<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TAC/COM-04 | FINAL - 5G Optimized</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --amber: #ffb000; --bg: #0d0900; --red: #8c3024; --blue: #00d4ff; --green: #39ff14; }
        body { background: #050505; color: var(--amber); font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; touch-action: manipulation; overflow: hidden; }
        .mainframe { width: 95%; max-width: 850px; background: #222; border: 6px solid #111; padding: 15px; display: flex; flex-direction: column; box-shadow: 0 0 60px #000; box-sizing: border-box; }
        @media (min-width: 768px) { .mainframe { display: grid; grid-template-columns: 1fr 320px; height: 600px; gap: 20px; } }
        .monitor { background: var(--bg); border: 10px solid #1a1a1a; border-radius: 15px; padding: 20px; flex-grow: 1; display: flex; flex-direction: column; position: relative; border-top: 4px solid #333; box-shadow: inset 0 0 20px #000; }
        #output { height: 220px; overflow-y: auto; font-size: 0.8rem; scrollbar-width: none; border-bottom: 1px solid #333; margin-bottom: 10px; color: var(--amber); }
        .module { background: #111; padding: 12px; border: 1px solid #333; margin-bottom: 10px; }
        .btn-ptt { width: 100%; height: 140px; background: var(--red); color: white; border: 5px solid #5e1e16; font-weight: bold; font-size: 1.3rem; cursor: pointer; transition: 0.1s; box-shadow: 0 6px 0 #401010; }
        .btn-ptt:active:not(:disabled) { background: #f00; transform: translateY(4px); box-shadow: 0 2px 0 #401010; }
        .btn-ptt:disabled { background: #333; opacity: 0.4; box-shadow: none; }
        .btn-action { width: 100%; padding: 10px; background: #333; color: #fff; border: 1px solid #555; cursor: pointer; font-weight: bold; font-size: 0.7rem; text-transform: uppercase; }
        input { width: 100%; background: #000; border: 1px solid #444; color: var(--amber); padding: 10px; box-sizing: border-box; outline: none; text-align: center; font-size: 1.2rem; letter-spacing: 2px; }
        .status-led { width: 12px; height: 12px; border-radius: 50%; background: #200; display: inline-block; }
        .online { background: var(--blue); box-shadow: 0 0 10px var(--blue); }
        .tx { background: #f00; box-shadow: 0 0 10px #f00; animation: pulse 1s infinite; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }
        #meter { width: 100%; height: 10px; background: #000; border: 1px solid #333; margin-top: auto; position: relative; }
        #meter-fill { width: 0%; height: 100%; background: var(--green); transition: width 0.08s linear; box-shadow: 0 0 10px var(--green); }
    </style>
</head>
<body>
<div class="mainframe">
    <div class="monitor">
        <div style="font-size: 0.6rem; display:flex; justify-content:space-between; margin-bottom:10px;">
            <span>FREQ: <span id="curFreq" style="color:var(--blue)">UNSET</span></span>
            <span>UPLINK: <span id="stat">OFFLINE</span></span>
        </div>
        <div id="output"><div>> SYSTEM READY. SELECT CHANNEL...</div></div>
        <div id="meter"><div id="meter-fill"></div></div>
    </div>
    <div class="side-panel">
        <div class="module">
            <div style="font-size: 0.6rem; color: #555; margin-bottom: 5px; text-align: center;">FREQUENCY BAND (1-99)</div>
            <input type="number" id="chanInput" value="1" min="1" max="99">
            <button class="btn-action" id="bootBtn" onclick="initChannel()" style="margin-top:10px; border-color:var(--green); color:var(--green);">INITIATE SECURE LINK</button>
        </div>
        <div class="module" style="text-align:center;">
            <button class="btn-ptt" id="pttBtn" disabled>HOLD TO TALK</button>
            <div style="margin-top:10px; font-size:0.5rem; display:flex; justify-content:space-around;">
                <span><div class="status-led" id="ledNet"></div> SYNC</span>
                <span><div class="status-led" id="ledTx"></div> TX</span>
            </div>
        </div>
        <button class="btn-action" onclick="location.reload()" style="background:#200; color: #fff;">HARD RESET</button>
    </div>
</div>

<script>
    let peer, conn, localStream, audioCtx, recorder, analyser, streamSource;
    let isRecording = false;
    const APP_PREFIX = "TAC-SECURE-V33-";

    function log(msg, color = "#ffb000") {
        const out = document.getElementById('output');
        const div = document.createElement('div');
        div.innerText = `> ${msg}`;
        div.style.color = color;
        out.appendChild(div);
        out.scrollTop = out.scrollHeight;
    }

    async function initChannel() {
        const chanNum = document.getElementById('chanInput').value.trim();
        if (!chanNum || chanNum < 1 || chanNum > 99) {
            log("INVALID CHANNEL (1-99)", "red");
            return;
        }

        const fullId = APP_PREFIX + chanNum;

        try {
            // Optimized for mobile + 5G
            localStream = await navigator.mediaDevices.getUserMedia({
                audio: {
                    echoCancellation: true,
                    noiseSuppression: true,
                    autoGainControl: true,
                    sampleRate: 48000
                }
            });

            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 256;
            streamSource = audioCtx.createMediaStreamSource(localStream);
            streamSource.connect(analyser);

            // Continuous recording with small chunks for lower latency on 5G
            recorder = new MediaRecorder(localStream, {
                mimeType: MediaRecorder.isTypeSupported('audio/webm;codecs=opus') 
                          ? 'audio/webm;codecs=opus' 
                          : 'audio/webm'
            });

            recorder.ondataavailable = (e) => {
                if (conn && conn.open && e.data && e.data.size > 100) {
                    conn.send(e.data);
                }
            };

            // Start continuous recording (low latency)
            recorder.start(250); // 250ms chunks - good balance for 5G

            document.getElementById('bootBtn').disabled = true;
            document.getElementById('curFreq').innerText = "CH-" + chanNum;
            document.getElementById('stat').innerText = "CONNECTING...";

            initPeer(fullId);
            updateMeter();
            log("AUDIO STREAM INITIALIZED (Opus @ 48kHz)", "#39ff14");
        } catch (e) {
            log("MIC ACCESS DENIED OR NOT SUPPORTED", "red");
            console.error(e);
        }
    }

    function initPeer(myId) {
        peer = new Peer(myId, {
            config: {
                iceServers: [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:stun1.l.google.com:19302' },
                    { urls: 'stun:stun2.l.google.com:19302' },
                    // Free reliable TURN (works well on 5G/mobile CGNAT)
                    {
                        urls: 'turn:global.relay.metered.ca:80',
                        username: 'metered',
                        credential: 'metered'
                    },
                    {
                        urls: 'turn:global.relay.metered.ca:443',
                        username: 'metered',
                        credential: 'metered'
                    }
                ],
                iceCandidatePoolSize: 10
            },
            debug: 2
        });

        peer.on('open', (id) => {
            log("CHANNEL HOSTED: " + id.split('-').pop(), "#39ff14");
            // Try connecting to self (for single device testing) or wait for incoming
            setTimeout(() => {
                if (!conn) {
                    const c = peer.connect(myId, { reliable: true });
                    setupHandlers(c);
                }
            }, 800);
        });

        peer.on('connection', (c) => setupHandlers(c));

        peer.on('error', (err) => {
            log("LINK ERROR: " + err.type, "red");
            if (err.type === 'unavailable-id') {
                log("CHANNEL BUSY → JOINING AS PEER", "#ffb000");
                peer.destroy();
                peer = new Peer(undefined, { /* same config as above */ });
                // ... (reuse logic)
            }
        });
    }

    function setupHandlers(c) {
        conn = c;
        conn.on('open', () => {
            document.getElementById('ledNet').classList.add('online');
            document.getElementById('pttBtn').disabled = false;
            document.getElementById('stat').innerText = "SECURE LINK UP";
            log("TCP TUNNEL ESTABLISHED OVER 5G", "#39ff14");
            playBeep(900, 0.08);
        });

        conn.on('data', async (data) => {
            if (!(data instanceof Blob)) return;
            document.getElementById('ledTx').classList.add('tx');
            const url = URL.createObjectURL(data);
            const audio = new Audio(url);
            audio.onended = () => URL.revokeObjectURL(url);
            await audio.play().catch(() => {});
            setTimeout(() => document.getElementById('ledTx').classList.remove('tx'), 800);
        });

        conn.on('close', () => {
            log("PEER DISCONNECTED", "red");
            document.getElementById('ledNet').classList.remove('online');
            document.getElementById('pttBtn').disabled = true;
            document.getElementById('stat').innerText = "DROPPED";
        });
    }

    function playBeep(freq, duration) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.frequency.value = freq;
        gain.gain.value = 0.04;
        osc.connect(gain).connect(audioCtx.destination);
        osc.start();
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
        osc.stop(audioCtx.currentTime + duration);
    }

    function updateMeter() {
        if (!analyser) return;
        const data = new Uint8Array(analyser.frequencyBinCount);
        analyser.getByteFrequencyData(data);
        let sum = 0;
        for (let i = 0; i < data.length; i++) sum += data[i];
        const avg = sum / data.length;
        document.getElementById('meter-fill').style.width = Math.min(100, avg * 2.8) + "%";
        requestAnimationFrame(updateMeter);
    }

    // PTT Handling (works on touch + mouse)
    const pttBtn = document.getElementById('pttBtn');
    let pttTimeout = null;

    function pttOn() {
        if (!conn || !conn.open || isRecording) return;
        isRecording = true;
        document.getElementById('ledTx').classList.add('tx');
        playBeep(1300, 0.06);
        log("TRANSMITTING...", "#00d4ff");
    }

    function pttOff() {
        if (!isRecording) return;
        isRecording = false;
        document.getElementById('ledTx').classList.remove('tx');
        playBeep(500, 0.15);
    }

    pttBtn.onmousedown = pttOn;
    pttBtn.onmouseup = pttOff;
    pttBtn.ontouchstart = (e) => { e.preventDefault(); pttOn(); };
    pttBtn.ontouchend = (e) => { e.preventDefault(); pttOff(); };

    // Cleanup on page unload
    window.addEventListener('beforeunload', () => {
        if (recorder && recorder.state === "recording") recorder.stop();
        if (localStream) localStream.getTracks().forEach(t => t.stop());
        if (peer) peer.destroy();
    });

    log("5G-OPTIMIZED TAC/COM SYSTEM LOADED", "#39ff14");
</script>
</body>
</html>
