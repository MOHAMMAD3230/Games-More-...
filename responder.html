<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TAC/COM v20.0 | STABLE</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --amber: #ffb000; --bg: #050505; --red: #ff3e3e; --blue: #00d4ff; --green: #39ff14; }
        body { background: var(--bg); color: var(--amber); font-family: 'Courier New', monospace; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        .deck { width: 90%; max-width: 400px; background: #111; border: 2px solid #333; padding: 25px; border-radius: 15px; box-shadow: 0 0 50px #000; }
        .monitor { background: #000; border: 1px solid #222; padding: 12px; height: 120px; overflow-y: auto; font-size: 0.75rem; color: #0f0; margin-bottom: 20px; border-radius: 4px; border-left: 4px solid var(--green); }
        .ptt-btn { width: 100%; height: 150px; background: radial-gradient(#300, #100); border: 5px solid #500; border-radius: 50%; color: var(--red); font-weight: bold; font-size: 1.8rem; cursor: pointer; transition: 0.1s; -webkit-tap-highlight-color: transparent; }
        .ptt-btn:active:not(:disabled) { background: var(--red); color: #fff; box-shadow: 0 0 50px var(--red); transform: scale(0.98); }
        .ptt-btn:disabled { opacity: 0.1; filter: grayscale(1); }
        .led-status { display: flex; justify-content: space-around; margin-top: 25px; background: #000; padding: 15px; border-radius: 8px; border: 1px solid #222; }
        .led-box { display: flex; flex-direction: column; align-items: center; font-size: 0.6rem; color: #555; gap: 8px; }
        .led { width: 15px; height: 15px; border-radius: 50%; background: #1a1a1a; transition: 0.2s; }
        .led-blue.on { background: var(--blue); box-shadow: 0 0 15px var(--blue); }
        .led-green.on { background: var(--green); box-shadow: 0 0 15px var(--green); }
    </style>
</head>
<body>

<div class="deck">
    <div style="font-size: 0.6rem; color: #444; margin-bottom: 10px; letter-spacing: 2px;">SECURE COMMS v20.0</div>
    <div id="mon" class="monitor">> LINK ESTABLISHED. READY.</div>
    
    <div style="display: flex; justify-content: center;"><button class="ptt-btn" id="ptt">PTT</button></div>
    
    <div class="led-status">
        <div class="led-box"><div class="led led-blue on" id="l1"></div>NET</div>
        <div class="led-box"><div class="led led-green on" id="l2"></div>SYNC</div>
    </div>
</div>

<script>
    // Note: This logic assumes the handshake from v19.0 is already active.
    // Ensure you use the same ROOM_KEY on both devices.
    let lStream, aCtx, sGain;

    async function initAudio() {
        lStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        aCtx = new (window.AudioContext || window.webkitAudioContext)();
        sGain = aCtx.createGain();
        sGain.connect(aCtx.destination);
        mute(true);
    }

    function mute(m) {
        if(lStream) lStream.getAudioTracks().forEach(t => t.enabled = !m);
        if(sGain) sGain.gain.setValueAtTime(m ? 1 : 0, aCtx.currentTime);
    }

    const p = document.getElementById('ptt');
    const start = (e) => { e.preventDefault(); mute(false); };
    const stop = (e) => { e.preventDefault(); mute(true); };

    p.onmousedown = start; p.onmouseup = stop;
    p.ontouchstart = start; p.ontouchend = stop;

    // Run hardware init immediately
    initAudio();
</script>
</body>
</html>
