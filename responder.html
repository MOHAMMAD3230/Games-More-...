<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TAC/COM v22.0 | BOOT</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --amber: #ffb000; --bg: #050505; --red: #ff3e3e; --blue: #00d4ff; --green: #39ff14; }
        body { background: var(--bg); color: var(--amber); font-family: 'Courier New', monospace; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; touch-action: none; overflow: hidden; }
        .deck { width: 90%; max-width: 400px; background: #111; border: 2px solid #333; padding: 25px; border-radius: 15px; text-align: center; box-shadow: 0 0 50px #000; }
        
        /* BOOT BUTTON - MUST CLICK FIRST */
        .btn-boot { width: 100%; background: var(--red); color: #fff; border: none; padding: 20px; font-weight: bold; border-radius: 8px; cursor: pointer; font-size: 1.2rem; margin-bottom: 20px; box-shadow: 0 0 20px rgba(255,0,0,0.3); }
        .btn-boot.active { background: var(--green); color: #000; box-shadow: 0 0 20px var(--green); }

        /* PTT BUTTON - STAYS LOCKED UNTIL BOOT */
        .ptt-btn { width: 160px; height: 160px; background: #222; border: 8px solid #333; border-radius: 50%; color: #444; font-weight: bold; font-size: 1.8rem; cursor: not-allowed; margin: 0 auto; transition: 0.2s; -webkit-tap-highlight-color: transparent; }
        .ptt-btn.unlocked { border-color: var(--red); color: var(--red); background: #300; cursor: pointer; box-shadow: 0 0 30px rgba(255, 0, 0, 0.2); }
        .ptt-btn.unlocked:active { background: var(--red); color: #fff; transform: scale(0.95); box-shadow: 0 0 50px var(--red); }

        .status-text { font-size: 0.7rem; color: #555; margin-top: 15px; letter-spacing: 2px; text-transform: uppercase; }
        #log { font-size: 0.8rem; color: var(--blue); margin-bottom: 10px; height: 20px; }
    </style>
</head>
<body>

<div class="deck">
    <div id="log">SYSTEM COLD</div>
    
    <button class="btn-boot" id="bootBtn" onclick="runBootSequence()">POWER ON COMMS</button>
    
    <button class="ptt-btn" id="ptt">PTT</button>
    
    <div class="status-text" id="stat">HARDWARE LOCKED</div>
</div>

<script>
    let aCtx, lStream, sGain;

    async function runBootSequence() {
        const bootBtn = document.getElementById('bootBtn');
        const pttBtn = document.getElementById('ptt');
        const log = document.getElementById('log');
        const stat = document.getElementById('stat');

        try {
            // 1. Force Audio Context
            aCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (aCtx.state === 'suspended') await aCtx.resume();

            // 2. Request Mic (The "Push" that unlocks the browser)
            lStream = await navigator.mediaDevices.getUserMedia({ 
                audio: { echoCancellation: true, noiseSuppression: true } 
            });

            // 3. Setup Audio Graph
            sGain = aCtx.createGain();
            sGain.connect(aCtx.destination);
            
            // 4. Update UI
            bootBtn.innerText = "SYSTEM ONLINE";
            bootBtn.classList.add('active');
            bootBtn.disabled = true;
            
            pttBtn.classList.add('unlocked');
            log.innerText = "UPLINK STABLE";
            stat.innerText = "READY FOR TRANSMISSION";
            
            // Initialize Mute State
            toggleMute(true);

            // ATTACH PTT EVENTS (Now they will work)
            pttBtn.onmousedown = () => toggleMute(false);
            pttBtn.onmouseup = () => toggleMute(true);
            pttBtn.ontouchstart = (e) => { e.preventDefault(); toggleMute(false); };
            pttBtn.ontouchend = (e) => { e.preventDefault(); toggleMute(true); };

        } catch (e) {
            log.innerText = "HARDWARE FAILURE";
            stat.innerText = "CHECK MIC PERMISSIONS";
        }
    }

    function toggleMute(isMuted) {
        if (!lStream || !sGain) return;
        // Enable/Disable the mic track
        lStream.getAudioTracks().forEach(t => t.enabled = !isMuted);
        // Enable/Disable the speaker to prevent feedback
        sGain.gain.setValueAtTime(isMuted ? 1 : 0, aCtx.currentTime);
    }
</script>
</body>
</html>
