<!DOCTYPE html>
<html lang="en">
<head>

   <link rel="icon" href="https://mohammad3230.github.io/PROJECT/favicon.png" type="image/png" sizes="32x32" />

  <!-- Google tag (gtag.js) -->

<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://unpkg.com; style-src 'self' 'unsafe-inline'; connect-src 'self' wss://0.peerjs.com wss://*.peerjs.com https://0.peerjs.com https://*.peerjs.com; img-src 'self' data: https:; font-src 'self' https://fonts.gstatic.com;">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>MESH // Relay Chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg0:#050505;--bg1:#0a0a0a;--bg2:#111;--bg3:#1a1a1a;
  --amber:#ffb000;--amber-dim:#7a5500;
  --green:#39ff14;--cyan:#00d4ff;--red:#ff3333;--yellow:#ffe066;
  --dim:#2a2a2a;--muted:#555;
  --font:'JetBrains Mono','Courier New',monospace;
}
html{height:100%}
body{
  background:var(--bg0);color:var(--amber);font-family:var(--font);font-size:15px;
  line-height:1.6;overflow:hidden;
  height:100vh;height:100dvh;
}
#scanlines{position:fixed;inset:0;pointer-events:none;z-index:9999;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.04) 2px,rgba(0,0,0,.04) 4px)}

#setup-screen{display:flex;align-items:center;justify-content:center;height:100%;min-height:0;padding:20px}
.setup-card{background:var(--bg1);border:1px solid var(--amber-dim);padding:36px;width:100%;max-width:440px;position:relative}
.setup-card::after{content:'';position:absolute;inset:-1px;border:1px solid var(--amber);opacity:.15;filter:blur(8px);pointer-events:none}
.setup-logo{text-align:center;margin-bottom:28px}
.setup-logo h1{font-size:30px;font-weight:700;letter-spacing:10px;text-shadow:0 0 30px rgba(255,176,0,.2)}
.setup-logo p{color:var(--muted);font-size:10px;letter-spacing:3px;text-transform:uppercase;margin-top:4px}
.field{margin-bottom:18px}
.field label{display:block;font-size:9px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:5px}
.field input{width:100%;padding:12px 11px;background:var(--bg0);border:1px solid var(--dim);color:var(--amber);font-family:var(--font);font-size:16px;outline:none;transition:border-color .2s}
.field input:focus{border-color:var(--amber)}
.field input::placeholder{color:#333}
.field-row{display:flex;gap:12px}
.field-row .field{flex:1}
.field-row .field.chan{flex:0 0 90px}
.connect-btn{width:100%;padding:14px;background:transparent;border:1px solid var(--amber);color:var(--amber);font-family:var(--font);font-size:12px;font-weight:700;letter-spacing:4px;text-transform:uppercase;cursor:pointer;transition:all .15s;margin-top:4px}
.connect-btn:hover{background:var(--amber);color:var(--bg0)}
.connect-btn:active{transform:scale(.98)}
.connect-btn:disabled{opacity:.3;cursor:not-allowed;transform:none}
.connect-btn:disabled:hover{background:transparent;color:var(--amber)}
.setup-info{margin-top:24px;font-size:10px;color:#333;line-height:2.1}
.setup-info b{color:var(--green);font-weight:400}

#chat-screen{display:none;flex-direction:column;height:100%;min-height:0;animation:crtOn .2s ease-out}
@keyframes crtOn{0%{opacity:0;filter:brightness(2)}25%{opacity:1;filter:brightness(.6)}100%{filter:brightness(1)}}

header{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;background:var(--bg1);border-bottom:1px solid #151515;flex-shrink:0;gap:8px;flex-wrap:wrap}
.hdr-left{display:flex;align-items:center;gap:9px}
.hdr-title{font-size:11px;font-weight:700;letter-spacing:5px}
.hdr-chan{font-size:10px;color:var(--muted);letter-spacing:1px}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot.ok{background:var(--green);box-shadow:0 0 6px var(--green);animation:pulse 2s ease-in-out infinite}
.dot.wait{background:var(--yellow);box-shadow:0 0 6px var(--yellow);animation:pulse .5s ease-in-out infinite}
.dot.off{background:var(--red);box-shadow:0 0 6px var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.hdr-right{display:flex;align-items:center;gap:6px}
.hbtn{padding:8px 10px;background:transparent;border:1px solid #1a1a1a;color:var(--muted);font-family:var(--font);font-size:9px;letter-spacing:1px;cursor:pointer;transition:all .15s;white-space:nowrap;min-height:36px;display:flex;align-items:center}
.hbtn:hover{border-color:var(--amber);color:var(--amber)}
.hbtn.danger:hover{border-color:var(--red);color:var(--red)}
.hbtn.active{border-color:var(--green);color:var(--green)}

.ind-bar{display:flex;align-items:center;gap:2px;padding:4px 14px;background:var(--bg1);border-bottom:1px solid #111;flex-shrink:0;overflow-x:auto;-webkit-overflow-scrolling:touch;transition:border-color .3s,box-shadow .3s}
.ind-bar.flash{border-color:var(--green);box-shadow:0 0 10px rgba(57,255,20,.15)}
.ind{display:flex;align-items:center;gap:4px;padding:2px 8px;border:1px solid #151515;background:rgba(255,255,255,.01);white-space:nowrap}
.ind-l{font-size:8px;color:#333;letter-spacing:1px;text-transform:uppercase;font-weight:700}
.ind-v{font-size:10px;font-weight:700;letter-spacing:.5px}
.ind-v.g{color:var(--green)}.ind-v.y{color:var(--yellow)}.ind-v.r{color:var(--red)}.ind-v.m{color:var(--muted)}.ind-v.c{color:var(--cyan)}
.ind-sep{width:1px;height:14px;background:#151515;flex-shrink:0}

.msg-wrap{flex:1;position:relative;overflow:hidden;background:var(--bg0);min-height:0}
#messages{position:absolute;inset:0;overflow-y:auto;padding:12px 14px;-webkit-overflow-scrolling:touch}
#messages::-webkit-scrollbar{width:4px}
#messages::-webkit-scrollbar-track{background:transparent}
#messages::-webkit-scrollbar-thumb{background:#1a1a1a;border-radius:2px}

/* ── Messages: BOLD + LARGE ── */
.m{padding:2px 0;animation:mIn .1s ease-out;line-height:1.7}
@keyframes mIn{from{opacity:0;transform:translateY(2px)}to{opacity:1;transform:translateY(0)}}
.m.glow{text-shadow:0 0 5px currentColor;transition:text-shadow .6s ease}
.m .ts{color:#333;margin-right:8px;font-size:12px;font-weight:300}
/* Message text: bold 16px — the main change */
.m > span:last-child{font-size:16px;font-weight:700;letter-spacing:.3px}
.m.sys > span:last-child{font-size:13px;font-weight:400;font-style:italic}
.m.self > span:last-child{font-size:16px;font-weight:700}
.m.warn > span:last-child{font-size:16px;font-weight:700}
.m.err > span:last-child{font-size:16px;font-weight:700}
.m.dbg > span:last-child{font-size:12px;font-weight:400;color:#3a3a3a}

.peer-panel{position:absolute;top:0;right:0;width:280px;max-height:100%;background:rgba(5,5,5,.97);border-left:1px solid var(--amber-dim);transform:translateX(100%);transition:transform .2s ease;z-index:10;display:flex;flex-direction:column}
.peer-panel.open{transform:translateX(0)}
.pp-hdr{padding:10px 12px;font-size:9px;letter-spacing:3px;color:var(--amber);border-bottom:1px solid #1a1a1a;flex-shrink:0;text-transform:uppercase;display:flex;justify-content:space-between;align-items:center}
.pp-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;padding:2px 6px;font-family:var(--font)}
.pp-close:hover{color:var(--amber)}
.pp-body{flex:1;overflow-y:auto;padding:6px 0;-webkit-overflow-scrolling:touch}
.pp-row{display:flex;align-items:center;gap:6px;padding:6px 12px;font-size:11px;border-bottom:1px solid #0d0d0d}
.pp-row.self{background:rgba(255,176,0,.03)}
.pp-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.pp-name{flex:1;color:var(--amber);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pp-role{font-size:8px;color:var(--muted);letter-spacing:1px;min-width:36px;text-align:right}
.pp-rtt{font-size:10px;min-width:44px;text-align:right;font-weight:700}
.pp-rtt.pg{color:var(--green)}.pp-rtt.py{color:var(--yellow)}.pp-rtt.pr{color:var(--red)}
.pp-sig{font-size:9px;min-width:42px;text-align:right;letter-spacing:1px}
.pp-ft{padding:8px 12px;font-size:9px;color:#333;border-top:1px solid #1a1a1a;flex-shrink:0;letter-spacing:1px}

.typing-bar{padding:2px 14px 0;background:var(--bg0);font-size:11px;color:#555;height:22px;flex-shrink:0}
.tdots::after{content:'...';animation:tdots 1.2s steps(4,end) infinite}
@keyframes tdots{0%{content:''}25%{content:'.'}50%{content:'..'}75%{content:'...'}}

.input-bar{display:flex;padding:8px 14px;background:var(--bg1);border-top:1px solid #151515;gap:8px;flex-shrink:0}
.input-bar input{flex:1;padding:12px 11px;background:var(--bg0);border:1px solid var(--dim);color:var(--amber);font-family:var(--font);font-size:16px;outline:none;transition:border-color .2s;min-width:0}
.input-bar input:focus{border-color:var(--amber)}
.input-bar input::placeholder{color:#333}
.send-btn{padding:12px 18px;background:transparent;border:1px solid var(--amber);color:var(--amber);font-family:var(--font);font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .12s;min-height:44px;display:flex;align-items:center}
.send-btn:hover{background:var(--amber);color:var(--bg0)}
.send-btn:active{transform:scale(.96)}

.rate-warn{padding:4px 14px;background:rgba(255,50,50,.08);border-top:1px solid #331111;color:var(--red);font-size:10px;flex-shrink:0;display:none;letter-spacing:.5px}
.rate-warn.show{display:block}

@media(max-width:520px){
  .setup-card{padding:22px}.setup-logo h1{font-size:22px;letter-spacing:5px}
  .ind-bar{gap:1px;padding:3px 8px}.ind{padding:2px 5px}.ind-l{font-size:7px}.ind-v{font-size:9px}
  .peer-panel{width:100%}header{padding:6px 10px}
  .hbtn{padding:6px 8px;min-height:34px;font-size:8px}
  .input-bar{padding:6px 10px}
  .input-bar input,.field input{font-size:16px}
  .m > span:last-child{font-size:15px}
}
@media(prefers-reduced-motion:reduce){
  .m{animation:none}.dot{animation:none}.tdots::after{animation:none;content:'...'}
  #scanlines{display:none}#chat-screen{animation:none}.ind-bar{transition:none}
}
</style>
</head>
<body>

<div id="scanlines" aria-hidden="true"></div>

<section id="setup-screen" role="main">
  <div class="setup-card">
    <div class="setup-logo"><h1>MESH</h1><p>Cross-Device Relay Chat</p></div>
    <div class="field">
      <label for="in-user">Callsign</label>
      <input type="text" id="in-user" placeholder="Your name" maxlength="20" autocomplete="off" spellcheck="false" inputmode="text">
    </div>
    <div class="field-row">
      <div class="field chan">
        <label for="in-chan">Channel</label>
        <input type="number" id="in-chan" placeholder="01" min="1" max="99" inputmode="numeric">
      </div>
      <div class="field">
        <label>&nbsp;</label>
        <button class="connect-btn" id="btn-go">Establish Link</button>
      </div>
    </div>
    <div class="setup-info">
      <b>&#9632;</b> First node = relay, auto-failover on drop<br>
      <b>&#9632;</b> Multi-peer star topology, heartbeat monitoring<br>
      <b>&#9632;</b> WebRTC data channels, DTLS encrypted
    </div>
  </div>
</section>

<section id="chat-screen" role="main">
  <header>
    <div class="hdr-left">
      <div class="dot wait" id="dot" aria-label="Connection status"></div>
      <div><div class="hdr-title">MESH</div><div class="hdr-chan" id="hdr-chan">CH-00</div></div>
    </div>
    <div class="hdr-right">
      <span class="ind-v m" id="hdr-peers" style="font-size:10px">1 node</span>
      <button class="hbtn active" id="btn-snd" title="Toggle sound" aria-label="Toggle sound">SND</button>
      <button class="hbtn" id="btn-peers" title="Peer panel" aria-label="Toggle peer panel">PEERS</button>
      <button class="hbtn" id="btn-cpy" title="Copy channel info" aria-label="Copy channel info">COPY</button>
      <button class="hbtn danger" id="btn-disc" title="Disconnect" aria-label="Disconnect">DISC</button>
    </div>
  </header>

  <div class="ind-bar" id="ind-bar">
    <div class="ind"><span class="ind-l">Link</span><span class="ind-v m" id="v-link">OFFLINE</span></div>
    <div class="ind-sep"></div>
    <div class="ind"><span class="ind-l">Ping</span><span class="ind-v m" id="v-ping">--ms</span></div>
    <div class="ind-sep"></div>
    <div class="ind"><span class="ind-l">Sig</span><span class="ind-v m" id="v-sig">&#9617;&#9617;&#9617;&#9617;&#9617;</span></div>
    <div class="ind-sep"></div>
    <div class="ind"><span class="ind-l">Enc</span><span class="ind-v m" id="v-enc">NONE</span></div>
    <div class="ind-sep"></div>
    <div class="ind"><span class="ind-l">Tx/Rx</span><span class="ind-v m" id="v-txrx">0/0</span></div>
    <div class="ind-sep"></div>
    <div class="ind"><span class="ind-l">Up</span><span class="ind-v m" id="v-up">00:00:00</span></div>
  </div>

  <div class="msg-wrap" id="msg-wrap">
    <div id="messages" role="log" aria-live="polite"></div>
    <div class="peer-panel" id="peer-panel" aria-label="Peer details">
      <div class="pp-hdr"><span>Peer Manifest</span><button class="pp-close" id="pp-close" aria-label="Close panel">&times;</button></div>
      <div class="pp-body" id="pp-body"></div>
      <div class="pp-ft" id="pp-ft"></div>
    </div>
  </div>

  <div class="typing-bar" id="typing-bar" aria-live="polite"></div>
  <div class="rate-warn" id="rate-warn">RATE LIMITED - slow down</div>
  <div class="input-bar">
    <input type="text" id="in-msg" placeholder="Enter message..." maxlength="500" autocomplete="off" spellcheck="false" aria-label="Message input" inputmode="text">
    <button class="send-btn" id="btn-send">Send</button>
  </div>
</section>

<script>
(function(){
'use strict';

var C={
  PREFIX:'MESH-',MAX_MSG:500,
  RATE_MAX:12,RATE_WINDOW:10000,
  HB_MS:12000,DEAD_MS:42000,TYPING_MS:3000,
  FAIL_MIN:900,FAIL_MAX:2600,
  CONN_TIMEOUT:20000,DESTROY_DELAY:1500,OPEN_TIMEOUT:10000,
  ICE:[{urls:'stun:stun.l.google.com:19302'}],
  COLORS:['#39ff14','#00d4ff','#ff6b9d','#c084fc','#fb923c','#facc15','#34d399','#f472b6','#a78bfa','#67e8f9','#f87171','#86efac','#fbbf24','#22d3ee','#e879f9']
};

var S={
  peer:null,conns:new Map(),isHost:false,channel:null,user:null,myColor:null,cIdx:0,
  totalPeers:1,connecting:false,destroying:false,
  hbTimer:null,cleanTimer:null,typeTimer:null,
  peerTimeout:null,openTimeout:null,upTimer:null,
  rtt:0,rttHist:[],iceState:'new',
  msgTx:0,msgRx:0,bytesTx:0,bytesRx:0,startTime:null,
  audioCtx:null,soundOn:true,unread:0,title:document.title,
  typingUsers:new Map(),panelOpen:false,
  rateLog:new Map(),selfRateLog:[]
};

var $=function(id){return document.getElementById(id)};
var elMsgs=$('messages'),elTyping=$('typing-bar'),elDot=$('dot'),
    elChan=$('hdr-chan'),elPeers=$('hdr-peers'),
    elInUser=$('in-user'),elInChan=$('in-chan'),elInMsg=$('in-msg'),
    elIndBar=$('ind-bar'),elPanel=$('peer-panel'),elMsgWrap=$('msg-wrap'),
    elSetup=$('setup-screen'),elChat=$('chat-screen'),elRateWarn=$('rate-warn');

var saved=localStorage.getItem('mesh-user');
if(saved)elInUser.value=saved;
elInUser.focus();

 $('btn-go').addEventListener('click',doConnect);
elInUser.addEventListener('keydown',function(e){if(e.key==='Enter')elInChan.focus()});
elInChan.addEventListener('keydown',function(e){if(e.key==='Enter')doConnect()});
 $('btn-send').addEventListener('click',doSend);
elInMsg.addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();doSend()}});
elInMsg.addEventListener('input',onOwnTyping);
 $('btn-cpy').addEventListener('click',doCopy);
 $('btn-disc').addEventListener('click',doDisconnect);
 $('btn-snd').addEventListener('click',toggleSound);
 $('btn-peers').addEventListener('click',togglePanel);
 $('pp-close').addEventListener('click',closePanel);
elMsgWrap.addEventListener('click',function(e){
  if(S.panelOpen&&!elPanel.contains(e.target)&&e.target!=$('btn-peers'))closePanel();
});
document.addEventListener('visibilitychange',function(){if(!document.hidden){S.unread=0;document.title=S.title}});
window.addEventListener('beforeunload',function(){safeDestroy()});

function beep(f,d,v){if(!S.soundOn)return;try{if(!S.audioCtx)S.audioCtx=new(window.AudioContext||window.webkitAudioContext)();if(S.audioCtx.state==='suspended')S.audioCtx.resume();var c=S.audioCtx,o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=f;o.type='sine';g.gain.value=v;o.start();g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);o.stop(c.currentTime+d+.01)}catch(e){}}
function sndMsg(){beep(880,.1,.06)}
function sndJoin(){beep(660,.07,.04);setTimeout(function(){beep(990,.1,.04)},70)}
function sndLeave(){beep(330,.14,.04)}
function sndErr(){beep(200,.22,.06)}
function toggleSound(){S.soundOn=!S.soundOn;var b=$('btn-snd');b.textContent=S.soundOn?'SND':'MUT';b.classList.toggle('active',S.soundOn)}

function ts(){return new Date().toLocaleTimeString([],{hour12:false})}
function trunc(s,n){return s.length>n?s.substring(0,n):s}
function escHtml(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}
function nextColor(){return C.COLORS[S.cIdx++%C.COLORS.length]}
function sigBars(l){return '\u2588'.repeat(Math.max(0,l))+'\u2591'.repeat(Math.max(0,5-l))}
function sigColor(l){return l>=4?'var(--green)':l>=3?'var(--yellow)':l>=1?'var(--red)':'#330000'}
function iceLevel(st){return st==='connected'||st==='completed'?5:st==='checking'?3:st==='new'?2:st==='disconnected'?1:0}
function pingCls(ms){if(typeof ms!=='number'||isNaN(ms))return' m';return ms<80?' pg':ms<250?' py':' pr'}
function fmtUptime(ms){var s=Math.floor(ms/1000),h=Math.floor(s/3600),m=Math.floor(s%3600/60);s=s%60;return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0')}
function smoothRtt(arr){if(!arr.length)return'--';return Math.round(arr.reduce(function(a,b){return a+b},0)/arr.length)}

function isRateLimited(logArr){var now=Date.now();while(logArr.length&&logArr[0]<now-C.RATE_WINDOW)logArr.shift();return logArr.length>=C.RATE_MAX}
function recordMsg(logArr){logArr.push(Date.now())}

function clearAllTimers(){['peerTimeout','openTimeout','hbTimer','cleanTimer','upTimer','typeTimer'].forEach(function(k){if(S[k]){clearTimeout(S[k]);clearInterval(S[k]);S[k]=null}})}
function safeDestroy(){if(S.destroying)return;S.destroying=true;clearAllTimers();if(S.peer){try{S.peer.destroy()}catch(e){}S.peer=null}S.conns.clear();S.typingUsers.clear();S.connecting=false;S.destroying=false}

function addLine(text,cls){var div=document.createElement('div');div.className='m'+(cls?' '+cls:'');var t=document.createElement('span');t.className='ts';t.textContent=ts();var s=document.createElement('span');s.textContent=text;div.appendChild(t);div.appendChild(s);elMsgs.appendChild(div);elMsgs.scrollTop=elMsgs.scrollHeight;div.classList.add('glow');setTimeout(function(){div.classList.remove('glow')},600);return div}
function logSys(t){addLine(t,'sys')}
function logDbg(t){addLine(t,'dbg')}
function logWarn(t){addLine(t,'warn');sndErr()}
function logErr(t){addLine(t,'err');sndErr()}
function logSelf(t){addLine('>> '+S.user+' '+t,'self')}
function logPeer(name,text,color){var el=addLine(name+' >> '+text,'');el.style.color=color}

function flashBar(){elIndBar.classList.add('flash');setTimeout(function(){elIndBar.classList.remove('flash')},300)}
function setIndV(id,v,cls){try{var el=$(id);el.textContent=v;el.className='ind-v '+(cls||'m')}catch(e){}}
function updLink(v,cls){setIndV('v-link',v,cls)}
function updPing(ms){if(typeof ms!=='number'||isNaN(ms)){setIndV('v-ping','--ms','m');return}setIndV('v-ping',ms+'ms',ms<80?'g':ms<250?'y':'r')}
function updSig(state){try{var l=iceLevel(state),el=$('v-sig');el.textContent=sigBars(l);el.style.color=sigColor(l)}catch(e){}}
function updEnc(on){setIndV('v-enc',on?'DTLS':'NONE',on?'g':'r')}
function updTxRx(){setIndV('v-txrx',S.msgTx+'/'+S.msgRx,'c')}
function updUptime(){try{var el=$('v-up');el.textContent=S.startTime?fmtUptime(Date.now()-S.startTime):'00:00:00';el.className='ind-v m'}catch(e){}}
function updNodeCount(){try{var c=S.isHost?S.conns.size+1:S.totalPeers;elPeers.textContent=c+' node'+(c!==1?'s':'')}catch(e){}}
function setIndicatorsConnected(){try{updLink(S.isHost?'RELAY':'LINKED','g');updEnc(true);updSig('connected');S.startTime=S.startTime||Date.now();startUptime()}catch(e){}}
function setIndicatorsOffline(){try{updLink('OFFLINE','r');updPing(null);updSig('closed');updEnc(false);stopUptime()}catch(e){}}
function setIndicatorsWaiting(){try{updLink('SYNCING','y');updSig('checking')}catch(e){}}

function startUptime(){stopUptime();S.upTimer=setInterval(updUptime,1000);updUptime()}
function stopUptime(){if(S.upTimer){clearInterval(S.upTimer);S.upTimer=null}}

function togglePanel(){S.panelOpen?closePanel():openPanel()}
function openPanel(){S.panelOpen=true;elPanel.classList.add('open');$('btn-peers').classList.add('active');renderPeerPanel()}
function closePanel(){S.panelOpen=false;elPanel.classList.remove('open');$('btn-peers').classList.remove('active')}
function renderPeerPanel(){if(!S.panelOpen)return;try{var body=$('pp-body');body.innerHTML='';var selfRtt=S.isHost?'--':smoothRtt(S.rttHist);body.appendChild(makeRow(S.user,S.myColor,S.isHost?'RELAY':'CLIENT',selfRtt,S.iceState,true));S.conns.forEach(function(info){body.appendChild(makeRow(info.user,info.color,S.isHost?'PEER':'HOST',smoothRtt(S.isHost?info.rttHist:S.rttHist),info.iceState||'new',false))});var c=S.isHost?S.conns.size+1:S.totalPeers;$('pp-ft').textContent=c+' nodes | CH-'+S.channel+' | '+(S.startTime?fmtUptime(Date.now()-S.startTime):'00:00:00')}catch(e){}}
function makeRow(name,color,role,rtt,iceSt,self){var d=document.createElement('div');d.className='pp-row'+(self?' self':'');var l=iceLevel(iceSt),rt=typeof rtt==='number'?rtt:rtt;d.innerHTML='<span class="pp-dot" style="background:'+color+'"></span><span class="pp-name">'+escHtml(name)+'</span><span class="pp-role">'+role+'</span><span class="pp-rtt'+pingCls(rt)+'">'+rt+'ms</span><span class="pp-sig" style="color:'+sigColor(l)+'">'+sigBars(l)+'</span>';return d}

function trackIce(conn,peerId){try{var pc=conn.peerConnection;if(!pc)return;var rtc=pc._pc||pc.pc||pc.peerConnection||pc;if(!rtc||typeof rtc.addEventListener!=='function')return;function upd(){try{var st=rtc.iceConnectionState||'new';if(S.isHost&&S.conns.has(peerId)){var info=S.conns.get(peerId);if(info){if(st!==info.iceState){info.iceState=st;logDbg('ICE '+st.toUpperCase()+' ('+(info.user||peerId)+')');renderPeerPanel()}}}else{if(st!==S.iceState){S.iceState=st;logDbg('ICE '+st.toUpperCase());if(!S.isHost)updSig(st);renderPeerPanel()}}}catch(e){}}rtc.addEventListener('iceconnectionstatechange',upd)}catch(e){}}

function setDot(cls){elDot.className='dot '+cls}
function showTyping(n){S.typingUsers.set(n,true);renderTyping()}
function hideTyping(n){S.typingUsers.delete(n);renderTyping()}
function renderTyping(){var names=[].slice.call(S.typingUsers.keys());if(!names.length){elTyping.innerHTML='';return}var who=names.length<=2?names.map(escHtml).join(', '):escHtml(names[0])+' +'+(names.length-1);elTyping.innerHTML='<span>'+who+'</span> typing<span class="tdots"></span>'}
function notify(){if(document.hidden){S.unread++;document.title='('+S.unread+') '+S.title;sndMsg()}}
function showRateWarn(show){elRateWarn.classList.toggle('show',show)}

// ════════════════════════════════════════
//  CONNECTION
// ════════════════════════════════════════

function doConnect(){
  if(S.connecting)return;
  var user=elInUser.value.trim(),chan=elInChan.value.trim();
  if(!user){logWarn('Callsign required.');elInUser.focus();return}
  if(!chan||+chan<1||+chan>99||chan!==String(+chan)){logWarn('Channel must be 1-99.');elInChan.focus();return}
  if(typeof Peer==='undefined'){logErr('PeerJS failed to load. Refresh.');return}
  S.user=trunc(user,20);S.channel=chan;localStorage.setItem('mesh-user',S.user);
  S.connecting=true;S.rtt=0;S.rttHist=[];S.msgTx=0;S.msgRx=0;S.bytesTx=0;S.bytesRx=0;S.startTime=null;S.iceState='new';S.rateLog.clear();S.selfRateLog=[];
  updTxRx();updUptime();showRateWarn(false);
  var btn=$('btn-go');btn.disabled=true;btn.textContent='CONNECTING...';
  setIndicatorsWaiting();
  S.peerTimeout=setTimeout(function(){logErr('Connection timed out. Check network.');backToSetup()},C.CONN_TIMEOUT);
  var roomId=C.PREFIX+chan;
  logSys('Claiming channel '+chan+' as relay...');logDbg('Room: '+roomId);
  try{S.peer=new Peer(roomId,{config:{iceServers:C.ICE}})}catch(e){logErr('Peer creation failed: '+e.message);backToSetup();return}
  S.peer.on('open',function(id){clearTimeout(S.peerTimeout);logDbg('Registered: '+id);becomeHost()});
  S.peer.on('error',function(err){
    if(!S.connecting)return;clearTimeout(S.peerTimeout);
    if(err.type==='unavailable-id'){logSys('Channel occupied. Joining as client...');try{S.peer.destroy()}catch(e){}S.peer=null;setTimeout(function(){if(!S.connecting)return;joinAsClient(roomId)},C.DESTROY_DELAY)}
    else if(err.type==='network'||err.type==='server-error'){logErr('Signaling unreachable: '+err.type);backToSetup()}
    else if(err.type==='peer-unavailable'){logErr('Target peer not found.');backToSetup()}
    else{logErr('Error: '+err.type);backToSetup()}
  });
}

function backToSetup(){
  safeDestroy();S.unread=0;document.title=S.title;S.panelOpen=false;
  try{elPanel.classList.remove('open');$('btn-peers').classList.remove('active')}catch(e){}
  setIndicatorsOffline();showRateWarn(false);
  elChat.style.display='none';elSetup.style.display='flex';
  var btn=$('btn-go');btn.disabled=false;btn.textContent='ESTABLISH LINK';
}

// ════════════════════════════════════════
//  HOST
// ════════════════════════════════════════

function becomeHost(){
  S.isHost=true;S.myColor=nextColor();
  logSys('Relay active | '+S.user+' | '+S.myColor);
  logSys('Waiting for connections...');
  showChatUI();setDot('ok');setIndicatorsConnected();updNodeCount();
  S.peer.on('connection',function(conn){logDbg('Incoming: '+conn.peer);onHostConn(conn)});
  startHB();startClean();
}

function onHostConn(conn){
  conn.on('data',function(d){onHostData(conn,d)});
  conn.on('open',function(){logDbg('DC OPEN: '+conn.peer);trackIce(conn,conn.peer)});
  conn.on('close',function(){var info=S.conns.get(conn.peer);if(!info)return;logSys(info.user+' disconnected');sndLeave();hideTyping(info.user);clearTimeout(info.typeTimer);S.rateLog.delete(conn.peer);broadcast({t:'leave',user:info.user},conn.peer);S.conns.delete(conn.peer);updNodeCount();renderPeerPanel()});
  conn.on('error',function(err){logDbg('Conn err: '+(err.message||err));var info=S.conns.get(conn.peer);if(!info)return;hideTyping(info.user);clearTimeout(info.typeTimer);S.rateLog.delete(conn.peer);S.conns.delete(conn.peer);updNodeCount();renderPeerPanel()});
}

function onHostData(conn,d){
  if(typeof d!=='object'||!d.t)return;
  var info=S.conns.get(conn.peer);
  switch(d.t){
    case 'intro':
      if(info)return;
      var color=nextColor(),others=[];S.conns.forEach(function(c){others.push(c.user)});
      var entry={conn:conn,user:d.user,color:color,lastSeen:Date.now(),typing:false,typeTimer:null,rtt:0,rttHist:[],iceState:'new'};
      S.conns.set(conn.peer,entry);S.rateLog.set(conn.peer,[]);
      logSys(d.user+' joined');sndJoin();
      try{conn.send({t:'welcome',user:d.user,color:color,peers:others})}catch(e){}
      broadcast({t:'join',user:d.user,color:color},conn.peer);updNodeCount();renderPeerPanel();break;
    case 'msg':
      if(!info)return;info.lastSeen=Date.now();
      var rl=S.rateLog.get(conn.peer)||[];S.rateLog.set(conn.peer,rl);
      if(isRateLimited(rl)){logDbg('RATE LIMITED: '+info.user);return}
      recordMsg(rl);
      var txt=trunc(d.text||'',C.MAX_MSG);S.msgRx++;S.bytesRx+=JSON.stringify(d).length;updTxRx();flashBar();
      broadcast({t:'msg',user:info.user,color:info.color,text:txt},conn.peer);notify();break;
    case 'typing':
      if(!info)return;info.lastSeen=Date.now();
      if(!info.typing){info.typing=true;broadcast({t:'typing',user:info.user},conn.peer)}
      clearTimeout(info.typeTimer);info.typeTimer=setTimeout(function(){info.typing=false;broadcast({t:'stoptyping',user:info.user},conn.peer)},C.TYPING_MS);break;
    case 'stoptyping':
      if(!info)return;info.lastSeen=Date.now();
      if(info.typing){info.typing=false;clearTimeout(info.typeTimer);broadcast({t:'stoptyping',user:info.user},conn.peer)}break;
    case 'ping':
      if(info)info.lastSeen=Date.now();try{conn.send({t:'pong',ts:d.ts})}catch(e){}break;
    case 'pong':
      if(info){info.lastSeen=Date.now();info.rtt=Date.now()-d.ts;info.rttHist.push(info.rtt);if(info.rttHist.length>6)info.rttHist.shift();renderPeerPanel()}break;
  }
}

// ════════════════════════════════════════
//  CLIENT
// ════════════════════════════════════════

function joinAsClient(roomId){
  setIndicatorsWaiting();logDbg('Creating client peer...');
  try{S.peer=new Peer(undefined,{config:{iceServers:C.ICE}})}catch(e){logErr('Client peer failed: '+e.message);backToSetup();return}
  S.peer.on('open',function(id){
    logDbg('Registered: '+id);logSys('Opening data channel to '+roomId+'...');
    var conn;try{conn=S.peer.connect(roomId,{reliable:true})}catch(e){logErr('Connect failed: '+e.message);backToSetup();return}
    logDbg('DC created, awaiting OPEN...');
    S.openTimeout=setTimeout(function(){logErr('Data channel timeout. Firewall may block WebRTC.');backToSetup()},C.OPEN_TIMEOUT);
    conn.on('data',function(d){onClientData(d)});
    conn.on('open',function(){
      clearTimeout(S.openTimeout);clearTimeout(S.peerTimeout);logDbg('DC OPEN! Handshaking...');setDot('ok');
      trackIce(conn,conn.peer);try{conn.send({t:'intro',user:S.user})}catch(e){}
      S.conns.set(conn.peer,{conn:conn,user:'__RELAY__',color:'#888',lastSeen:Date.now(),typing:false,typeTimer:null,rtt:0,rttHist:[],iceState:'new'});
      showChatUI();startHB();
    });
    conn.on('close',function(){clearTimeout(S.openTimeout);logWarn('Relay lost.');sndLeave();setDot('off');setIndicatorsOffline();S.conns.clear();S.typingUsers.clear();renderTyping();stopHB();var ms=C.FAIL_MIN+Math.random()*(C.FAIL_MAX-C.FAIL_MIN);logSys('Failover in ~'+Math.round(ms)+'ms...');setTimeout(attemptFailover,ms)});
    conn.on('error',function(err){clearTimeout(S.openTimeout);logErr('DC error: '+(err.message||err));setDot('off');setIndicatorsOffline()});
  });
  S.peer.on('error',function(err){clearTimeout(S.openTimeout);if(err.type==='peer-unavailable')logErr('Relay "'+roomId+'" not found.');else logErr('Client error: '+err.type);backToSetup()});
}

function onClientData(d){
  if(typeof d!=='object'||!d.t)return;
  switch(d.t){
    case 'welcome':S.myColor=d.color;S.totalPeers=(d.peers?d.peers.length:0)+1;logSys('Assigned: '+d.color);if(d.peers&&d.peers.length)logSys('Online: '+d.peers.join(', '));setIndicatorsConnected();updNodeCount();renderPeerPanel();break;
    case 'msg':S.msgRx++;S.bytesRx+=JSON.stringify(d).length;updTxRx();flashBar();logPeer(d.user,d.text,d.color);notify();break;
    case 'join':logSys(d.user+' joined');sndJoin();S.totalPeers++;updNodeCount();renderPeerPanel();break;
    case 'leave':logSys(d.user+' left');sndLeave();hideTyping(d.user);S.totalPeers=Math.max(1,S.totalPeers-1);updNodeCount();renderPeerPanel();break;
    case 'typing':showTyping(d.user);break;
    case 'stoptyping':hideTyping(d.user);break;
    case 'ping':var h=getHostConn();if(h&&h.open)try{h.send({t:'pong',ts:d.ts})}catch(e){}break;
    case 'pong':S.rtt=Date.now()-d.ts;S.rttHist.push(S.rtt);if(S.rttHist.length>6)S.rttHist.shift();updPing(smoothRtt(S.rttHist));renderPeerPanel();break;
  }
}

function getHostConn(){var f=null;S.conns.forEach(function(i){if(i.conn)f=i.conn});return f}

// ════════════════════════════════════════
//  FAILOVER
// ════════════════════════════════════════

function attemptFailover(){
  logDbg('Destroying old peer...');try{S.peer.destroy()}catch(e){}S.peer=null;S.conns.clear();
  var roomId=C.PREFIX+S.channel;
  setTimeout(function(){
    logSys('Claiming relay role...');
    try{S.peer=new Peer(roomId,{config:{iceServers:C.ICE}})}catch(e){logErr('Failover failed: '+e.message);backToSetup();return}
    S.peer.on('open',function(){S.conns.clear();S.typingUsers.clear();renderTyping();S.isHost=true;S.myColor=nextColor();S.cIdx=1;S.rtt=0;S.rttHist=[];S.iceState='new';S.rateLog.clear();logSys('Relay assumed.');setDot('ok');setIndicatorsConnected();sndJoin();S.peer.on('connection',function(c){onHostConn(c)});startHB();startClean();updNodeCount();renderPeerPanel()});
    S.peer.on('error',function(err){if(err.type==='unavailable-id'){try{S.peer.destroy()}catch(e){}S.peer=null;logSys('Relay claimed by another. Rejoining...');setTimeout(function(){joinAsClient(roomId)},C.DESTROY_DELAY)}else{logErr('Failover err: '+err.type);setDot('off')}});
  },C.DESTROY_DELAY);
}

// ════════════════════════════════════════
//  SEND / TYPING / BROADCAST
// ════════════════════════════════════════

function doSend(){
  var text=elInMsg.value.trim();if(!text)return;
  if(!S.isHost){var h=getHostConn();if(!h||!h.open){logWarn('Not connected.');return}}
  if(isRateLimited(S.selfRateLog)){showRateWarn(true);setTimeout(function(){showRateWarn(false)},2000);return}
  recordMsg(S.selfRateLog);
  text=trunc(text,C.MAX_MSG);logSelf(text);elInMsg.value='';cancelOwnTyping();S.msgTx++;updTxRx();flashBar();
  var msg={t:'msg',user:S.user,color:S.myColor,text:text};
  if(S.isHost){broadcast(msg)}else{var h2=getHostConn();if(h2&&h2.open)try{h2.send(msg)}catch(e){}}
}

function onOwnTyping(){var d={t:'typing',user:S.user};if(S.isHost)broadcast(d);else{var h=getHostConn();if(h&&h.open)try{h.send(d)}catch(e){}}clearTimeout(S.typeTimer);S.typeTimer=setTimeout(cancelOwnTyping,C.TYPING_MS)}
function cancelOwnTyping(){if(S.typeTimer){clearTimeout(S.typeTimer);S.typeTimer=null}var d={t:'stoptyping',user:S.user};if(S.isHost)broadcast(d);else{var h=getHostConn();if(h&&h.open)try{h.send(d)}catch(e){}}}

function broadcast(data,excludeId){S.conns.forEach(function(info,pid){if(pid!==excludeId&&info.conn&&info.conn.open)try{info.conn.send(data)}catch(e){}})}

function startHB(){stopHB();S.hbTimer=setInterval(function(){var ping={t:'ping',ts:Date.now()};if(S.isHost){S.conns.forEach(function(info){if(info.conn&&info.conn.open)try{info.conn.send(ping)}catch(e){}})}else{var h=getHostConn();if(h&&h.open)try{h.send(ping)}catch(e){}}S.conns.forEach(function(info){info.lastSeen=Date.now()})},C.HB_MS)}
function stopHB(){if(S.hbTimer){clearInterval(S.hbTimer);S.hbTimer=null}}

function startClean(){stopClean();S.cleanTimer=setInterval(function(){var now=Date.now(),dead=[];S.conns.forEach(function(info,pid){if(now-info.lastSeen>C.DEAD_MS)dead.push(pid)});dead.forEach(function(pid){var info=S.conns.get(pid);if(!info)return;logSys(info.user+' timed out');hideTyping(info.user);clearTimeout(info.typeTimer);S.rateLog.delete(pid);broadcast({t:'leave',user:info.user},pid);try{info.conn.close()}catch(e){}S.conns.delete(pid);updNodeCount();renderPeerPanel()})},8000)}
function stopClean(){if(S.cleanTimer){clearInterval(S.cleanTimer);S.cleanTimer=null}}

// ════════════════════════════════════════
//  UI
// ════════════════════════════════════════

function showChatUI(){elSetup.style.display='none';elChat.style.display='flex';elChan.textContent='CH-'+String(S.channel).padStart(2,'0');elInMsg.focus()}
function doDisconnect(){safeDestroy();elMsgs.innerHTML='';elTyping.innerHTML='';elChat.style.display='none';elSetup.style.display='flex';S.unread=0;document.title=S.title;S.panelOpen=false;showRateWarn(false);try{elPanel.classList.remove('open');$('btn-peers').classList.remove('active')}catch(e){}setIndicatorsOffline();var btn=$('btn-go');btn.disabled=false;btn.textContent='ESTABLISH LINK'}
function doCopy(){var info='MESH Chat // Channel '+S.channel+(S.isHost?' [RELAY]':' [CLIENT]');if(navigator.clipboard){navigator.clipboard.writeText(info).then(function(){logSys('Copied.')},function(){logWarn('Clipboard denied.')})}else{logSys(info)}}

})();
</script>
