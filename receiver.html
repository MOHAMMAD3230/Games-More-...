<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LMS</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #222;
    color: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
  }
  #container {
    max-width: 400px;
    width: 90%;
    padding: 20px;
    background: #333;
    border-radius: 10px;
    text-align: center;
  }
  #networkType {
    font-size: 1rem;
    margin-bottom: 10px;
  }
  button {
    padding: 15px 30px;
    font-size: 1rem;
    margin: 10px 0;
    cursor: pointer;
    background: #007bff;
    border: none;
    border-radius: 5px;
    color: #fff;
  }
  button:disabled {
    background: #555;
    cursor: not-allowed;
  }
  #status {
    margin-top: 10px;
    font-size: 0.9rem;
  }
  #remoteAudio {
    display: none;
  }
</style>
</head>
<body>
<div id="container">
  <h2>Peer-to-Peer LMS</h2>
  <div id="networkType">Detecting network...</div>
  <button id="startBtn">Start</button>
  <button id="callBtn" disabled>Call</button>
  <div id="status"></div>
  <audio id="remoteAudio" autoplay></audio>
</div>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script>
  const startBtn = document.getElementById('startBtn');
  const callBtn = document.getElementById('callBtn');
  const statusDiv = document.getElementById('status');
  const remoteAudio = document.getElementById('remoteAudio');
  const networkDiv = document.getElementById('networkType');

  let peer = null;
  let conn = null;
  let localStream = null;
  let peerId = null;

  // Detect network type
  function updateNetworkType() {
    const connection = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
    if (connection && connection.effectiveType) {
      let type = connection.effectiveType;
      if (type === '4g' && navigator.userAgent.includes('Android')) {
        networkDiv.innerText = '4G / 5G (approximate)';
      } else {
        networkDiv.innerText = type.toUpperCase();
      }
      connection.onchange = updateNetworkType;
    } else {
      networkDiv.innerText = 'Unknown (API not supported)';
    }
  }

  updateNetworkType();

  // Start peer connection
  startBtn.onclick = async () => {
    startBtn.disabled = true;
    try {
      // Get microphone
      localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
      // Create PeerJS instance
      peer = new Peer();

      peer.on('open', id => {
        peerId = id;
        statusDiv.innerText = 'Your ID: ' + id + ' (Share to connect)';
        callBtn.disabled = false;
      });

      peer.on('connection', c => {
        conn = c;
        setupConnection();
      });

      peer.on('call', call => {
        call.answer(localStream);
        call.on('stream', stream => {
          attachStream(stream);
        });
      });
    } catch (e) {
      alert('Error accessing microphone: ' + e.message);
    }
  };

  // Connect to peer
  callBtn.onclick = () => {
    const peerIdToCall = prompt('Enter remote peer ID:');
    if (peerIdToCall) {
      const call = peer.call(peerIdToCall, localStream);
      call.on('stream', stream => {
        attachStream(stream);
      });
      setupConnection(call);
    }
  };

  // Setup connection event
  function setupConnection(callOrConn) {
    if (callOrConn) {
      conn = callOrConn;
    }
    conn.on('open', () => {
      statusDiv.innerText = 'Connected!';
    });
    conn.on('data', data => {
      // handle incoming data if needed
    });
  }

  // Attach remote audio stream
  function attachStream(stream) {
    remoteAudio.srcObject = stream;
  }

  // Push-To-Talk button
  // Using spacebar for demo, or you can replace with a button
  document.addEventListener('keydown', e => {
    if (e.key === ' ') {
      startPTT();
    }
  });
  document.addEventListener('keyup', e => {
    if (e.key === ' ') {
      stopPTT();
    }
  });

  // PTT functions
  let mediaRecorder = null;
  function startPTT() {
    if (!localStream || !conn) return;
    // Create MediaRecorder
    mediaRecorder = new MediaRecorder(localStream);
    mediaRecorder.ondataavailable = e => {
      if (conn && conn.open) {
        conn.send(e.data);
      }
    };
    mediaRecorder.start();
    statusDiv.innerText = 'Transmitting...';
  }
  function stopPTT() {
    if (mediaRecorder) {
      mediaRecorder.stop();
      mediaRecorder = null;
      statusDiv.innerText = 'Connected!';
    }
  }
</script>
</body>
</html>
