<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TAC/COM-P2P CHAT FIXED</title>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<style>
body { background:#050505; color:#ffb000; font-family:monospace; display:flex; justify-content:center; align-items:center; height:100vh; margin:0; }
.mainframe { width:95%; max-width:600px; background:#222; padding:20px; border:6px solid #111; display:flex; flex-direction:column; gap:10px; }
#output { height:200px; overflow-y:auto; border:1px solid #333; padding:5px; background:#0d0900; }
input, button { width:100%; padding:10px; font-size:1rem; margin-top:5px; }
.pttBtn { background:red; color:#fff; font-size:1.2rem; font-weight:bold; height:120px; border:none; cursor:pointer; }
.pttBtn:disabled { background:#333; cursor:not-allowed; }
.status-led { width:12px; height:12px; border-radius:50%; display:inline-block; background:#200; }
.online { background:blue; box-shadow:0 0 10px blue; }
.tx { background:red; box-shadow:0 0 10px red; }
</style>
</head>
<body>

<div class="mainframe">
  <div id="output">&gt; Enter channel number to start...</div>
  <input type="number" id="chanInput" min="1" max="99" placeholder="Channel 1-99">
  <button id="bootBtn">SET CHANNEL</button>
  <button class="pttBtn" id="pttBtn" disabled>HOLD TO TALK</button>
  <div style="display:flex; justify-content:space-between; font-size:0.8rem; margin-top:5px;">
    <span>SYNC <div class="status-led" id="ledNet"></div></span>
    <span>TX <div class="status-led" id="ledTx"></div></span>
  </div>
  <audio id="remoteAudio" autoplay playsinline style="display:none;"></audio>
</div>

<script>
let peer, conn, localStream, audioCtx, speakerGain, delayNode;
const PREFIX="TAC-P2P-";

function log(msg) {
  const out=document.getElementById('output');
  const div=document.createElement('div'); div.innerText='> '+msg; out.appendChild(div); out.scrollTop=out.scrollHeight;
}

async function initChannel() {
  const chan=document.getElementById('chanInput').value;
  if(!chan) return alert("Enter channel number 1-99");
  document.getElementById('bootBtn').disabled=true;

  const fullId=PREFIX+chan;
  log("Getting microphone...");
  try {
    localStream=await navigator.mediaDevices.getUserMedia({ audio:true });
  } catch(e){ log("Microphone access denied"); return; }

  audioCtx=new (window.AudioContext||window.webkitAudioContext)();
  speakerGain=audioCtx.createGain(); speakerGain.gain.value=1;
  delayNode=audioCtx.createDelay(5.0); delayNode.delayTime=0.5;
  delayNode.connect(speakerGain); speakerGain.connect(audioCtx.destination);

  log("Initializing PeerJS...");
  peer=new Peer(fullId,{
    host:'peerjs-server.herokuapp.com',
    port:443,
    path:'/',
    secure:true,
    config:{ iceServers:[{ urls:'stun:stun.l.google.com:19302' }] }
  });

  peer.on('open', id=>{ log("Channel active. Listening..."); tryAutoConnect(fullId); });
  peer.on('connection', c=>{ conn=c; setupHandlers(); });
  peer.on('call', call=>{ call.answer(localStream); call.on('stream', s=>attachStream(s)); });
  peer.on('error', err=>{
    if(err.type==='unavailable-id'){
      log("Channel busy, connecting as joiner...");
      peer.destroy();
      initCallerMode(fullId);
    } else log("Error: "+err);
  });
}

function initCallerMode(targetId){
  peer=new Peer();
  peer.on('open', ()=>{
    log("Calling host...");
    conn=peer.connect(targetId);
    const call=peer.call(targetId, localStream);
    call.on('stream', s=>attachStream(s));
    setupHandlers();
  });
}

function attachStream(stream){
  const audioEl=document.getElementById('remoteAudio');
  audioEl.srcObject=stream;
  const source=audioCtx.createMediaStreamSource(stream);
  source.connect(delayNode);
  log("Remote audio connected");
}

function setupHandlers(){
  conn.on('open', ()=>{
    document.getElementById('ledNet').classList.add('online');
    document.getElementById('pttBtn').disabled=false;
    log("Peer link established");
  });
  conn.on('data', data=>{
    if(data==='TX_ON') document.getElementById('ledTx').classList.add('tx');
    if(data==='TX_OFF') document.getElementById('ledTx').classList.remove('tx');
  });
}

function muteMic(mute){ if(localStream) localStream.getAudioTracks().forEach(t=>t.enabled=!mute); }

const ptt=document.getElementById('pttBtn');
ptt.onmousedown=pttOn; ptt.onmouseup=pttOff;
ptt.addEventListener('touchstart', e=>{ e.preventDefault(); pttOn(); });
ptt.addEventListener('touchend', e=>{ e.preventDefault(); pttOff(); });
function pttOn(){ if(!conn||ptt.disabled) return; muteMic(false); conn.send('TX_ON'); }
function pttOff(){ if(!conn||ptt.disabled) return; muteMic(true); conn.send('TX_OFF'); }

function tryAutoConnect(fullId){
  setTimeout(()=>{
    if(peer.id!==fullId){
      const c=peer.connect(fullId);
      c.on('open', ()=>{ conn=c; setupHandlers(); });
      const call=peer.call(fullId, localStream);
      call.on('stream', s=>attachStream(s));
    }
  }, 1500);
}

document.getElementById('bootBtn').onclick=initChannel;
</script>

</body>
</html>
