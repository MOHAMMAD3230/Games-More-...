<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TAC/COM-04 | 5G DEBUG</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --amber: #ffb000; --bg: #0d0900; --red: #8c3024; --blue: #00d4ff; --green: #39ff14; }
        body { background: #050505; color: var(--amber); font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; touch-action: manipulation; overflow: hidden; }
        .mainframe { width: 95%; max-width: 850px; background: #222; border: 6px solid #111; padding: 15px; display: flex; flex-direction: column; box-shadow: 0 0 60px #000; box-sizing: border-box; }
        @media (min-width: 768px) { .mainframe { display: grid; grid-template-columns: 1fr 320px; height: 620px; gap: 20px; } }
        .monitor { background: var(--bg); border: 10px solid #1a1a1a; border-radius: 15px; padding: 20px; flex-grow: 1; display: flex; flex-direction: column; position: relative; box-shadow: inset 0 0 20px #000; }
        #output { height: 260px; overflow-y: auto; font-size: 0.78rem; scrollbar-width: none; border-bottom: 1px solid #333; margin-bottom: 12px; color: var(--amber); }
        .module { background: #111; padding: 12px; border: 1px solid #333; margin-bottom: 10px; }
        .btn-ptt { width: 100%; height: 145px; background: var(--red); color: white; border: 5px solid #5e1e16; font-weight: bold; font-size: 1.35rem; cursor: pointer; transition: 0.1s; box-shadow: 0 6px 0 #401010; }
        .btn-ptt:active:not(:disabled) { background: #f00; transform: translateY(4px); box-shadow: 0 2px 0 #401010; }
        .btn-ptt:disabled { background: #333; opacity: 0.45; box-shadow: none; }
        .btn-action { width: 100%; padding: 11px; background: #333; color: #fff; border: 1px solid #555; cursor: pointer; font-weight: bold; font-size: 0.72rem; text-transform: uppercase; }
        input { width: 100%; background: #000; border: 1px solid #444; color: var(--amber); padding: 10px; box-sizing: border-box; outline: none; text-align: center; font-size: 1.25rem; letter-spacing: 2px; }
        .status-led { width: 13px; height: 13px; border-radius: 50%; background: #200; display: inline-block; vertical-align: middle; }
        .online { background: var(--blue); box-shadow: 0 0 12px var(--blue); }
        .tx { background: #f00; box-shadow: 0 0 15px #f00; animation: pulse 0.7s infinite; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
        #meter { width: 100%; height: 11px; background: #000; border: 1px solid #333; margin-top: auto; }
        #meter-fill { width: 0%; height: 100%; background: var(--green); transition: width 0.08s linear; box-shadow: 0 0 10px var(--green); }
    </style>
</head>
<body>
<div class="mainframe">
    <div class="monitor">
        <div style="font-size: 0.65rem; display:flex; justify-content:space-between; margin-bottom:10px;">
            <span>FREQ: <span id="curFreq" style="color:var(--blue)">UNSET</span></span>
            <span>UPLINK: <span id="stat">OFFLINE</span></span>
        </div>
        <div id="output"><div>> TAC/COM-04 DEBUG MODE LOADED</div></div>
        <div id="meter"><div id="meter-fill"></div></div>
    </div>
    <div class="side-panel">
        <div class="module">
            <div style="font-size: 0.6rem; color: #555; margin-bottom: 5px; text-align: center;">CHANNEL (1-99)</div>
            <input type="number" id="chanInput" value="42" min="1" max="99">
            <button class="btn-action" id="bootBtn" onclick="initChannel()" style="margin-top:10px; border-color:var(--green); color:var(--green);">INITIATE SECURE LINK</button>
        </div>
        <div class="module" style="text-align:center;">
            <button class="btn-ptt" id="pttBtn" disabled>HOLD TO TALK</button>
            <div style="margin-top:12px; font-size:0.55rem; display:flex; justify-content:space-around;">
                <span><div class="status-led" id="ledNet"></div> SYNC</span>
                <span><div class="status-led" id="ledTx"></div> TX</span>
            </div>
        </div>
        <button class="btn-action" onclick="location.reload()" style="background:#200; color:#fff;">HARD RESET</button>
    </div>
</div>

<script>
    let peer, conn, localStream, audioCtx, recorder, analyser, streamSource;
    let isPTTActive = false;
    const APP_PREFIX = "TAC-SECURE-V33-";

    function log(msg, color = "#ffb000") {
        const out = document.getElementById('output');
        const div = document.createElement('div');
        div.innerText = `> ${msg}`;
        div.style.color = color;
        out.appendChild(div);
        out.scrollTop = out.scrollHeight;
        console.log("[TAC]", msg);
    }

    async function initChannel() {
        const chanNum = document.getElementById('chanInput').value.trim();
        if (!chanNum || chanNum < 1 || chanNum > 99) {
            log("INVALID CHANNEL - Use 1 to 99", "red");
            return;
        }

        const fullId = APP_PREFIX + chanNum;

        try {
            localStream = await navigator.mediaDevices.getUserMedia({
                audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true, sampleRate: 48000 }
            });

            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 256;
            streamSource = audioCtx.createMediaStreamSource(localStream);
            streamSource.connect(analyser);

            recorder = new MediaRecorder(localStream, { 
                mimeType: 'audio/webm;codecs=opus' 
            });

            recorder.ondataavailable = (e) => {
                if (conn && conn.open && e.data && e.data.size > 60 && isPTTActive) {
                    conn.send(e.data);
                    log("AUDIO CHUNK SENT (" + (e.data.size/1024).toFixed(1) + " KB)", "#00d4ff");
                }
            };

            document.getElementById('bootBtn').disabled = true;
            document.getElementById('curFreq').innerText = "CH-" + chanNum;
            document.getElementById('stat').innerText = "CONNECTING...";

            initPeer(fullId);
            updateMeter();
            log("MIC INITIALIZED - Ready for PTT", "#39ff14");
        } catch (e) {
            log("MIC ACCESS DENIED - Allow microphone permission", "red");
            console.error(e);
        }
    }

    function initPeer(myId) {
        const iceConfig = {
            iceServers: [
                { urls: ['stun:stun.l.google.com:19302', 'stun:stun1.l.google.com:19302', 'stun:stun2.l.google.com:19302'] },
                // Strong TURN servers for Indian 5G CGNAT
                { urls: 'turn:openrelay.metered.ca:80', username: 'openrelayproject', credential: 'openrelayproject' },
                { urls: 'turn:openrelay.metered.ca:443', username: 'openrelayproject', credential: 'openrelayproject' },
                { urls: 'turn:openrelay.metered.ca:443?transport=tcp', username: 'openrelayproject', credential: 'openrelayproject' },
                { urls: 'turn:global.relay.metered.ca:80', username: 'metered', credential: 'metered' },
                { urls: 'turn:global.relay.metered.ca:443', username: 'metered', credential: 'metered' }
            ],
            iceCandidatePoolSize: 15
        };

        peer = new Peer(myId, { config: iceConfig, debug: 2 });

        peer.on('open', (id) => {
            log("PEER ID OPEN: " + id.split('-').pop(), "#39ff14");
            setTimeout(() => {
                if (!conn) {
                    log("ATTEMPTING AUTO-CONNECT TO SAME CHANNEL...", "#ffb000");
                    const c = peer.connect(myId, { reliable: true });
                    setupConnection(c);
                }
            }, 700);
        });

        peer.on('connection', (c) => setupConnection(c));

        peer.on('error', (err) => {
            log("PEER ERROR: " + err.type, "red");
            console.error(err);
            if (err.type === 'unavailable-id' || err.type === 'peer-unavailable') {
                log("Try different channel or ensure both use same channel", "#ffb000");
            }
        });
    }

    function setupConnection(c) {
        conn = c;
        conn.on('open', () => {
            document.getElementById('ledNet').classList.add('online');
            document.getElementById('pttBtn').disabled = false;
            document.getElementById('stat').innerText = "SECURE LINK ACTIVE";
            log("DATA CHANNEL OPEN - You can now use PTT", "#39ff14");
            playBeep(950, 0.12);
        });

        conn.on('data', async (data) => {
            if (!(data instanceof Blob)) return;
            document.getElementById('ledTx').classList.add('tx');
            log("RECEIVED AUDIO CHUNK - Playing...", "#00d4ff");

            const url = URL.createObjectURL(data);
            const audio = new Audio(url);
            audio.volume = 1.0;
            audio.onended = () => URL.revokeObjectURL(url);
            try {
                await audio.play();
            } catch (err) {
                log("PLAYBACK ERROR: " + err.message, "red");
                console.error(err);
            }
            setTimeout(() => document.getElementById('ledTx').classList.remove('tx'), 900);
        });

        conn.on('close', () => {
            log("CONNECTION CLOSED", "red");
            document.getElementById('ledNet').classList.remove('online');
            document.getElementById('pttBtn').disabled = true;
            document.getElementById('stat').innerText = "DISCONNECTED";
        });

        conn.on('error', (err) => log("DATA ERROR: " + err, "red"));
    }

    function playBeep(freq, dur) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.frequency.value = freq;
        gain.gain.value = 0.035;
        osc.connect(gain).connect(audioCtx.destination);
        osc.start();
        gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + dur);
        osc.stop(audioCtx.currentTime + dur);
    }

    function updateMeter() {
        if (!analyser) return;
        const data = new Uint8Array(analyser.frequencyBinCount);
        analyser.getByteFrequencyData(data);
        let sum = 0;
        for (let v of data) sum += v;
        const avg = sum / data.length;
        document.getElementById('meter-fill').style.width = Math.min(100, avg * 2.9) + "%";
        requestAnimationFrame(updateMeter);
    }

    // PTT
    const pttBtn = document.getElementById('pttBtn');

    function startPTT() {
        if (!conn || !conn.open || !recorder) {
            log("Cannot transmit - No active link", "red");
            return;
        }
        if (recorder.state === 'inactive') recorder.start(150);
        isPTTActive = true;
        document.getElementById('ledTx').classList.add('tx');
        playBeep(1350, 0.04);
        log("PTT PRESSED - TRANSMITTING", "#00d4ff");
    }

    function stopPTT() {
        if (!isPTTActive) return;
        isPTTActive = false;
        if (recorder.state === 'recording') recorder.stop();
        document.getElementById('ledTx').classList.remove('tx');
        playBeep(480, 0.2);
        log("PTT RELEASED", "#ffb000");
    }

    pttBtn.onmousedown = startPTT;
    pttBtn.onmouseup = stopPTT;
    pttBtn.ontouchstart = (e) => { e.preventDefault(); startPTT(); };
    pttBtn.ontouchend = (e) => { e.preventDefault(); stopPTT(); };

    window.addEventListener('beforeunload', () => {
        if (recorder && recorder.state === 'recording') recorder.stop();
        if (localStream) localStream.getTracks().forEach(t => t.stop());
        if (peer) peer.destroy();
    });

    log("DEBUG BUILD LOADED - Check console (F12) for extra info", "#39ff14");
</script>
</body>
</html>
