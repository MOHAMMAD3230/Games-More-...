<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TAC/COM-Cloud PTT Chat</title>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<style>
:root {
  --amber: #ffb000; --bg: #050505; --red: #f33; --blue: #00d4ff; --green: #39ff14;
}
body { margin:0; font-family: monospace; background:#000; color: var(--amber); display:flex; justify-content:center; align-items:center; height:100vh; }
.container { background:#111; padding:20px; border:3px solid #222; border-radius:12px; width:95%; max-width:500px; display:flex; flex-direction:column; gap:10px; }
h2 { color: var(--blue); font-size:1rem; margin:0 0 10px 0; text-align:center; }
#log { background: #000; border:1px solid #333; padding:10px; height:200px; overflow-y:auto; font-size:0.8rem; }
input, button { font-family: monospace; }
input { width:100%; padding:10px; margin:5px 0; background:#000; color:var(--amber); border:1px solid #333; outline:none; text-align:center; }
button { padding:10px; background:#222; color:var(--amber); border:1px solid var(--amber); cursor:pointer; font-weight:bold; }
button:active { background: var(--amber); color:#000; }
button:disabled { background:#333; border-color:#555; cursor:not-allowed; color:#555; }
.led { width:12px; height:12px; border-radius:50%; display:inline-block; background:#200; margin-right:5px; }
.active-led { background:var(--green); box-shadow:0 0 10px var(--green); }
</style>
</head>
<body>

<div class="container">
<h2>🌐 TAC/COM PTT CHAT</h2>

<input type="number" id="chanInput" placeholder="CHANNEL (1-99)" min="1" max="99">
<button id="bootBtn" onclick="initChannel()">SET CHANNEL</button>

<div id="log">> SYSTEM READY. ENTER CHANNEL TO START...</div>

<button id="pttBtn" disabled>HOLD TO TALK</button>
<div style="margin-top:5px;">
  <span class="led" id="ledNet"></span> NETWORK
  <span class="led" id="ledTx"></span> TX
</div>
</div>

<audio id="remoteAudio" autoplay playsinline style="display:none;"></audio>

<script>
let peer, conn, localStream, audioCtx, delayNode, analyser, speakerGain;
const PREFIX = "TAC-COM-CLOUD-";

function log(msg, color=varAmber()) {
    const div = document.createElement('div'); div.innerText = '> ' + msg; div.style.color = color;
    const out = document.getElementById('log'); out.appendChild(div); out.scrollTop = out.scrollHeight;
}
function varAmber(){return '#ffb000';}

async function initChannel() {
    const chan = document.getElementById('chanInput').value;
    if(!chan) { log("ENTER A CHANNEL NUMBER!", '#f33'); return; }
    const fullId = PREFIX + chan;

    try {
        localStream = await navigator.mediaDevices.getUserMedia({ audio:true });
        muteMic(true);

        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        speakerGain = audioCtx.createGain(); speakerGain.gain.value=1;
        delayNode = audioCtx.createDelay(5.0); delayNode.delayTime.value=0.1;
        analyser = audioCtx.createAnalyser();
        delayNode.connect(analyser); analyser.connect(speakerGain); speakerGain.connect(audioCtx.destination);

        document.getElementById('bootBtn').disabled = true;
        log("TUNING TO CHANNEL " + chan + "...", '#00d4ff');

        initPeer(fullId);
    } catch(e){ log("MIC ERROR: "+e.message,'#f33'); }
}

function initPeer(myId){
    peer = new Peer(myId,{
        host:'peerjs.com', port:443, path:'/', secure:true,
        config:{ iceServers:[{ urls:'stun:stun.l.google.com:19302' }] }
    });

    peer.on('open', id => { log("CHANNEL ACTIVE. LISTENING FOR PEERS...", '#39ff14'); setTimeout(autoConnect,500); });
    peer.on('connection', c => { conn = c; setupHandlers(); });
    peer.on('call', call => { call.answer(localStream); call.on('stream', attachStream); });
    peer.on('error', err => {
        if(err.type==='unavailable-id'){ log("CHANNEL BUSY. ATTEMPTING TO JOIN...","#ffb000"); peer.destroy(); initCaller(myId);}
        else log("PEER ERROR: "+err.type,'#f33');
    });
}

function initCaller(targetId){
    peer = new Peer();
    peer.on('open', ()=>{
        log("HANDSHAKE INITIATED...","#39ff14");
        conn = peer.connect(targetId);
        const call = peer.call(targetId, localStream);
        call.on('stream', attachStream);
        setupHandlers();
    });
}

function attachStream(stream){
    const audioEl = document.getElementById('remoteAudio'); audioEl.srcObject=stream;
    const source = audioCtx.createMediaStreamSource(stream); source.connect(delayNode);
    log("REMOTE AUDIO STREAM ACTIVE","#00d4ff");
}

function setupHandlers(){
    conn.on('open', ()=>{
        document.getElementById('ledNet').classList.add('active-led');
        document.getElementById('pttBtn').disabled=false;
        log("VOICE LINK ESTABLISHED","#39ff14");
    });
    conn.on('data', data=>{
        if(data==='TX_ON') document.getElementById('ledTx').classList.add('active-led');
        if(data==='TX_OFF') document.getElementById('ledTx').classList.remove('active-led');
    });
}

function muteMic(state){ if(localStream) localStream.getAudioTracks().forEach(t=>t.enabled=!state); }

const ptt=document.getElementById('pttBtn');
ptt.onmousedown=pttOn; ptt.onmouseup=pttOff;
ptt.addEventListener('touchstart',e=>{e.preventDefault();pttOn();});
ptt.addEventListener('touchend',e=>{e.preventDefault();pttOff();});

function pttOn(){ if(!conn||ptt.disabled) return; muteMic(false); conn.send('TX_ON'); }
function pttOff(){ if(!conn||ptt.disabled) return; muteMic(true); conn.send('TX_OFF'); }

function autoConnect(){ 
    const chan = document.getElementById('chanInput').value;
    const targetId = PREFIX + chan;
    if(peer.id !== targetId){ conn = peer.connect(targetId); setupHandlers(); const call = peer.call(targetId, localStream); call.on('stream', attachStream);}
}
</script>
</body>
</html>
