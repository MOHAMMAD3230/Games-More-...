<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐍 Snake Game - Mobile/PC Selector</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
        
        .mode-selector {
            background: rgba(0,0,0,0.9);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
            text-align: center;
            color: white;
            margin-bottom: 20px;
        }
        
        .mode-selector h1 {
            margin: 0 0 30px 0;
            font-size: 3em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        
        .mode-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .mode-btn {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 20px 40px;
            font-size: 1.5em;
            font-family: inherit;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
            min-width: 200px;
        }
        
        .mode-btn:hover {
            background: #45a049;
            transform: scale(1.05) translateY(-5px);
        }
        
        .mode-btn.active {
            background: #ff9800;
            box-shadow: 0 0 30px #ff9800;
        }

        /* Laptop Mode */
        .game-container.laptop {
            background: rgba(0,0,0,0.9);
            padding: 40px;
            border-radius: 2px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
            text-align: center;
            color: white;
            position: relative;
            max-width: 90vw;
            max-height: 90vh;
        }
        
        .game-container.laptop h1 {
            margin: 0 0 10px 0;
            font-size: 3em;
        }
        
        .game-container.laptop .score-board {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 1.4em;
            font-weight: bold;
        }
        
        .game-container.laptop #gameBoard {
            border: 4px solid #fff;
            border-radius: 4px;
            background: #000;
            box-shadow: inset 0 0 25px rgba(255,255,255,0.1), 0 8px 25px rgba(0,0,0,0.3);
            display: block;
            margin: 0 auto;
            touch-action: none;
        }
        
        .game-container.laptop .controls {
            margin-top: 25px;
        }
        
        .game-container.laptop .controls p {
            margin: 0 0 20px 0;
            opacity: 0.9;
            font-size: 1.1em;
        }
        
        .game-container.laptop #restart, .game-container.laptop #soundToggle, .game-container.laptop #backBtn {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.1em;
            font-family: inherit;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            margin: 0 8px;
        }

        /* Mobile Mode */
        .game-container.mobile {
            background: rgba(0,0,0,0.95);
            padding: 10px;
            border-radius: 2px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            color: white;
            position: relative;
            width: 95vw;
            max-width: 400px;
            margin: 0 auto;
        }
        
        .game-container.mobile h1 {
            margin: 0 0 15px 0;
            font-size: 2em;
        }
        
        .game-container.mobile .score-board {
            font-size: 1.2em;
            margin-bottom: 15px;
        }
        
        .game-container.mobile #gameBoard {
            border: 3px solid #fff;
            border-radius: 10px;
            background: #000;
            box-shadow: inset 0 0 20px rgba(255,255,255,0.1);
            width: 100%;
            height: 300px;
            touch-action: none;
        }
        
        .game-container.mobile .controls {
            margin-top: 15px;
        }
        
        .game-container.mobile .controls p {
            font-size: 1em;
            margin: 0 0 10px 0;
        }
        
        .game-container.mobile #restart, .game-container.mobile #soundToggle, .game-container.mobile #backBtn {
            padding: 12px 24px;
            font-size: 1em;
            border-radius: 25px;
            margin: 5px;
        }

        .sound-off { background: #f44336 !important; }
        .sound-off:hover { background: #da190b !important; }
        
        #backBtn {
            background: #ff9800 !important;
        }
        
        #backBtn:hover {
            background: #e68900 !important;
            transform: scale(1.05);
        }
        
        button:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <!-- Mode Selector Screen -->
    <div id="modeSelector" class="mode-selector">
        <h1>🐍 Snake Game</h1>
        <div class="mode-buttons">
            <button id="laptopMode" class="mode-btn">💻 Laptop Mode</button>
            <button id="mobileMode" class="mode-btn">📱 Mobile Mode</button>
        </div>
    </div>

    <!-- Game Container (hidden initially) -->
    <div id="gameContainer" class="game-container laptop" style="display: none;">
        <h1>🐍 Snake Game</h1>
        <div class="score-board">
            <span>Score: <span id="score">0</span></span>
            <span>High Score: <span id="highScore">0</span></span>
        </div>
        <canvas id="gameBoard" width="8000" height="2000" tabindex="0"></canvas>
        <div class="controls">
            <p id="controlText">↑↓←→ arrows or WASD</p>
            <button id="backBtn">⬅️ Back</button>
            <button id="restart">New Game</button>
            <button id="soundToggle">🔊 Sound ON</button>
        </div>
    </div>

    <script>
        // Mode selection
        const laptopBtn = document.getElementById('laptopMode');
        const mobileBtn = document.getElementById('mobileMode');
        const modeSelector = document.getElementById('modeSelector');
        const gameContainer = document.getElementById('gameContainer');
        const backBtn = document.getElementById('backBtn');
        const controlText = document.getElementById('controlText');
        
        laptopBtn.addEventListener('click', () => selectMode('laptop'));
        mobileBtn.addEventListener('click', () => selectMode('mobile'));

        function selectMode(mode) {
            gameContainer.className = `game-container ${mode}`;
            isMobileMode = mode === 'mobile';
            startGame(mode);
            laptopBtn.classList.remove('active');
            mobileBtn.classList.remove('active');
            document.getElementById(mode + 'Mode').classList.add('active');
        }

        function goBackToMenu() {
            // Reset game state
            gameRunning = false;
            cancelAnimationFrame(gameLoopId);
            snake = [{x: 10, y: 10}];
            dx = 0; dy = 0; score = 0;
            
            // Hide game, show menu
            gameContainer.style.display = 'none';
            modeSelector.style.display = 'block';
            canvas.blur();
        }

        // Web Audio API
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playBeep(frequency = 800, duration = 0.1) {
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.frequency.value = frequency;
            oscillator.type = 'square';
            gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            oscillator.start(audioCtx.currentTime);
            oscillator.stop(audioCtx.currentTime + duration);
        }

        function playGameOver() {
            playBeep(200, 0.3);
            setTimeout(() => playBeep(150, 0.3), 100);
            setTimeout(() => playBeep(100, 0.5), 200);
        }

        // Game variables
        let canvas, ctx, scoreEl, highScoreEl, restartBtn, soundToggle;
        let snake = [{x: 10, y: 10}];
        let food = {x: 15, y: 15};
        let dx = 0, dy = 0;
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let gameRunning = true;
        let soundsEnabled = true;
        let lastUpdateTime = 0;
        let gameLoopId;
        let GAME_SPEED, gridSize, tileCount;
        let isMobileMode = false;

        function initGameElements() {
            canvas = document.getElementById('gameBoard');
            ctx = canvas.getContext('2d');
            scoreEl = document.getElementById('score');
            highScoreEl = document.getElementById('highScore');
            restartBtn = document.getElementById('restart');
            soundToggle = document.getElementById('soundToggle');
            highScoreEl.textContent = highScore;
            canvas.focus();
        }

        function setupGameMode(mode) {
            isMobileMode = mode === 'mobile';
            
            if (isMobileMode) {
                canvas.width = 350;
                canvas.height = 350;
                gridSize = 20;
                GAME_SPEED = 130;
                controlText.textContent = 'Tap/Swipe to play';
            } else {
                canvas.width = 500;
                canvas.height = 500;
                gridSize = 25;
                GAME_SPEED = 140;
                controlText.textContent = '↑↓←→ arrows or WASD';
            }
            
            tileCount = canvas.width / gridSize;
        }

        function changeDirection(event) {
            if (!gameRunning) return;
            
            const LEFT_KEY = 37, UP_KEY = 38, RIGHT_KEY = 39, DOWN_KEY = 40,
                  A_KEY = 65, W_KEY = 87, D_KEY = 68, S_KEY = 83;
            
            const keyPressed = event.keyCode;
            const goingUp = dy === -1;
            const goingDown = dy === 1;
            const goingRight = dx === 1;
            const goingLeft = dx === -1;
            
            if (keyPressed === LEFT_KEY || keyPressed === A_KEY) {
                if (!goingRight) { dx = -1; dy = 0; }
            }
            else if (keyPressed === UP_KEY || keyPressed === W_KEY) {
                if (!goingDown) { dx = 0; dy = -1; }
            }
            else if (keyPressed === RIGHT_KEY || keyPressed === D_KEY) {
                if (!goingLeft) { dx = 1; dy = 0; }
            }
            else if (keyPressed === DOWN_KEY || keyPressed === S_KEY) {
                if (!goingUp) { dx = 0; dy = 1; }
            }
            
            if (soundsEnabled && [LEFT_KEY, UP_KEY, RIGHT_KEY, DOWN_KEY, A_KEY, W_KEY, D_KEY, S_KEY].includes(keyPressed)) {
                playBeep(600, 0.05);
            }
        }

        function setupTouchControls() {
            let touchStartX = 0, touchStartY = 0;
            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                touchStartX = e.touches[0].clientX;
                touchStartY = e.touches[0].clientY;
            });
            
            canvas.addEventListener('touchend', (e) => {
                e.preventDefault();
                if (!gameRunning || !touchStartX || !touchStartY) return;
                
                const touchEndX = e.changedTouches[0].clientX;
                const touchEndY = e.changedTouches[0].clientY;
                const diffX = touchStartX - touchEndX;
                const diffY = touchStartY - touchEndY;
                
                if (Math.abs(diffX) > Math.abs(diffY)) {
                    if (diffX > 30 && dx !== 1) { dx = -1; dy = 0; }
                    else if (diffX < -30 && dx !== -1) { dx = 1; dy = 0; }
                } else {
                    if (diffY > 30 && dy !== 1) { dx = 0; dy = -1; }
                    else if (diffY < -30 && dy !== -1) { dx = 0; dy = 1; }
                }
                
                if (soundsEnabled && (Math.abs(diffX) > 30 || Math.abs(diffY) > 30)) {
                    playBeep(600, 0.05);
                }
                
                touchStartX = 0;
                touchStartY = 0;
            });
        }

        function generateFood() {
            food = {
                x: Math.floor(Math.random() * tileCount),
                y: Math.floor(Math.random() * tileCount)
            };
            if (snake.some(segment => segment.x === food.x && segment.y === food.y)) {
                generateFood();
            }
        }

        function gameLoop(currentTime) {
            if (!gameRunning) return;

            if (currentTime - lastUpdateTime < GAME_SPEED) {
                gameLoopId = requestAnimationFrame(gameLoop);
                return;
            }
            lastUpdateTime = currentTime;

            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreEl.textContent = score;
                if (soundsEnabled) playBeep(800, 0.15);
                generateFood();
            } else {
                snake.pop();
            }

            ctx.fillStyle = 'black';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#0f0';
            snake.forEach((segment, index) => {
                ctx.fillRect(segment.x * gridSize, segment.y * gridSize, gridSize - 2, gridSize - 2);
                if (index === 0) {
                    ctx.shadowColor = '#0f0';
                    ctx.shadowBlur = isMobileMode ? 10 : 15;
                    ctx.fillRect(segment.x * gridSize, segment.y * gridSize, gridSize - 2, gridSize - 2);
                    ctx.shadowBlur = 0;
                }
            });

            ctx.fillStyle = 'red';
            ctx.shadowColor = 'red';
            ctx.shadowBlur = isMobileMode ? 12 : 20;
            ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize - 2, gridSize - 2);
            ctx.shadowBlur = 0;

            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount ||
                snake.slice(1).some(segment => segment.x === head.x && segment.y === head.y)) {
                gameOver();
                return;
            }

            gameLoopId = requestAnimationFrame(gameLoop);
        }

        function gameOver() {
            gameRunning = false;
            cancelAnimationFrame(gameLoopId);
            if (soundsEnabled) playGameOver();
            
            if (score > highScore) {
                highScore = score;
                highScoreEl.textContent = highScore;
                localStorage.setItem('snakeHighScore', highScore);
            }
            
            setTimeout(() => {
                alert(`Game Over!\nScore: ${score}\nHigh Score: ${highScore}`);
                restartGame();
            }, 800);
        }

        function restartGame() {
            snake = [{x: 10, y: 10}];
            dx = 0;
            dy = 0;
            score = 0;
            scoreEl.textContent = 0;
            gameRunning = true;
            generateFood();
            canvas.focus();
            lastUpdateTime = 0;
            gameLoop(0);
        }

        function startGame(mode) {
            modeSelector.style.display = 'none';
            gameContainer.style.display = 'block';
            
            initGameElements();
            setupGameMode(mode);
            setupTouchControls();
            
            // Event listeners
            document.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });
            document.addEventListener('keydown', (e) => {
                if ([37,38,39,40,65,87,68,83].includes(e.keyCode)) e.preventDefault();
            });
            document.addEventListener('keydown', changeDirection);
            canvas.addEventListener('keydown', changeDirection);
            
            restartBtn.addEventListener('click', restartGame);
            soundToggle.addEventListener('click', () => {
                soundsEnabled = !soundsEnabled;
                soundToggle.textContent = soundsEnabled ? '🔊 Sound ON' : '🔇 Sound OFF';
                soundToggle.classList.toggle('sound-off', !soundsEnabled);
            });
            backBtn.addEventListener('click', goBackToMenu);
            
            generateFood();
            canvas.focus();
            gameLoop(0);
        }
    </script>
</body>
</html>
