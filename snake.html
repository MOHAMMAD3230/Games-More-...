<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🐍 Snake Game</title>

<style>
*{box-sizing:border-box}

body{
margin:0;
padding:20px;
font-family:Courier New, monospace;
background:linear-gradient(135deg,#667eea,#764ba2);
display:flex;
flex-direction:column;
align-items:center;
justify-content:flex-start;
min-height:100vh;
overflow-y:auto;
overflow-x:hidden;
}

/* SCROLLBAR */
::-webkit-scrollbar{width:10px;}
::-webkit-scrollbar-track{background:#222;}
::-webkit-scrollbar-thumb{background:#4CAF50;border-radius:10px;}
::-webkit-scrollbar-thumb:hover{background:#45a049;}

/* MENU */
.mode-selector{
background:#000c;
padding:30px;
border-radius:20px;
text-align:center;
color:white;
margin-bottom:20px;
}
.mode-selector h1{font-size:3em;margin-bottom:30px;}
.mode-buttons{display:flex;gap:20px;flex-wrap:wrap;justify-content:center;}
.mode-btn{
background:#4CAF50;
border:none;
color:white;
padding:20px 40px;
font-size:1.3em;
border-radius:30px;
cursor:pointer;
}
.mode-btn:hover{transform:scale(1.05);}

/* GAME */
.game-container{
display:none;
background:#000e;
padding:20px;
border-radius:20px;
color:white;
text-align:center;
max-width:100%;
}
canvas{
background:black;
border:4px solid white;
border-radius:10px;
touch-action:none;
display:block;
margin:0 auto;
}
.score-board{display:flex;justify-content:space-between;margin-bottom:10px;font-size:1.3em;}
.controls{margin-top:15px;}
button{
padding:10px 20px;
border:none;
border-radius:20px;
cursor:pointer;
background:#4CAF50;
color:white;
margin:5px;
}
button:hover{transform:scale(1.05);}
.sound-off{background:#f44336;}
#backBtn{background:#ff9800;}
</style>
</head>

<body>
<!-- MODE SELECTOR -->
<div id="modeSelector" class="mode-selector">
<h1>🐍 Snake Game</h1>
<div class="mode-buttons">
<button id="laptopMode" class="mode-btn">💻 Laptop Mode</button>
<button id="mobileMode" class="mode-btn">📱 Mobile Mode</button>
</div>
</div>

<!-- GAME -->
<div id="gameContainer" class="game-container">
<h1>🐍 Snake Game</h1>
<div class="score-board">
<span>Score: <span id="score">0</span></span>
<span>High Score: <span id="highScore">0</span></span>
</div>
<canvas id="gameBoard" width="500" height="500" tabindex="0"></canvas>
<div class="controls">
<p id="controlText">Arrows or WASD</p>
<button id="backBtn">⬅ Back</button>
<button id="restart">New Game</button>
<button id="soundToggle">🔊 Sound ON</button>
</div>
</div>

<script>
/* MENU */
const laptopBtn=document.getElementById("laptopMode")
const mobileBtn=document.getElementById("mobileMode")
const menu=document.getElementById("modeSelector")
const gameContainer=document.getElementById("gameContainer")

laptopBtn.onclick=()=>startGame("laptop")
mobileBtn.onclick=()=>startGame("mobile")

/* VARIABLES */
let canvas,ctx
let gridSize,tileCount
let snake,food
let dx=0,dy=0
let score=0
let highScore=localStorage.getItem("snakeHighScore")||0
let gameRunning=false
let gameSpeed=140
let lastUpdate=0
let gameLoopId
let soundsEnabled=true
let isMobile=false

/* AUDIO */
let audioCtx
function initAudio(){
    if(audioCtx)return
    audioCtx=new (window.AudioContext||window.webkitAudioContext)()
}

function beep(freq=700,dur=0.1){
    if(!soundsEnabled)return
    try{
        initAudio()
        if(audioCtx.state==='suspended')audioCtx.resume()
        const osc=audioCtx.createOscillator()
        const gain=audioCtx.createGain()
        osc.connect(gain)
        gain.connect(audioCtx.destination)
        osc.frequency.value=freq
        gain.gain.setValueAtTime(.3,audioCtx.currentTime)
        gain.gain.exponentialRampToValueAtTime(.01,audioCtx.currentTime+dur)
        osc.start()
        osc.stop(audioCtx.currentTime+dur)
    }catch(e){}
}

/* START GAME */
function startGame(mode){
    menu.style.display="none"
    gameContainer.style.display="block"
    
    canvas=document.getElementById("gameBoard")
    ctx=canvas.getContext("2d")
    
    isMobile = mode==="mobile"
    
    if(isMobile){
        canvas.width=350
        canvas.height=350
        gridSize=20
        gameSpeed=130
        document.getElementById("controlText").textContent="Swipe to move"
        setupTouch()
    }else{
        canvas.width=500
        canvas.height=500
        gridSize=25
        gameSpeed=140
        document.getElementById("controlText").textContent="Arrows or WASD"
    }
    
    tileCount=Math.floor(canvas.width/gridSize)
    document.getElementById("highScore").textContent=highScore
    
    // **FIX 1: Remove old listeners**
    document.removeEventListener('keydown', handleKeys)
    canvas.removeEventListener('keydown', handleKeys)
    
    // **FIX 2: Add new listeners with preventDefault**
    document.addEventListener('keydown', handleKeys)
    canvas.addEventListener('keydown', handleKeys)
    
    resetGame()
}

/* KEY HANDLER - FIXED SCROLLING */
function handleKeys(e){
    // **CRITICAL FIX: Prevent ALL default behaviors**
    e.preventDefault()
    e.stopPropagation()
    
    if(!gameRunning)return
    
    const k=e.keyCode
    if(k===37||k===65){ if(dx!==1){dx=-1;dy=0} }
    if(k===38||k===87){ if(dy!==1){dx=0;dy=-1} }
    if(k===39||k===68){ if(dx!==-1){dx=1;dy=0} }
    if(k===40||k===83){ if(dy!==-1){dx=0;dy=1} }
    
    beep(600,0.05)
}

/* RESET */
function resetGame(){
    snake=[{x:10,y:10}]
    dx=0
    dy=0
    score=0
    document.getElementById("score").textContent=score
    generateFood()
    gameRunning=true
    lastUpdate=0
    gameLoop(0)
}

/* FOOD */
function generateFood(){
    food={
        x:Math.floor(Math.random()*tileCount),
        y:Math.floor(Math.random()*tileCount)
    }
    if(snake.some(s=>s.x===food.x && s.y===food.y))
        generateFood()
}

/* LOOP */
function gameLoop(time){
    if(!gameRunning)return
    
    if(time-lastUpdate<gameSpeed){
        gameLoopId=requestAnimationFrame(gameLoop)
        return
    }
    
    lastUpdate=time
    
    const head={x:snake[0].x+dx,y:snake[0].y+dy}
    snake.unshift(head)
    
    if(head.x===food.x && head.y===food.y){
        score+=10
        document.getElementById("score").textContent=score
        beep(900,.15)
        generateFood()
    }else{
        snake.pop()
    }
    
    draw()
    
    if(checkCollision(head)){
        gameOver()
        return
    }
    
    gameLoopId=requestAnimationFrame(gameLoop)
}

/* DRAW */
function draw(){
    ctx.fillStyle="black"
    ctx.fillRect(0,0,canvas.width,canvas.height)
    
    ctx.fillStyle="lime"
    snake.forEach(s=>{
        ctx.fillRect(s.x*gridSize,s.y*gridSize,gridSize-2,gridSize-2)
    })
    
    ctx.fillStyle="red"
    ctx.fillRect(food.x*gridSize,food.y*gridSize,gridSize-2,gridSize-2)
}

/* COLLISION */
function checkCollision(head){
    if(head.x<0||head.x>=tileCount||head.y<0||head.y>=tileCount)
        return true
    return snake.slice(1).some(s=>s.x===head.x && s.y===head.y)
}

/* GAME OVER */
function gameOver(){
    gameRunning=false
    beep(200,.3)
    
    if(score>highScore){
        highScore=score
        localStorage.setItem("snakeHighScore",highScore)
        document.getElementById("highScore").textContent=highScore
    }
    
    setTimeout(()=>{
        alert("Game Over\nScore: "+score)
        resetGame()
    },600)
}

/* TOUCH */
function setupTouch(){
    let startX=0,startY=0
    canvas.addEventListener("touchstart",e=>{
        e.preventDefault()
        startX=e.touches[0].clientX
        startY=e.touches[0].clientY
    },{passive:false})
    
    canvas.addEventListener("touchend",e=>{
        e.preventDefault()
        if(!gameRunning)return
        
        let endX=e.changedTouches[0].clientX
        let endY=e.changedTouches[0].clientY
        
        let diffX=startX-endX
        let diffY=startY-endY
        
        if(Math.abs(diffX)>Math.abs(diffY)){
            if(diffX>30 && dx!==1){dx=-1;dy=0}
            if(diffX<-30 && dx!==-1){dx=1;dy=0}
        }else{
            if(diffY>30 && dy!==1){dx=0;dy=-1}
            if(diffY<-30 && dy!==-1){dx=0;dy=1}
        }
        
        beep(600,0.05)
    },{passive:false})
}

/* BUTTONS */
document.getElementById("restart").onclick=resetGame

document.getElementById("backBtn").onclick=()=>{
    if(gameLoopId)cancelAnimationFrame(gameLoopId)
    gameRunning=false
    gameContainer.style.display="none"
    menu.style.display="block"
    // Clean up focus
    if(canvas)canvas.blur()
}

document.getElementById("soundToggle").onclick=function(){
    soundsEnabled=!soundsEnabled
    this.textContent=soundsEnabled?"🔊 Sound ON":"🔇 Sound OFF"
    this.classList.toggle("sound-off",!soundsEnabled)
}
</script>
</body>
</html>
