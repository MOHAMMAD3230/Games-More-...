name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # Change this to 'master' if that is your default branch name

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./ # If your index.html is in a subfolder, change this to ./folder-name
