name: "CodeQL"

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  schedule:
    - cron: '22 4 * * 4'

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'javascript' ]  # Change to 'typescript' if .ts files

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Initialize Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'  # Use your project's Node version (e.g., from package.json)

    # Build to index JS code for CodeQL
    - name: Install dependencies & Build
      run: |
        npm ci  # Or yarn install
        npm run build  # Replace with your build script (e.g., npm run dev if no build)

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: ${{ matrix.language }}
        # Optional: paths: '**/*.js,**/*.ts'  # Explicitly include your files
        # paths-ignore: '**/node_modules/**'

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
