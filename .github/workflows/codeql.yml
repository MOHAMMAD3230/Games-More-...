name: "CodeQL"

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  schedule:
    - cron: '22 4 * * 4'

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'javascript' ]
        # Add other languages if needed: 'python', 'java', etc.

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # Initializes the CodeQL tools for scanning.
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: ${{ matrix.language }}
        # Optional: paths-ignore: '**/node_modules/**'

    # If you need a manual build (e.g., npm install), uncomment/add:
    # - name: Build (manual)
    #   run: |
    #     npm ci
    #     npm run build

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3

