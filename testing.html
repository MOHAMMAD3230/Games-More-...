<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://unpkg.com; style-src 'self' 'unsafe-inline'; connect-src 'self' wss://*.peerjs.com https://*.peerjs.com; img-src 'self' data: https:; font-src 'self';">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OMNI-LINK | P2P RELAY</title>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<style>
    :root {
        --bg: #050505;
        --surface: #0f0f0f;
        --border: #1a1a1a;
        --accent: #39ff14;
        --text: #d0d0d0;
        --mono: 'Courier New', Courier, monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
        background: var(--bg); color: var(--text); font-family: var(--mono); 
        height: 100vh;
        height: 100dvh;
        display: flex; flex-direction: column; overflow: hidden;
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
    }

    .header {
        display: flex; align-items: center; justify-content: space-between;
        padding: 10px 15px; background: var(--surface); border-bottom: 1px solid var(--border);
        flex-shrink: 0;
    }
    .header-title { color: var(--accent); font-weight: bold; font-size: 14px; letter-spacing: 2px; }
    .header-badges { display: flex; align-items: center; gap: 8px; }

    .net-indicator {
        display: inline-flex; align-items: center; gap: 5px;
        font-size: 9px; font-weight: bold; text-transform: uppercase;
        letter-spacing: 0.5px; padding: 4px 8px; border-radius: 3px;
        background: #111; opacity: 0.3; transition: opacity 0.4s;
    }
    .net-indicator.active { opacity: 1; }

    .net-dot {
        width: 6px; height: 6px; border-radius: 50%; background: #333;
        transition: background 0.4s, box-shadow 0.4s;
    }
    .net-dot.lan { background: #39ff14; box-shadow: 0 0 6px #39ff14; }
    .net-dot.p2p { background: #00d4ff; box-shadow: 0 0 6px #00d4ff; }
    .net-dot.relay { background: #ffd700; box-shadow: 0 0 6px #ffd700; }

    #netText { color: #444; transition: color 0.4s; }

    .status-badge { display: flex; align-items: center; gap: 8px; font-size: 10px; text-transform: uppercase; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #444; transition: background 0.4s, box-shadow 0.4s; }
    .status-dot.online { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
    .status-dot.listening { background: #ffd700; animation: blink 1s infinite; }
    .status-dot.connecting { background: #00d4ff; animation: pulse 0.6s infinite; }

    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(0.7); } }

    .console { 
        flex: 1; min-height: 0; overflow-y: auto; padding: 15px; 
        background: rgba(0,0,0,0.5); font-size: 13px; line-height: 1.5;
        -webkit-overflow-scrolling: touch;
    }
    .entry { margin-bottom: 5px; word-break: break-all; border-left: 2px solid transparent; padding-left: 8px; }
    .ts { color: #555; margin-right: 8px; }
    .sys { color: #777; font-style: italic; }
    .local { color: var(--accent); border-left-color: var(--accent); }
    .remote { color: #00d4ff; border-left-color: #00d4ff; }
    .warn { color: #ff3333; }
    .route-log { color: #666; font-size: 11px; }
    .ok { color: #39ff14; }

    .panel { 
        padding: 15px; background: var(--surface); border-top: 1px solid var(--border);
        flex-shrink: 0;
    }
    .setup-row, .chat-row { display: flex; gap: 10px; }
    .chat-row { display: none; }
    .chat-row.active { display: flex; }
    .dead-row { display: none; }
    .dead-row.active { display: flex; }

    input { 
        flex: 1; background: #000; border: 1px solid var(--border); 
        color: var(--accent); padding: 10px; font-family: var(--mono); outline: none;
        min-height: 44px;
    }
    input:focus { border-color: var(--accent); }
    input::placeholder { color: #222; }

    .btn { 
        background: transparent; border: 1px solid var(--accent); color: var(--accent);
        padding: 0 15px; cursor: pointer; font-family: var(--mono); font-size: 11px;
        text-transform: uppercase; transition: 0.2s; min-height: 44px; min-width: 44px;
        -webkit-tap-highlight-color: transparent; white-space: nowrap;
    }
    .btn:hover { background: var(--accent); color: #000; }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .btn.btn-warn { border-color: #ff3333; color: #ff3333; }
    .btn.btn-warn:hover { background: #ff3333; color: #000; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: var(--border); }

    @media (max-width: 420px) {
        .header { padding: 8px 12px; }
        .header-title { font-size: 12px; letter-spacing: 1px; }
        .net-indicator { padding: 3px 6px; font-size: 8px; }
        .panel { padding: 12px; }
        .btn { padding: 0 12px; font-size: 10px; }
    }

    @media (prefers-reduced-motion: reduce) {
        .status-dot.listening, .status-dot.connecting { animation: none; }
        .btn { transition: none; }
    }
</style>
</head>
<body>

<header class="header">
    <div class="header-title">OMNI-LINK v3.1</div>
    <div class="header-badges">
        <div class="net-indicator" id="netIndicator">
            <span class="net-dot" id="netDot"></span>
            <span id="netText">---</span>
        </div>
        <div class="status-badge">
            <div class="status-dot" id="statusDot"></div>
            <span id="statusText">Offline</span>
        </div>
    </div>
</header>

<main class="console" id="console"></main>

<section class="panel">
    <div class="setup-row" id="setupRow">
        <input type="number" id="chanInput" placeholder="CHANNEL (1-99)" min="1" max="99" inputmode="numeric" autocomplete="off">
        <button class="btn" id="initBtn">Initialize Link</button>
    </div>

    <div class="chat-row" id="chatRow">
        <input type="text" id="msgInput" placeholder="Type message..." maxlength="500" autocomplete="off">
        <button class="btn" id="sendBtn">Send</button>
        <button class="btn btn-warn" id="discBtn">End</button>
    </div>

    <div class="dead-row" id="deadRow">
        <button class="btn" id="retryBtn" style="flex:1;">Retry Connection</button>
    </div>
</section>

<script>
(function() {
    'use strict';

    var peer = null;
    var conn = null;
    var connTimeout = null;
    var failTimeout = null;
    var iceRestarted = false;
    var channel = '';
    var isHost = false;
    var PREFIX = 'OMNI-P2P-PRO-';
    var logEl = document.getElementById('console');

    /* 
     * STUN-only: fast local/public IP discovery.
     * NO custom TURN — PeerJS cloud (0.peerjs.com) provides its own
     * working TURN relay via Xirsys. Adding broken TURN servers here
     * would OVERRIDE PeerJS's built-in relay and kill cross-network connectivity.
     */
    var PEER_OPTS = {
        debug: 0,
        secure: true,
        host: '0.peerjs.com',
        port: 443,
        transports: ['websocket'],
        config: {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' },
                { urls: 'stun:stun2.l.google.com:19302' },
                { urls: 'stun:stun3.l.google.com:19302' },
                { urls: 'stun:stun4.l.google.com:19302' }
            ]
        }
    };

    function getPC(c) {
        if (!c) return null;
        return c.peerConnection || c._pc || null;
    }

    function attachIceTracker(c) {
        var pc = getPC(c);
        if (!pc) {
            /* PeerJS may not have set up the RTCPeerConnection yet — retry */
            if (c._iceRetries < 15) {
                c._iceRetries = (c._iceRetries || 0) + 1;
                setTimeout(function() { attachIceTracker(c); }, 400);
            } else {
                log('Warning: Could not access WebRTC layer.', 'warn');
            }
            return;
        }

        pc.addEventListener('icecandidate', function(e) {
            if (!e.candidate) return log('ICE: Gathering complete.', 'route-log');
            var t = e.candidate.type;
            if (t === 'host')  log('ICE: Local candidate (LAN).', 'route-log');
            if (t === 'srflx') log('ICE: STUN candidate (Public IP).', 'route-log');
            if (t === 'relay') log('ICE: TURN candidate (Relay).', 'route-log');
        });

        pc.addEventListener('iceconnectionstatechange', function() {
            var s = pc.iceConnectionState;
            log('ICE state: ' + s, 'route-log');

            if (s === 'connected' || s === 'completed') {
                clearAllTimeouts();
                detectRoute(pc);
            }
            if (s === 'disconnected') {
                log('ICE disconnected — may recover...', 'warn');
            }
            if (s === 'failed') {
                if (!iceRestarted) {
                    iceRestarted = true;
                    log('ICE failed. Attempting restart...', 'warn');
                    try { pc.restartIce(); } catch(e) {
                        log('ICE restart not supported. Connection lost.', 'warn');
                        handleDead();
                    }
                } else {
                    log('ICE restart failed. Connection dead.', 'warn');
                    handleDead();
                }
            }
            if (s === 'closed') {
                clearAllTimeouts();
            }
        });
    }

    function detectRoute(pc) {
        pc.getStats(null).then(function(stats) {
            var done = false;
            stats.forEach(function(r) {
                if (done) return;
                if (r.type === 'candidate-pair' && r.state === 'succeeded') {
                    done = true;
                    var local = stats.get(r.localCandidateId);
                    if (local) {
                        var t = local.candidateType || 'unknown';
                        showRoute(t);
                        if (t === 'host')      log('Route: LAN — Same network.', 'ok');
                        else if (t === 'srflx') log('Route: P2P — Direct across networks.', 'ok');
                        else if (t === 'relay') log('Route: RELAY — Routed through TURN server.', 'ok');
                        else                    log('Route: Unknown type.', 'route-log');
                    }
                }
            });
            if (!done) showRoute('unknown');
        }).catch(function() { showRoute('unknown'); });
    }

    function showRoute(type) {
        var el  = document.getElementById('netIndicator');
        var dot = document.getElementById('netDot');
        var txt = document.getElementById('netText');
        el.className = 'net-indicator active';
        dot.className = 'net-dot';
        txt.style.color = '';
        if (type === 'host') { dot.classList.add('lan'); txt.textContent = 'LAN'; txt.style.color = '#39ff14'; }
        else if (type === 'srflx') { dot.classList.add('p2p'); txt.textContent = 'P2P'; txt.style.color = '#00d4ff'; }
        else if (type === 'relay') { dot.classList.add('relay'); txt.textContent = 'RELAY'; txt.style.color = '#ffd700'; }
        else { txt.textContent = '---'; }
    }

    function resetRoute() {
        document.getElementById('netIndicator').className = 'net-indicator';
        document.getElementById('netDot').className = 'net-dot';
        var txt = document.getElementById('netText');
        txt.textContent = '---';
        txt.style.color = '';
    }

    function log(msg, type) {
        var div = document.createElement('div');
        div.className = 'entry ' + (type || '');
        var ts = new Date().toLocaleTimeString([], {hour12:false});
        div.innerHTML = '<span class="ts">[' + ts + ']</span><span></span>';
        div.querySelector('span:last-child').textContent = msg;
        logEl.appendChild(div);
        logEl.scrollTop = logEl.scrollHeight;
    }

    function setStatus(text, dotClass) {
        document.getElementById('statusText').textContent = text;
        document.getElementById('statusDot').className = 'status-dot ' + (dotClass || '');
    }

    function clearAllTimeouts() {
        clearTimeout(connTimeout);
        clearTimeout(failTimeout);
    }

    function startConnTimeouts() {
        clearAllTimeouts();
        connTimeout = setTimeout(function() {
            log('Connection slow — checking ICE...', 'warn');
        }, 10000);
        failTimeout = setTimeout(function() {
            log('Connection timed out.', 'warn');
            handleDead();
        }, 30000);
    }

    function showRow(name) {
        document.getElementById('setupRow').style.display = 'none';
        document.getElementById('chatRow').classList.remove('active');
        document.getElementById('deadRow').classList.remove('active');
        if (name === 'setup') document.getElementById('setupRow').style.display = 'flex';
        if (name === 'chat')  document.getElementById('chatRow').classList.add('active');
        if (name === 'dead')  document.getElementById('deadRow').classList.add('active');
    }

    function handleDead() {
        clearAllTimeouts();
        setStatus('Failed', '');
        resetRoute();
        showRow('dead');
        destroyPeer();
    }

    function destroyPeer() {
        if (conn) { try { conn.close(); } catch(e) {} }
        conn = null;
        if (peer) { try { peer.destroy(); } catch(e) {} }
        peer = null;
        iceRestarted = false;
    }

    function fullReset() {
        clearAllTimeouts();
        destroyPeer();
        channel = '';
        isHost = false;
        setStatus('Offline', '');
        resetRoute();
        showRow('setup');
        document.getElementById('initBtn').disabled = false;
    }

    function initLink() {
        var chan = document.getElementById('chanInput').value.trim();
        if (!chan || chan < 1 || chan > 99) return log('Enter channel 1-99.', 'warn');
        channel = chan;

        var targetId = PREFIX + chan;
        document.getElementById('initBtn').disabled = true;
        log('Creating node on CH-' + chan + '...', 'sys');

        try { peer = new Peer(targetId, PEER_OPTS); }
        catch(e) { log('Failed: ' + e.message, 'warn'); fullReset(); return; }

        var sigTimeout = setTimeout(function() {
            if (peer && !peer.destroyed) { log('Signaling timeout.', 'warn'); fullReset(); }
        }, 12000);

        peer.on('open', function() {
            clearTimeout(sigTimeout);
            isHost = true;
            log('Node registered as HOST. Waiting for peer...', 'sys');
            setStatus('Listening', 'listening');
        });

        peer.on('connection', function(incoming) {
            log('Incoming connection detected.', 'sys');
            setStatus('Connecting', 'connecting');
            conn = incoming;
            conn._iceRetries = 0;
            attachIceTracker(conn);
            startConnTimeouts();
            wireDataConn();
        });

        peer.on('error', function(err) {
            clearTimeout(sigTimeout);
            clearAllTimeouts();
            if (err.type === 'unavailable-id') {
                log('Channel occupied — joining as CLIENT...', 'sys');
                peer.removeAllListeners();
                peer.destroy();
                peer = null;
                isHost = false;
                setTimeout(function() { joinExisting(targetId); }, 1500);
            } else {
                log('Error: ' + err.type, 'warn');
                fullReset();
            }
        });
    }

    function joinExisting(targetId) {
        log('Creating client node...', 'sys');

        try { peer = new Peer(PEER_OPTS); }
        catch(e) { log('Failed to create client node.', 'warn'); fullReset(); return; }

        var sigTimeout = setTimeout(function() {
            if (peer && !peer.destroyed) { log('Signaling timeout.', 'warn'); fullReset(); }
        }, 12000);

        peer.on('open', function() {
            clearTimeout(sigTimeout);
            log('Connecting to HOST...', 'sys');
            setStatus('Connecting', 'connecting');

            try {
                conn = peer.connect(targetId, { reliable: true });
                conn._iceRetries = 0;
                attachIceTracker(conn);
                startConnTimeouts();
                wireDataConn();
            } catch(e) {
                log('Connect failed: ' + e.message, 'warn');
                fullReset();
            }
        });

        peer.on('error', function(err) {
            clearTimeout(sigTimeout);
            clearAllTimeouts();
            log('Join error: ' + err.type, 'warn');
            fullReset();
        });
    }

    function wireDataConn() {
        conn.on('open', function() {
            clearAllTimeouts();
            log('Data stream ESTABLISHED. Ready to communicate.', 'ok');
            setStatus('Connected', 'online');
            showRow('chat');
            document.getElementById('msgInput').focus();
        });

        conn.on('data', function(data) {
            if (typeof data === 'string') log(data, 'remote');
            else log('[binary data]', 'remote');
        });

        conn.on('close', function() {
            clearAllTimeouts();
            log('Peer disconnected.', 'warn');
            handleDead();
        });

        conn.on('error', function(err) {
            log('Data error: ' + err, 'warn');
        });
    }

    function sendMessage() {
        var input = document.getElementById('msgInput');
        var msg = input.value.trim();
        if (!msg) return;
        if (conn && conn.open) {
            try {
                conn.send(msg);
                log(msg, 'local');
                input.value = '';
            } catch(e) {
                log('Send failed.', 'warn');
            }
        } else {
            log('Link not active.', 'warn');
        }
    }

    /* Wire UI */
    document.getElementById('initBtn').onclick = initLink;
    document.getElementById('sendBtn').onclick = sendMessage;
    document.getElementById('discBtn').onclick = function() {
        log('Link terminated by user.', 'sys');
        fullReset();
    };
    document.getElementById('retryBtn').onclick = function() {
        fullReset();
        if (channel) {
            document.getElementById('chanInput').value = channel;
            setTimeout(initLink, 300);
        }
    };
    document.getElementById('msgInput').onkeydown = function(e) {
        if (e.key === 'Enter') sendMessage();
    };

    log('OMNI-LINK v3.1 Online.', 'sys');
    log('STUN-only ICE — PeerJS cloud provides TURN relay.', 'sys');

})();
</script>
</body>
</html>
