<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>WebRTC Peer Connection</title>
<style>
  body { font-family: Arial, sans-serif; background: #222; color: #eee; padding: 20px; }
  #netStat { font-weight: bold; margin-bottom: 10px; }
  #log { height: 200px; overflow-y: auto; background: #333; padding: 10px; }
  button { padding: 10px 20px; margin-top: 10px; }
</style>
</head>
<body>

<h1>WebRTC Peer Connection</h1>
<div id="netStat">NET: NOT CONNECTED</div>
<div id="log"></div>
<button id="bootBtn">INITIALIZE LINK</button>
<input type="number" id="chanInput" placeholder="Channel 01-99" min="1" max="99"/>
<script src="https://cdn.jsdelivr.net/npm/peerjs@1.4.7/dist/peerjs.min.js"></script>
<script>
  const logEl = document.getElementById('log');
  const bootBtn = document.getElementById('bootBtn');
  const chanInput = document.getElementById('chanInput');
  const netStat = document.getElementById('netStat');

  let peer = null;
  let conn = null;
  let currentCall = null;
  let localStream = null;

  // Your TURN/STUN servers
  const NET_CONFIG = {
    host: 'your.peerjs.server', // Optional: your own PeerServer
    port: 9000,
    path: '/myapp',
    secure: true,
    config: {
      iceServers: [
        { urls: 'stun:stun.l.google.com:19302' },
        // Add TURN server if needed
        // { urls: 'turn:your.turn.server', username: 'user', credential: 'pass' }
      ]
    }
  };

  function log(message, type='') {
    const span = document.createElement('div');
    span.innerText = message;
    if (type === 'error') span.style.color = 'red';
    if (type === 'success') span.style.color = 'lightgreen';
    logEl.appendChild(span);
    logEl.scrollTop = logEl.scrollHeight;
  }

  function enablePTT() {
    // Your code to enable push-to-talk or other UI
  }

  function setupConnectionHandlers(connection, call) {
    if (connection) {
      connection.on('data', (data) => {
        log('Received data: ' + data);
      });
      connection.on('close', () => log('Connection closed.'));
    }

    if (call) {
      call.on('stream', (stream) => {
        // Play remote stream
        log('Received remote stream.');
        // You might want to attach to an audio element
      });
      call.on('close', () => log('Call ended.'));
    }
  }

  function setupAudioGraph() {
    // Your code to set up audio processing
  }

  function setMicState(state) {
    // Your code to enable/disable mic
  }

  // Function to become host with fixed ID
  function becomeHost() {
    const fixedHostId = 'TAC-SECURE-HOST'; // Fixed peer ID for host

    peer = new Peer(fixedHostId, NET_CONFIG);
    peer.on('open', (id) => {
      log(`NODE ${id} ONLINE. LISTENING...`, "success");
      netStat.innerText = "NET: HOSTING";
      netStat.style.color = "var(--green)";
      enablePTT();
      console.log('Host Peer ID:', id);
    });

    peer.on('connection', (c) => {
      log("INCOMING HANDSHAKE DETECTED.", "sys");
      conn = c;
      setupConnectionHandlers(c, null); 
    });

    peer.on('call', (call) => {
      log("INCOMING VOICE LINK.", "sys");
      call.answer(localStream);
      setupConnectionHandlers(null, call);
    });
  }

  // Function to connect to the host
  async function initChannel() {
    const inputVal = parseInt(chanInput.value);
    if (isNaN(inputVal) || inputVal < 1 || inputVal > 99) {
      log("ERROR: INVALID FREQUENCY. RANGE 01-99.", "error");
      chanInput.style.borderColor = "red";
      setTimeout(() => chanInput.style.borderColor = "#444", 1000);
      return;
    }
    const chanNum = inputVal.toString().padStart(2, '0');
    const targetId = 'TAC-SECURE-HOST'; // Fixed ID to connect to

    bootBtn.disabled = true;
    bootBtn.innerText = "LINKING...";
    log(`ATTEMPTING CONNECTION TO ${targetId}...`, "sys");
    console.log('Connecting to peer ID:', targetId);

    try {
      localStream = await navigator.mediaDevices.getUserMedia({ 
        audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true }
      });
      setMicState(false);
      setupAudioGraph();

      document.getElementById('curFreq').innerText = "462." + chanNum;

      connectToPeer(targetId);
    } catch(e) {
      console.error(e);
      log("HARDWARE ERROR: MIC ACCESS DENIED OR UNAVAILABLE", "error");
      bootBtn.disabled = false;
      bootBtn.innerText = "INITIALIZE LINK";
    }
  }

  function connectToPeer(targetId) {
    peer = new Peer(NET_CONFIG);
    peer.on('open', (id) => {
      console.log('Local Peer ID:', id);
      log("LOCAL HANDSHAKE ESTABLISHED. ID: " + id.substr(0,4) + "...", "sys");
      // Connect to fixed host ID
      conn = peer.connect(targetId);
      currentCall = peer.call(targetId, localStream);
      setupConnectionHandlers(conn, currentCall);
    });
    peer.on('error', (err) => {
      log('Peer error: ' + err.message, 'error');
    });
  }

  document.getElementById('bootBtn').onclick = () => {
    // Decide whether to be host or client:
    // For example, if you want to be host:
    // becomeHost();
    // Or if you want to connect as client:
    initChannel();
  };

  // For testing, you can call becomeHost() manually in console or button
</script>

</body>
</html>
