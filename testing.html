<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OMNI-VOICE V13</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --neon: #00ff41; --bg: #050505; }
        body { background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .terminal { border: 2px solid var(--neon); padding: 25px; background: #000; width: 340px; box-shadow: 0 0 15px var(--neon); text-align: center; }
        #ptt { width: 100%; padding: 40px; background: transparent; color: var(--neon); border: 2px solid var(--neon); font-size: 1.2rem; font-weight: bold; margin-top: 15px; display: none; cursor: pointer; user-select: none; }
        #ptt.active { background: var(--neon); color: #000; }
        .meter { width: 100%; height: 10px; background: #111; margin-top: 10px; border: 1px solid var(--neon); position: relative; }
        #fill { height: 100%; width: 0%; background: var(--neon); transition: width 0.1s; }
        input { background: #000; border: 1px solid var(--neon); color: var(--neon); padding: 10px; width: 100%; margin-bottom: 10px; text-align: center; }
        .btn { padding: 10px; background: var(--neon); color: #000; border: none; font-weight: bold; cursor: pointer; width: 48%; }
        #status { font-size: 0.7rem; margin-top: 15px; min-height: 1.2em; }
    </style>
</head>
<body>

<div class="terminal">
    <div id="setup-area">
        <button class="btn" style="width:100%; margin-bottom:10px;" onclick="startMic()">1. ACTIVATE MICROPHONE</button>
    </div>

    <div id="comms-area" style="display:none;">
        <input type="text" id="ch" placeholder="CHANNEL_ID">
        <div style="display:flex; justify-content: space-between;">
            <button class="btn" onclick="initPeer('A')">MODE_A</button>
            <button class="btn" onclick="initPeer('B')">MODE_B</button>
        </div>
        <div class="meter"><div id="fill"></div></div>
        <button id="ptt">HOLD TO TALK</button>
    </div>
    
    <div id="status">OFFLINE</div>
</div>

<audio id="v-out" autoplay playsinline></audio>

<script>
    let stream, peer, call;
    const status = document.getElementById('status');
    const fill = document.getElementById('fill');
    const ptt = document.getElementById('ptt');
    const vOut = document.getElementById('v-out');

    // 1. PURE MIC START (Matches the test page you just used)
    async function startMic() {
        try {
            stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            stream.getAudioTracks()[0].enabled = false; // Mute initially
            
            // Visual Meter Logic
            const ctx = new AudioContext();
            const src = ctx.createMediaStreamSource(stream);
            const ana = ctx.createAnalyser();
            src.connect(ana);
            const data = new Uint8Array(ana.frequencyBinCount);
            
            const update = () => {
                ana.getByteFrequencyData(data);
                if(stream.getAudioTracks()[0].enabled) {
                    fill.style.width = (data.reduce((a,b)=>a+b)/data.length * 2) + "%";
                } else { fill.style.width = "0%"; }
                requestAnimationFrame(update);
            };
            update();

            document.getElementById('setup-area').style.display = 'none';
            document.getElementById('comms-area').style.display = 'block';
            status.innerText = "MIC_READY";
        } catch(e) { status.innerText = "MIC_FAILED: " + e.name; }
    }

    // 2. PEER LOGIC
    function initPeer(role) {
        const id = document.getElementById('ch').value.toUpperCase();
        if(!id) return;
        
        if(peer) peer.destroy();
        peer = new Peer(`OMNI_${id}_${role}`, { debug: 1 });

        peer.on('open', () => {
            status.innerText = `ONLINE: ${role}`;
            if(role === 'A') {
                status.innerText = "CONNECTING TO B...";
                const c = peer.call(`OMNI_${id}_B`, stream);
                handleStream(c);
            }
        });

        peer.on('call', c => {
            c.answer(stream);
            handleStream(c);
        });
    }

    function handleStream(c) {
        c.on('stream', s => {
            vOut.srcObject = s;
            status.innerText = "LINKED";
            ptt.style.display = 'block';
        });
    }

    // 3. PTT LOGIC
    const talk = (on) => { 
        if(stream) stream.getAudioTracks()[0].enabled = on; 
        ptt.classList.toggle('active', on);
    };

    ptt.onmousedown = () => talk(true);
    ptt.onmouseup = () => talk(false);
    ptt.ontouchstart = (e) => { e.preventDefault(); talk(true); };
    ptt.ontouchend = (e) => { e.preventDefault(); talk(false); };
</script>
</body>
</html>
