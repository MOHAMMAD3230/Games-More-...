<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OMNI-VOICE | Stable Link</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --neon: #00ff41; --bg: #050505; }
        body { background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .terminal { border: 2px solid var(--neon); padding: 25px; background: #000; width: 340px; box-shadow: 0 0 15px var(--neon); text-align: center; }
        
        .node-map { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border: 1px solid #111; padding: 10px; }
        .node { width: 10px; height: 10px; border-radius: 50%; background: #222; transition: 0.3s; }
        .node.active { background: var(--neon); box-shadow: 0 0 10px var(--neon); }
        .line { flex-grow: 1; height: 1px; background: #222; margin: 0 10px; }
        .line.active { background: var(--neon); }

        input { background: #000; border: 1px solid var(--neon); color: var(--neon); padding: 12px; width: 100%; margin-bottom: 10px; text-transform: uppercase; font-family: inherit; text-align: center; outline: none; }
        
        #ptt-btn { 
            width: 100%; padding: 35px; background: transparent; color: var(--neon); 
            border: 2px solid var(--neon); cursor: pointer; font-size: 1.2rem; font-weight: bold;
            margin-top: 15px; user-select: none; -webkit-user-select: none;
        }
        #ptt-btn:active:not(:disabled) { background: var(--neon); color: #000; }
        #ptt-btn:disabled { border-color: #222; color: #222; cursor: not-allowed; }
        .small { font-size: 0.6rem; opacity: 0.6; margin-top: 10px; }
    </style>
</head>
<body>

<div class="terminal">
    <div class="node-map">
        <div id="n-local" class="node"></div>
        <div id="n-line" class="line"></div>
        <div id="n-remote" class="node"></div>
    </div>

    <input type="text" id="freq" placeholder="ENTER CHANNEL ID">
    
    <div style="display: flex; gap: 5px;">
        <button onclick="join('A')" style="flex:1; padding: 10px; background: var(--neon); color: black; border:none; font-weight:bold; cursor:pointer;">MODE_A</button>
        <button onclick="join('B')" style="flex:1; padding: 10px; background: var(--neon); color: black; border:none; font-weight:bold; cursor:pointer;">MODE_B</button>
    </div>

    <button id="ptt-btn" disabled>OFFLINE</button>
    <div id="status" style="font-size: 0.7rem; margin-top: 10px;">READY_FOR_HANDSHAKE</div>
    <div class="small">V.3.1_AUTO_RECONNECT</div>
</div>

<audio id="output" autoplay playsinline></audio>

<script>
    const status = document.getElementById('status');
    const nLocal = document.getElementById('n-local');
    const nRemote = document.getElementById('n-remote');
    const nLine = document.getElementById('n-line');
    const ptt = document.getElementById('ptt-btn');
    const audioOut = document.getElementById('output');

    let peer = null, localStream = null;

    // 1. Initial Mic Capture
    navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true } })
        .then(stream => {
            localStream = stream;
            localStream.getAudioTracks()[0].enabled = false;
        }).catch(() => { status.innerText = "MIC_ACCESS_DENIED"; });

    // 2. Peer Setup
    function join(role) {
        const ch = document.getElementById('freq').value.trim().toUpperCase();
        if(!ch) return alert("CHANNEL ID REQUIRED");

        if(peer) peer.destroy(); // Clear existing
        
        // UNIQUE IDs for A and B to prevent instant disconnects
        const myId = `OMNI_VOICE_${ch}_${role}`;
        const targetId = `OMNI_VOICE_${ch}_${role === 'A' ? 'B' : 'A'}`;

        peer = new Peer(myId, {
            config: { 'iceServers': [{ url: 'stun:stun.l.google.com:19302' }, { url: 'stun:stun1.l.google.com:19302' }] },
            debug: 1
        });

        peer.on('open', () => {
            status.innerText = `ACTIVE_CH: ${ch} (${role})`;
            nLocal.classList.add('active');
            if(role === 'A') {
                status.innerText = "SEARCHING_FOR_PEER...";
                setTimeout(() => dial(targetId), 2000); // Wait for signaling cloud to register
            }
        });

        peer.on('call', (call) => {
            status.innerText = "INCOMING_TRANSMISSION...";
            call.answer(localStream);
            attachStream(call);
        });

        peer.on('error', (err) => {
            status.innerText = "ERROR: " + err.type;
            if(err.type === 'peer-unavailable' && role === 'A') {
                status.innerText = "REMOTE_OFFLINE... RETRYING";
                setTimeout(() => dial(targetId), 3000); // Auto-retry
            }
        });
    }

    function dial(tid) {
        if(!peer || peer.destroyed) return;
        const call = peer.call(tid, localStream);
        attachStream(call);
    }

    function attachStream(call) {
        call.on('stream', (stream) => {
            audioOut.srcObject = stream;
            
            // Critical Fix: Force the audio to play after a user tap
            const playPromise = audioOut.play();
            if (playPromise !== undefined) {
                playPromise.catch(() => {
                    status.innerText = "TAP_SCREEN_TO_ACTIVATE_AUDIO";
                    window.onclick = () => { audioOut.play(); window.onclick = null; };
                });
            }

            status.innerText = "SECURED_LINK_READY";
            nRemote.classList.add('active');
            nLine.classList.add('active');
            ptt.disabled = false;
            ptt.innerText = "HOLD_TO_TALK";
        });

        call.on('close', () => {
            status.innerText = "LINK_LOST_RECONNECTING...";
            nRemote.classList.remove('active');
            nLine.classList.remove('active');
            ptt.disabled = true;
        });
    }

    // 3. PTT logic (Supports Desktop & Mobile)
    const setMic = (state) => {
        if(localStream) {
            localStream.getAudioTracks()[0].enabled = state;
            ptt.innerText = state ? "TRANSMITTING" : "HOLD_TO_TALK";
        }
    };

    ptt.onmousedown = () => setMic(true);
    ptt.onmouseup = () => setMic(false);
    ptt.ontouchstart = (e) => { e.preventDefault(); setMic(true); };
    ptt.ontouchend = (e) => { e.preventDefault(); setMic(false); };
</script>
</body>
</html>
