<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OMNI-VOICE V4</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --neon: #00ff41; --bg: #050505; --dim: #003b0f; }
        body { background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .terminal { border: 2px solid var(--neon); padding: 25px; background: #000; width: 340px; box-shadow: 0 0 20px rgba(0, 255, 65, 0.2); }
        
        /* Node Connectivity UI */
        .node-map { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding: 10px; background: #080808; border: 1px solid var(--dim); }
        .node { width: 12px; height: 12px; border-radius: 50%; background: #222; position: relative; }
        .node.active { background: var(--neon); box-shadow: 0 0 10px var(--neon); }
        .line { flex-grow: 1; height: 2px; background: #222; margin: 0 10px; position: relative; overflow: hidden; }
        .line.active::after { content: ''; position: absolute; width: 40px; height: 100%; background: var(--neon); animation: pulse 1.5s infinite; }
        @keyframes pulse { from { left: -40px; } to { left: 100%; } }

        input { background: #000; border: 1px solid var(--neon); color: var(--neon); padding: 12px; width: 100%; margin-bottom: 10px; text-transform: uppercase; font-family: inherit; text-align: center; }
        #ptt-btn { 
            width: 100%; padding: 35px; background: transparent; color: var(--neon); 
            border: 2px solid var(--neon); cursor: pointer; font-size: 1.2rem; font-weight: bold;
            margin-top: 15px; user-select: none; -webkit-user-select: none;
        }
        #ptt-btn:active:not(:disabled) { background: var(--neon); color: #000; }
        #ptt-btn:disabled { border-color: #222; color: #222; }
    </style>
</head>
<body>

<div class="terminal">
    <div class="node-map">
        <div id="n-local" class="node"></div>
        <div id="n-line" class="line"></div>
        <div id="n-remote" class="node"></div>
    </div>

    <input type="text" id="freq" placeholder="FREQUENCY_ID">
    
    <div style="display: flex; gap: 5px;">
        <button onclick="boot('A')" style="flex:1; padding: 10px; background: var(--neon); color: black; border:none; font-weight:bold; cursor:pointer;">MODE_A</button>
        <button onclick="boot('B')" style="flex:1; padding: 10px; background: var(--neon); color: black; border:none; font-weight:bold; cursor:pointer;">MODE_B</button>
    </div>

    <button id="ptt-btn" disabled>OFFLINE</button>
    <div id="status" style="font-size: 0.7rem; margin-top: 10px; text-align: center;">SYSTEM_STANDBY</div>
</div>

<audio id="output" autoplay playsinline></audio>

<script>
    const status = document.getElementById('status');
    const nLocal = document.getElementById('n-local');
    const nRemote = document.getElementById('n-remote');
    const nLine = document.getElementById('n-line');
    const ptt = document.getElementById('ptt-btn');
    const audioOut = document.getElementById('output');

    let peer = null, localStream = null, retryInterval = null;

    // Mic Initialization
    navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true } })
        .then(stream => { localStream = stream; localStream.getAudioTracks()[0].enabled = false; })
        .catch(() => status.innerText = "MIC_ERROR: CHECK_PERMISSIONS");

    function boot(role) {
        const ch = document.getElementById('freq').value.trim().toUpperCase();
        if(!ch) return alert("ENTER FREQUENCY");
        
        if(peer) peer.destroy();
        clearInterval(retryInterval);

        // IDs MUST be different for A and B or they kick each other off
        const myId = `OMNI_V4_${ch}_${role}`;
        const targetId = `OMNI_V4_${ch}_${role === 'A' ? 'B' : 'A'}`;

        peer = new Peer(myId, {
            config: { 'iceServers': [{ url: 'stun:stun.l.google.com:19302' }, { url: 'stun:stun1.l.google.com:19302' }] },
            debug: 1
        });

        peer.on('open', () => {
            status.innerText = `READY: ${ch}_${role}`;
            nLocal.classList.add('active');
            if(role === 'A') {
                status.innerText = "CONNECTING...";
                retryInterval = setInterval(() => dial(targetId), 4000);
                dial(targetId);
            }
        });

        peer.on('call', (call) => {
            status.innerText = "LINK_REQUESTED...";
            call.answer(localStream);
            attach(call);
        });

        peer.on('error', (err) => {
            console.warn("Peer Error:", err.type);
            if(err.type === 'peer-unavailable') status.innerText = "TARGET_OFFLINE... SEARCHING";
            else status.innerText = "ERROR: " + err.type;
        });
    }

    function dial(tid) {
        if(!peer || peer.destroyed) return;
        const call = peer.call(tid, localStream);
        attach(call);
    }

    function attach(call) {
        call.on('stream', (stream) => {
            clearInterval(retryInterval);
            audioOut.srcObject = stream;
            
            // Forced Wake-Up for Audio
            audioOut.play().catch(() => {
                status.innerText = "TAP_TERMINAL_TO_UNMUTE";
                window.onclick = () => { audioOut.play(); window.onclick = null; };
            });

            status.innerText = "LINK_SECURED";
            nRemote.classList.add('active');
            nLine.classList.add('active');
            ptt.disabled = false;
            ptt.innerText = "HOLD_TO_TALK";
        });

        call.on('close', () => {
            status.innerText = "LINK_LOST_RECONNECTING...";
            nRemote.classList.remove('active');
            nLine.classList.remove('active');
            ptt.disabled = true;
        });
    }

    const setMic = (on) => { if(localStream) localStream.getAudioTracks()[0].enabled = on; ptt.innerText = on ? "TRANSMITTING" : "HOLD_TO_TALK"; };
    ptt.onmousedown = () => setMic(true);
    ptt.onmouseup = () => setMic(false);
    ptt.ontouchstart = (e) => { e.preventDefault(); setMic(true); };
    ptt.ontouchend = (e) => { e.preventDefault(); setMic(false); };
</script>
</body>
</html>
