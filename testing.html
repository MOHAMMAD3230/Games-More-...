<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TAC/COM-04 | CH-TEXT</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { 
            --amber: #ffb000; 
            --bg: #0d0900; 
            --red: #ff3333; 
            --blue: #00d4ff; 
            --green: #39ff14; 
            --dark-panel: #111;
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            background: #050505; 
            color: var(--amber); 
            font-family: 'Courier New', monospace; 
            margin: 0; 
            padding: 0;
            height: 100dvh; 
            width: 100vw;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            overflow: hidden;
            overscroll-behavior: none; 
        }
        
        .mainframe { 
            width: 100%; 
            max-width: 650px; 
            background: #222; 
            border: 6px solid #111; 
            display: flex; 
            flex-direction: column; 
            box-shadow: 0 0 40px #000; 
            height: 100%; 
            position: relative;
        }
        
        @media (min-width: 768px) {
            .mainframe { height: 95vh; border-radius: 8px; }
        }

        /* Header */
        .header-stats {
            padding: 10px 15px; 
            font-size: 0.7rem; 
            display:flex; 
            justify-content:space-between; 
            align-items: center;
            background: #1a1a1a;
            border-bottom: 1px solid #333;
            flex-shrink: 0;
        }

        /* Signal Meter */
        .signal-container {
            display: flex;
            align-items: flex-end;
            gap: 2px;
            height: 16px;
            width: 20px;
            margin-right: 10px;
        }
        .sig-bar {
            width: 4px;
            background: #333;
            border-radius: 1px;
            transition: height 0.3s, background-color 0.3s;
        }
        .sig-bar:nth-child(1) { height: 25%; }
        .sig-bar:nth-child(2) { height: 50%; }
        .sig-bar:nth-child(3) { height: 75%; }
        .sig-bar:nth-child(4) { height: 100%; }
        
        /* Signal Colors based on Ping */
        .sig-lvl-1 .sig-bar:nth-child(1) { background: var(--red); box-shadow: 0 0 5px var(--red); }
        .sig-lvl-2 .sig-bar:nth-child(-n+2) { background: #ffaa00; }
        .sig-lvl-3 .sig-bar:nth-child(-n+3) { background: var(--blue); }
        .sig-lvl-4 .sig-bar:nth-child(-n+4) { background: var(--green); box-shadow: 0 0 5px var(--green); }

        /* Monitor */
        .monitor { 
            background: var(--bg); 
            flex-grow: 1; 
            display: flex; 
            flex-direction: column; 
            position: relative; 
            overflow: hidden;
            border-bottom: 2px solid #111;
        }

        #output { 
            flex-grow: 1; 
            overflow-y: auto; 
            overflow-x: hidden;
            padding: 15px;
            font-size: 0.95rem; 
            scrollbar-width: thin; 
            scrollbar-color: var(--amber) #000;
            display: flex; flex-direction: column; gap: 8px;
        }
        
        .msg-entry { word-break: break-word; line-height: 1.4; animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        .sys-msg { color: #777; font-size: 0.8rem; border-left: 2px solid #333; padding-left: 8px; }
        .local-msg { color: var(--green); text-shadow: 0 0 1px rgba(57, 255, 20, 0.5); }
        .remote-msg { color: var(--blue); text-shadow: 0 0 1px rgba(0, 212, 255, 0.5); }
        .timestamp { font-size: 0.7rem; color: #555; margin-right: 6px; user-select: none; }

        /* Input Deck */
        .input-deck {
            background: #111;
            padding: 10px;
            display: flex;
            gap: 8px;
            border-top: 1px solid #333;
            flex-shrink: 0; 
        }
        
        input { 
            flex: 1; 
            background: #000; 
            border: 1px solid #444; 
            color: var(--amber); 
            padding: 12px; 
            outline: none; 
            text-align: left; 
            font-family: inherit;
            font-size: 16px; 
            border-radius: 4px;
        }
        input:focus { border-color: var(--amber); }

        /* Control Panel */
        .control-panel {
            background: #1a1a1a;
            padding: 10px 15px;
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: space-between;
            border-top: 1px solid #333;
            flex-shrink: 0;
        }

        /* LED Indicators */
        .led-group { display: flex; align-items: center; gap: 15px; }
        .led-indicator { display: flex; align-items: center; font-size: 0.65rem; color: #666; text-transform: uppercase; }
        .led {
            width: 10px; height: 10px; border-radius: 50%; background: #300; margin-right: 6px;
            box-shadow: inset 0 0 2px #000; transition: background 0.1s, box-shadow 0.1s;
        }
        .led.on.green { background: var(--green); box-shadow: 0 0 8px var(--green); }
        .led.on.red { background: var(--red); box-shadow: 0 0 8px var(--red); }
        .led.on.blue { background: var(--blue); box-shadow: 0 0 8px var(--blue); }

        /* Buttons */
        .btn-row { display: flex; gap: 8px; }
        .btn-mini {
            padding: 8px 12px; background: #222; color: #888; border: 1px solid #444;
            font-family: inherit; font-weight: bold; font-size: 0.7rem; cursor: pointer;
            text-transform: uppercase; border-radius: 4px;
        }
        .btn-mini:active { transform: scale(0.96); background: #333; }
        .btn-mini:disabled { opacity: 0.3; cursor: not-allowed; border-color: #333; }
        
        .btn-sync:not(:disabled) { color: var(--blue); border-color: var(--blue); }
        .btn-sync:not(:disabled):hover { background: rgba(0, 212, 255, 0.1); }
        .btn-reset { color: var(--red); border-color: #553333; }

        .btn-main { 
            padding: 0 20px; background: #333; color: var(--amber); border: 1px solid var(--amber); 
            font-weight: bold; cursor: pointer; text-transform: uppercase; font-family: inherit;
            border-radius: 4px; font-size: 0.9rem;
        }
        .btn-main:hover { background: var(--amber); color: #000; }

        /* Setup Overlay */
        #setupPanel {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 5, 5, 0.98); z-index: 20;
            display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px;
        }
        .setup-box {
            background: #111; border: 1px solid #444; padding: 30px; width: 100%; max-width: 320px; text-align: center; box-shadow: 0 0 20px #000;
        }
        .setup-box h2 { margin-top: 0; color: var(--amber); font-size: 1.2rem; }
        .setup-box input { margin-bottom: 20px; text-align: center; letter-spacing: 2px; }
    </style>
</head>
<body>

<div class="mainframe">
    <!-- Header -->
    <div class="header-stats">
        <div style="display:flex; flex-direction:column;">
            <span>FREQ: <span id="curFreq" style="color:var(--blue)">UNSET</span></span>
            <!-- This now uses Browser Native Info -->
            <span id="netInfo" style="color:#666; font-size:0.6rem;">DETECTING LINK...</span>
        </div>
        
        <div style="display:flex; align-items:center;">
            <div class="signal-container sig-lvl-0" id="signalMeter">
                <div class="sig-bar"></div>
                <div class="sig-bar"></div>
                <div class="sig-bar"></div>
                <div class="sig-bar"></div>
            </div>
            <span id="stat">OFFLINE</span>
        </div>
    </div>

    <div class="monitor">
        <div id="output">
            <div class="msg-entry sys-msg">> SYSTEM READY. AWAITING FREQUENCY.</div>
        </div>
    </div>

    <div class="input-deck">
        <input type="text" id="msgInput" placeholder="ENTER MESSAGE DATA..." onkeypress="checkEnter(event)" autocomplete="off" disabled>
        <button class="btn-main" id="sendBtn" onclick="sendMsg()" disabled>TX</button>
    </div>

    <div class="control-panel">
        <div class="led-group">
            <div class="led-indicator"><div class="led" id="ledNet"></div>NET</div>
            <div class="led-indicator"><div class="led" id="ledTx"></div>TX</div>
            <div class="led-indicator"><div class="led" id="ledRx"></div>RX</div>
        </div>

        <div class="btn-row">
            <button class="btn-mini btn-sync" id="syncBtn" onclick="attemptSync()" disabled>SYNC</button>
            <button class="btn-mini btn-reset" onclick="hardReset()">RESET</button>
        </div>
    </div>

    <!-- Setup Overlay -->
    <div id="setupPanel">
        <div class="setup-box">
            <h2>TAC/COM LINK</h2>
            <div style="margin-bottom:10px; font-size:0.7rem; color:#666;">SELECT FREQUENCY (1-99)</div>
            <input type="number" id="chanInput" value="1" min="1" max="99">
            <button class="btn-main" id="bootBtn" onclick="initChannel()" style="width:100%; padding: 12px;">CONNECT</button>
        </div>
    </div>
</div>

<script>
    let peer, conn, heartbeatInterval, pingInterval;
    let lastUsedChannel = null;
    const APP_PREFIX = "TAC-TEXT-V5-"; 
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    // Robust ICE Config
    const PEER_CONFIG = {
        config: {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' },
                { urls: 'stun:global.stun.twilio.com:3478' }
            ]
        }
    };

    // --- 1. BROWSER NATIVE NETWORK INFO (No API Limits) ---
    function getLocalNetworkInfo() {
        const netEl = document.getElementById('netInfo');
        const connection = navigator.connection || navigator.mozConnection || navigator.webkitConnection;

        if (connection) {
            // Get Connection Type (wifi, cellular, ethernet, etc.)
            let type = connection.type;
            // Some browsers return 'wifi' or 'cellular', others return effectiveType
            if (!type && connection.effectiveType) type = "DATA"; 
            if (!type) type = "LAN/WIFI";

            // Get Speed (4g, 3g, 2g)
            let speed = connection.effectiveType ? connection.effectiveType.toUpperCase() : "UNKNOWN";

            netEl.innerText = `LINK: ${type.toUpperCase()} | ${speed}`;
            netEl.style.color = "var(--green)";
        } else {
            netEl.innerText = "LINK: LOCAL NETWORK";
            netEl.style.color = "var(--amber)";
        }
    }

    // --- 2. REAL-TIME LATENCY (PING) SYSTEM ---
    function startPingSystem() {
        stopPingSystem();
        // Send a ping every 2 seconds
        pingInterval = setInterval(() => {
            if(conn && conn.open) {
                const timestamp = Date.now();
                conn.send({ type: 'ping', time: timestamp });
            }
        }, 2000);
    }

    function stopPingSystem() {
        if(pingInterval) clearInterval(pingInterval);
    }

    function updateSignalMeter(pingMs) {
        const meter = document.getElementById('signalMeter');
        // Remove old levels
        meter.className = 'signal-container';
        
        let level = 1;
        if (pingMs < 20) level = 4;      // Excellent LAN
        else if (pingMs < 100) level = 3; // Good
        else if (pingMs < 300) level = 2; // Fair
        else level = 1;                   // Poor

        meter.classList.add(`sig-lvl-${level}`);
    }

    // --- UI & UTILS ---

    function log(msg, type="sys") {
        const div = document.createElement('div');
        const time = new Date().toLocaleTimeString([], { hour12: false, hour: '2-digit', minute:'2-digit', second:'2-digit' });
        div.className = `msg-entry ${type}-msg}`;
        
        if (type === 'sys') div.innerHTML = `<span class="timestamp">[${time}]</span> ${msg}`;
        else if (type === 'local') div.innerHTML = `<span class="timestamp">[${time}]</span> <b>YOU:</b> ${msg}`;
        else if (type === 'remote') div.innerHTML = `<span class="timestamp">[${time}]</span> <b>REMOTE:</b> ${msg}`;
        
        const out = document.getElementById('output');
        out.appendChild(div);
        
        const isNearBottom = out.scrollHeight - out.scrollTop - out.clientHeight < 100;
        if(isNearBottom) out.scrollTop = out.scrollHeight;
    }

    function flashLed(ledId, colorClass, duration=200) {
        const el = document.getElementById(ledId);
        el.classList.remove('on', 'green', 'red', 'blue');
        void el.offsetWidth; 
        el.classList.add('on', colorClass);
        setTimeout(() => el.classList.remove('on', colorClass), duration);
    }

    function setLedState(ledId, isOn, colorClass) {
        const el = document.getElementById(ledId);
        el.className = 'led'; 
        if(isOn) el.classList.add('on', colorClass);
    }

    function setUIState(connected) {
        const panel = document.getElementById('setupPanel');
        const inputs = document.getElementById('msgInput');
        const sendBtn = document.getElementById('sendBtn');
        const syncBtn = document.getElementById('syncBtn');
        const stat = document.getElementById('stat');
        const bootBtn = document.getElementById('bootBtn');
        
        if (connected) {
            panel.style.opacity = '0';
            setTimeout(() => panel.style.display = 'none', 200);
            
            inputs.disabled = false;
            sendBtn.disabled = false;
            syncBtn.disabled = false;
            
            if(window.innerWidth > 768) inputs.focus();
            
            stat.innerHTML = "LINK ESTABLISHED";
            stat.style.color = "var(--green)";
            setLedState('ledNet', true, 'green');
            
            startHeartbeat();
            startPingSystem();
            getLocalNetworkInfo(); // Update network info on connect
        } else {
            panel.style.display = 'flex';
            setTimeout(() => panel.style.opacity = '1', 10);
            
            inputs.disabled = true;
            sendBtn.disabled = true;
            syncBtn.disabled = true; 
            
            bootBtn.disabled = false;
            bootBtn.innerText = "CONNECT";
            
            stat.innerText = "OFFLINE";
            stat.style.color = "#666";
            setLedState('ledNet', false);
            
            stopHeartbeat();
            stopPingSystem();
            document.getElementById('signalMeter').className = 'signal-container sig-lvl-0';
        }
    }

    function setDisconnectedState() {
        const syncBtn = document.getElementById('syncBtn');
        const stat = document.getElementById('stat');
        const inputs = document.getElementById('msgInput');
        const sendBtn = document.getElementById('sendBtn');

        inputs.disabled = true;
        sendBtn.disabled = true;
        syncBtn.disabled = false;
        syncBtn.innerText = "RE-CONNECT";
        
        stat.innerText = "SIGNAL LOST";
        stat.style.color = "var(--red)";
        setLedState('ledNet', false);
        
        log("CONNECTION SEVERED. PRESS SYNC TO RE-CONNECT.", "sys");
        stopHeartbeat();
        stopPingSystem();
        document.getElementById('signalMeter').className = 'signal-container sig-lvl-0';
    }

    function playBeep(freq, duration) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.type = 'square';
        osc.frequency.value = freq; 
        g.gain.value = 0.05; 
        osc.connect(g); g.connect(audioCtx.destination);
        osc.start();
        g.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
        osc.stop(audioCtx.currentTime + duration);
    }

    // --- HEARTBEAT ---
    function startHeartbeat() {
        stopHeartbeat();
        heartbeatInterval = setInterval(() => {
            if(conn && conn.open) {
                conn.send({ type: 'heartbeat' });
            }
        }, 3000); 
    }

    function stopHeartbeat() {
        if(heartbeatInterval) clearInterval(heartbeatInterval);
    }

    // --- PEERJS LOGIC ---

    function initChannel() {
        const chanInput = document.getElementById('chanInput');
        const chanNum = chanInput.value;
        if(!chanNum) return;

        lastUsedChannel = chanNum; 
        const fullId = APP_PREFIX + chanNum;
        const btn = document.getElementById('bootBtn');
        
        btn.disabled = true;
        btn.innerText = "LINKING...";
        
        if (audioCtx.state === 'suspended') audioCtx.resume();
        getLocalNetworkInfo(); // Get local network status immediately

        initPeer(fullId);
    }

    function initPeer(myId) {
        if(peer) { try { peer.destroy(); } catch(e){} }

        peer = new Peer(myId, PEER_CONFIG);

        peer.on('open', id => { 
            log(`CHANNEL ${myId.replace(APP_PREFIX, '')} ACTIVE.`, 'sys');
            document.getElementById('curFreq').innerText = "CH-" + myId.replace(APP_PREFIX, '');
            document.getElementById('bootBtn').disabled = false;
            document.getElementById('bootBtn').innerText = "CONNECT";
        });

        peer.on('connection', c => { 
            if(conn && conn.open) { c.close(); return; }
            conn = c; 
            setupHandlers(); 
        });

        peer.on('error', (err) => {
            if(err.type === 'unavailable-id') {
                peer.destroy();
                peer = null;
                initCallerMode(myId);
            } else {
                log("CONN ERROR: " + err.type, 'sys');
                document.getElementById('bootBtn').disabled = false;
            }
        });
    }

    function initCallerMode(targetId) {
        peer = new Peer(PEER_CONFIG); 
        peer.on('open', () => {
            log("CONNECTING TO HOST...", 'sys');
            conn = peer.connect(targetId, { reliable: true });
            setupHandlers();
        });
        peer.on('error', (err) => {
             log("HANDSHAKE FAILED", 'sys');
             document.getElementById('bootBtn').disabled = false;
        });
    }

    function setupHandlers() {
        conn.on('open', () => {
            setUIState(true);
            log("DATA LINK SECURE.", 'sys');
            conn.send({ type: 'join' });
        });

        conn.on('data', data => {
            // Handle Ping/Pong
            if(data.type === 'ping') {
                conn.send({ type: 'pong', time: data.time });
                return;
            }
            if(data.type === 'pong') {
                const now = Date.now();
                const rtt = now - data.time;
                updateSignalMeter(rtt);
                return;
            }

            // Standard Messages
            if (data.type !== 'heartbeat') flashLed('ledRx', 'blue', 300);

            if (typeof data === 'string') {
                log(data, 'remote');
            } else {
                if (data.type === 'join') {
                    log("REMOTE UNIT ONLINE.", 'sys');
                } 
                else if (data.type === 'msg') {
                    log(data.content, 'remote');
                } 
                else if (data.type === 'sync') {
                    conn.send({ type: 'sync_ack' });
                    log("PING RECEIVED.", 'sys');
                    playBeep(600, 0.1);
                }
                else if (data.type === 'sync_ack') {
                    log("SYNC CONFIRMED.", 'sys');
                    playBeep(1000, 0.1);
                }
            }
        });

        conn.on('close', () => {
            conn = null;
            setDisconnectedState();
        });
        
        conn.on('error', (err) => {
            log("LINK ERROR.", 'sys');
        });
    }

    // --- ACTIONS ---

    function attemptSync() {
        if(conn && conn.open) {
            log("SENDING SYNC PULSE...", 'sys');
            flashLed('ledTx', 'red', 100);
            conn.send({ type: 'sync' });
        } else {
            if(lastUsedChannel) {
                log("ATTEMPTING RE-CONNECTION...", 'sys');
                document.getElementById('syncBtn').disabled = true;
                document.getElementById('syncBtn').innerText = "SCANNING...";
                setTimeout(() => {
                    const fullId = APP_PREFIX + lastUsedChannel;
                    if(peer) peer.destroy();
                    peer = null;
                    initPeer(fullId);
                }, 500);
            }
        }
    }

    function sendMsg() {
        const input = document.getElementById('msgInput');
        const val = input.value.trim();
        if(!val || !conn || !conn.open) return;

        flashLed('ledTx', 'red', 200);

        conn.send({ type: 'msg', content: val });
        log(val, 'local');
        input.value = '';
        input.focus();
    }

    function checkEnter(e) {
        if(e.key === 'Enter') sendMsg();
    }
    
    function hardReset() {
        if(confirm("TERMINATE SESSION AND REBOOT SYSTEM?")) {
            if(conn) conn.close();
            if(peer) peer.destroy();
            stopHeartbeat();
            stopPingSystem();
            location.reload();
        }
    }
</script>
</body>
</html>
