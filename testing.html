<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TAC/COM-04 | SECURE NET v1.2</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root {
            --amber: #ffb000;
            --amber-dim: #8c6600;
            --bg: #0d0900;
            --red: #ff3333;
            --green: #39ff14;
            --blue: #00d4ff;
            --panel-bg: #1a1a1a;
        }
        body {
            background: #050505;
            color: var(--amber);
            font-family: 'Courier New', monospace;
            margin: 0;
            padding: 0;
            overflow: hidden;
            touch-action: manipulation;
        }
        .scanlines {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,0.3) 50%), 
                        linear-gradient(90deg, rgba(255,0,0,0.05), rgba(0,255,0,0.02), rgba(0,0,255,0.05));
            background-size: 100% 3px, 4px 100%;
            pointer-events: none;
            z-index: 999;
        }
        .mainframe {
            width: 95%;
            max-width: 1000px;
            margin: 15px auto;
            background: #222;
            border: 5px solid #333;
            padding: 12px;
            box-shadow: 0 0 50px #000;
            display: grid;
            grid-template-columns: 1fr 340px;
            gap: 15px;
            height: calc(100vh - 30px);
            box-sizing: border-box;
        }
        .monitor {
            background: var(--bg);
            border: 3px solid #444;
            padding: 15px;
            display: flex;
            flex-direction: column;
            box-shadow: inset 0 0 25px #000;
        }
        .status-bar {
            font-size: 0.75rem;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #444;
            padding-bottom: 6px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        #output {
            flex-grow: 1;
            overflow-y: auto;
            font-size: 0.85rem;
            padding-right: 10px;
        }
        .chat-box {
            margin-top: 10px;
            border-top: 1px solid #444;
            padding-top: 8px;
        }
        .chat-messages {
            height: 140px;
            overflow-y: auto;
            font-size: 0.8rem;
            margin-bottom: 5px;
        }
        .chat-input {
            display: flex;
            gap: 5px;
        }
        .chat-input input {
            flex: 1;
            background: #000;
            border: 2px solid #555;
            color: var(--blue);
            padding: 8px;
        }
        .module {
            background: var(--panel-bg);
            padding: 14px;
            border: 1px solid #444;
            margin-bottom: 12px;
        }
        .btn-ptt {
            width: 100%;
            height: 130px;
            background: repeating-linear-gradient(45deg, #600, #600 12px, #800 12px, #800 24px);
            color: white;
            border: 5px solid #522;
            font-size: 1.6rem;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-ptt:active:not(:disabled) {
            background: #ff3333;
            transform: scale(0.97);
            box-shadow: 0 0 20px #ff0000;
        }
        .btn-action {
            width: 100%;
            padding: 12px;
            background: #222;
            color: var(--amber);
            border: 1px solid var(--amber-dim);
            cursor: pointer;
            font-weight: bold;
        }
        input[type="range"] {
            width: 100%;
        }
        .led-group {
            display: flex;
            justify-content: space-around;
            margin: 15px 0;
        }
        .status-led {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #300;
            border: 2px solid #500;
            transition: all 0.3s;
        }
        .online { background: var(--blue); box-shadow: 0 0 12px var(--blue); }
        .tx { background: var(--red); box-shadow: 0 0 20px var(--red); }
    </style>
</head>
<body>
<div class="scanlines"></div>
<div class="mainframe">
    <audio id="remoteAudio" autoplay playsinline style="display:none;"></audio>

    <!-- Left: Monitor -->
    <div class="monitor">
        <div class="status-bar">
            <span>FREQ: <span id="curFreq" style="color:var(--blue)">--.--</span> MHz</span>
            <span id="netStat">NET: DISCONNECTED</span>
        </div>
        
        <div id="output"></div>

        <div class="chat-box">
            <div style="font-size:0.7rem;color:#777;margin-bottom:4px;">SQUAD CHAT</div>
            <div id="chatMessages" class="chat-messages"></div>
            <div class="chat-input">
                <input type="text" id="chatInput" placeholder="TRANSMIT TEXT..." onkeypress="if(event.key==='Enter') sendChat()">
                <button class="btn-action" onclick="sendChat()" style="width:auto;padding:0 15px;">SEND</button>
            </div>
        </div>

        <div style="margin-top:auto;">
            <div style="display:flex;justify-content:space-between;font-size:0.7rem;">
                <span>RX LEVEL</span>
                <span id="dbVal">-inf dB</span>
            </div>
            <div style="height:10px;background:#000;border:1px solid #555;margin:6px 0;">
                <div id="meter-fill" style="width:0%;height:100%;background:var(--green);transition:width 0.05s;"></div>
            </div>
            <div style="font-size:0.65rem;color:#666;">SQUELCH <input type="range" id="squelch" min="0" max="50" value="15" style="width:140px;vertical-align:middle;">
                <span id="squelchVal">15</span>
            </div>
        </div>
    </div>

    <!-- Right: Controls -->
    <div>
        <div class="module">
            <div style="text-align:center;font-size:0.7rem;color:#777;margin-bottom:8px;">SECURE CHANNEL (01-99)</div>
            <input type="number" id="chanInput" value="1" min="1" max="99" style="font-size:2rem;text-align:center;">
            <button class="btn-action" id="bootBtn" onclick="initChannel()" style="margin-top:12px;">INITIALIZE LINK</button>
        </div>

        <div class="module" style="text-align:center;">
            <button class="btn-ptt" id="pttBtn" disabled>
                PUSH TO TALK<br>
                <span style="font-size:0.75rem;opacity:0.7;">(HOLD)</span>
            </button>
            
            <div class="led-group">
                <div><div class="status-led" id="ledNet"></div><br><span style="font-size:0.65rem">LINK</span></div>
                <div><div class="status-led" id="ledTx"></div><br><span style="font-size:0.65rem">TX</span></div>
            </div>
        </div>

        <button class="btn-action" onclick="hardReset()" style="background:#300;color:#f66;border-color:#800;">SYSTEM RESET</button>
        <button class="btn-action" id="reconnectBtn" onclick="manualReconnect()" style="display:none;margin-top:8px;">RECONNECT</button>
    </div>
</div>

<script>
    let peer = null, conn = null, localStream = null, audioCtx = null;
    let analyser = null, speakerGain = null;
    let currentCall = null;
    let isHost = false;
    let channel = "01";
    let reconnectAttempts = 0;
    const MAX_RECONNECT = 5;
    const APP_PREFIX = "TAC-COM-SECURE-";

    const output = document.getElementById('output');
    const chatMessages = document.getElementById('chatMessages');

    function log(msg, type="info") {
        const div = document.createElement('div');
        const time = new Date().toLocaleTimeString('en-US',{hour12:false,hour:"2-digit",minute:"2-digit",second:"2-digit"});
        div.innerText = `[${time}] > ${msg}`;
        if(type==="error") div.style.color = "#f66";
        if(type==="success") div.style.color = "#39ff14";
        if(type==="sys") div.style.color = "#888";
        output.appendChild(div);
        output.scrollTop = output.scrollHeight;
    }

    function addChat(msg, from = "SQUAD") {
        const div = document.createElement('div');
        div.innerHTML = `<span style="color:#0af">[${from}]</span> ${msg}`;
        chatMessages.appendChild(div);
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    async function initChannel() {
        let val = parseInt(document.getElementById('chanInput').value);
        if(isNaN(val) || val < 1 || val > 99) return log("INVALID CHANNEL", "error");
        
        channel = val.toString().padStart(2, '0');
        const fullId = APP_PREFIX + channel;

        document.getElementById('bootBtn').disabled = true;
        document.getElementById('curFreq').innerText = `462.${channel}`;

        log(`TUNING TO CHANNEL ${channel}...`, "sys");

        try {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true }});
            setupAudioGraph();
            connectToNetwork(fullId);
        } catch(e) {
            log("MIC ACCESS DENIED", "error");
        }
    }

    function setupAudioGraph() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        speakerGain = audioCtx.createGain();
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 64;

        const source = audioCtx.createMediaStreamSource(localStream); // for meter
        source.connect(analyser);
        analyser.connect(audioCtx.destination); // monitoring

        updateMeter();
    }

    function connectToNetwork(targetId) {
        peer = new Peer();
        peer.on('open', () => {
            log("LOCAL NODE READY", "sys");
            conn = peer.connect(targetId);
            currentCall = peer.call(targetId, localStream);
            setupHandlers();
        });

        peer.on('error', (err) => {
            if(err.type === 'peer-unavailable') {
                becomeHost(targetId);
            } else {
                log("CONNECTION ERROR: " + err.type, "error");
            }
        });
    }

    function becomeHost(hostId) {
        isHost = true;
        peer = new Peer(hostId);
        peer.on('open', () => {
            log(`HOST NODE ${channel} ESTABLISHED`, "success");
            document.getElementById('netStat').innerText = "NET: HOST";
            document.getElementById('netStat').style.color = "var(--green)";
            enablePTT();
        });
        peer.on('connection', c => { conn = c; setupHandlers(); });
        peer.on('call', call => {
            call.answer(localStream);
            setupHandlers(null, call);
        });
    }

    function setupHandlers(connection, call) {
        if(connection) {
            connection.on('open', () => {
                document.getElementById('ledNet').classList.add('online');
                document.getElementById('netStat').innerText = "NET: LINKED";
                document.getElementById('netStat').style.color = "var(--blue)";
                enablePTT();
                reconnectAttempts = 0;
                log("DATA LINK ESTABLISHED", "success");
            });
            connection.on('data', data => {
                if(data.type === "chat") addChat(data.msg, "REMOTE");
                if(data.type === "TX_ON") document.getElementById('ledTx').classList.add('tx');
                if(data.type === "TX_OFF") document.getElementById('ledTx').classList.remove('tx');
            });
            connection.on('close', () => attemptReconnect());
        }

        if(call) {
            call.on('stream', stream => {
                document.getElementById('remoteAudio').srcObject = stream;
                log("AUDIO STREAM SYNCED", "success");
            });
        }
    }

    function enablePTT() {
        document.getElementById('pttBtn').disabled = false;
        document.getElementById('bootBtn').innerText = "LINK ACTIVE";
    }

    // PTT Logic
    const pttBtn = document.getElementById('pttBtn');
    function pttDown() {
        if(!conn || !conn.open) return;
        localStream.getAudioTracks()[0].enabled = true;
        conn.send({type: "TX_ON"});
        document.getElementById('ledTx').classList.add('tx');
        speakerGain.gain.value = 0;
    }
    function pttUp() {
        if(!conn || !conn.open) return;
        localStream.getAudioTracks()[0].enabled = false;
        conn.send({type: "TX_OFF"});
        document.getElementById('ledTx').classList.remove('tx');
        speakerGain.gain.value = 1;
    }

    pttBtn.addEventListener('mousedown', pttDown);
    pttBtn.addEventListener('mouseup', pttUp);
    pttBtn.addEventListener('touchstart', e=>{e.preventDefault(); pttDown();});
    pttBtn.addEventListener('touchend', e=>{e.preventDefault(); pttUp();});

    function sendChat() {
        const input = document.getElementById('chatInput');
        if(!conn || !conn.open || !input.value.trim()) return;
        conn.send({type: "chat", msg: input.value.trim()});
        addChat(input.value.trim(), "ME");
        input.value = "";
    }

    function attemptReconnect() {
        if(reconnectAttempts >= MAX_RECONNECT) return;
        reconnectAttempts++;
        log(`RECONNECTING... (${reconnectAttempts}/${MAX_RECONNECT})`, "sys");
        setTimeout(() => location.reload(), 1500);
    }

    function manualReconnect() {
        location.reload();
    }

    function updateMeter() {
        if(!analyser) return;
        const data = new Uint8Array(analyser.frequencyBinCount);
        analyser.getByteFrequencyData(data);
        let avg = data.reduce((a,b)=>a+b)/data.length;
        const perc = Math.min(100, avg * 2.8);
        document.getElementById('meter-fill').style.width = perc + "%";
        document.getElementById('dbVal').innerText = perc > 8 ? `-${(100-perc).toFixed(0)} dB` : "-inf dB";
        requestAnimationFrame(updateMeter);
    }

    function hardReset() {
        if(peer) peer.destroy();
        if(localStream) localStream.getTracks().forEach(t=>t.stop());
        location.reload();
    }

    // Boot message
    log("TAC/COM-04 v1.2 SECURE BOOT", "sys");
    log("ENCRYPTED LINK PROTOCOL ACTIVE", "success");
</script>
</body>
</html>
