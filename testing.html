<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OMNI-VOICE V10 | DEBUG_READY</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --neon: #00ff41; --bg: #050505; --err: #ff003c; }
        * { box-sizing: border-box; touch-action: manipulation; }
        body { background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        
        .terminal { border: 2px solid var(--neon); padding: 25px; background: #000; width: 340px; box-shadow: 0 0 20px rgba(0, 255, 65, 0.2); position: relative; }
        
        /* Connection Status Map */
        .node-map { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding: 10px; border: 1px solid #111; }
        .node { width: 12px; height: 12px; border-radius: 50%; background: #222; }
        .node.active { background: var(--neon); box-shadow: 0 0 10px var(--neon); }
        .line { flex-grow: 1; height: 2px; background: #222; margin: 0 10px; position: relative; overflow: hidden; }
        .line.active::after { content: ''; position: absolute; width: 40px; height: 100%; background: var(--neon); animation: pulse 1.5s infinite linear; }
        @keyframes pulse { from { left: -40px; } to { left: 100%; } }

        #power-btn { width: 100%; padding: 25px; background: var(--err); color: #fff; border: none; font-weight: bold; cursor: pointer; letter-spacing: 1px; }
        #ui-layer { display: none; }
        
        input { background: #000; border: 1px solid var(--neon); color: var(--neon); padding: 12px; width: 100%; margin-bottom: 10px; text-align: center; outline: none; font-family: inherit; }
        .modes { display: flex; gap: 5px; margin-bottom: 10px; }
        .mode-btn { flex: 1; padding: 12px; background: var(--neon); color: #000; border: none; font-weight: bold; cursor: pointer; }

        #ptt { width: 100%; padding: 40px; background: transparent; color: var(--neon); border: 2px solid var(--neon); font-size: 1.2rem; font-weight: bold; display: none; user-select: none; }
        #status { font-size: 0.65rem; text-align: center; margin-top: 15px; height: 20px; color: var(--neon); border-top: 1px solid #111; padding-top: 10px; }
    </style>
</head>
<body>

<div class="terminal">
    <div class="node-map">
        <div id="n-local" class="node"></div>
        <div id="n-line" class="line"></div>
        <div id="n-remote" class="node"></div>
    </div>

    <button id="power-btn">SYSTEM POWER: OFF</button>

    <div id="ui-layer">
        <input type="text" id="freq" placeholder="ENTER FREQUENCY">
        <div class="modes">
            <button class="mode-btn" onclick="connect('A')">SET_A</button>
            <button class="mode-btn" onclick="connect('B')">SET_B</button>
        </div>
        <button id="ptt">HOLD TO TALK</button>
    </div>

    <div id="status">INIT_REQUIRED</div>
</div>

<audio id="remote-audio" playsinline></audio>

<script>
    const pwr = document.getElementById('power-btn');
    const ui = document.getElementById('ui-layer');
    const status = document.getElementById('status');
    const ptt = document.getElementById('ptt');
    const audioOut = document.getElementById('remote-audio');
    const nLocal = document.getElementById('n-local');
    const nRemote = document.getElementById('n-remote');
    const nLine = document.getElementById('n-line');

    let peer = null, localStream = null;

    // 1. SECURE HARDWARE INITIALIZATION
    pwr.onclick = async () => {
        status.innerText = "REQUESTING_HARDWARE...";
        try {
            // Check for Secure Context
            if (location.protocol !== 'https:' && location.hostname !== 'localhost') {
                throw new Error("UNSECURE_CONTEXT");
            }

            localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            localStream.getAudioTracks()[0].enabled = false; // Start muted
            
            // Wake up Audio Engine
            audioOut.srcObject = new MediaStream();
            await audioOut.play();

            pwr.style.display = 'none';
            ui.style.display = 'block';
            status.innerText = "HARDWARE_AUTH_SUCCESS";
            nLocal.classList.add('active');
        } catch (e) {
            if (e.message === "UNSECURE_CONTEXT") {
                status.innerText = "ERR: HTTPS_REQUIRED";
            } else if (e.name === "NotAllowedError" || e.name === "PermissionDeniedError") {
                status.innerText = "ERR: MIC_PERMISSION_DENIED";
            } else {
                status.innerText = "ERR: " + e.name;
            }
            console.error(e);
        }
    };

    // 2. NETWORK HANDSHAKE
    function connect(role) {
        const ch = document.getElementById('freq').value.trim().toUpperCase();
        if(!ch) return;
        
        if(peer) peer.destroy();
        status.innerText = "SIGNALING_START...";

        peer = new Peer(`OMNI_V10_${ch}_${role}`, {
            config: {
                iceServers: [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:stun1.l.google.com:19302' }
                ]
            }
        });

        peer.on('open', () => {
            status.innerText = `FREQ_${ch} [${role}] ONLINE`;
            if(role === 'A') {
                status.innerText = "SEARCHING_FOR_NODE_B...";
                setTimeout(() => dial(`OMNI_V10_${ch}_B`), 1500);
            }
        });

        peer.on('call', (call) => {
            status.innerText = "HANDSHAKE_INCOMING...";
            call.answer(localStream);
            attach(call);
        });

        peer.on('error', (err) => {
            status.innerText = "SIG_ERR: " + err.type;
        });
    }

    function dial(target) {
        if(!peer || peer.destroyed) return;
        const call = peer.call(target, localStream);
        attach(call);
    }

    // 3. AUDIO ATTACHMENT
    function attach(call) {
        call.on('stream', (stream) => {
            audioOut.srcObject = stream;
            audioOut.play().then(() => {
                status.innerText = "LINK_SECURED: AUDIO_ACTIVE";
                nRemote.classList.add('active');
                nLine.classList.add('active');
                ptt.style.display = 'block';
            }).catch(() => {
                status.innerText = "TAP_SCREEN_TO_UNMUTE";
                window.onclick = () => audioOut.play();
            });
        });
    }

    // 4. PTT ENGINE
    const transmit = (on) => { if(localStream) localStream.getAudioTracks()[0].enabled = on; };
    ptt.onmousedown = () => transmit(true);
    ptt.onmouseup = () => transmit(false);
    ptt.ontouchstart = (e) => { e.preventDefault(); transmit(true); };
    ptt.ontouchend = (e) => { e.preventDefault(); transmit(false); };
</script>
</body>
</html>
