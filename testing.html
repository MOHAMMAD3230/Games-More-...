<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OMNI-VOICE V6</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --neon: #00ff41; --bg: #050505; }
        body { background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .terminal { border: 2px solid var(--neon); padding: 25px; background: #000; width: 340px; box-shadow: 0 0 20px rgba(0, 255, 65, 0.4); text-align: center; }
        
        /* Node Connectivity */
        .nodes { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .node { width: 12px; height: 12px; border-radius: 50%; background: #222; transition: 0.3s; }
        .node.active { background: var(--neon); box-shadow: 0 0 10px var(--neon); }
        .pipe { flex-grow: 1; height: 2px; background: #222; margin: 0 10px; position: relative; overflow: hidden; }
        .pipe.active::after { content: ''; position: absolute; width: 30%; height: 100%; background: var(--neon); animation: slide 1s infinite linear; }
        @keyframes slide { from { left: -30%; } to { left: 100%; } }

        input { background: #000; border: 1px solid var(--neon); color: var(--neon); padding: 12px; width: 100%; margin-bottom: 15px; text-transform: uppercase; font-family: inherit; text-align: center; outline: none; }
        
        #ptt-btn { 
            width: 100%; padding: 40px; background: transparent; color: var(--neon); 
            border: 2px solid var(--neon); cursor: pointer; font-size: 1.2rem; font-weight: bold;
            user-select: none; -webkit-user-select: none;
        }
        #ptt-btn:active:not(:disabled) { background: var(--neon); color: #000; }
        #ptt-btn:disabled { border-color: #222; color: #222; opacity: 0.3; }
    </style>
</head>
<body>

<div class="terminal">
    <div class="nodes">
        <div id="l-node" class="node"></div>
        <div id="pipe" class="pipe"></div>
        <div id="r-node" class="node"></div>
    </div>

    <input type="text" id="freq" placeholder="ENTER FREQUENCY">
    
    <div style="display: flex; gap: 5px; margin-bottom: 10px;">
        <button onclick="boot('TX')" style="flex:1; padding: 10px; background: var(--neon); border:none; font-weight:bold; cursor:pointer;">MODE: TX</button>
        <button onclick="boot('RX')" style="flex:1; padding: 10px; background: var(--neon); border:none; font-weight:bold; cursor:pointer;">MODE: RX</button>
    </div>

    <button id="ptt-btn" disabled>PTT_LOCKED</button>
    <div id="status" style="font-size: 0.7rem; margin-top: 15px;">BOOT_READY</div>
</div>

<audio id="output" autoplay playsinline></audio>

<script>
    const status = document.getElementById('status');
    const ptt = document.getElementById('ptt-btn');
    const audioOut = document.getElementById('output');

    let peer = null, localStream = null;

    // Mic Init
    navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true } })
        .then(stream => { 
            localStream = stream; 
            localStream.getAudioTracks()[0].enabled = false;
        });

    function boot(mode) {
        const f = document.getElementById('freq').value.trim().toUpperCase();
        if(!f) return;
        if(peer) peer.destroy();

        // Unique IDs: TX and RX are distinct roles to prevent the "kick" glitch
        const myId = `OMNI_${f}_${mode}`;
        const targetId = `OMNI_${f}_${mode === 'TX' ? 'RX' : 'TX'}`;

        peer = new Peer(myId, {
            config: { 'iceServers': [{ url: 'stun:stun.l.google.com:19302' }] },
            debug: 1
        });

        peer.on('open', () => {
            status.innerText = `FREQ_${f} [${mode}] ONLINE`;
            document.getElementById('l-node').classList.add('active');
            if(mode === 'TX') {
                status.innerText = "LINKING_TO_RX...";
                setTimeout(() => connect(targetId), 2000);
            }
        });

        peer.on('call', (call) => {
            status.innerText = "LINK_INCOMING...";
            call.answer(localStream);
            handleStream(call);
        });

        peer.on('error', (err) => {
            if(err.type === 'peer-unavailable' && mode === 'TX') {
                status.innerText = "RX_NOT_FOUND... RETRYING";
                setTimeout(() => connect(targetId), 3000);
            } else {
                status.innerText = "ERR: " + err.type;
            }
        });
    }

    function connect(tid) {
        if(!peer || peer.destroyed) return;
        handleStream(peer.call(tid, localStream));
    }

    function handleStream(call) {
        call.on('stream', (stream) => {
            audioOut.srcObject = stream;
            audioOut.play().catch(() => {
                status.innerText = "TAP_SCREEN_FOR_AUDIO";
                window.onclick = () => { audioOut.play(); window.onclick = null; };
            });

            status.innerText = "LINK_SECURED";
            document.getElementById('r-node').classList.add('active');
            document.getElementById('pipe').classList.add('active');
            ptt.disabled = false;
            ptt.innerText = "HOLD_TO_TALK";
        });
    }

    const setMic = (on) => { if(localStream) localStream.getAudioTracks()[0].enabled = on; };
    ptt.onmousedown = () => setMic(true);
    ptt.onmouseup = () => setMic(false);
    ptt.ontouchstart = (e) => { e.preventDefault(); setMic(true); };
    ptt.ontouchend = (e) => { e.preventDefault(); setMic(false); };
</script>
</body>
</html>
