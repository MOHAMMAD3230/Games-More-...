<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMNI-VOICE | Stable Link</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #050505; color: #00ff41; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .console { border: 1px solid #00ff41; padding: 20px; background: #000; width: 340px; box-shadow: 0 0 20px rgba(0, 255, 65, 0.2); }
        .status-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid #222; padding-bottom: 10px; }
        .led { width: 8px; height: 8px; border-radius: 50%; background: #333; }
        .led-on { background: #00ff41; box-shadow: 0 0 10px #00ff41; }
        #ptt-btn { 
            width: 100%; padding: 25px; background: transparent; color: #00ff41; 
            border: 2px solid #00ff41; cursor: pointer; font-size: 1.2rem; font-weight: bold;
            text-transform: uppercase; transition: 0.1s;
        }
        #ptt-btn:active:not(:disabled) { background: #00ff41; color: #000; }
        #ptt-btn:disabled { border-color: #222; color: #222; }
        input { background: #000; border: 1px solid #333; color: #00ff41; padding: 10px; width: 100%; box-sizing: border-box; margin: 10px 0; outline: none; }
        input:focus { border-color: #00ff41; }
    </style>
</head>
<body>

<div class="console">
    <div class="status-bar">
        <div id="status-led" class="led"></div>
        <span id="log">BOOTING...</span>
    </div>

    <div style="font-size: 0.8rem; margin-bottom: 10px; opacity: 0.7;">
        LOCAL_ID: <span id="my-id">----</span>
    </div>

    <input type="text" id="peer-id-input" placeholder="ENTER_TARGET_ID">
    <button onclick="startConnection()" style="width: 100%; background: #00ff41; color: #000; border: none; padding: 10px; cursor: pointer; font-weight: bold;">INITIALIZE LINK</button>
    
    <button id="ptt-btn" disabled>PTT_LOCKED</button>
</div>

<audio id="receiver" autoplay></audio>

<script>
    const log = document.getElementById('log');
    const led = document.getElementById('status-led');
    const ptt = document.getElementById('ptt-btn');
    const myIdDisplay = document.getElementById('my-id');

    let peer, localStream;

    // 1. Force explicit user interaction for Mic access (fixes auto-play blocks)
    async function setupMic() {
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ 
                audio: { echoCancellation: true, noiseSuppression: true } 
            });
            localStream.getAudioTracks()[0].enabled = false;
            connectSignaling();
        } catch (e) {
            log.innerText = "MIC_ACCESS_DENIED";
        }
    }

    // 2. Connect to the Signaling Cloud
    function connectSignaling() {
        // We add clear Google STUN servers to bypass the 'new' state hang
        peer = new Peer({
            config: { 'iceServers': [{ url: 'stun:stun.l.google.com:19302' }] },
            debug: 2
        });

        peer.on('open', (id) => {
            myIdDisplay.innerText = id;
            log.innerText = "SIGNAL_READY";
            led.classList.add('led-on');
        });

        peer.on('call', (call) => {
            log.innerText = "INCOMING_DATA...";
            call.answer(localStream);
            attachStream(call);
        });

        peer.on('error', (err) => {
            log.innerText = "ERR: " + err.type;
            if(err.type === 'peer-unavailable') alert("Target Peer not found!");
        });
    }

    // 3. Handlers
    function startConnection() {
        const tid = document.getElementById('peer-id-input').value;
        if(!tid) return;
        log.innerText = "DIALING_PEER...";
        const call = peer.call(tid, localStream);
        attachStream(call);
    }

    function attachStream(call) {
        call.on('stream', (remoteStream) => {
            document.getElementById('receiver').srcObject = remoteStream;
            log.innerText = "LINK_SECURED";
            ptt.disabled = false;
            ptt.innerText = "HOLD_TO_TALK";
        });
    }

    // PTT Logic
    ptt.onmousedown = () => { if(localStream) { localStream.getAudioTracks()[0].enabled = true; ptt.innerText = "TRANSMITTING"; } };
    ptt.onmouseup = () => { if(localStream) { localStream.getAudioTracks()[0].enabled = false; ptt.innerText = "HOLD_TO_TALK"; } };

    // Start
    setupMic();
</script>
</body>
</html>
