<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TAC/COM-04 YU | TAC-COM STATION</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    
    <style>
        :root {
            --amber: #ffb000; --bg-lcd: #1a1500; --red: #8c3024; --cyan: #00d4ff;
            --green: #39ff14; --casing: #2a2a2a; --casing-dark: #1e1e1e;
            --inset: #050505; --yu-red: #ff3c3c;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; margin:0; padding:0; }
        
        body {
            background: #111; color: var(--amber); font-family: 'Courier New', monospace;
            display: flex; justify-content: center; align-items: center;
            margin: 0; touch-action: manipulation; overflow: hidden;
            height: 100vh; height: 100dvh; padding: 10px;
        }

        .radio-container {
            width: 100%; max-width: 440px;
            height: 100%; max-height: 950px;
            position: relative; display: flex; flex-direction: column;
            filter: drop-shadow(0 25px 50px rgba(0,0,0,0.9));
        }

        .antenna {
            width: 14px; height: 100px; margin: 0 auto -15px; z-index: 10;
            background: linear-gradient(90deg, #0a0a0a, #444 35%, #555 50%, #444 65%, #0a0a0a);
            border-radius: 7px 7px 0 0; position: relative;
        }
        .antenna::before {
            content: ''; position: absolute; top: -8px; left: 50%; transform: translateX(-50%);
            width: 20px; height: 20px; background: radial-gradient(circle at 35% 35%, #666, #1a1a1a);
            border-radius: 50%; border: 2px solid #000;
        }

        .radio-body {
            flex: 1; background: linear-gradient(90deg, var(--casing-dark) 0%, var(--casing) 15%, var(--casing) 85%, var(--casing-dark) 100%);
            border-radius: 20px; border: 3px solid #0a0a0a;
            display: flex; flex-direction: column; position: relative; overflow: hidden;
            box-shadow: inset 2px 0 0 rgba(255,255,255,0.05), inset -2px 0 0 rgba(0,0,0,0.5);
        }

        .metal-band {
            height: 16px; background: linear-gradient(180deg, #555, #222 40%, #444 50%, #222 60%, #111);
            border-top: 1px solid #666; border-bottom: 1px solid #000;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.3);
            position: relative; z-index: 2; flex-shrink: 0;
        }

        .z-content {
            flex: 1; display: grid;
            grid-template-rows: auto auto 1fr auto auto;
            gap: 10px; padding: 15px 20px 25px 20px; position: relative; z-index: 1;
            overflow: hidden; min-height: 0;
        }

        .controls-top { display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        .brand { font-size: 0.8rem; font-weight: bold; letter-spacing: 3px; color: #555; text-shadow: 1px 1px 0 #000, -1px -1px 0 #333; }

        .power-switch {
            width: 46px; height: 46px; border-radius: 50%; cursor: pointer;
            background: radial-gradient(circle at 30% 30%, #aa2020, #500000);
            border: 3px solid #111; box-shadow: 0 4px 0 #220000, inset 0 2px 2px rgba(255,255,255,0.2);
            transition: all 0.1s; position: relative;
        }
        .power-switch.on { 
            background: radial-gradient(circle at 30% 30%, #30cc30, #004400); 
            box-shadow: 0 4px 0 #002200, 0 0 15px rgba(57, 255, 20, 0.4); 
        }

        .screen-bezel {
            background: var(--inset); border-radius: 8px; padding: 8px;
            border: 3px solid #050505; box-shadow: inset 0 4px 12px rgba(0,0,0,1), 0 1px 0 #333;
        }
        .screen {
            background: #020200; border-radius: 4px; padding: 10px;
            flex: 1; display: flex; flex-direction: column; position: relative;
            min-height: 220px; overflow: hidden;
        }
        .screen.on {
            background: var(--bg-lcd); 
            box-shadow: inset 0 0 20px rgba(255,176,0,0.08);
        }

        canvas { 
            width: 100%; height: 110px; background: #000; 
            border: 1px solid #1a1a1a; margin: 8px 0; border-radius: 4px; 
        }
        
        #output {
            flex: 1; overflow-y: auto; font-size: 0.72rem; line-height: 1.5;
            text-shadow: 0 0 3px rgba(255,176,0,0.2);
            scrollbar-width: none;
        }
        #output::-webkit-scrollbar { display: none; }

        .yu-telemetry {
            display: flex; gap: 15px; background: #080808; padding: 8px; border-radius: 4px;
            border: 1px solid #222;
        }
        .yu-val { font-size: 0.9rem; font-weight: bold; color: var(--amber); }

        .led-bay { display: flex; gap: 8px; }
        .led { width: 11px; height: 11px; border-radius: 50%; background: #1a1a1a; transition: all 0.2s; }
        .led.active { box-shadow: 0 0 10px currentColor; }

        .btn-ptt {
            width: 100%; height: 115px; color: rgba(255,255,255,0.7); border: none;
            font-weight: bold; font-size: 1.35rem; cursor: pointer; font-family: inherit;
            letter-spacing: 5px; border-radius: 8px;
            background: repeating-linear-gradient(0deg, #3a3a3a 0px, #3a3a3a 4px, #2a2a2a 4px, #2a2a2a 8px);
            box-shadow: inset 0 2px 0 rgba(255,255,255,0.1), inset 0 -2px 0 rgba(0,0,0,0.8), 0 8px 0 #111;
            transition: all 0.05s;
        }
        .btn-ptt.active {
            opacity: 1; pointer-events: auto;
            background: repeating-linear-gradient(0deg, #5a2020 0px, #5a2020 4px, #401515 4px, #401515 8px);
        }
    </style>
</head>
<body>
    <div class="radio-container">
        <div class="antenna"></div>
        <div class="radio-body">
            <div class="metal-band"></div>
            <audio id="remoteAudio" autoplay playsinline style="display:none;"></audio>
            
            <div class="z-content">
                <div class="controls-top">
                    <div class="brand">TAC/COM-04 YU</div>
                    <div class="power-switch" id="powerBtn" onclick="togglePower()"></div>
                </div>

                <div class="yu-telemetry">
                    <div style="flex:1"><div style="font-size:0.5rem;color:#444">LINK</div><div class="yu-val" id="s-stat">OFFLINE</div></div>
                    <div style="flex:1"><div style="font-size:0.5rem;color:#444">PING</div><div class="yu-val" id="s-ping">--</div></div>
                    <div class="led-bay">
                        <div class="led" id="l-pwr" style="color:#00bfff"></div>
                        <div class="led" id="l-syn" style="color:#39ff14"></div>
                        <div class="led" id="l-tx" style="color:#ff3c3c"></div>
                    </div>
                </div>

                <div class="screen-bezel">
                    <div class="screen" id="screen">
                        <div class="hud-bar" style="font-size:0.65rem;display:flex;justify-content:space-between;margin-bottom:6px;">
                            <span>CH: <span class="hud-val" id="curFreq">---</span></span>
                            <span>STS: <span class="hud-val" id="stat">STANDBY</span></span>
                        </div>
                        <canvas id="visualizer"></canvas>
                        <div id="output"><div>> YU SYSTEM STANDBY...</div></div>
                    </div>
                </div>

                <div id="controlsMid">
                    <input type="number" id="chanInput" value="909" style="width:100%; background:#000; border:2px solid #222; color:var(--cyan); padding:10px; font-size:1.4rem; text-align:center; border-radius:4px;">
                    <button class="btn-set" id="bootBtn" onclick="yuBoot()" style="width:100%; height:50px; margin-top:8px; font-size:1rem;">
                        INITIATE YU CORE
                    </button>
                </div>

                <div class="controls-bottom">
                    <button class="btn-ptt" id="pttBtn">HOLD TO TRANSMIT</button>
                </div>
            </div>
            
            <div class="metal-band" style="box-shadow: inset 0 -1px 0 rgba(255,255,255,0.3), inset 0 1px 0 #000;"></div>
        </div>
    </div>

<script>
    let peer, conn, localStream, audioCtx, analyser, speakerGain;
    let isPowered = false;
    let isConnected = false;
    const YU_NET_ID = "YU-WALKIE-";

    const config = {
        config: {
            iceServers: [
                { urls: "stun:stun.relay.metered.ca:80" },
                { urls: "turn:global.relay.metered.ca:443", username: "ce97feaaa435bc128230c5bd", credential: "+qT5rVgsuGkqWX6o" },
                { urls: "turns:global.relay.metered.ca:443?transport=tcp", username: "ce97feaaa435bc128230c5bd", credential: "+qT5rVgsuGkqWX6o" }
            ]
        }
    };

    function log(msg, color = "#ffb000") {
        const out = document.getElementById('output');
        const div = document.createElement('div');
        div.style.color = color;
        div.textContent = `> ${msg}`;
        out.appendChild(div);
        out.scrollTop = out.scrollHeight;
    }

    async function yuBoot() {
        if (!isPowered) {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ 
                    audio: { echoCancellation: true, noiseSuppression: true } 
                });
                localStream.getAudioTracks()[0].enabled = false;

                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                speakerGain = audioCtx.createGain();
                speakerGain.gain.value = 1;
                analyser.connect(speakerGain);
                speakerGain.connect(audioCtx.destination);

                isPowered = true;
                document.getElementById('powerBtn').classList.add('on');
                document.getElementById('screen').classList.add('on');
                document.getElementById('l-pwr').classList.add('active');
                document.getElementById('bootBtn').textContent = "TERMINATE YU CORE";
                document.getElementById('stat').textContent = "READY";
                document.getElementById('stat').style.color = "#39ff14";

                log("YU CORE BOOT SEQUENCE COMPLETE", "#39ff14");
                initNetwork();
                runVisualizer();

            } catch (e) {
                log("MIC ACCESS FAILED: " + e.message, "#ff3c3c");
            }
        } else {
            location.reload(); // Simple full reset
        }
    }

    function initNetwork() {
        const channel = document.getElementById('chanInput').value;
        peer = new Peer(YU_NET_ID + channel, config);

        peer.on('open', () => log("NETWORK TUNNEL OPEN", "#ffb000"));
        peer.on('connection', c => { conn = c; setupConn(); });
        peer.on('call', call => {
            call.answer(localStream);
            call.on('stream', s => {
                document.getElementById('remoteAudio').srcObject = s;
                audioCtx.createMediaStreamSource(s).connect(analyser);
            });
        });
    }

    function setupConn() {
        conn.on('open', () => {
            isConnected = true;
            document.getElementById('l-syn').classList.add('active');
            document.getElementById('s-stat').innerText = "LINKED";
            log("SECURE LINK ESTABLISHED", "#39ff14");
            document.getElementById('pttBtn').classList.add('active');
        });

        conn.on('data', d => {
            if (d === 'TX_ON') document.getElementById('l-tx').classList.add('active');
            if (d === 'TX_OFF') document.getElementById('l-tx').classList.remove('active');
        });
    }

    function runVisualizer() {
        const canvas = document.getElementById('visualizer');
        const ctx = canvas.getContext('2d');
        const buffer = new Uint8Array(analyser.frequencyBinCount);

        function draw() {
            if (!isPowered) return;
            requestAnimationFrame(draw);
            analyser.getByteTimeDomainData(buffer);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.lineWidth = 2.5;
            ctx.strokeStyle = "#ffb000";
            ctx.beginPath();
            const slice = canvas.width / buffer.length;
            let x = 0;
            for (let i = 0; i < buffer.length; i++) {
                const y = (buffer[i] / 128) * (canvas.height / 2);
                i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
                x += slice;
            }
            ctx.stroke();
        }
        draw();
    }

    // PTT Controls
    const pttBtn = document.getElementById('pttBtn');

    function pttOn() {
        if (!conn || !isConnected || !localStream) return;
        localStream.getAudioTracks()[0].enabled = true;
        speakerGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.01);
        conn.send('TX_ON');
        document.getElementById('l-tx').classList.add('active');
    }

    function pttOff() {
        if (!conn || !isConnected || !localStream) return;
        localStream.getAudioTracks()[0].enabled = false;
        speakerGain.gain.setTargetAtTime(1, audioCtx.currentTime, 0.01);
        conn.send('TX_OFF');
        document.getElementById('l-tx').classList.remove('active');
    }

    pttBtn.addEventListener('mousedown', pttOn);
    pttBtn.addEventListener('mouseup', pttOff);
    pttBtn.addEventListener('touchstart', e => { e.preventDefault(); pttOn(); });
    pttBtn.addEventListener('touchend', e => { e.preventDefault(); pttOff(); });

    document.addEventListener('keydown', e => { if (e.code === 'Space') { e.preventDefault(); pttOn(); }});
    document.addEventListener('keyup',   e => { if (e.code === 'Space') { e.preventDefault(); pttOff(); }});

    function togglePower() {
        yuBoot();
    }
</script>
</body>
</html>
