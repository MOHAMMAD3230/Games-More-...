<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TAC/COM-X | OMNI-OPERATOR</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --amber: #ffb000; --bg: #0d0900; --red: #8c3024; --blue: #00d4ff; --green: #39ff14; --panel: #1a1a1a; --off: #222; }
        body { background: #050505; color: var(--amber); font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; touch-action: manipulation; overflow: hidden; }
        
        /* CRT Grid */
        body::after { content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02)); z-index: 2; background-size: 100% 2px, 3px 100%; pointer-events: none; }

        .mainframe { width: 95%; max-width: 950px; background: #222; border: 4px solid #111; padding: 10px; display: grid; box-shadow: 0 0 60px #000; z-index: 3; box-sizing: border-box; }
        @media (min-width: 768px) { .mainframe { grid-template-columns: 1fr 320px; height: 700px; gap: 15px; } }

        .monitor { background: var(--bg); border: 8px solid var(--panel); border-radius: 5px; padding: 15px; display: flex; flex-direction: column; position: relative; border-style: inset; }
        #output { height: 180px; overflow-y: auto; font-size: 0.7rem; scrollbar-width: none; border-bottom: 1px solid #222; margin-bottom: 10px; opacity: 0.5; transition: 0.3s; }
        .system-on #output { opacity: 1; }

        canvas { width: 100%; height: 100px; background: #000; border: 1px solid #333; margin-bottom: 10px; filter: grayscale(1); transition: 0.3s; }
        .system-on canvas { filter: none; }

        /* Power Controls */
        .power-strip { display: flex; gap: 5px; margin-bottom: 10px; }
        .pwr-btn { flex: 1; padding: 10px; font-weight: bold; border: 2px solid #444; cursor: pointer; font-size: 0.7rem; text-transform: uppercase; }
        .pwr-on { background: #040; color: var(--green); border-color: var(--green); }
        .pwr-off { background: #400; color: #f00; border-color: #f00; }
        .pwr-btn:disabled { opacity: 0.2; cursor: default; }

        /* Feature Matrix */
        .feat-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 5px; margin-bottom: 10px; }
        .feat-btn { background: #111; border: 1px solid #444; color: #555; font-size: 0.6rem; padding: 10px; cursor: pointer; text-transform: uppercase; font-weight: bold; }
        .system-on .feat-btn { color: var(--amber); border-color: #666; }
        .feat-btn.active { color: var(--blue) !important; border-color: var(--blue) !important; box-shadow: 0 0 5px var(--blue); }

        .led-row { display: flex; justify-content: space-between; padding: 8px; background: #111; border: 1px solid #333; margin-bottom: 10px; }
        .led-item { display: flex; flex-direction: column; align-items: center; font-size: 0.5rem; gap: 4px; color: #444; }
        .led { width: 10px; height: 10px; border-radius: 50%; background: #151515; box-shadow: inset 0 0 3px #000; }
        .led.active-blue { background: var(--blue); box-shadow: 0 0 10px var(--blue); }
        .led.active-red { background: #f00; box-shadow: 0 0 10px #f00; }
        .led.active-green { background: var(--green); box-shadow: 0 0 10px var(--green); }

        .ptt-container { display: flex; gap: 10px; margin-bottom: 10px; height: 130px; }
        .btn-ptt { flex-grow: 1; background: var(--off); color: #444; border: 4px solid #333; font-weight: bold; font-size: 1.2rem; cursor: pointer; transition: 0.2s; }
        .system-on .btn-ptt { background: var(--red); color: white; border-color: #5e1e16; }
        .btn-ptt:active:not(:disabled) { transform: scale(0.96); background: #f00; }
        
        .side-module { background: #111; padding: 10px; border: 1px solid #333; margin-bottom: 10px; }
        input { width: 100%; background: #000; border: 1px solid #444; color: var(--amber); padding: 10px; text-align: center; font-family: monospace; font-size: 1.2rem; opacity: 0.3; }
        .system-on input { opacity: 1; }
    </style>
</head>
<body>

<div class="mainframe" id="ui-frame">
    <audio id="remoteAudio" autoplay playsinline></audio>
    
    <div class="monitor">
        <div class="power-strip">
            <button class="pwr-btn pwr-on" id="onBtn" onclick="powerOn()">System On</button>
            <button class="pwr-btn pwr-off" id="offBtn" onclick="powerOff()" disabled>System Off</button>
        </div>

        <div style="display:flex; justify-content:space-between; font-size:0.55rem; margin-bottom:5px; color: #444;">
            <span>LINK-DATA: <span id="s-link">OFF</span></span>
            <span>PING: <span id="s-ping">--</span></span>
        </div>

        <canvas id="visualizer"></canvas>

        <div id="output"><div>> SYSTEM IDLE. AWAITING POWER_ON...</div></div>

        <div class="feat-grid">
            <button class="feat-btn" id="btn-rec" onclick="toggleRecord()">REC-LOG</button>
            <button class="feat-btn" id="btn-scram" onclick="toggleScramble()">SCRAMBLE</button>
            <button class="feat-btn" id="btn-night" onclick="toggleNight()">NIGHT-V</button>
            <button class="feat-btn" onclick="sendBeep(true)">SIGNAL-PULSE</button>
        </div>
    </div>

    <div class="side-panel">
        <div class="led-row">
            <div class="led-item"><div class="led" id="l-pwr"></div>CPU</div>
            <div class="led-item"><div class="led" id="l-syn"></div>SYNC</div>
            <div class="led-item"><div class="led" id="l-rec"></div>LOG</div>
            <div class="led-item"><div class="led" id="l-tx"></div>TX</div>
        </div>

        <div class="side-module">
            <div style="font-size: 0.6rem; text-align: center; color:#555; margin-bottom:5px;">CHANNEL SELECT</div>
            <input type="number" id="chanInput" value="404">
        </div>

        <div class="ptt-container">
            <button class="btn-ptt" id="pttBtn" disabled>COMM-INACTIVE</button>
        </div>
        
        <div style="padding: 10px; font-size: 0.5rem; color: #333; text-align: center;">
            SECURE RELAY CLUSTER-X9<br>HIGH-ISOLATION FIRMWARE
        </div>
    </div>
</div>

<script>
    let peer, conn, localStream, audioCtx, analyser, speakerGain, noiseFilter, recorder, chunks = [];
    let isSystemOn = false;
    let scrambleNode;
    const APP_PREFIX = "OMNI-X-"; 

    const PEER_OPTIONS = {
        config: { 'iceServers': [{ 'urls': 'turns:global.relay.metered.ca:443?transport=tcp', 'username': 'ce97feaaa435bc128230c5bd', 'credential': '+qT5rVgsuGkqWX6o' }] },
        iceTransportPolicy: 'relay'
    };

    function log(msg, color="#ffb000") {
        const out = document.getElementById('output');
        out.innerHTML += `<div style="color:${color}">> ${msg}</div>`;
        out.scrollTop = out.scrollHeight;
    }

    // --- POWER SYSTEMS ---

    async function powerOn() {
        if(isSystemOn) return;
        isSystemOn = true;
        document.getElementById('ui-frame').classList.add('system-on');
        document.getElementById('onBtn').disabled = true;
        document.getElementById('offBtn').disabled = false;
        document.getElementById('pttBtn').innerText = "HOLD TO TALK";
        
        try {
            log("BOOTING OPERATING SYSTEM...", "var(--blue)");
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            // DSP Setup
            noiseFilter = audioCtx.createBiquadFilter();
            noiseFilter.type = "highpass"; noiseFilter.frequency.value = 350;
            speakerGain = audioCtx.createGain(); speakerGain.gain.value = 0.6;
            analyser = audioCtx.createAnalyser(); analyser.fftSize = 256;

            noiseFilter.connect(analyser);
            analyser.connect(speakerGain);
            speakerGain.connect(audioCtx.destination);
            
            document.getElementById('l-pwr').classList.add('active-blue');
            initPeer(APP_PREFIX + document.getElementById('chanInput').value);
            drawVisualizer();
        } catch(e) { log("HARDWARE FAILURE: " + e.message, "red"); powerOff(); }
    }

    function powerOff() {
        isSystemOn = false;
        log("TERMINATING SESSION...", "red");
        if(peer) peer.destroy();
        if(localStream) localStream.getTracks().forEach(t => t.stop());
        if(audioCtx) audioCtx.close();
        
        document.getElementById('ui-frame').classList.remove('system-on');
        document.getElementById('onBtn').disabled = false;
        document.getElementById('offBtn').disabled = true;
        document.getElementById('pttBtn').disabled = true;
        document.getElementById('pttBtn').innerText = "COMM-INACTIVE";
        document.querySelectorAll('.led').forEach(l => l.className = 'led');
        document.getElementById('s-link').innerText = "OFF";
        document.getElementById('s-link').style.color = "inherit";
    }

    // --- NETWORK ---

    function initPeer(id) {
        peer = new Peer(id, PEER_OPTIONS);
        peer.on('open', () => log("RELAY ACQUIRED. BROADCASTING...", "var(--green)"));
        peer.on('connection', c => { conn = c; setupHandlers(); });
        peer.on('call', call => {
            call.answer(localStream);
            call.on('stream', s => attachStream(s));
        });
        peer.on('error', err => { if(err.type==='unavailable-id'){ peer.destroy(); initCaller(id); }});
    }

    function initCaller(tid) {
        peer = new Peer(PEER_OPTIONS);
        peer.on('open', () => {
            conn = peer.connect(tid);
            const call = peer.call(tid, localStream);
            call.on('stream', s => attachStream(s));
            setupHandlers();
        });
    }

    function setupHandlers() {
        conn.on('open', () => {
            document.getElementById('l-syn').classList.add('active-green');
            document.getElementById('pttBtn').disabled = false;
            document.getElementById('s-link').innerText = "SYNCED";
            document.getElementById('s-link').style.color = "var(--green)";
            log("PEER HANDSHAKE SUCCESS.");
            setInterval(() => { if(isSystemOn && conn) conn.send({type:'ping', ts:Date.now()}); }, 4000);
        });
        conn.on('data', d => {
            if(d === 'TX_ON') document.getElementById('l-tx').classList.add('active-red');
            if(d === 'TX_OFF') document.getElementById('l-tx').classList.remove('active-red');
            if(d.type === 'ping') conn.send({type:'pong', ts:d.ts});
            if(d.type === 'pong') document.getElementById('s-ping').innerText = (Date.now() - d.ts) + "ms";
        });
    }

    function attachStream(s) {
        document.getElementById('remoteAudio').srcObject = s;
        audioCtx.createMediaStreamSource(s).connect(noiseFilter);
    }

    // --- DSP FEATURES ---

    function toggleScramble() {
        const btn = document.getElementById('btn-scram');
        if(!scrambleNode) {
            scrambleNode = audioCtx.createOscillator();
            scrambleNode.type = 'sawtooth';
            scrambleNode.frequency.value = 50;
            const scramGain = audioCtx.createGain();
            scramGain.gain.value = 0.5;
            scrambleNode.connect(scramGain);
            scramGain.connect(audioCtx.destination);
            scrambleNode.start();
            btn.classList.add('active');
            log("VOICE SCRAMBLER ACTIVE.");
        } else {
            scrambleNode.stop(); scrambleNode = null;
            btn.classList.remove('active');
        }
    }

    function toggleNight() {
        document.body.style.filter = document.body.style.filter === 'none' || !document.body.style.filter ? 'sepia(1) hue-rotate(90deg) brightness(1.2)' : 'none';
        document.getElementById('btn-night').classList.toggle('active');
    }

    function toggleRecord() {
        if (!recorder) {
            const stream = document.getElementById('remoteAudio').srcObject;
            if(!stream) return;
            recorder = new MediaRecorder(stream);
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'audio/webm' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob); a.download = `LOG_${Date.now()}.webm`; a.click();
                chunks = [];
            };
            recorder.start();
            document.getElementById('l-rec').classList.add('active-red');
            document.getElementById('btn-rec').classList.add('active');
        } else {
            recorder.stop(); recorder = null;
            document.getElementById('l-rec').classList.remove('active-red');
            document.getElementById('btn-rec').classList.remove('active');
        }
    }

    function drawVisualizer() {
        const canvas = document.getElementById('visualizer');
        const ctx = canvas.getContext('2d');
        const bufferLength = analyser.frequencyBinCount;
        const dataArray = new Uint8Array(bufferLength);
        
        function draw() {
            if(!isSystemOn) { ctx.clearRect(0,0,canvas.width,canvas.height); return; }
            requestAnimationFrame(draw);
            analyser.getByteTimeDomainData(dataArray);
            ctx.fillStyle = '#000'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.lineWidth = 2; ctx.strokeStyle = document.getElementById('btn-night').classList.contains('active') ? '#39ff14' : '#ffb000';
            ctx.beginPath();
            let sliceWidth = canvas.width / bufferLength;
            let x = 0;
            for(let i=0; i<bufferLength; i++) {
                let v = dataArray[i] / 128.0;
                let y = v * canvas.height / 2;
                if(i===0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                x += sliceWidth;
            }
            ctx.stroke();
        }
        draw();
    }

    function muteMic(m) {
        if(localStream) localStream.getAudioTracks().forEach(t => t.enabled = !m);
        if(speakerGain) speakerGain.gain.setTargetAtTime(m ? 0.6 : 0, audioCtx.currentTime, 0.02);
    }

    const ptt = document.getElementById('pttBtn');
    const pttOn = (e) => { if(e) e.preventDefault(); if(!conn || ptt.disabled) return; muteMic(false); conn.send('TX_ON'); document.getElementById('l-tx').classList.add('active-red'); };
    const pttOff = (e) => { if(e) e.preventDefault(); if(!conn || ptt.disabled) return; muteMic(true); conn.send('TX_OFF'); document.getElementById('l-tx').classList.remove('active-red'); };

    ptt.addEventListener('touchstart', pttOn, {passive:false});
    ptt.addEventListener('touchend', pttOff, {passive:false});
    ptt.addEventListener('mousedown', pttOn);
    ptt.addEventListener('mouseup', pttOff);
</script>
</body>
</html>
