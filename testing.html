<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OMNI-VOICE V9</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --neon: #00ff41; --bg: #050505; }
        body { background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .terminal { border: 2px solid var(--neon); padding: 25px; background: #000; width: 340px; box-shadow: 0 0 20px var(--neon); }
        input { background: #000; border: 1px solid var(--neon); color: var(--neon); padding: 12px; width: 100%; margin-bottom: 10px; text-align: center; outline: none; }
        .btn-row { display: flex; gap: 5px; }
        button { flex: 1; padding: 12px; background: var(--neon); color: black; border: none; font-weight: bold; cursor: pointer; }
        #ptt-btn { width: 100%; padding: 40px; background: transparent; color: var(--neon); border: 2px solid var(--neon); margin-top: 15px; font-size: 1.2rem; display: none; }
        #status { font-size: 0.7rem; text-align: center; margin-top: 15px; }
        #power-on { width: 100%; padding: 20px; background: #ff003c; color: white; border: none; font-weight: bold; margin-bottom: 10px; cursor: pointer; }
    </style>
</head>
<body>

<div class="terminal">
    <button id="power-on">1. INITIALIZE AUDIO SYSTEM</button>

    <div id="ui-main" style="display:none;">
        <input type="text" id="freq" placeholder="CHANNEL_ID">
        <div class="btn-row">
            <button onclick="boot('A')">MODE_A</button>
            <button onclick="boot('B')">MODE_B</button>
        </div>
        <button id="ptt-btn">HOLD_TO_TALK</button>
    </div>
    
    <div id="status">OFFLINE</div>
</div>

<audio id="receiver" playsinline></audio>

<script>
    const pwr = document.getElementById('power-on');
    const main = document.getElementById('ui-main');
    const status = document.getElementById('status');
    const ptt = document.getElementById('ptt-btn');
    const audioOut = document.getElementById('receiver');

    let peer = null, localStream = null;

    // BUG 3 FIX: Capture User Gesture immediately
    pwr.onclick = async () => {
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            localStream.getAudioTracks()[0].enabled = false;
            
            // Prime the audio element with a silent "kickstart"
            audioOut.srcObject = new MediaStream(); 
            await audioOut.play();
            
            pwr.style.display = 'none';
            main.style.display = 'block';
            status.innerText = "HARDWARE_READY";
        } catch (e) {
            status.innerText = "MIC_ACCESS_DENIED";
        }
    };

    function boot(role) {
        const ch = document.getElementById('freq').value.trim().toUpperCase();
        if(!ch) return;
        
        if(peer) peer.destroy();

        // BUG 1 FIX: Clean ICE Config with triple STUN redundancy
        peer = new Peer(`OMNI_V9_${ch}_${role}`, {
            config: {
                iceServers: [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:stun1.l.google.com:19302' },
                    { urls: 'stun:stun2.l.google.com:19302' }
                ]
            }
        });

        peer.on('open', () => {
            status.innerText = `NODE_${role}_ONLINE`;
            if(role === 'A') {
                status.innerText = "LINKING...";
                setTimeout(() => {
                    const call = peer.call(`OMNI_V9_${ch}_B`, localStream);
                    handleCall(call);
                }, 1000);
            }
        });

        peer.on('call', (call) => {
            call.answer(localStream);
            handleCall(call);
        });
    }

    function handleCall(call) {
        call.on('stream', (remoteStream) => {
            // BUG 2 FIX: Explicitly set and play
            audioOut.srcObject = remoteStream;
            audioOut.play().then(() => {
                status.innerText = "LINK_SECURED_AUDIO_LIVE";
                ptt.style.display = 'block';
            }).catch(e => {
                status.innerText = "ERROR: TAP_SCREEN_TO_FIX_AUDIO";
                window.onclick = () => audioOut.play();
            });
        });
    }

    // PTT Logic
    const toggle = (on) => { if(localStream) localStream.getAudioTracks()[0].enabled = on; };
    ptt.onmousedown = () => toggle(true);
    ptt.onmouseup = () => toggle(false);
    ptt.ontouchstart = (e) => { e.preventDefault(); toggle(true); };
    ptt.ontouchend = (e) => { e.preventDefault(); toggle(false); };
</script>
</body>
</html>
