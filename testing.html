<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <!-- ===== SECURITY HEADERS ===== -->
    <meta http-equiv="Content-Security-Policy" content="
        default-src 'self';
        script-src 'self' 'unsafe-inline' https://unpkg.com;
        style-src 'self' 'unsafe-inline';
        img-src 'self' data:;
        media-src 'self' blob:;
        connect-src 'self' wss://*.peerjs.com https://*.peerjs.com https://unpkg.com;
        frame-src https://pagead2.googlesyndication.com;
        base-uri 'self';
        form-action 'self';
        object-src 'none';
    " />
    <meta http-equiv="X-Frame-Options" content="SAMEORIGIN" />
    <meta name="referrer" content="no-referrer-when-downgrade" />
    
    <!-- CRITICAL: Allows microphone on this specific page -->
    <meta http-equiv="Permissions-Policy" content="
        camera=(),
        microphone=(self),
        geolocation=(),
        payment=(),
        usb=(),
        magnetometer=(),
        gyroscope=(),
        accelerometer=(),
        ambient-light-sensor=(),
        autoplay=(),
        encrypted-media=(),
        picture-in-picture=(),
        screen-wake-lock=()
    " />

    <meta name="robots" content="noindex, nofollow, noarchive, nosnippet" />
    <link rel="icon" href="https://mohammad3230.github.io/Games-More-.../favicon.png" type="image/png" sizes="32x32" />

    <title>TAC/COM-04 | CH-TUNER</title>

    <!-- PeerJS (pinned version for supply chain stability) -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

    <style>
        :root { --amber: #ffb000; --bg: #0d0900; --red: #8c3024; --blue: #00d4ff; --green: #39ff14; }
        *, *::before, *::after { box-sizing: border-box; }
        
        body {
            background: #050505; color: var(--amber);
            font-family: 'Courier New', monospace;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0;
            touch-action: manipulation;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .mainframe {
            width: 95%; max-width: 850px;
            background: #222; border: 6px solid #111; padding: 15px;
            display: flex; flex-direction: column;
            box-shadow: 0 0 60px #000;
        }
        @media (min-width: 768px) {
            .mainframe { display: grid; grid-template-columns: 1fr 320px; height: 600px; gap: 20px; }
        }

        .monitor {
            background: var(--bg); border: 10px solid #1a1a1a; border-radius: 15px;
            padding: 20px; flex-grow: 1; display: flex; flex-direction: column; position: relative;
        }

        #output {
            height: 220px; overflow-y: auto; -webkit-overflow-scrolling: touch;
            font-size: 0.8rem; scrollbar-width: none;
            border-bottom: 1px solid #333; margin-bottom: 10px;
        }
        #output::-webkit-scrollbar { display: none; }

        .module { background: #111; padding: 12px; border: 1px solid #333; margin-bottom: 10px; }

        .btn-ptt {
            width: 100%; height: 140px; background: var(--red); color: white;
            border: 5px solid #5e1e16; font-weight: bold; font-size: 1.3rem;
            cursor: pointer; transition: 0.1s; touch-action: manipulation;
            -webkit-user-select: none; user-select: none;
        }
        .btn-ptt:active:not(:disabled) { background: #f00; transform: scale(0.98); }
        .btn-ptt:disabled { background: #333; opacity: 0.2; cursor: not-allowed; }

        .btn-action {
            width: 100%; padding: 10px; background: #333; color: #fff;
            border: 1px solid #555; cursor: pointer; font-weight: bold;
            font-size: 0.7rem; font-family: 'Courier New', monospace; touch-action: manipulation;
        }
        .btn-action:disabled { opacity: 0.4; cursor: not-allowed; }

        input[type="number"] {
            width: 100%; background: #000; border: 1px solid #444; color: var(--amber);
            padding: 10px; box-sizing: border-box; outline: none; text-align: center;
            font-size: 1.2rem; letter-spacing: 2px; font-family: 'Courier New', monospace;
            -moz-appearance: textfield;
        }
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        .input-error { border-color: #f00 !important; }

        .status-led { width: 12px; height: 12px; border-radius: 50%; background: #200; display: inline-block; vertical-align: middle; }
        .online { background: var(--blue); box-shadow: 0 0 10px var(--blue); }
        .tx { background: #f00; box-shadow: 0 0 10px #f00; }

        #meter { width: 100%; height: 10px; background: #000; border: 1px solid #333; margin-top: auto; }
        #meter-fill { width: 0%; height: 100%; background: var(--green); transition: width 0.1s; }
    </style>
</head>
<body>

<div class="mainframe">
    <audio id="remoteAudio" autoplay playsinline style="display:none;"></audio>

    <div class="monitor">
        <div style="font-size: 0.6rem; display:flex; justify-content:space-between; margin-bottom:10px;">
            <span>FREQ: <span id="curFreq" style="color:var(--blue)">UNSET</span></span>
            <span>UPLINK: <span id="stat">SCANNING</span></span>
        </div>
        <div id="output"><div>> SELECT FREQUENCY CHANNEL TO START...</div></div>
        <div id="meter"><div id="meter-fill"></div></div>
    </div>

    <div class="side-panel">
        <div class="module">
            <div style="font-size: 0.6rem; color: #555; margin-bottom: 5px; text-align: center;">SET FREQUENCY (1-99)</div>
            <input type="number" id="chanInput" value="1" min="1" max="99" inputmode="numeric" pattern="[0-9]*">
            <button class="btn-action" id="bootBtn" style="margin-top:10px; border-color:var(--green); color:var(--green);">SET CHANNEL</button>
        </div>

        <div class="module" style="text-align:center;">
            <button class="btn-ptt" id="pttBtn" disabled aria-label="Push to talk">HOLD TO TALK</button>
            <div style="margin-top:10px; font-size:0.5rem; display:flex; justify-content:space-around;">
                <span><div class="status-led" id="ledNet"></div> SYNC</span>
                <span><div class="status-led" id="ledTx"></div> TRANS</span>
            </div>
        </div>
        
        <button class="btn-action" id="resetBtn" style="background:#200;">RESET SYSTEM</button>
    </div>
</div>

<script>
    /* =================================================================
       SECURITY: Input Validation & Sanitization
       ================================================================= */
    function sanitizeInput(str) {
        if (typeof str !== 'string') return '';
        return str.replace(/[<>]/g, '').replace(/[\x00-\x1F\x7F]/g, '').trim().slice(0, 20);
    }

    function validateChannel(val) {
        var n = parseInt(val, 10);
        return !isNaN(n) && n >= 1 && n <= 99 && String(n) === String(val).trim();
    }

    /* =================================================================
       STATE & CONFIG
       ================================================================= */
    var peer = null;
    var conn = null;
    var localStream = null;
    var audioCtx = null;
    var delayNode = null;
    var analyser = null;
    var speakerGain = null;
    var APP_PREFIX = 'TAC-COM-V1-';

    /* =================================================================
       NETWORKING: STUN + TURN (Cross-Network Fix)
       ================================================================= */
    function getIceServers() {
        return [
            /* STUN: Fast IP discovery, no data relay */
            { urls: 'stun:stun.l.google.com:19302' },
            { urls: 'stun:stun1.l.google.com:19302' },
            
            /* TURN: Relays audio when direct P2P is blocked by NAT/Firewalls */
            {
                urls: 'turn:openrelay.metered.ca:80',
                username: 'openrelayproject',
                credential: 'openrelayproject'
            },
            {
                urls: 'turn:openrelay.metered.ca:443',
                username: 'openrelayproject',
                credential: 'openrelayproject'
            },
            {
                urls: 'turn:openrelay.metered.ca:443?transport=tcp',
                username: 'openrelayproject',
                credential: 'openrelayproject'
            }
        ];
    }

    /* =================================================================
       LOGGING (XSS Safe via textContent)
       ================================================================= */
    function log(msg, color) {
        color = color || '#ffb000';
        var div = document.createElement('div');
        div.style.color = color;
        div.textContent = '> ' + msg; 
        var out = document.getElementById('output');
        out.appendChild(div);
        out.scrollTop = out.scrollHeight;
    }

    /* =================================================================
       CHANNEL INITIALIZATION
       ================================================================= */
    async function initChannel() {
        var rawVal = document.getElementById('chanInput').value;
        var inputEl = document.getElementById('chanInput');

        if (!validateChannel(rawVal)) {
            inputEl.classList.add('input-error');
            log('INVALID FREQUENCY. RANGE: 1-99.', 'red');
            setTimeout(function() { inputEl.classList.remove('input-error'); }, 2000);
            return;
        }
        inputEl.classList.remove('input-error');

        var chanNum = sanitizeInput(String(rawVal));
        var fullId = APP_PREFIX + chanNum;

        try {
            localStream = await navigator.mediaDevices.getUserMedia({ 
                audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true } 
            });

            muteMic(true);

            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            speakerGain = audioCtx.createGain();
            speakerGain.gain.value = 1;
            delayNode = audioCtx.createDelay(5.0);
            delayNode.delayTime.value = 1.5;
            analyser = audioCtx.createAnalyser();
            
            delayNode.connect(analyser);
            analyser.connect(speakerGain);
            speakerGain.connect(audioCtx.destination);
            
            document.getElementById('bootBtn').disabled = true;
            document.getElementById('chanInput').disabled = true;
            document.getElementById('curFreq').innerText = 'CH-' + chanNum;
            
            updateMeter();
            initPeer(fullId);
            log('TUNING TO CHANNEL ' + chanNum + '...', '#00d4ff');

        } catch (e) {
            if (e.name === 'NotAllowedError') log('MICROPHONE ACCESS DENIED BY USER.', 'red');
            else if (e.name === 'NotFoundError') log('NO MICROPHONE DETECTED.', 'red');
            else if (e.name === 'NotReadableError') log('MICROPHONE IN USE BY ANOTHER APP.', 'red');
            else log('HARDWARE ERROR: ' + (e.message || 'UNKNOWN'), 'red');
        }
    }

    /* =================================================================
       PEERJS CONNECTION (Host Mode)
       ================================================================= */
    function initPeer(myId) {
        peer = new Peer(myId, { config: { iceServers: getIceServers() } });

        peer.on('open', function() {
            log('CHANNEL ACTIVE. SCANNING FOR PEERS...', '#39ff14');
            setTimeout(autoConnect, 1500);
        });

        peer.on('connection', function(c) { conn = c; setupHandlers(); });
        
        peer.on('call', function(call) {
            call.answer(localStream);
            call.on('stream', function(stream) { attachStream(stream); });
        });

        peer.on('error', function(err) {
            if (err.type === 'unavailable-id') {
                log('CHANNEL BUSY. ATTEMPTING HANDSHAKE...', '#ffb000');
                peer.destroy();
                initCallerMode(myId);
            } else if (err.type === 'peer-unavailable') {
                log('NO PEER FOUND ON THIS CHANNEL.', '#ffb000');
            } else {
                log('CONN ERROR: ' + err.type, 'red');
            }
        });
    }

    /* =================================================================
       PEERJS CONNECTION (Caller/Slave Mode)
       ================================================================= */
    function initCallerMode(targetId) {
        peer = new Peer({ config: { iceServers: getIceServers() } });
        
        peer.on('open', function() {
            log('HANDSHAKE INITIATED...', '#ffb000');
            conn = peer.connect(targetId);
            var call = peer.call(targetId, localStream);
            call.on('stream', function(stream) { attachStream(stream); });
            setupHandlers();
        });
    }

    function attachStream(stream) {
        var audioEl = document.getElementById('remoteAudio');
        audioEl.srcObject = stream;
        var source = audioCtx.createMediaStreamSource(stream);
        source.connect(delayNode);
        log('REMOTE SYNC SUCCESSFUL.', '#39ff14');
    }

    function setupHandlers() {
        conn.on('open', function() {
            document.getElementById('ledNet').classList.add('online');
            document.getElementById('pttBtn').disabled = false;
            document.getElementById('stat').innerText = 'SYNCED';
            log('VOICE LINK ESTABLISHED.', '#39ff14');
        });

        conn.on('data', function(data) {
            if (data === 'TX_ON') document.getElementById('ledTx').classList.add('tx');
            if (data === 'TX_OFF') {
                document.getElementById('ledTx').classList.remove('tx');
                setTimeout(function() { playBeep(450, 0.2); }, 1500);
            }
        });

        conn.on('close', function() {
            document.getElementById('ledNet').classList.remove('online');
            document.getElementById('pttBtn').disabled = true;
            document.getElementById('stat').innerText = 'LOST SIGNAL';
            log('VOICE LINK LOST.', 'red');
        });
    }

    /* =================================================================
       MIC / AUDIO CONTROLS
       ================================================================= */
    function muteMic(shouldMute) {
        if (localStream) {
            localStream.getAudioTracks().forEach(function(t) { t.enabled = !shouldMute; });
        }
        if (speakerGain) {
            speakerGain.gain.setValueAtTime(shouldMute ? 1 : 0, audioCtx.currentTime);
        }
    }

    function updateMeter() {
        if (!analyser) return;
        var dataArray = new Uint8Array(analyser.frequencyBinCount);
        analyser.getByteFrequencyData(dataArray);
        var sum = 0;
        for (var i = 0; i < dataArray.length; i++) sum += dataArray[i];
        document.getElementById('meter-fill').style.width = Math.min(100, (sum / dataArray.length) * 4) + '%';
        requestAnimationFrame(updateMeter);
    }

    function playBeep(freq, duration) {
        if (!audioCtx) return;
        if (audioCtx.state === 'suspended') audioCtx.resume();
        var osc = audioCtx.createOscillator();
        var g = audioCtx.createGain();
        osc.frequency.value = freq; g.gain.value = 0.05;
        osc.connect(g); g.connect(audioCtx.destination);
        osc.start();
        g.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
        osc.stop(audioCtx.currentTime + duration);
    }

    /* =================================================================
       PTT LOGIC
       ================================================================= */
    function pttOn() {
        if (!conn || document.getElementById('pttBtn').disabled) return;
        muteMic(false);
        conn.send('TX_ON');
        document.getElementById('ledTx').classList.add('tx');
        playBeep(1200, 0.05);
    }

    function pttOff() {
        if (!conn || document.getElementById('pttBtn').disabled) return;
        muteMic(true);
        conn.send('TX_OFF');
        document.getElementById('ledTx').classList.remove('tx');
        playBeep(450, 0.2);
    }

    /* =================================================================
       EVENT BINDINGS (No inline onclick)
       ================================================================= */
    document.addEventListener('DOMContentLoaded', function() {
        var ptt = document.getElementById('pttBtn');

        /* Mouse PTT */
        ptt.addEventListener('mousedown', function(e) { e.preventDefault(); pttOn(); });
        ptt.addEventListener('mouseup', pttOff);

        /* Touch PTT (Mobile) */
        ptt.addEventListener('touchstart', function(e) { e.preventDefault(); pttOn(); }, { passive: false });
        ptt.addEventListener('touchend', function(e) { e.preventDefault(); pttOff(); }, { passive: false });

        /* Keyboard PTT (Spacebar) */
        var spaceHeld = false;
        document.addEventListener('keydown', function(e) {
            if (e.code === 'Space' && !spaceHeld && !document.getElementById('pttBtn').disabled) {
                e.preventDefault(); spaceHeld = true; pttOn();
            }
        });
        document.addEventListener('keyup', function(e) {
            if (e.code === 'Space' && spaceHeld) {
                e.preventDefault(); spaceHeld = false; pttOff();
            }
        });

        /* UI Buttons */
        document.getElementById('bootBtn').addEventListener('click', initChannel);
        document.getElementById('resetBtn').addEventListener('click', function() { location.reload(); });

        /* Enter key in input */
        document.getElementById('chanInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') { e.preventDefault(); if (!document.getElementById('bootBtn').disabled) initChannel(); }
        });

        /* Cleanup on leave */
        window.addEventListener('beforeunload', function() {
            if (localStream) localStream.getAudioTracks().forEach(function(t) { t.stop(); });
            if (peer) peer.destroy();
        });
    });
</script>
</body>
</html>
