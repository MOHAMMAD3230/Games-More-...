<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TACTICAL COMMS v2</title>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

<style>
body {
    background:#050505;
    color:#0f0;
    font-family:monospace;
    text-align:center;
}
button, input {
    padding:10px;
    margin:5px;
}
#log {
    height:200px;
    overflow:auto;
    border:1px solid #333;
    padding:5px;
    font-size:12px;
}
</style>
</head>

<body>

<h2>📡 TAC-COM v2</h2>

<input id="channel" type="number" min="1" max="99" value="1">
<button onclick="start()">JOIN CHANNEL</button>

<br><br>

<button id="ptt" disabled>HOLD TO TALK</button>

<div id="log"></div>

<script>
let peer;
let localStream;
let connections = {};
let currentChannel = null;
let heartbeatInterval;

const ICE_CONFIG = {
    iceServers: [
        { urls: 'stun:stun.l.google.com:19302' },
        {
            urls: 'turn:openrelay.metered.ca:80',
            username: 'openrelayproject',
            credential: 'openrelayproject'
        }
    ]
};

function log(msg){
    const el = document.getElementById('log');
    el.innerHTML += "> " + msg + "<br>";
    el.scrollTop = el.scrollHeight;
}

async function start(){
    currentChannel = "room-" + document.getElementById('channel').value;

    localStream = await navigator.mediaDevices.getUserMedia({
        audio: {
            echoCancellation:true,
            noiseSuppression:true,
            autoGainControl:true,
            latency:0
        }
    });

    createPeer();
}

function createPeer(){
    peer = new Peer(undefined, { config: ICE_CONFIG });

    peer.on('open', id=>{
        log("My ID: " + id);
        discoverPeers();
        startHeartbeat();
    });

    peer.on('connection', conn=>{
        setupConnection(conn);
    });

    peer.on('call', call=>{
        call.answer(localStream);
        call.on('stream', stream=>{
            playStream(stream);
        });
    });

    peer.on('disconnected', ()=>{
        log("Disconnected. Reconnecting...");
        reconnect();
    });

    peer.on('error', err=>{
        log("Error: " + err);
    });
}

function discoverPeers(){
    // brute-force scan nearby IDs
    for(let i=0;i<20;i++){
        let testId = currentChannel + "-" + i;
        if(peer.id === testId) continue;

        let conn = peer.connect(testId, { reliable:false });

        conn.on('open', ()=>{
            setupConnection(conn);

            const call = peer.call(testId, localStream);
            call.on('stream', stream=>{
                playStream(stream);
            });
        });
    }

    // also assign self ID in pool
    peer.id = currentChannel + "-" + Math.floor(Math.random()*20);
}

function setupConnection(conn){
    if(connections[conn.peer]) return;

    connections[conn.peer] = conn;
    log("Connected: " + conn.peer);

    document.getElementById('ptt').disabled = false;

    conn.on('data', data=>{
        if(data === "PING"){
            conn.send("PONG");
        }
    });

    conn.on('close', ()=>{
        log("Lost: " + conn.peer);
        delete connections[conn.peer];
        retryConnection(conn.peer);
    });
}

function retryConnection(id){
    setTimeout(()=>{
        log("Retrying " + id);
        let conn = peer.connect(id);
        conn.on('open', ()=> setupConnection(conn));
    }, 2000);
}

function startHeartbeat(){
    heartbeatInterval = setInterval(()=>{
        Object.values(connections).forEach(conn=>{
            conn.send("PING");
        });
    }, 3000);
}

function reconnect(){
    peer.reconnect();
    setTimeout(discoverPeers,2000);
}

function playStream(stream){
    const audio = new Audio();
    audio.srcObject = stream;
    audio.play();
}

function muteMic(mute){
    localStream.getAudioTracks().forEach(t=>t.enabled = !mute);
}

const ptt = document.getElementById('ptt');

ptt.onmousedown = ()=> transmit(true);
ptt.onmouseup = ()=> transmit(false);

ptt.ontouchstart = (e)=>{ e.preventDefault(); transmit(true); }
ptt.ontouchend = (e)=>{ e.preventDefault(); transmit(false); }

function transmit(on){
    muteMic(!on);
}
</script>

</body>
</html>
