<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PeerJS Video Chat with Indicators (Different Networks)</title>
<style>
  body { font-family: Arial, sans-serif; text-align: center; margin-top: 20px; }
  video { width: 45%; margin: 10px; border: 1px solid #ccc; }
  #channelContainer { margin-top: 20px; }
  input { padding: 8px; width: 300px; }
  button { padding: 8px 16px; margin-left: 10px; }
  #status { margin-top: 10px; font-weight: bold; }
  #peerIdSection { margin-top: 20px; }
  #chatBox { width: 90%; height: 150px; border: 1px solid #ccc; overflow-y: auto; margin-top: 10px; padding: 5px; }
  #messageInput { width: 70%; padding: 8px; }
</style>
</head>
<body>

<h2>PeerJS Video Chat (Different Networks)</h2>
<p>Your Peer ID: <span id="myId">Connecting...</span></p>
<div id="status">Status: Connecting...</div>

<div id="channelContainer">
  <h3>Connect to Peer</h3>
  <input type="text" id="peerIdInput" placeholder="Enter Peer ID" />
  <button id="connectBtn">Connect</button>
</div>

<div id="peerIdSection">
  <h3>Your Peer ID (Share this with others)</h3>
  <div style="font-weight: bold; font-size: 1.2em;" id="ownPeerId"></div>
</div>

<div id="videoContainer" style="display:none;">
  <video id="localVideo" autoplay muted></video>
  <video id="remoteVideo" autoplay></video>
</div>

<h3>Channel Chat</h3>
<div id="chatBox"></div>
<input type="text" id="messageInput" placeholder="Type a message" />
<button id="sendBtn">Send</button>

<!-- Include PeerJS library -->
<script src="https://cdn.jsdelivr.net/npm/peerjs@1.3.1/dist/peerjs.min.js"></script>
<script>
const localVideo = document.getElementById('localVideo');
const remoteVideo = document.getElementById('remoteVideo');
const myIdSpan = document.getElementById('myId');
const statusDiv = document.getElementById('status');
const peerIdInput = document.getElementById('peerIdInput');
const connectBtn = document.getElementById('connectBtn');
const chatBox = document.getElementById('chatBox');
const messageInput = document.getElementById('messageInput');
const sendBtn = document.getElementById('sendBtn');
const videoContainer = document.getElementById('videoContainer');
const ownPeerIdDiv = document.getElementById('ownPeerId');

let peer, localStream;
let currentCall = null;
let dataConnection = null;

// 1. Get user media
navigator.mediaDevices.getUserMedia({ video: true, audio: true })
  .then(stream => {
    localStream = stream;
    localVideo.srcObject = stream;
  })
  .catch(err => {
    alert('Error accessing media devices: ' + err);
  });

// 2. Initialize PeerJS with public server (works across different networks)
peer = new Peer(undefined, {
  host: 'peerjs.com',
  port: 443,
  secure: true,
  path: '/'
});

peer.on('open', id => {
  myIdSpan.textContent = id;
  ownPeerIdDiv.textContent = id;
  statusDiv.textContent = 'Status: Ready. Share your Peer ID to connect.';
});

// 3. Handle incoming calls
peer.on('call', call => {
  // Accept the call
  call.answer(localStream);
  currentCall = call;
  call.on('stream', remoteStream => {
    remoteVideo.srcObject = remoteStream;
    videoContainer.style.display = 'block';
    updateStatus('Connected to ' + call.peer);
  });
  call.on('close', () => {
    updateStatus('Call ended');
    remoteVideo.srcObject = null;
  });
});

// 4. Connect to another peer
connectBtn.onclick = () => {
  const peerId = peerIdInput.value.trim();
  if (!peerId) {
    alert('Enter a valid Peer ID.');
    return;
  }
  // Make a call
  const call = peer.call(peerId, localStream);
  currentCall = call;
  call.on('stream', remoteStream => {
    remoteVideo.srcObject = remoteStream;
    videoContainer.style.display = 'block';
    updateStatus('Connected to ' + peerId);
  });
  call.on('close', () => {
    updateStatus('Call ended');
    remoteVideo.srcObject = null;
  });

  // Create data connection for chat
  const conn = peer.connect(peerId);
  setupDataConnection(conn);
};

// 5. Handle incoming data connection
peer.on('connection', conn => {
  setupDataConnection(conn);
  updateStatus('Chat connected with ' + conn.peer);
});

// Function to setup data connection
function setupDataConnection(conn) {
  dataConnection = conn;
  conn.on('data', data => {
    chatBox.innerHTML += `<div><strong>${conn.peer}:</strong> ${data}</div>`;
    chatBox.scrollTop = chatBox.scrollHeight;
  });
}

// 6. Send chat message
sendBtn.onclick = () => {
  const message = messageInput.value.trim();
  if (!message || !dataConnection || dataConnection.open !== true) return;
  chatBox.innerHTML += `<div><strong>You:</strong> ${message}</div>`;
  dataConnection.send(message);
  messageInput.value = '';
};

// 7. Update status indicator
function updateStatus(text) {
  statusDiv.textContent = 'Status: ' + text;
}
</script>

</body>
</html>
