<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OMNI-LINK | HUD V2</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { 
            --neon-blue: #00f2ff; --neon-amber: #ffb000; --neon-red: #ff3131;
            --glass: rgba(20, 20, 25, 0.85); --panel-border: rgba(255, 255, 255, 0.1);
            --bg-dark: #050507;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body { 
            background: var(--bg-dark); color: #fff; 
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; overflow: hidden;
        }

        /* Ambient Background Glow */
        body::before {
            content: ""; position: absolute; width: 300px; height: 300px;
            background: radial-gradient(circle, rgba(0, 242, 255, 0.05) 0%, transparent 70%);
            top: 10%; left: 10%; z-index: -1;
        }

        .container {
            width: 100%; height: 100vh; display: flex; flex-direction: column;
            padding: 15px; gap: 15px; position: relative;
        }

        @media (min-width: 1024px) {
            .container { 
                max-width: 1200px; height: 800px; 
                display: grid; grid-template-columns: 300px 1fr;
                grid-template-areas: "sidebar main";
            }
        }

        /* Glass Panels */
        .panel {
            background: var(--glass); backdrop-filter: blur(10px);
            border: 1px solid var(--panel-border); border-radius: 20px;
            padding: 20px; display: flex; flex-direction: column;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        .sidebar { grid-area: sidebar; gap: 20px; order: 2; }
        .main-display { grid-area: main; flex-grow: 1; order: 1; min-height: 0; }
        @media (min-width: 1024px) { .sidebar { order: 1; } .main-display { order: 2; } }

        /* Typography & Info */
        .label { font-size: 0.65rem; text-transform: uppercase; color: #666; letter-spacing: 2px; margin-bottom: 5px; }
        .stat-value { font-family: monospace; font-size: 0.9rem; color: var(--neon-blue); }

        /* Oscilloscope */
        #visualizer { 
            width: 100%; height: 150px; background: rgba(0, 0, 0, 0.3); 
            border-radius: 12px; margin: 15px 0; border: 1px solid rgba(0, 242, 255, 0.1);
        }

        #output { 
            flex-grow: 1; font-size: 0.8rem; overflow-y: auto; scrollbar-width: none;
            color: rgba(255, 255, 255, 0.6); line-height: 1.6; padding-right: 5px;
        }

        /* Controls */
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        button {
            background: rgba(255, 255, 255, 0.05); border: 1px solid var(--panel-border);
            color: #fff; padding: 12px; border-radius: 12px; cursor: pointer;
            font-size: 0.75rem; font-weight: 600; transition: 0.3s;
        }

        button:hover { background: rgba(255, 255, 255, 0.1); }

        .btn-primary { 
            background: linear-gradient(135deg, #1a1a1a 0%, #000 100%);
            border-color: var(--neon-blue); color: var(--neon-blue);
        }

        .system-on .btn-primary { 
            background: linear-gradient(135deg, #003a3d 0%, #001a1b 100%);
            border-color: var(--neon-blue); box-shadow: 0 0 15px rgba(0, 242, 255, 0.2);
        }

        /* PTT & Beep */
        .comms-block { display: flex; gap: 10px; height: 120px; }
        .btn-ptt { 
            flex: 1; border-radius: 15px; border: 1px solid var(--panel-border);
            background: rgba(255, 255, 255, 0.03); font-size: 1.2rem; font-weight: 800;
            color: rgba(255, 255, 255, 0.2); pointer-events: none;
        }

        .system-on .btn-ptt {
            background: linear-gradient(180deg, var(--neon-red) 0%, #8b0000 100%);
            color: #fff; border: none; pointer-events: auto; opacity: 1;
            box-shadow: 0 5px 20px rgba(255, 49, 49, 0.3);
        }

        .btn-ptt:active { transform: scale(0.96); opacity: 0.8; }

        input {
            background: rgba(0, 0, 0, 0.3); border: 1px solid var(--panel-border);
            color: var(--neon-amber); font-size: 1.5rem; text-align: center;
            padding: 10px; border-radius: 12px; width: 100%; outline: none;
            font-family: monospace;
        }

        /* Indicators */
        .indicator-row { display: flex; justify-content: space-around; margin-bottom: 20px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: #1a1a1c; transition: 0.3s; }
        .active-blue { background: var(--neon-blue); box-shadow: 0 0 10px var(--neon-blue); }
        .active-green { background: #39ff14; box-shadow: 0 0 10px #39ff14; }
        .active-red { background: var(--neon-red); box-shadow: 0 0 10px var(--neon-red); }

        .night-vision { filter: brightness(1.2) contrast(1.2) sepia(100%) hue-rotate(80deg) saturate(200%); }
    </style>
</head>
<body id="root">

<div class="container" id="app-ui">
    <audio id="remoteAudio" autoplay playsinline></audio>

    <aside class="panel sidebar">
        <div>
            <div class="label">System Status</div>
            <div class="indicator-row">
                <div class="led-tag"><div class="dot" id="l-pwr"></div></div>
                <div class="led-tag"><div class="dot" id="l-syn"></div></div>
                <div class="led-tag"><div class="dot" id="l-tx"></div></div>
            </div>
            <div style="display: flex; justify-content: space-between; margin-top: 10px;">
                <div><div class="label">Link</div><div class="stat-value" id="s-stat">OFF</div></div>
                <div><div class="label">Ping</div><div class="stat-value" id="s-ping">--</div></div>
            </div>
        </div>

        <div>
            <div class="label">Frequency</div>
            <input type="number" id="chanInput" value="303">
        </div>

        <button class="btn-primary" id="pwrBtn" onclick="sysToggle()">Initialize Link</button>
        <button onclick="location.reload()">System Reset</button>
    </aside>

    <main class="panel main-display">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <div class="label">Spectral Analysis</div>
            <div class="btn-grid">
                <button onclick="toggleNight()" style="padding: 5px 15px;">HUD</button>
                <button onclick="toggleScramble()" id="btn-scram" style="padding: 5px 15px;">SCRM</button>
            </div>
        </div>

        <canvas id="visualizer"></canvas>

        <div class="label">Uplink Activity Log</div>
        <div id="output"><div>> WAITING FOR POWER CYCLE...</div></div>

        <div class="comms-block" style="margin-top: 20px;">
            <button class="btn-ptt" id="pttBtn">TRANSMIT</button>
            <button id="beepBtn" style="width: 70px; font-weight: bold;" disabled 
                onmousedown="sendBeep(true)" onmouseup="sendBeep(false)" 
                ontouchstart="sendBeep(true)" ontouchend="sendBeep(false)">BP</button>
        </div>
    </main>
</div>

<script>
    let peer, conn, localStream, audioCtx, analyser, speakerGain, scrambleNode;
    let isPowered = false;
    const APP_PREFIX = "TAC-HUD-V2-";

    const PEER_OPTIONS = {
        config: { 'iceServers': [{ 'urls': 'turns:global.relay.metered.ca:443?transport=tcp', 'username': 'ce97feaaa435bc128230c5bd', 'credential': '+qT5rVgsuGkqWX6o' }] },
        iceTransportPolicy: 'relay'
    };

    function log(msg, color="rgba(255,255,255,0.6)") {
        const out = document.getElementById('output');
        out.innerHTML += `<div style="color:${color}">[INFO] ${msg}</div>`;
        out.scrollTop = out.scrollHeight;
    }

    async function sysToggle() {
        if(!isPowered) {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ 
                    audio: { echoCancellation: true, noiseSuppression: true } 
                });
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                
                analyser = audioCtx.createAnalyser();
                speakerGain = audioCtx.createGain();
                speakerGain.gain.value = 0.8;
                analyser.connect(speakerGain);
                speakerGain.connect(audioCtx.destination);
                
                isPowered = true;
                document.getElementById('app-ui').classList.add('system-on');
                document.getElementById('l-pwr').classList.add('active-blue');
                document.getElementById('pwrBtn').innerText = "Shutdown";
                log("UPLINK CORE ACTIVATED", "var(--neon-blue)");
                
                initPeer(APP_PREFIX + document.getElementById('chanInput').value);
                startVisualizer();
            } catch(e) { log("HARDWARE ERROR: " + e.message, "red"); }
        } else { location.reload(); }
    }

    function initPeer(id) {
        peer = new Peer(id, PEER_OPTIONS);
        peer.on('open', () => log("RELAY ACQUIRED. BROADCASTING...", "#39ff14"));
        peer.on('connection', c => { conn = c; setupHandlers(); });
        peer.on('call', call => {
            call.answer(localStream);
            call.on('stream', s => {
                document.getElementById('remoteAudio').srcObject = s;
                audioCtx.createMediaStreamSource(s).connect(analyser);
            });
        });
        peer.on('error', err => { if(err.type==='unavailable-id'){ peer.destroy(); initCaller(id); }});
    }

    function initCaller(tid) {
        peer = new Peer(PEER_OPTIONS);
        peer.on('open', () => {
            conn = peer.connect(tid);
            const call = peer.call(tid, localStream);
            call.on('stream', s => {
                document.getElementById('remoteAudio').srcObject = s;
                audioCtx.createMediaStreamSource(s).connect(analyser);
            });
            setupHandlers();
        });
    }

    function setupHandlers() {
        conn.on('open', () => {
            document.getElementById('l-syn').classList.add('active-green');
            document.getElementById('beepBtn').disabled = false;
            document.getElementById('s-stat').innerText = "ONLINE";
            log("ENCRYPTED LINK SYNCED.");
            setInterval(() => { if(conn) conn.send({type:'ping', ts:Date.now()}); }, 4000);
        });
        conn.on('data', d => {
            if(d === 'TX_ON') document.getElementById('l-tx').classList.add('active-red');
            if(d === 'TX_OFF') document.getElementById('l-tx').classList.remove('active-red');
            if(d === 'BEEP_ON') playBeep(true);
            if(d === 'BEEP_OFF') playBeep(false);
            if(d.type === 'ping') conn.send({type:'pong', ts:d.ts});
            if(d.type === 'pong') document.getElementById('s-ping').innerText = (Date.now() - d.ts) + "ms";
        });
    }

    function toggleNight() { document.getElementById('root').classList.toggle('night-vision'); }

    function toggleScramble() {
        if(!scrambleNode) {
            scrambleNode = audioCtx.createOscillator();
            scrambleNode.type = 'sawtooth'; scrambleNode.frequency.value = 55;
            const g = audioCtx.createGain(); g.gain.value = 0.3;
            scrambleNode.connect(g); g.connect(audioCtx.destination);
            scrambleNode.start();
            document.getElementById('btn-scram').style.color = "var(--neon-blue)";
        } else {
            scrambleNode.stop(); scrambleNode = null;
            document.getElementById('btn-scram').style.color = "#fff";
        }
    }

    function sendBeep(state) {
        if(conn) conn.send(state ? 'BEEP_ON' : 'BEEP_OFF');
        playBeep(state);
    }

    let beepOsc;
    function playBeep(state) {
        if(state) {
            beepOsc = audioCtx.createOscillator();
            beepOsc.type = 'sine'; beepOsc.frequency.setValueAtTime(800, audioCtx.currentTime);
            beepOsc.connect(audioCtx.destination); beepOsc.start();
        } else if(beepOsc) { beepOsc.stop(); beepOsc = null; }
    }

    function startVisualizer() {
        const canvas = document.getElementById('visualizer');
        const ctx = canvas.getContext('2d');
        const dataArray = new Uint8Array(analyser.frequencyBinCount);
        function draw() {
            requestAnimationFrame(draw);
            analyser.getByteTimeDomainData(dataArray);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.lineWidth = 3; ctx.strokeStyle = "#00f2ff";
            ctx.beginPath();
            let sliceWidth = canvas.width / dataArray.length;
            let x = 0;
            for(let i=0; i<dataArray.length; i++) {
                let v = dataArray[i] / 128.0;
                let y = v * canvas.height / 2;
                if(i===0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                x += sliceWidth;
            }
            ctx.stroke();
        }
        draw();
    }

    function muteMic(m) {
        if(localStream) localStream.getAudioTracks().forEach(t => t.enabled = !m);
        if(speakerGain) speakerGain.gain.setTargetAtTime(m ? 0.8 : 0, audioCtx.currentTime, 0.02);
    }

    const ptt = document.getElementById('pttBtn');
    const pttOn = (e) => { if(e) e.preventDefault(); if(!conn) return; muteMic(false); conn.send('TX_ON'); document.getElementById('l-tx').classList.add('active-red'); };
    const pttOff = (e) => { if(e) e.preventDefault(); if(!conn) return; muteMic(true); conn.send('TX_OFF'); document.getElementById('l-tx').classList.remove('active-red'); };

    ptt.addEventListener('touchstart', pttOn); ptt.addEventListener('touchend', pttOff);
    ptt.addEventListener('mousedown', pttOn); ptt.addEventListener('mouseup', pttOff);
</script>
</body>
</html>
