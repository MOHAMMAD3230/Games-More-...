    <style>
        :root { 
            --amber: #ffb000; --bg-lcd: #1a1500; --red: #8c3024; --cyan: #00d4ff; 
            --green: #39ff14; --casing: #2a2a2a; --casing-dark: #1e1e1e;
            --inset: #050505;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        
        body { 
            background: #111; color: var(--amber); font-family: 'Courier New', monospace; 
            display: flex; justify-content: center; align-items: center; 
            margin: 0; touch-action: manipulation; overflow: hidden;
            height: 100vh; height: 100dvh; padding: 10px;
        }

        .radio-container {
            width: 100%; max-width: 400px; 
            height: 100%; max-height: 950px;
            position: relative; display: flex; flex-direction: column;
            filter: drop-shadow(0 25px 50px rgba(0,0,0,0.9));
        }

        @media (min-width: 768px) {
            .radio-container { max-width: 440px; max-height: 920px; }
            .hud-bar, #output { font-size: 0.85rem !important; }
            .ch-readout { font-size: 1.3rem !important; }
            .channel-box input, .sub-box select { font-size: 1.5rem !important; }
            .brand { font-size: 0.9rem !important; }
            .spacebar-hint { display: block !important; opacity: 0.5; }
            .channel-box input::-webkit-outer-spin-button,
            .channel-box input::-webkit-inner-spin-button { -webkit-appearance: auto !important; margin: 0; }
            .channel-box input { -moz-appearance: auto !important; }
            .btn-set:hover:not(:disabled), .btn-prog:hover { background: linear-gradient(180deg, #444, #222) !important; color: #aaa !important; }
        }

        @media (max-width: 767px) {
            .radio-container { max-width: 100%; border-radius: 0; }
            .radio-body { border-radius: 0; border-left: none; border-right: none; }
            .antenna { display: none; }
            .top-led-housing { top: 10px; right: 10px; }
            .spacebar-hint { display: none !important; }
            .z-content { padding: 10px 15px 20px 15px; gap: 10px; }
        }

        .antenna {
            width: 14px; height: 100px; margin: 0 auto -15px; z-index: 10;
            background: linear-gradient(90deg, #0a0a0a, #444 35%, #555 50%, #444 65%, #0a0a0a);
            border-radius: 7px 7px 0 0; position: relative;
        }
        .antenna::before {
            content: ''; position: absolute; top: -8px; left: 50%; transform: translateX(-50%);
            width: 20px; height: 20px; background: radial-gradient(circle at 35% 35%, #666, #1a1a1a);
            border-radius: 50%; border: 2px solid #000;
        }

        .top-led-housing {
            position: absolute; top: 30px; right: 15%; 
            width: 22px; height: 22px; background: #111; border-radius: 50%;
            border: 3px solid #000; box-shadow: inset 0 2px 4px rgba(0,0,0,0.8), 0 1px 0 #333;
            display: flex; align-items: center; justify-content: center; z-index: 20;
            pointer-events: none;
        }
        .top-led {
            width: 12px; height: 12px; border-radius: 50%; background: #1a0500;
            transition: all 0.3s; box-shadow: inset 0 -2px 2px rgba(0,0,0,0.5);
        }
        .top-led.scan { background: #ff0000; box-shadow: 0 0 14px #ff0000, inset 0 0 3px #fff; animation: pulseRed 1s infinite; }
        .top-led.link { background: var(--green); box-shadow: 0 0 14px var(--green), inset 0 0 3px #fff; }
        .top-led.err { background: #ff4400; box-shadow: 0 0 14px #ff4400; animation: pulseRed 0.4s infinite; }
        @keyframes pulseRed { 0%,100% { opacity: 1; } 50% { opacity: 0.2; } }

        .radio-body {
            flex: 1; background: linear-gradient(90deg, var(--casing-dark) 0%, var(--casing) 15%, var(--casing) 85%, var(--casing-dark) 100%);
            border-radius: 20px; border: 3px solid #0a0a0a;
            display: flex; flex-direction: column; position: relative; overflow: hidden;
            box-shadow: inset 2px 0 0 rgba(255,255,255,0.05), inset -2px 0 0 rgba(0,0,0,0.5);
        }

        .metal-band {
            height: 16px; background: linear-gradient(180deg, #555, #222 40%, #444 50%, #222 60%, #111);
            border-top: 1px solid #666; border-bottom: 1px solid #000;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.3);
            position: relative; z-index: 2; flex-shrink: 0;
        }

        .z-content { 
            flex: 1; display: grid; 
            grid-template-rows: auto auto 1fr auto auto; 
            gap: 10px; padding: 15px 20px 25px 20px; position: relative; z-index: 1;
            overflow: hidden; min-height: 0; 
        }

        .controls-top { display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        .brand { font-size: 0.75rem; font-weight: bold; letter-spacing: 3px; color: #555; text-shadow: 1px 1px 0 #000, -1px -1px 0 #333; }
        
        .power-switch {
            width: 46px; height: 46px; border-radius: 50%; cursor: pointer;
            background: radial-gradient(circle at 30% 30%, #aa2020, #500000);
            border: 3px solid #111; box-shadow: 0 4px 0 #220000, inset 0 2px 2px rgba(255,255,255,0.2);
            transition: all 0.1s; position: relative; z-index: 30;
        }
        .power-switch.on { 
            background: radial-gradient(circle at 30% 30%, #30cc30, #004400); 
            box-shadow: 0 4px 0 #002200, 0 0 15px rgba(57, 255, 20, 0.4); 
        }
        .power-switch::after {
            content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 0; height: 16px; border-left: 3px solid rgba(0,0,0,0.8);
            border-top: 9px solid transparent; border-bottom: 9px solid transparent;
        }
        .power-switch:active { transform: translateY(3px) scale(0.95) !important; box-shadow: 0 1px 0 #000; }

        .indicator-strip {
            display: flex; justify-content: space-between; align-items: center;
            background: #0a0a0a; border-radius: 4px; padding: 6px 12px;
            border: 1px solid #111; box-shadow: inset 0 2px 5px rgba(0,0,0,0.9);
            flex-shrink: 0; height: 32px;
        }
        .indicator-group { display: flex; align-items: center; gap: 6px; }
        .ind-label { font-size: 0.5rem; color: #333; font-weight: bold; letter-spacing: 1px; }
        .signal-dots { display: flex; gap: 5px; align-items: center; }
        .sig-dot { width: 9px; height: 9px; border-radius: 50%; background: #111; border: 1px solid #1a1a1a; box-shadow: inset 0 1px 2px rgba(0,0,0,0.8); transition: all 0.3s; }
        .sig-dot.active { background: var(--green); border-color: #00ff00; box-shadow: 0 0 8px var(--green), inset 0 0 2px #fff; }
        .sig-dot.warn { background: var(--amber); border-color: #ffba00; box-shadow: 0 0 8px var(--amber), inset 0 0 2px #fff; }
        .bat-shell { width: 28px; height: 14px; border: 2px solid #222; border-radius: 3px; position: relative; display: flex; align-items: center; padding: 2px; }
        .bat-shell::after { content: ''; position: absolute; right: -6px; top: 50%; transform: translateY(-50%); width: 4px; height: 8px; background: #222; border-radius: 0 2px 2px 0; }
        .bat-fill { height: 100%; width: 100%; background: #111; border-radius: 2px; transition: all 0.3s; }
        .bat-fill.active { background: var(--green); box-shadow: inset 0 0 3px #fff; }

        .screen-bezel { 
            background: var(--inset); border-radius: 8px; padding: 8px;
            border: 3px solid #050505; box-shadow: inset 0 4px 12px rgba(0,0,0,1), 0 1px 0 #333; 
            display: flex; flex-direction: column; min-height: 0; overflow: hidden;
        }
        .screen { 
            background: #020200; border-radius: 4px; padding: 10px;
            flex: 1; display: flex; flex-direction: column; position: relative;
            transition: background 0.5s; overflow: hidden; min-height: 0;
        }
        .screen.on { background: var(--bg-lcd); box-shadow: inset 0 0 20px rgba(255,176,0,0.05); }
        .screen-off-msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #111; font-size: 0.7rem; letter-spacing: 3px; }
        
        .hud-bar { 
            font-size: 0.65rem; display: flex; justify-content: space-between; 
            padding-bottom: 6px; border-bottom: 1px solid rgba(255,176,0,0.1); margin-bottom: 6px; 
            flex-wrap: wrap; gap: 6px; opacity: 0; transition: opacity 0.3s; text-shadow: 0 0 4px rgba(255,176,0,0.3);
            flex-shrink: 0; height: auto;
        }
        .screen.on .hud-bar { opacity: 1; }
        .hud-val { color: var(--cyan); font-weight: bold; }
        .hud-val.ok { color: var(--green); } .hud-val.warn { color: var(--amber); } .hud-val.err { color: #f44; }
        
        #output { 
            flex: 1; overflow-y: auto; font-size: 0.7rem; scrollbar-width: none; line-height: 1.6; 
            opacity: 0; transition: opacity 0.3s; text-shadow: 0 0 3px rgba(255,176,0,0.2); min-height: 0;
        }
        .screen.on #output { opacity: 1; }
        #output::-webkit-scrollbar { display: none; }
        .log-line { padding: 1px 0; animation: logIn 0.1s ease-out; }
        @keyframes logIn { from { opacity: 0; } to { opacity: 1; } }
        
        .meter-container { margin-top: 8px; opacity: 0; transition: opacity 0.3s; flex-shrink: 0; height: 12px; }
        .screen.on .meter-container { opacity: 1; }
        #meter { width: 100%; height: 10px; background: #000; border: 1px solid #222; border-radius: 2px; position: relative; }
        #meter-fill { width: 0%; height: 100%; background: linear-gradient(90deg, var(--green) 0%, var(--amber) 80%, #f44 100%); transition: width 0.08s; border-radius: 2px; }

        .controls-mid { opacity: 0.2; pointer-events: none; transition: all 0.3s; flex-shrink: 0; }
        .controls-mid.active { opacity: 1; pointer-events: auto; }
        
        .ch-readout {
            background: #000; border: 2px solid #111; border-radius: 4px;
            padding: 8px; text-align: center; margin-bottom: 10px;
            box-shadow: inset 0 2px 6px rgba(0,0,0,0.9), 0 1px 0 #333;
            font-size: 1.1rem; color: var(--cyan); letter-spacing: 3px;
            text-shadow: 0 0 6px rgba(0, 212, 255, 0.5);
            font-weight: bold; height: 40px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }

        .channel-row { display: flex; gap: 10px; align-items: stretch; }
        .channel-box { flex: 2; background: #000; border: 2px solid #222; border-radius: 4px; box-shadow: inset 0 2px 5px rgba(0,0,0,0.9); display: flex; flex-direction: column; flex-shrink: 0; }
        .sub-box { flex: 1; background: #000; border: 2px solid #222; border-radius: 4px; overflow: hidden; box-shadow: inset 0 2px 5px rgba(0,0,0,0.9); display: flex; flex-direction: column; flex-shrink: 0; }
        
        .ctrl-label { font-size: 0.5rem; color: #444; text-align: center; padding: 5px 0 2px 0; text-transform: uppercase; letter-spacing: 2px; font-weight: bold; border-bottom: 1px solid #111; background: #0a0a0a; flex-shrink: 0; }
        
        .channel-box input {
            width: 100%; background: transparent; border: none; color: var(--cyan); padding: 10px;
            text-align: center; font-family: inherit; font-size: 1.4rem; letter-spacing: 3px; outline: none;
            text-shadow: 0 0 5px rgba(0,212,255,0.4); -moz-appearance: textfield; height: 100%; flex: 1;
        }
        .channel-box input::-webkit-outer-spin-button,
        .channel-box input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        
        .sub-box select {
            width: 100%; background: #000; color: var(--cyan); border: none; padding: 10px 5px;
            font-family: inherit; font-size: 1.1rem; outline: none; text-align: center; cursor: pointer;
            text-shadow: 0 0 5px rgba(0,212,255,0.4); -webkit-appearance: none; font-weight: bold; height: 100%; flex: 1;
        }
        
        .btn-action-row { display: flex; gap: 8px; margin-top: 10px; flex-shrink: 0; height: 44px; }
        .btn-set, .btn-prog { 
            flex: 1; padding: 10px; background: linear-gradient(180deg, #333, #111); 
            color: #666; border: 2px solid #222; font-weight: bold; font-size: 0.7rem; 
            cursor: pointer; font-family: inherit; letter-spacing: 2px; border-radius: 4px; 
            box-shadow: 0 4px 0 #000, inset 0 1px 0 rgba(255,255,255,0.1); text-transform: uppercase;
        }
        .btn-set:active:not(:disabled), .btn-prog:active { transform: translateY(4px); box-shadow: 0 0 0 #000; }
        .btn-set:disabled { opacity: 0.3; cursor: default; }

        .controls-bottom { padding-top: 12px; border-top: 2px solid #111; flex-shrink: 0; }
        .btn-ptt { 
            width: 100%; height: 115px; color: rgba(255,255,255,0.6); border: none; 
            font-weight: bold; font-size: 1.3rem; cursor: pointer; font-family: inherit; 
            letter-spacing: 5px; border-radius: 8px; text-shadow: 0 2px 4px rgba(0,0,0,0.8);
            opacity: 0.3; pointer-events: none; flex-shrink: 0;
            background: repeating-linear-gradient(0deg, #3a3a3a 0px, #3a3a3a 4px, #2a2a2a 4px, #2a2a2a 8px);
            box-shadow: inset 0 2px 0 rgba(255,255,255,0.1), inset 0 -2px 0 rgba(0,0,0,0.8), 0 8px 0 #111;
            transition: all 0.05s;
        }
        .btn-ptt.active { opacity: 1; pointer-events: auto; }
        .btn-ptt:active:not(:disabled) { 
            background: repeating-linear-gradient(0deg, #5a2020 0px, #5a2020 4px, #401515 4px, #401515 8px);
            transform: translateY(6px); box-shadow: 0 2px 0 #111; color: #fff; text-shadow: 0 0 10px #ff0000;
        }
        .btn-ptt:disabled { background: #151515; color: #222; cursor: default; transform: none; box-shadow: 0 8px 0 #000; }

        .spacebar-hint { display: none; text-align: center; font-size: 0.5rem; color: #333; margin-top: 8px; letter-spacing: 1px; }

        .led-bar { display: flex; justify-content: space-around; margin-top: 15px; }
        .led-group { display: flex; align-items: center; gap: 6px; font-size: 0.55rem; color: #444; font-weight: bold; }
        .led { width: 12px; height: 12px; border-radius: 50%; background: #0a0a0a; border: 2px solid #222; box-shadow: inset 0 -2px 2px rgba(0,0,0,0.9), 0 1px 1px #000; transition: all 0.2s; }
        .led.on { background: var(--cyan); border-color: #00a0a0; box-shadow: 0 0 10px var(--cyan), inset 0 0 3px #fff; }
        .led.tx { background: #ff0000; border-color: #aa0000; box-shadow: 0 0 14px #ff0000, inset 0 0 3px #fff; }
        .led.rx { background: var(--green); border-color: #00aa00; box-shadow: 0 0 14px var(--green), inset 0 0 3px #fff; }
        .led.blink { animation: ledBlink 1s infinite; }
        @keyframes ledBlink { 0%,100% { opacity: 1; } 50% { opacity: 0.2; } }

        .settings-modal {
            position: absolute; inset: 0; background: rgba(0,0,0,0.97); z-index: 200; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: opacity 0.2s; border-radius: 20px; border: 4px solid var(--cyan);
        }
        .settings-modal.open { opacity: 1; pointer-events: auto; }
        .modal-title { font-size: 1.2rem; color: var(--cyan); letter-spacing: 5px; margin-bottom: 30px; text-shadow: 0 0 10px var(--cyan); border-bottom: 2px solid var(--cyan); padding-bottom: 10px; }
        .toggle-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; width: 80%; font-size: 0.85rem; color: #aaa; }
        .toggle-switch { position: relative; display: inline-block; width: 46px; height: 26px; flex-shrink: 0; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .3s; border-radius: 26px; border: 2px solid #555; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 2px; bottom: 2px; background-color: white; transition: .3s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--green); border-color: var(--green); }
        input:checked + .slider:before { transform: translateX(20px); }
        .btn-modal { width: 80%; padding: 16px; margin-top: 10px; background: transparent; font-family: inherit; font-weight: bold; letter-spacing: 3px; cursor: pointer; border-radius: 6px; text-transform: uppercase; transition: 0.2s; }
        .btn-exit { color: var(--cyan); border: 2px solid var(--cyan); font-size: 1rem; }
        .btn-exit:hover { background: rgba(0,212,255,0.1); }
        .btn-reset-sys { color: #f44; border: 2px solid #600; font-size: 0.75rem; margin-top: 25px; }
        .btn-reset-sys:hover { background: rgba(255,0,0,0.1); }
    </style>

    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-K98KWTPT"

    <div class="radio-container">
        <div class="antenna"></div>
        <div class="top-led-housing"><div class="top-led" id="topLed"></div></div>
        
        <div class="radio-body">

            <audio id="remoteAudio" autoplay playsinline style="display:none;"></audio>

            <div class="z-content">
                <div class="controls-top">
                    <div class="brand">TAC/COM-04</div>
                    <div class="power-switch" id="powerBtn"></div>
                </div>

                <div class="indicator-strip">
                    <div class="indicator-group">
                        <span class="ind-label">SIG</span>
                        <div class="signal-dots">
                            <div class="sig-dot" id="sig1"></div><div class="sig-dot" id="sig2"></div>
                            <div class="sig-dot" id="sig3"></div><div class="sig-dot" id="sig4"></div>
                        </div>
                    </div>
                    <div class="indicator-group">
                        <span class="ind-label">PWR</span>
                        <div class="bat-shell"><div class="bat-fill" id="batLvl"></div></div>

                </div>

                <div class="screen-bezel">
                    <div class="screen" id="screen">
                        <div class="screen-off-msg" id="offMsg">STANDBY</div>

                            <span>FRQ: <span class="hud-val" id="curFreq">---</span></span>

                            <div class="ctrl-label">Channel</div>
                            <input type="number" id="chanInput" value="1" min="1" max="999" disabled inputmode="numeric" autocomplete="off">
                        </div>
                        <div class="sub-box">
                            <div class="ctrl-label">Grp</div>
                            <select id="subChan" disabled autocomplete="off">
                                <option value="A">A</option><option value="B">B</option>
                                <option value="C">C</option><option value="D">D</option>
                            </select>
                        </div>
                    </div>
                    <div class="btn-action-row">
                        <button class="btn-set" id="bootBtn" disabled>CONNECT</button>
                        <button class="btn-prog" id="gearBtn" disabled>PROG</button>

                </div>

                <div class="controls-bottom">
                    <button class="btn-ptt" id="pttBtn" disabled>TRANSMIT</button>
                    <div class="spacebar-hint">[ HOLD SPACEBAR TO TALK ]</div>

                        <div class="led-group"><span class="led" id="ledScan"></span>ACQ</div>
                    </div>
                </div>
            </div>

            <div class="metal-band" style="box-shadow: inset 0 -1px 0 rgba(255,255,255,0.3), inset 0 1px 0 #000;"></div>

            <div class="settings-modal" id="settingsModal">
                <div class="modal-title">PROGRAM MODE</div>
                <div class="toggle-row">ROGER BEEP (END OF TX)<label class="toggle-switch"><input type="checkbox" id="togRoger" checked><span class="slider"></span></label></div>
                <div class="toggle-row">VOX LED (REMOTE AUDIO)<label class="toggle-switch"><input type="checkbox" id="togVox" checked><span class="slider"></span></label></div>
                <button class="btn-modal btn-exit" id="btnExitSettings">[ EXIT ]</button>
                <button class="btn-modal btn-reset-sys" id="btnResetSys">DISCONNECT & RESET</button>
            </div>
        </div>
    </div>

<script>
    var APP_PREFIX = "TACCOM4-";
    
    /* METERED_ICE_CONFIG with corrected typo in relay URL (was 'relap', now 'relay') */
    var METERED_ICE_CONFIG = {
        iceServers: [
            { urls: "stun:stun.relay.metered.ca:80" },
            { urls: "turn:global.relay.metered.ca:80", username: "ce97feaaa435bc128230c5bd", credential: "+qT5rVgsuGkqWX6o" },
            { urls: "turn:global.relay.metered.ca:80?transport=tcp", username: "ce97feaaa435bc128230c5bd", credential: "+qT5rVgsuGkqWX6o" },
            { urls: "turn:global.relay.metered.ca:443", username: "ce97feaaa435bc128230c5bd", credential: "+qT5rVgsuGkqWX6o" },
            { urls: "turns:global.relay.metered.ca:443?transport=tcp", username: "ce97feaaa435bc128230c5bd", credential: "+qT5rVgsuGkqWX6o" }
        ], 
        iceCandidatePoolSize: 10
    };

    var isPoweredOn = false, channelNum = null, subChan = 'A';
    var peer = null, conn = null, activeCall = null, localStream = null;
    var audioCtx, delayNode, analyser, speakerGain, remoteAnalyser;
    var state = 'IDLE', myRole = null, scanTimer = null, scanCount = 0;

    /* ── Input sanitization ── */
    function sanitizeInput(val, maxLen) {
        maxLen = maxLen || 3;
        if (typeof val !== 'string') return '1';
        return val.replace(/[^0-9]/g, '').substring(0, maxLen) || '1';
    }

    /* ── Event wiring ── */
    document.getElementById('powerBtn').addEventListener('click', togglePower);
    document.getElementById('bootBtn').addEventListener('click', initChannel);
    document.getElementById('gearBtn').addEventListener('click', toggleSettings);
    document.getElementById('btnExitSettings').addEventListener('click', toggleSettings);
    document.getElementById('btnResetSys').addEventListener('click', function() { fullReset(false); });
    document.getElementById('chanInput').addEventListener('input', updateChReadout);
    document.getElementById('subChan').addEventListener('change', updateChReadout);

    function updateChReadout() {
        var num = sanitizeInput(document.getElementById('chanInput').value, 3);
        var grp = document.getElementById('subChan').value;
        document.getElementById('chReadout').textContent = 'CH ' + num.padStart(3, '0') + ' - GRP ' + grp;
    }

    /* ── Power toggle ── */
    function togglePower() {
        isPoweredOn = !isPoweredOn;
        var btn = document.getElementById('powerBtn');
        var screen = document.getElementById('screen');
        var offMsg = document.getElementById('offMsg');
        var controls = document.getElementById('controlsMid');
        var ptt = document.getElementById('pttBtn');
        var gear = document.getElementById('gearBtn');
        var inputs = document.querySelectorAll('#chanInput, #subChan');

        if (isPoweredOn) {
            btn.classList.add('on');
            screen.classList.add('on');
            offMsg.style.display = 'none';
            controls.classList.add('active');
            ptt.classList.add('active');
            gear.classList.remove('active');
            inputs.forEach(function(i) { i.disabled = false; });
            document.getElementById('bootBtn').disabled = false;
            document.getElementById('topLed').className = 'top-led scan';
            updateChReadout();
            log('SYSTEM BOOT...', '#39ff14');
            setStatus('READY', 'warn');
            playBootBeep();
        } else {
            btn.classList.remove('on');
            screen.classList.remove('on');
            offMsg.style.display = 'block';
            controls.classList.remove('active');
            ptt.classList.remove('active');
            gear.classList.remove('active');
            inputs.forEach(function(i) { i.disabled = true; });
            document.getElementById('bootBtn').disabled = true;
            document.getElementById('topLed').className = 'top-led';
            resetIndicators();
            fullReset(true);
        }
    }

    /* ── Indicators ── */
    function resetIndicators() { 
        updateSignalBars(0); 
        document.getElementById('batLvl').classList.remove('active'); 
    }

    function updateSignalBars(count, type) {
        type = type || 'active';
        for (var i = 1; i <= 4; i++) {
            var bar = document.getElementById('sig' + i);
            bar.className = 'sig-dot';
            if (state === 'LINKED' && i <= count) bar.classList.add(type);
        }
        var bat = document.getElementById('batLvl');
        if (state === 'LINKED') bat.classList.add('active'); 
        else bat.classList.remove('active');
    }

    /* ── Audio feedback ── */
    function playBootBeep() { 
        setTimeout(function() { playTone(800, 0.05); }, 100); 
        setTimeout(function() { playTone(1200, 0.1); }, 200); 
    }

    function playTone(freq, dur) {
        try {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            var o = audioCtx.createOscillator();
            var g = audioCtx.createGain();
            o.frequency.value = freq;
            g.gain.value = 0.05;
            o.connect(g);
            g.connect(audioCtx.destination);
            o.start();
            g.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + dur);
            o.stop(audioCtx.currentTime + dur + 0.05);
        } catch (e) {}
    }

    /* ── Settings modal ── */
    function toggleSettings() { 
        var modal = document.getElementById('settingsModal');
        modal.classList.toggle('open'); 
        if (modal.classList.contains('open')) playTone(600, 0.05);
    }

    /* ── Peer helpers ── */
    function getPeerOptions(id) { 
        var o = { config: METERED_ICE_CONFIG, debug: 0, secure: true }; 
        if (id) o.id = id; 
        return o; 
    }

    function getFullChannelId() { return APP_PREFIX + channelNum + subChan; }

    /* ── Logging ── */
    function log(msg, color) {
        if (!isPoweredOn) return;
        color = color || '#ffb000';
        var div = document.createElement('div'); 
        div.className = 'log-line'; 
        div.style.color = color; 
        div.textContent = '> ' + msg; 
        var out = document.getElementById('output'); 
        out.appendChild(div); 
        out.scrollTop = out.scrollHeight;
        while (out.children.length > 80) out.removeChild(out.firstChild);
    }

    function setStatus(t, c) { 
        var e = document.getElementById('stat'); 
        e.textContent = t; 
        e.className = 'hud-val' + (c ? ' ' + c : ''); 
    }

    function setScanLed(on) { 
        var el = document.getElementById('ledScan');
        el.classList.toggle('blink', on); 
        el.classList.toggle('on', on); 
    }
    
    function updateTypeDisplay(type) {
        var el = document.getElementById('routeType');
        var map = { host: 'LOCAL', srflx: 'P2P', relay: 'RELAY', prflx: 'P2P' };
        el.textContent = map[type] || type || '--'; 
        el.className = 'hud-val ok';
        if (type === 'srflx' || type === 'prflx') updateSignalBars(4); 
        if (type === 'relay') updateSignalBars(2, 'warn');
    }

    function vibrate(ms) { if (navigator.vibrate) navigator.vibrate(ms); }

    /* ── State machine ── */
    function transitionState(newState) {
        state = newState;
        if (newState === 'SCANNING') {
            clearScanTimer();
            setScanLed(true); 
            setStatus('SCANNING', 'warn');
            document.getElementById('topLed').className = 'top-led scan'; 
            updateSignalBars(0);
            scanCount++;
            if (scanCount === 1 || scanCount % 5 === 0) log('SCAN #' + scanCount + ' [' + myRole + ']', '#333');
            scanTimer = setTimeout(function() { executeAttempt(); }, 2500);
        }
        if (newState === 'ATTEMPTING') executeAttempt();
        if (newState === 'LINKED') {
            clearScanTimer();
            setScanLed(false); 
            setStatus('CONNECTED', 'ok');
            document.getElementById('topLed').className = 'top-led link';
            document.getElementById('ledNet').classList.add('on');
            document.getElementById('pttBtn').disabled = false;
            document.getElementById('pttBtn').textContent = 'TRANSMIT';
            document.getElementById('gearBtn').classList.add('active');
            log('VOICE LINK ESTABLISHED', '#39ff14');
            vibrate(200);
        }
    }

    function clearScanTimer() {
        if (scanTimer) { clearTimeout(scanTimer); scanTimer = null; }
    }

    function executeAttempt() {
        if (state !== 'ATTEMPTING' || !peer || peer.destroyed || !isPoweredOn) { 
            if (isPoweredOn) transitionState('SCANNING'); 
            return; 
        }

        if (conn && !conn.open) try { conn.close(); } catch(e) {} 
        conn = null;
        if (activeCall) try { activeCall.close(); } catch(e) {} 
        activeCall = null;

        var targetId = getFullChannelId();
        try { 
            conn = peer.connect(targetId, { reliable: true }); 
            setupConnHandlers(conn); 
        } catch(e) { 
            transitionState('SCANNING'); 
            return; 
        }

        try { 
            if (localStream) { 
                activeCall = peer.call(targetId, localStream); 
                if (activeCall) { 
                    activeCall.on('stream', function(stream) { attachStream(stream); }); 
                    (function(call) {
                        setTimeout(function() { 
                            if (call && call.peerConnection) monitorIce(call.peerConnection); 
                        }, 500);
                    })(activeCall);
                } 
            } 
        } catch(e) {}

        setTimeout(function() { 
            if (state === 'ATTEMPTING' && isPoweredOn) { 
                if (conn && !conn.open) try { conn.close(); } catch(e) {} 
                if (activeCall) try { activeCall.close(); } catch(e) {} 
                transitionState('SCANNING'); 
            } 
        }, 12000);
    }

    function monitorIce(pc) {
        if (!pc) return;
        pc.oniceconnectionstatechange = function() { 
            var s = pc.iceConnectionState; 
            log('ICE: ' + s, s === 'connected' ? '#39ff14' : s === 'failed' ? '#f44' : '#555'); 
            if (s === 'failed') document.getElementById('topLed').className = 'top-led err'; 
        };
        setInterval(function() { 
            if (!pc || pc.connectionState === 'closed') return; 
            pc.getStats().then(function(stats) { 
                stats.forEach(function(r) { 
                    if (r.type === 'candidate-pair' && r.state === 'succeeded') { 
                        var l = stats.get(r.localCandidateId); 
                        if (l && l.candidateType) updateTypeDisplay(l.candidateType); 
                    } 
                }); 
            }).catch(function() {}); 
        }, 3000);
    }

    /* ── Channel init ── */
    async function initChannel() {
        if (!isPoweredOn) return;
        var rawNum = sanitizeInput(document.getElementById('chanInput').value, 3);
        subChan = document.getElementById('subChan').value;
        if (!rawNum || rawNum < 1) { log('INVALID FREQ', '#f44'); return; }
        
        channelNum = rawNum; 
        myRole = 'HOST'; 
        scanCount = 0;
        document.getElementById('bootBtn').disabled = true;
        document.getElementById('bootBtn').textContent = 'SYNCING...';
        log('ACCESSING MIC...', '#00d4ff');
        
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ 
                audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: true } 
            });
            muteMic(true);
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            speakerGain = audioCtx.createGain(); 
            speakerGain.gain.value = 1;
            delayNode = audioCtx.createDelay(5.0); 
            delayNode.delayTime.value = 1.5;
            analyser = audioCtx.createAnalyser(); 
            analyser.fftSize = 256;
            remoteAnalyser = audioCtx.createAnalyser(); 
            remoteAnalyser.fftSize = 256;
            delayNode.connect(analyser); 
            analyser.connect(speakerGain); 
            speakerGain.connect(audioCtx.destination);
            
            document.getElementById('curFreq').textContent = rawNum.padStart(3, '0') + subChan;
            updateMeter(); 
            updateVox();
            log('TUNING CH-' + rawNum.padStart(3, '0') + ' GRP-' + subChan, '#00d4ff');
            initPeer(getFullChannelId());
        } catch (e) { 
            log('MIC ERR: ' + e.message, '#f44'); 
            document.getElementById('bootBtn').disabled = false; 
            document.getElementById('bootBtn').textContent = 'CONNECT'; 
        }
    }

    function initPeer(myId) {
        cleanupConnections(); 
        state = 'REGISTERING'; 
        setStatus('REG', 'warn');
        
        var opts = getPeerOptions(myId);
        peer = new Peer(opts);
        
        peer.on('open', function(id) { 
            log('REGISTERED [' + id + ']', '#39ff14'); 
            transitionState('SCANNING'); 
        });
        
        peer.on('connection', function(c) { 
            log('HANDSHAKE IN', '#00d4ff'); 
            clearScanTimer(); 
            setScanLed(false); 
            if (conn && !conn.open) try { conn.close(); } catch(e) {} 
            conn = c; 
            setupConnHandlers(c); 
        });
        
        peer.on('call', function(call) { 
            log('INCOMING VOICE', '#00d4ff');
            if (activeCall) try { activeCall.close(); } catch(e) {} 
            activeCall = call; 
            call.answer(localStream); 
            call.on('stream', function(stream) { attachStream(stream); }); 
            (function(c) {
                setTimeout(function() { if (c.peerConnection) monitorIce(c.peerConnection); }, 500);
            })(call);
        });
        
        peer.on('disconnected', function() { 
            log('SIGNAL LOST', '#ffb000'); 
            setStatus('RECONN', 'err'); 
            if (peer && !peer.destroyed) {
                try { peer.reconnect(); } catch(e) {}
            }
        });
        
        peer.on('error', function(err) {
            if (err.type === 'unavailable-id') { 
                log('CH TAKEN -> CALLER', '#ffb000'); 
                if (peer) try { peer.destroy(); } catch(e) {} 
                peer = null; 
                myRole = 'CALLER'; 
                setTimeout(function() { initPeer(null); }, 500); 
            }
            else if (err.type === 'peer-unavailable') { 
                /* Expected during scanning */
            }
            else if (err.type === 'network' || err.type === 'server-error' || err.type === 'socket-error' || err.type === 'socket-closed') { 
                log('SIGNAL ERR [' + err.type + ']', '#f44'); 
            }
            else if (err.type === 'webrtc') {
                log('WEBRTC ERR', '#f44');
            }
        });
    }

    function setupConnHandlers(c) {
        if (!c) return;
        c.on('open', function() { transitionState('LINKED'); });
        c.on('data', function(data) {
            if (typeof data !== 'string') return;
            if (data === 'TX_ON') document.getElementById('ledTx').classList.add('tx');
            if (data === 'TX_OFF') { 
                document.getElementById('ledTx').classList.remove('tx'); 
                if (document.getElementById('togRoger').checked) { 
                    setTimeout(function() { playTone(600, 0.1); }, 100); 
                    setTimeout(function() { playTone(900, 0.1); }, 200); 
                } 
            }
        });
        c.on('close', function() {
            if (state === 'LINKED') {
                log('LINK LOST', '#f44'); 
                document.getElementById('ledNet').classList.remove('on'); 
                document.getElementById('pttBtn').disabled = true; 
                document.getElementById('pttBtn').textContent = 'TRANSMIT';
                document.getElementById('gearBtn').classList.remove('active');
                setStatus('LOST', 'err'); 
                scanCount = 0; 
                resetIndicators();
                document.getElementById('topLed').className = 'top-led scan';
                setTimeout(function() { 
                    if (peer && !peer.destroyed && channelNum && state === 'LINKED') { 
                        state = 'IDLE'; 
                        transitionState('SCANNING'); 
                    } 
                }, 2000);
            }
        });
        c.on('error', function(err) {
            log('DATA ERR: ' + err, '#f44');
        });
    }

    function attachStream(stream) {
        document.getElementById('remoteAudio').srcObject = stream;
        try { 
            audioCtx.createMediaStreamSource(stream).connect(remoteAnalyser); 
            remoteAnalyser.connect(delayNode); 
            log('AUDIO SYNCED', '#39ff14'); 
        } catch(e) {}
    }

    function muteMic(m) { 
        if (localStream) localStream.getAudioTracks().forEach(function(t) { t.enabled = !m; }); 
        if (speakerGain) speakerGain.gain.setValueAtTime(m ? 1 : 0, audioCtx.currentTime); 
    }

    /* ── Audio visualization ── */
    function updateMeter() {
        if (!analyser) { requestAnimationFrame(updateMeter); return; }
        var d = new Uint8Array(analyser.frequencyBinCount); 
        analyser.getByteFrequencyData(d);
        var sum = 0;
        for (var i = 0; i < d.length; i++) sum += d[i];
        document.getElementById('meter-fill').style.width = Math.min(100, (sum / d.length) * 4) + '%';
        requestAnimationFrame(updateMeter);
    }

    function updateVox() {
        if (!remoteAnalyser) { requestAnimationFrame(updateVox); return; }
        var rxLed = document.getElementById('ledRx');
        if (!document.getElementById('togVox').checked || state !== 'LINKED') { 
            rxLed.classList.remove('rx'); 
            requestAnimationFrame(updateVox); 
            return; 
        }
        var d = new Uint8Array(remoteAnalyser.frequencyBinCount); 
        remoteAnalyser.getByteFrequencyData(d);
        var sum = 0;
        for (var i = 0; i < d.length; i++) sum += d[i];
        if ((sum / d.length) > 10) rxLed.classList.add('rx'); 
        else rxLed.classList.remove('rx');
        requestAnimationFrame(updateVox);
    }
    requestAnimationFrame(updateVox);

    /* ── PTT controls ── */
    var pttBtn = document.getElementById('pttBtn');
    function isInputFocused() { 
        var t = document.activeElement ? document.activeElement.tagName : ''; 
        return t === 'INPUT' || t === 'SELECT' || t === 'TEXTAREA'; 
    }

    function pttOn() { 
        if (!conn || !conn.open || pttBtn.disabled || isInputFocused()) return; 
        muteMic(false); 
        try { conn.send('TX_ON'); } catch(e) {} 
        document.getElementById('ledTx').classList.add('tx'); 
        pttBtn.textContent = 'TX ACTIVE'; 
        playTone(1200, 0.05); 
        vibrate(50); 
    }

    function pttOff() { 
        if (!conn || !conn.open || pttBtn.disabled) return; 
        muteMic(true); 
        try { conn.send('TX_OFF'); } catch(e) {} 
        document.getElementById('ledTx').classList.remove('tx'); 
        pttBtn.textContent = 'TRANSMIT'; 
        vibrate(30); 
    }

    pttBtn.addEventListener('mousedown', function(e) { e.preventDefault(); pttOn(); });
    pttBtn.addEventListener('mouseup', function(e) { e.preventDefault(); pttOff(); });
    pttBtn.addEventListener('mouseleave', function() { if (pttBtn.matches(':active')) pttOff(); });
    pttBtn.addEventListener('touchstart', function(e) { e.preventDefault(); pttOn(); }, { passive: false });
    pttBtn.addEventListener('touchend', function(e) { e.preventDefault(); pttOff(); }, { passive: false });
    pttBtn.addEventListener('touchcancel', function(e) { e.preventDefault(); pttOff(); }, { passive: false });

    document.addEventListener('keydown', function(e) { 
        if (e.code === 'Space' && !e.repeat && !isInputFocused()) { e.preventDefault(); pttOn(); } 
    });
    document.addEventListener('keyup', function(e) { 
        if (e.code === 'Space' && !isInputFocused()) { e.preventDefault(); pttOff(); } 
    });

    /* ── Cleanup ── */
    function cleanupConnections() {
        clearScanTimer();
        if (activeCall) try { activeCall.close(); } catch(e) {} 
        activeCall = null;
        if (conn) try { conn.close(); } catch(e) {} 
        conn = null;
        setScanLed(false);
        ['ledNet', 'ledTx', 'ledRx'].forEach(function(id) { 
            document.getElementById(id).className = 'led'; 
        });
        document.getElementById('pttBtn').disabled = true;
    }

    function fullReset(silent) {
        cleanupConnections();
        if (peer) try { peer.destroy(); } catch(e) {} 
        peer = null;
        if (localStream) { localStream.getTracks().forEach(function(t) { t.stop(); }); localStream = null; }
        if (!isPoweredOn && audioCtx) { try { audioCtx.close(); } catch(e) {} audioCtx = null; }
        channelNum = null; 
        myRole = null; 
        state = 'IDLE'; 
        scanCount = 0;
        document.getElementById('bootBtn').disabled = !isPoweredOn;
        document.getElementById('bootBtn').textContent = 'CONNECT';
        document.getElementById('curFreq').textContent = '---';
        document.getElementById('pttBtn').textContent = 'TRANSMIT';
        document.getElementById('gearBtn').classList.remove('active');
        setStatus(isPoweredOn ? 'READY' : 'OFF', isPoweredOn ? 'warn' : '');
        document.getElementById('routeType').textContent = '---';
        document.getElementById('routeType').className = 'hud-val';
        document.getElementById('meter-fill').style.width = '0%';
        resetIndicators();
        document.getElementById('settingsModal').classList.remove('open');
        if (!silent) document.getElementById('output').innerHTML = '<div class="log-line">> SYSTEM RESET.</div>';
        else document.getElementById('output').innerHTML = '';
    }
</script>
</body>
