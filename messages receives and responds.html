<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PeerJS Cross-Device Mesh Chat</title>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<style>
body { background:#000; color:#ffb000; font-family:monospace; margin:0; padding:0; display:flex; flex-direction:column; height:100vh; }
.console { flex:1; overflow-y:auto; padding:10px; background:#080808; }
.entry { margin-bottom:6px; }
.ts { color:#555; margin-right:6px; }
.local { color:#39ff14; font-weight:bold; }
.remote { color:#00d4ff; font-weight:bold; }
.controls { display:flex; background:#111; padding:10px; gap:10px; }
input { flex:1; padding:8px; background:#000; border:1px solid #333; color:#ffb000; }
button { padding:8px 12px; background:#222; border:1px solid #ffb000; color:#ffb000; cursor:pointer; }
button:active { background:#ffb000; color:#000; }
#status { font-weight:bold; margin-left:6px; }
</style>
</head>
<body>

<div class="console" id="console">
    <div class="entry">> Chat system ready. Enter a channel number (1-99) to start.</div>
</div>

<div class="controls" id="setup">
    <input type="number" id="chanInput" placeholder="Channel 1-99" min="1" max="99">
    <button onclick="initLink()">Initialize Link</button>
    <span>STATUS: <span id="status">OFFLINE</span></span>
</div>

<div class="controls" id="chat" style="display:none;">
    <input type="text" id="msgInput" placeholder="Enter message..." onkeypress="checkEnter(event)">
    <button onclick="sendMsg()">Send</button>
    <span>STATUS: <span id="status2">CONNECTED</span></span>
</div>

<script>
let peer, conn;
const PREFIX = "PEERCHAT-";

// Logging function
function log(msg, className="") {
    const consoleEl = document.getElementById('console');
    const div = document.createElement('div');
    div.className = 'entry ' + className;
    const time = new Date().toLocaleTimeString([], {hour12:false});
    div.innerHTML = `<span class="ts">[${time}]</span> ${msg}`;
    consoleEl.appendChild(div);
    consoleEl.scrollTop = consoleEl.scrollHeight;
}

// Initialize PeerJS link
function initLink() {
    const chan = document.getElementById('chanInput').value;
    if(!chan) return alert("Enter a channel 1-99!");

    const myId = PREFIX + chan;
    log(`Tuning to channel ${chan}...`);

    peer = new Peer(myId, {
        config: { 'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }] }
    });

    peer.on('open', id => {
        log(`Broadcasting on channel ${chan}. Waiting for peer...`);
        document.getElementById('status').innerText = "LISTENING";
    });

    // Incoming connection
    peer.on('connection', c => {
        conn = c;
        bindEvents();
    });

    // If channel busy, try to join
    peer.on('error', err => {
        if(err.type === 'unavailable-id') {
            log("Channel occupied. Attempting to join...");
            peer.destroy();
            joinLink(myId);
        } else {
            log(`ERROR: ${err.type}`, "remote");
        }
    });

    document.getElementById('setup').style.display = "none";
}

// Join existing channel
function joinLink(targetId) {
    peer = new Peer(); // Random ID
    peer.on('open', () => {
        conn = peer.connect(targetId);
        bindEvents();
    });
}

// Bind connection events
function bindEvents() {
    conn.on('open', () => {
        log("Uplink established. You can now chat.", "local");
        document.getElementById('chat').style.display = "flex";
        document.getElementById('status2').innerText = "CONNECTED";
    });

    conn.on('data', data => {
        log(`REMOTE << ${data}`, "remote");
    });

    conn.on('close', () => {
        log("Connection lost.", "remote");
        location.reload();
    });
}

// Send message
function sendMsg() {
    const input = document.getElementById('msgInput');
    const val = input.value.trim();
    if(!val || !conn) return;
    conn.send(val);
    log(`LOCAL >> ${val}`, "local");
    input.value = '';
}

// Enter key support
function checkEnter(e) {
    if(e.key === 'Enter') sendMsg();
}
</script>

</body>
</html>
