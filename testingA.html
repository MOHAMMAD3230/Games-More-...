<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TAC/COM-04 | ADVANCED DIAGNOSTICS</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --amber: #ffb000; --bg: #0d0900; --red: #8c3024; --blue: #00d4ff; --green: #39ff14; --gray: #333; }
        body { background: #050505; color: var(--amber); font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; touch-action: manipulation; overflow: hidden; }
        
        .mainframe { width: 95%; max-width: 900px; background: #222; border: 4px solid #111; padding: 10px; display: flex; flex-direction: column; box-shadow: 0 0 60px #000; box-sizing: border-box; }
        @media (min-width: 768px) { .mainframe { display: grid; grid-template-columns: 1fr 300px; height: 620px; gap: 15px; } }

        /* Monitor / Screen Area */
        .monitor { background: var(--bg); border: 8px solid #1a1a1a; border-radius: 10px; padding: 15px; flex-grow: 1; display: flex; flex-direction: column; position: relative; overflow: hidden; }
        .monitor::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06)); background-size: 100% 2px, 3px 100%; pointer-events: none; }
        
        #output { height: 180px; overflow-y: auto; font-size: 0.75rem; scrollbar-width: none; border-bottom: 1px solid #222; margin-bottom: 10px; }

        /* Indicator Grid */
        .ind-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 10px; }
        .ind-box { background: #111; border: 1px solid #222; padding: 5px; text-align: center; font-size: 0.6rem; }
        .ind-val { display: block; font-size: 0.8rem; color: var(--blue); margin-top: 2px; }

        /* Status LEDs */
        .led-row { display: flex; justify-content: space-around; padding: 10px; background: #111; border: 1px solid #333; margin-bottom: 10px; }
        .led-group { display: flex; flex-direction: column; align-items: center; font-size: 0.5rem; gap: 5px; }
        .led { width: 10px; height: 10px; border-radius: 50%; background: #200; transition: 0.2s; }
        .led.active-blue { background: var(--blue); box-shadow: 0 0 8px var(--blue); }
        .led.active-red { background: #f00; box-shadow: 0 0 8px #f00; }
        .led.active-green { background: var(--green); box-shadow: 0 0 8px var(--green); }
        .led.pulse { animation: blink 0.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        /* PTT Button & Side Panel */
        .btn-ptt { width: 100%; height: 120px; background: var(--red); color: white; border: 4px solid #5e1e16; font-weight: bold; font-size: 1.2rem; cursor: pointer; user-select: none; }
        .btn-ptt:active:not(:disabled) { background: #f00; }
        .btn-ptt:disabled { background: #333; opacity: 0.3; }
        
        .side-module { background: #111; padding: 10px; border: 1px solid #333; margin-bottom: 10px; }
        input { width: 100%; background: #000; border: 1px solid #444; color: var(--amber); padding: 8px; text-align: center; font-size: 1.1rem; }
        
        #meter { width: 100%; height: 12px; background: #000; border: 1px solid #222; overflow: hidden; }
        #meter-fill { width: 0%; height: 100%; background: linear-gradient(90deg, var(--green), var(--amber)); transition: width 0.05s; }
    </style>
</head>
<body>

<div class="mainframe">
    <audio id="remoteAudio" autoplay playsinline></audio>
    
    <div class="monitor">
        <div style="display:flex; justify-content:space-between; font-size:0.6rem; margin-bottom:10px;">
            <span>LINK: <span id="stat-link" style="color:var(--red)">DISCONNECTED</span></span>
            <span>OS: <span id="stat-os" style="color:var(--blue)">SCANNING...</span></span>
        </div>

        <div class="ind-grid">
            <div class="ind-box">LATENCY<span class="ind-val" id="val-ping">---ms</span></div>
            <div class="ind-box">SIGNAL<span class="ind-val" id="val-sig">0%</span></div>
            <div class="ind-box">MODE<span class="ind-val" style="color:var(--amber)">RELAY-TCP</span></div>
        </div>

        <div id="output"><div>> SYSTEM BOOT INITIALIZED...</div></div>
        
        <div style="font-size: 0.5rem; margin-top: auto; margin-bottom: 5px;">AUDIO STREAM INPUT</div>
        <div id="meter"><div id="meter-fill"></div></div>
    </div>

    <div class="side-panel">
        <div class="led-row">
            <div class="led-group"><div class="led" id="led-pow"></div>PWR</div>
            <div class="led-group"><div class="led" id="led-net"></div>SYNC</div>
            <div class="led-group"><div class="led" id="led-rel"></div>RELAY</div>
            <div class="led-group"><div class="led" id="led-tx"></div>TX</div>
        </div>

        <div class="side-module">
            <div style="font-size: 0.6rem; text-align: center; margin-bottom: 5px;">SECURE CHANNEL</div>
            <input type="number" id="chanInput" value="99">
            <button onclick="initChannel()" id="bootBtn" style="width:100%; margin-top:8px; padding:10px; background:var(--bg); color:var(--green); border:1px solid var(--green); cursor:pointer; font-weight:bold;">INITIALIZE</button>
        </div>

        <button class="btn-ptt" id="pttBtn" disabled>HOLD TO TALK</button>
        
        <div style="margin-top:10px;">
            <button onclick="location.reload()" style="width:100%; padding:5px; background:#111; color:#555; border:1px solid #222; font-size:0.6rem;">RESET CORE</button>
        </div>
    </div>
</div>

<script>
    let peer, conn, localStream, audioCtx, analyser, speakerGain;
    let pingInterval;
    const APP_PREFIX = "TAC-COM-V7-"; 

    // METERED.CA CONFIG
    const PEER_OPTIONS = {
        config: { 
            'iceServers': [
                {
                    'urls': 'turns:global.relay.metered.ca:443?transport=tcp',
                    'username': 'ce97feaaa435bc128230c5bd',
                    'credential': '+qT5rVgsuGkqWX6o'
                }
            ]
        },
        iceTransportPolicy: 'relay' 
    };

    function log(msg, color="#ffb000") {
        const div = document.createElement('div');
        div.innerText = `> ${msg}`; div.style.color = color;
        const out = document.getElementById('output');
        out.appendChild(div); out.scrollTop = out.scrollHeight;
    }

    // New Indicators Logic
    function updateHardwareInfo() {
        const isAndroid = /Android/i.test(navigator.userAgent);
        document.getElementById('stat-os').innerText = isAndroid ? "ANDROID-M" : "WEB-DESK";
        document.getElementById('led-pow').classList.add('active-blue');
    }
    updateHardwareInfo();

    async function initChannel() {
        try {
            log("OPENING HARDWARE ISOLATION...");
            localStream = await navigator.mediaDevices.getUserMedia({ 
                audio: { echoCancellation: true, noiseSuppression: true } 
            });

            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            speakerGain = audioCtx.createGain();
            speakerGain.gain.value = 0.6;
            analyser = audioCtx.createAnalyser();
            analyser.connect(speakerGain);
            speakerGain.connect(audioCtx.destination);
            
            muteMic(true);
            document.getElementById('bootBtn').disabled = true;
            document.getElementById('led-rel').classList.add('active-green', 'pulse');
            
            updateMeter();
            initPeer(APP_PREFIX + document.getElementById('chanInput').value);
        } catch(e) { log("MIC REJECTED", "red"); }
    }

    function initPeer(myId) {
        peer = new Peer(myId, PEER_OPTIONS);
        peer.on('open', id => log("UPLINK ACTIVE. WAITING...", "var(--green)"));
        peer.on('connection', c => { conn = c; setupHandlers(); });
        peer.on('call', call => {
            call.answer(localStream);
            call.on('stream', stream => attachStream(stream));
        });
        peer.on('error', (err) => {
            if(err.type === 'unavailable-id') {
                peer.destroy();
                initCallerMode(myId);
            }
        });
    }

    function initCallerMode(targetId) {
        peer = new Peer(PEER_OPTIONS); 
        peer.on('open', () => {
            conn = peer.connect(targetId);
            const call = peer.call(targetId, localStream);
            call.on('stream', stream => attachStream(stream));
            setupHandlers();
        });
    }

    function setupHandlers() {
        conn.on('open', () => {
            document.getElementById('led-net').classList.add('active-blue');
            document.getElementById('pttBtn').disabled = false;
            document.getElementById('stat-link').innerText = "ENCRYPTED";
            document.getElementById('stat-link').style.color = "var(--green)";
            document.getElementById('val-sig').innerText = "98%";
            log("HANDSHAKE COMPLETE.");
            
            // Start Ping Timer
            pingInterval = setInterval(() => {
                const start = Date.now();
                conn.send({type: 'ping', ts: start});
            }, 3000);
        });

        conn.on('data', data => {
            if(data === 'TX_ON') document.getElementById('led-tx').classList.add('active-red');
            if(data === 'TX_OFF') document.getElementById('led-tx').classList.remove('active-red');
            
            // Latency Calc
            if(data.type === 'ping') conn.send({type: 'pong', ts: data.ts});
            if(data.type === 'pong') {
                const latency = Date.now() - data.ts;
                document.getElementById('val-ping').innerText = latency + "ms";
            }
        });
    }

    function attachStream(stream) {
        const audioEl = document.getElementById('remoteAudio');
        audioEl.srcObject = stream;
        const source = audioCtx.createMediaStreamSource(stream);
        source.connect(analyser);
    }

    function muteMic(shouldMute) {
        if (localStream) localStream.getAudioTracks().forEach(t => t.enabled = !shouldMute);
        if (speakerGain) {
            const v = shouldMute ? 0.6 : 0;
            speakerGain.gain.setValueAtTime(v, audioCtx.currentTime);
        }
        const audioEl = document.getElementById('remoteAudio');
        if(audioEl) audioEl.muted = !shouldMute;
    }

    function updateMeter() {
        if(!analyser) return;
        const dataArray = new Uint8Array(analyser.frequencyBinCount);
        analyser.getByteFrequencyData(dataArray);
        let sum = dataArray.reduce((a, b) => a + b, 0);
        document.getElementById('meter-fill').style.width = Math.min(100, (sum/dataArray.length)*5) + "%";
        requestAnimationFrame(updateMeter);
    }

    const ptt = document.getElementById('pttBtn');
    const pttOn = (e) => { 
        if(e) e.preventDefault(); 
        if(!conn || ptt.disabled) return; 
        muteMic(false); 
        conn.send('TX_ON'); 
        document.getElementById('led-tx').classList.add('active-red');
    };
    const pttOff = (e) => { 
        if(e) e.preventDefault(); 
        if(!conn || ptt.disabled) return; 
        muteMic(true); 
        conn.send('TX_OFF'); 
        document.getElementById('led-tx').classList.remove('active-red');
    };

    ptt.addEventListener('touchstart', pttOn, { passive: false });
    ptt.addEventListener('touchend', pttOff, { passive: false });
    ptt.addEventListener('mousedown', pttOn);
    ptt.addEventListener('mouseup', pttOff);
</script>
</body>
</html>
