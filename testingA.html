<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TAC/COM-04 | SECURE NET v2.0</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root {
            --amber: #ffb000;
            --amber-dim: #8c6600;
            --bg: #0d0900;
            --red: #ff3333;
            --green: #39ff14;
            --blue: #00d4ff;
            --panel-bg: #1a1a1a;
        }
        body {
            background: #050505;
            color: var(--amber);
            font-family: 'Courier New', monospace;
            margin: 0;
            padding: 0;
            overflow: hidden;
            touch-action: manipulation;
        }
        .scanlines {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,0.25) 50%), 
                        linear-gradient(90deg, rgba(255,0,0,0.04), rgba(0,255,0,0.01), rgba(0,0,255,0.04));
            background-size: 100% 3px, 4px 100%;
            pointer-events: none;
            z-index: 999;
        }
        .mainframe {
            width: 96%;
            max-width: 1100px;
            margin: 12px auto;
            background: #222;
            border: 6px solid #333;
            padding: 15px;
            box-shadow: 0 0 60px #000;
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 18px;
            height: calc(100vh - 24px);
            box-sizing: border-box;
        }
        @media (max-width: 768px) {
            .mainframe {
                grid-template-columns: 1fr;
                height: auto;
                min-height: 100vh;
                padding: 10px;
                gap: 12px;
            }
        }
        .monitor {
            background: var(--bg);
            border: 3px solid #444;
            padding: 18px;
            display: flex;
            flex-direction: column;
            box-shadow: inset 0 0 30px #000;
        }
        .status-bar {
            font-size: 0.78rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #444;
            padding-bottom: 8px;
            margin-bottom: 12px;
            text-transform: uppercase;
        }
        .enc-badge {
            background: #003300;
            color: var(--green);
            padding: 2px 8px;
            font-size: 0.65rem;
            border: 1px solid var(--green);
            border-radius: 2px;
        }
        #output {
            flex-grow: 1;
            overflow-y: auto;
            font-size: 0.88rem;
            padding-right: 8px;
            line-height: 1.4;
        }
        .chat-box {
            margin-top: 12px;
            border-top: 2px solid #444;
            padding-top: 10px;
        }
        .chat-messages {
            height: 160px;
            overflow-y: auto;
            font-size: 0.85rem;
            background: #000;
            padding: 8px;
            border: 1px solid #555;
        }
        .chat-input {
            display: flex;
            gap: 6px;
            margin-top: 6px;
        }
        .chat-input input {
            flex: 1;
            background: #111;
            border: 2px solid #666;
            color: var(--blue);
            padding: 10px;
            font-size: 1rem;
        }
        .module {
            background: var(--panel-bg);
            padding: 16px;
            border: 2px solid #444;
            margin-bottom: 14px;
        }
        .btn-ptt {
            width: 100%;
            height: 138px;
            background: #222;
            color: white;
            border: 6px solid #444;
            font-size: 1.65rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        .btn-ptt:active:not(:disabled) {
            background: var(--red);
            border-color: #fff;
            transform: scale(0.96);
        }
        .btn-action {
            width: 100%;
            padding: 14px;
            background: #222;
            color: var(--amber);
            border: 2px solid var(--amber-dim);
            cursor: pointer;
            font-weight: bold;
            font-size: 0.9rem;
            transition: 0.2s;
        }
        .btn-action:hover:not(:disabled) { background: var(--amber-dim); color: #000; }
        .channel-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
            margin-top: 8px;
        }
        .chan-btn {
            padding: 10px;
            font-size: 1.1rem;
            background: #111;
            border: 2px solid #555;
            color: var(--blue);
            cursor: pointer;
        }
        .chan-btn.active {
            background: var(--blue);
            color: #000;
            border-color: var(--blue);
        }
        .signal-bars {
            display: flex;
            gap: 3px;
            align-items: flex-end;
            height: 28px;
        }
        .bar {
            width: 10px;
            background: #222;
            transition: height 0.15s linear;
        }
        .bar.active { background: var(--green); box-shadow: 0 0 6px var(--green); }
    </style>
</head>
<body>
<div class="scanlines"></div>
<div class="mainframe">

    <audio id="remoteAudio" autoplay playsinline style="display:none;"></audio>

    <!-- LEFT MONITOR -->
    <div class="monitor">
        <div class="status-bar">
            <span>FREQ: <span id="curFreq" style="color:var(--blue)">462.--</span> MHz</span>
            <span id="netStat" style="color:#888">NET: OFFLINE</span>
            <span class="enc-badge">🔒 E2EE SRTP + AES</span>
            <div class="signal-bars" id="signalBars">
                <div class="bar" style="height:20%"></div>
                <div class="bar" style="height:40%"></div>
                <div class="bar" style="height:65%"></div>
                <div class="bar" style="height:85%"></div>
                <div class="bar" style="height:100%"></div>
            </div>
        </div>

        <div id="output"></div>

        <!-- CHAT -->
        <div class="chat-box">
            <div style="font-size:0.75rem;color:#777;margin-bottom:6px;">ENCRYPTED SQUAD CHAT</div>
            <div id="chatMessages" class="chat-messages"></div>
            <div class="chat-input">
                <input type="text" id="chatInput" placeholder="TYPE SECURE MESSAGE..." onkeypress="if(event.key==='Enter') sendChat()">
                <button class="btn-action" onclick="sendChat()" style="width:90px">SEND</button>
            </div>
        </div>
    </div>

    <!-- RIGHT CONTROLS -->
    <div>

        <!-- CHANNEL SELECTOR (Multiple Channels) -->
        <div class="module">
            <div style="text-align:center;font-size:0.75rem;color:#777;margin-bottom:10px;">SECURE CHANNELS (01-99)</div>
            <input type="number" id="chanInput" value="01" min="1" max="99" style="width:100%;font-size:2.2rem;text-align:center;background:#000;border:3px solid #555;color:var(--blue);padding:8px;">
            
            <div style="margin-top:12px;font-size:0.75rem;color:#777;text-align:center;">QUICK SWITCH</div>
            <div class="channel-grid" id="quickChannels"></div>
            
            <button class="btn-action" id="bootBtn" onclick="initChannel()" style="margin-top:14px;">CONNECT TO CHANNEL</button>
        </div>

        <!-- PTT -->
        <div class="module" style="text-align:center;">
            <button class="btn-ptt" id="pttBtn" disabled>
                PUSH TO TALK<br>
                <span style="font-size:0.85rem;opacity:0.75">(HOLD TO TRANSMIT)</span>
            </button>
            
            <div style="margin-top:18px;display:flex;justify-content:center;gap:40px;">
                <div style="text-align:center;">
                    <div class="status-led" id="ledNet" style="width:22px;height:22px;border-radius:50%;background:#300;border:3px solid #500;margin:0 auto 6px;"></div>
                    <span style="font-size:0.75rem">LINK</span>
                </div>
                <div style="text-align:center;">
                    <div class="status-led" id="ledTx" style="width:22px;height:22px;border-radius:50%;background:#300;border:3px solid #500;margin:0 auto 6px;"></div>
                    <span style="font-size:0.75rem">TX</span>
                </div>
            </div>
        </div>

        <button class="btn-action" onclick="hardReset()" style="background:#300;color:#f66;border-color:#800;margin-bottom:10px;">FULL SYSTEM RESET</button>
        <button class="btn-action" id="reconnectBtn" onclick="manualReconnect()" style="display:none;background:#222;color:var(--amber);">RECONNECT TO CURRENT CHANNEL</button>
    </div>
</div>

<script>
    // ==================== CORE STATE ====================
    let peer = null;
    let connections = [];      // Support multiple users on same channel
    let calls = [];
    let localStream = null;
    let audioCtx = null;
    let analyser = null;
    let remoteGain = null;
    let currentChannel = "01";
    let isConnected = false;
    let reconnectAttempts = 0;
    const MAX_RECONNECT = 4;
    const APP_PREFIX = "TAC-COM-SECURE-";
    let signalInterval = null;

    const output = document.getElementById('output');
    const chatMessages = document.getElementById('chatMessages');

    // ==================== SIMPLE AES-LIKE ENCRYPTION (Web Crypto) ====================
    async function deriveKey(channel) {
        const encoder = new TextEncoder();
        const keyMaterial = await crypto.subtle.importKey(
            "raw", encoder.encode("TACCOM-" + channel), "PBKDF2", false, ["deriveBits", "deriveKey"]
        );
        return crypto.subtle.deriveKey(
            { name: "PBKDF2", salt: encoder.encode("SECURE-NET"), iterations: 100000, hash: "SHA-256" },
            keyMaterial,
            { name: "AES-GCM", length: 256 },
            false,
            ["encrypt", "decrypt"]
        );
    }

    async function encryptMessage(msg, channel) {
        const key = await deriveKey(channel);
        const encoder = new TextEncoder();
        const iv = crypto.getRandomValues(new Uint8Array(12));
        const encrypted = await crypto.subtle.encrypt(
            { name: "AES-GCM", iv },
            key,
            encoder.encode(msg)
        );
        return btoa(String.fromCharCode(...new Uint8Array(encrypted))) + "|" + btoa(String.fromCharCode(...iv));
    }

    async function decryptMessage(encryptedStr, channel) {
        try {
            const [dataB64, ivB64] = encryptedStr.split('|');
            const key = await deriveKey(channel);
            const data = Uint8Array.from(atob(dataB64), c => c.charCodeAt(0));
            const iv = Uint8Array.from(atob(ivB64), c => c.charCodeAt(0));
            const decrypted = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, data);
            return new TextDecoder().decode(decrypted);
        } catch(e) { return "[DECRYPT FAILED]"; }
    }

    // ==================== LOG & CHAT ====================
    function log(msg, type = "info") {
        const div = document.createElement('div');
        const time = new Date().toLocaleTimeString('en-US', { hour12: false, hour: "2-digit", minute: "2-digit", second: "2-digit" });
        div.textContent = `[${time}] > ${msg}`;
        if (type === "error") div.style.color = "#f66";
        if (type === "success") div.style.color = "#39ff14";
        if (type === "sys") div.style.color = "#888";
        output.appendChild(div);
        output.scrollTop = output.scrollHeight;
    }

    function addChat(msg, from = "REMOTE") {
        const div = document.createElement('div');
        div.innerHTML = `<span style="color:#0af">[${from}]</span> ${msg}`;
        chatMessages.appendChild(div);
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    // ==================== SIGNAL STRENGTH SIMULATION ====================
    function startSignalSimulation() {
        if (signalInterval) clearInterval(signalInterval);
        const bars = document.querySelectorAll('.bar');
        signalInterval = setInterval(() => {
            if (!isConnected) return;
            const strength = Math.random() * 100;
            bars.forEach((bar, i) => {
                const h = Math.max(15, (strength / 5) * (i + 1) + (Math.random() * 15 - 7));
                bar.style.height = `${h}%`;
                bar.classList.toggle('active', h > 30);
            });
        }, 420);
    }

    function stopSignalSimulation() {
        if (signalInterval) clearInterval(signalInterval);
        document.querySelectorAll('.bar').forEach(b => { b.style.height = '20%'; b.classList.remove('active'); });
    }

    // ==================== AUDIO SETUP (FIXED & CLEAN) ====================
    async function setupAudioGraph() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 128;
        remoteGain = audioCtx.createGain();
        remoteGain.gain.value = 1;

        // Meter runs on remote audio only
        analyser.connect(remoteGain);
        remoteGain.connect(audioCtx.destination);

        updateMeter();
    }

    function updateMeter() {
        if (!analyser) return;
        const data = new Uint8Array(analyser.frequencyBinCount);
        analyser.getByteFrequencyData(data);
        let avg = data.reduce((a, b) => a + b) / data.length;
        const perc = Math.min(100, avg * 2.2);
        // We removed RX LEVEL bar to simplify UI (no realistic radio feel)
        requestAnimationFrame(updateMeter);
    }

    // ==================== PEERJS NETWORK (MULTI-USER + MULTI-CHANNEL READY) ====================
    async function initChannel() {
        let val = parseInt(document.getElementById('chanInput').value);
        if (isNaN(val) || val < 1 || val > 99) return log("INVALID CHANNEL", "error");

        currentChannel = val.toString().padStart(2, '0');
        const targetId = APP_PREFIX + currentChannel;

        // Reset previous session
        if (peer) peer.destroy();
        connections = [];
        calls = [];
        isConnected = false;

        document.getElementById('bootBtn').innerText = "CONNECTING...";
        document.getElementById('curFreq').innerText = `462.${currentChannel}`;
        log(`TUNING TO SECURE CHANNEL ${currentChannel}...`, "sys");

        try {
            localStream = await navigator.mediaDevices.getUserMedia({
                audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true }
            });

            await setupAudioGraph();

            // Create peer
            peer = new Peer();

            peer.on('open', (myId) => {
                log(`NODE READY • ID:${myId.slice(0,8)}...`, "sys");
                // Connect as client
                const newConn = peer.connect(targetId);
                const newCall = peer.call(targetId, localStream);
                handleNewConnection(newConn, newCall);
            });

            peer.on('error', (err) => {
                if (err.type === 'peer-unavailable') {
                    log("CHANNEL EMPTY → BECOMING HOST", "sys");
                    becomeHost(targetId);
                } else {
                    log("ERROR: " + err.type, "error");
                    resetUI();
                }
            });

            // Host listeners (multiple incoming users supported)
            peer.on('connection', (c) => handleNewConnection(c, null));
            peer.on('call', (call) => {
                call.answer(localStream);
                handleNewConnection(null, call);
            });

        } catch (e) {
            log("MIC ACCESS FAILED", "error");
            document.getElementById('bootBtn').innerText = "CONNECT TO CHANNEL";
        }
    }

    function becomeHost(hostId) {
        peer = new Peer(hostId);
        peer.on('open', () => {
            log(`HOST ESTABLISHED ON CHANNEL ${currentChannel}`, "success");
            document.getElementById('netStat').innerText = "HOST";
            document.getElementById('netStat').style.color = "var(--green)";
            enablePTT();
            isConnected = true;
            startSignalSimulation();
        });
        peer.on('connection', (c) => handleNewConnection(c, null));
        peer.on('call', (call) => {
            call.answer(localStream);
            handleNewConnection(null, call);
        });
    }

    function handleNewConnection(connection, call) {
        if (connection) {
            connections.push(connection);
            connection.on('open', () => {
                isConnected = true;
                document.getElementById('ledNet').style.background = "#00d4ff";
                document.getElementById('ledNet').style.boxShadow = "0 0 12px #00d4ff";
                document.getElementById('netStat').innerText = `LINKED (${connections.length})`;
                document.getElementById('netStat').style.color = "var(--blue)";
                enablePTT();
                reconnectAttempts = 0;
                startSignalSimulation();
                log("NEW NODE JOINED SECURE NET", "success");
            });

            connection.on('data', async (data) => {
                if (data.type === "chat") {
                    const decrypted = await decryptMessage(data.payload, currentChannel);
                    addChat(decrypted, "REMOTE");
                }
            });

            connection.on('close', () => {
                connections = connections.filter(c => c !== connection);
                if (connections.length === 0) attemptReconnect();
            });
        }

        if (call) {
            calls.push(call);
            call.on('stream', (stream) => {
                // Route remote audio into our WebAudio graph (fixed metering)
                const source = audioCtx.createMediaStreamSource(stream);
                source.connect(analyser);
                log("ENCRYPTED VOICE STREAM LIVE", "success");
            });
            call.on('close', () => { calls = calls.filter(c => c !== call); });
        }
    }

    function enablePTT() {
        const btn = document.getElementById('pttBtn');
        btn.disabled = false;
        document.getElementById('bootBtn').innerText = "CHANNEL ACTIVE";
    }

    // ==================== PTT (SIMPLE HALF-DUPLEX – NO RADIO BEEPS) ====================
    const pttBtn = document.getElementById('pttBtn');
    function pttDown() {
        if (!localStream) return;
        localStream.getAudioTracks().forEach(t => t.enabled = true);
        document.getElementById('ledTx').style.background = "#ff3333";
        document.getElementById('ledTx').style.boxShadow = "0 0 15px #ff3333";
        // Broadcast TX status to all peers
        connections.forEach(c => { if (c.open) c.send({type: "TX_ON"}); });
    }
    function pttUp() {
        if (!localStream) return;
        localStream.getAudioTracks().forEach(t => t.enabled = false);
        document.getElementById('ledTx').style.background = "#300";
        document.getElementById('ledTx').style.boxShadow = "none";
        connections.forEach(c => { if (c.open) c.send({type: "TX_OFF"}); });
    }

    pttBtn.addEventListener('mousedown', pttDown);
    pttBtn.addEventListener('mouseup', pttUp);
    pttBtn.addEventListener('mouseleave', pttUp);
    pttBtn.addEventListener('touchstart', e => { e.preventDefault(); pttDown(); });
    pttBtn.addEventListener('touchend', e => { e.preventDefault(); pttUp(); });

    // ==================== ENCRYPTED CHAT ====================
    async function sendChat() {
        const input = document.getElementById('chatInput');
        if (!input.value.trim() || connections.length === 0) return;

        const msg = input.value.trim();
        addChat(msg, "YOU");
        
        const encrypted = await encryptMessage(msg, currentChannel);
        connections.forEach(c => {
            if (c.open) c.send({ type: "chat", payload: encrypted });
        });
        input.value = "";
    }

    // ==================== RECONNECT & RESET ====================
    function attemptReconnect() {
        if (reconnectAttempts >= MAX_RECONNECT) return;
        reconnectAttempts++;
        log(`RECONNECT ATTEMPT ${reconnectAttempts}/${MAX_RECONNECT}`, "sys");
        setTimeout(() => initChannel(), 1200);
    }

    function manualReconnect() {
        if (peer) peer.destroy();
        initChannel();
    }

    function hardReset() {
        if (peer) peer.destroy();
        if (localStream) localStream.getTracks().forEach(t => t.stop());
        stopSignalSimulation();
        location.reload();
    }

    // ==================== QUICK CHANNEL BUTTONS ====================
    function createQuickChannels() {
        const container = document.getElementById('quickChannels');
        for (let i = 1; i <= 10; i++) {
            const num = i.toString().padStart(2, '0');
            const btn = document.createElement('button');
            btn.className = 'chan-btn';
            btn.textContent = num;
            btn.onclick = () => {
                document.getElementById('chanInput').value = num;
                document.querySelectorAll('.chan-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                initChannel();
            };
            container.appendChild(btn);
        }
    }

    // ==================== BOOT ====================
    log("TAC/COM-04 v2.0 SECURE BOOT COMPLETE", "sys");
    log("E2EE VOICE + CHAT ENABLED • MULTI-USER • MULTI-CHANNEL", "success");
    createQuickChannels();

    // Desktop + Mobile ready
</script>
</body>
</html>
