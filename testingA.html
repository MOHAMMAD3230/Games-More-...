<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OMNI-LINK v18</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --accent: #39ff14; --bg: #050505; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; }
        .header { padding: 15px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
        .indicator-wrap { display: flex; gap: 10px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; background: #222; }
        .dot.on { background: var(--accent); box-shadow: 0 0 10px var(--accent); }
        .dot.searching { background: #ffcc00; animation: pulse 1s infinite; }
        @keyframes pulse { 50% { opacity: 0.3; } }
        .chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 80%; padding: 12px; border-radius: 12px; font-size: 14px; }
        .in { align-self: flex-start; background: #222; }
        .out { align-self: flex-end; background: var(--accent); color: #000; font-weight: bold; }
        .sys { align-self: center; font-size: 10px; color: #555; }
        .footer { padding: 15px; background: #111; display: flex; gap: 10px; padding-bottom: env(safe-area-inset-bottom); }
        input { flex: 1; background: #000; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 8px; outline: none; font-size: 16px; }
        .btn { background: var(--accent); border: none; padding: 0 20px; border-radius: 8px; font-weight: bold; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<header class="header">
    <div style="color:var(--accent); font-weight:bold;">OMNI-LINK v18</div>
    <div class="indicator-wrap">
        <div id="dot1" class="dot"></div>
        <div id="dot2" class="dot"></div>
    </div>
</header>

<main class="chat" id="log"></main>

<div class="footer" id="login">
    <input type="number" id="cid" placeholder="Channel ID" inputmode="numeric">
    <button class="btn" onclick="join()">JOIN</button>
</div>

<div class="footer hidden" id="sender">
    <input type="text" id="min" placeholder="Message..." autocomplete="off">
    <button class="btn" onclick="transmit()">SEND</button>
</div>

<script>
    let p = null, c = null;
    const PFX = 'OMNI-X18-';

    function log(t, s) {
        const d = document.createElement('div');
        d.className = `msg ${s}`;
        d.textContent = t;
        const box = document.getElementById('log');
        box.appendChild(d);
        box.scrollTop = box.scrollHeight;
    }

    function join() {
        const id = document.getElementById('cid').value;
        if(!id) return;
        document.getElementById('login').classList.add('hidden');
        document.getElementById('dot1').className = 'dot searching';
        log("System: Requesting Global Route...", "sys");

        // Use aggressive ICE configuration
        p = new Peer(PFX + id, {
            config: {
                'iceServers': [
                    { 'urls': 'stun:stun.l.google.com:19302' },
                    { 'urls': 'stun:stun1.l.google.com:19302' },
                    { 'urls': 'stun:stun2.l.google.com:19302' },
                    { 'urls': 'stun:stun3.l.google.com:19302' },
                    { 'urls': 'stun:stun4.l.google.com:19302' }
                ],
                'iceCandidatePoolSize': 10
            }
        });

        p.on('open', () => {
            document.getElementById('dot1').className = 'dot on';
            log("Signal: Listening on CH-" + id, "sys");
        });

        p.on('connection', (conn) => {
            c = conn;
            bind();
        });

        p.on('error', (err) => {
            if(err.type === 'unavailable-id') {
                p.destroy();
                const g = new Peer({ config: p.options.config });
                g.on('open', () => {
                    document.getElementById('dot1').className = 'dot on';
                    c = g.connect(PFX + id, { reliable: true });
                    bind();
                });
            } else {
                log("Error: " + err.type, "sys");
                document.getElementById('login').classList.remove('hidden');
            }
        });
    }

    function bind() {
        document.getElementById('dot2').className = 'dot searching';
        c.on('open', () => {
            document.getElementById('dot2').className = 'dot on';
            document.getElementById('sender').classList.remove('hidden');
            log("Link: GLOBAL TUNNEL ACTIVE", "sys");
            setInterval(() => { if(c.open) c.send('_h_'); }, 5000);
        });
        c.on('data', (d) => { if(d !== '_h_') log(d, "in"); });
        c.on('close', () => location.reload());
    }

    function transmit() {
        const i = document.getElementById('min');
        if(i.value && c && c.open) {
            c.send(i.value);
            log(i.value, "out");
            i.value = "";
        }
    }
    window.onkeydown = (e) => { if(e.key === 'Enter') transmit(); };
</script>
</body>
</html>
