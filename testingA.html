<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TAC/COM-04 | SECURE NET</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root {
            --amber: #ffb000;
            --amber-dim: #8c6600;
            --bg: #0d0900;
            --red: #ff3333;
            --red-dim: #8c1818;
            --blue: #00d4ff;
            --green: #39ff14;
            --panel-bg: #1a1a1a;
        }

        body {
            background: #050505;
            color: var(--amber);
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            touch-action: manipulation;
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
        }

        .scanlines {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
            z-index: 999;
        }

        .mainframe {
            width: 95%;
            max-width: 900px;
            background: #222;
            border: 4px solid #333;
            padding: 10px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 40px #000;
            box-sizing: border-box;
            position: relative;
            z-index: 10;
        }

        @media (min-width: 768px) {
            .mainframe {
                display: grid;
                grid-template-columns: 1fr 300px;
                gap: 15px;
                height: 650px;
            }
        }

        .monitor {
            background: var(--bg);
            border: 2px solid #333;
            padding: 15px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: inset 0 0 20px #000;
        }

        .status-bar {
            font-size: 0.7rem;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #333;
            padding-bottom: 5px;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            flex-wrap: wrap;
            gap: 5px;
        }

        #output {
            height: 100%;
            overflow-y: auto;
            font-size: 0.85rem;
            scrollbar-width: thin;
            scrollbar-color: var(--amber-dim) #000;
            margin-bottom: 10px;
            word-break: break-all;
        }

        #output::-webkit-scrollbar { width: 6px; }
        #output::-webkit-scrollbar-thumb { background: var(--amber-dim); }

        .module {
            background: var(--panel-bg);
            padding: 15px;
            border: 1px solid #444;
            margin-bottom: 15px;
            position: relative;
        }

        .module::before {
            content: '';
            position: absolute;
            top: 2px; left: 2px; right: 2px; height: 1px;
            background: #444;
        }

        .btn-ptt {
            width: 100%;
            height: 120px;
            background: repeating-linear-gradient(
                45deg,
                var(--red-dim),
                var(--red-dim) 10px,
                #601010 10px,
                #601010 20px
            );
            color: white;
            border: 4px solid #442222;
            font-weight: bold;
            font-size: 1.5rem;
            cursor: pointer;
            transition: 0.1s;
            text-shadow: 0 2px 0 #000;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-ptt.active {
            background: var(--red);
            transform: scale(0.98);
            box-shadow: 0 0 15px var(--red);
            border-color: #fff;
        }

        .btn-ptt:disabled {
            background: #222;
            color: #555;
            border-color: #333;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-action {
            width: 100%;
            padding: 12px;
            background: #222;
            color: var(--amber);
            border: 1px solid var(--amber-dim);
            cursor: pointer;
            font-weight: bold;
            font-size: 0.8rem;
            text-transform: uppercase;
            transition: 0.2s;
        }

        .btn-action:hover:not(:disabled) {
            background: var(--amber-dim);
            color: #000;
        }

        .btn-action:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        input {
            width: 100%;
            background: #000;
            border: 2px solid #444;
            color: var(--blue);
            padding: 12px;
            box-sizing: border-box;
            outline: none;
            text-align: center;
            font-size: 1.5rem;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            letter-spacing: 3px;
        }

        input:focus {
            border-color: var(--blue);
        }

        .led-group {
            display: flex;
            justify-content: space-around;
            margin-top: 15px;
        }

        .indicator {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 0.6rem;
            color: #777;
        }

        .status-led {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #300;
            border: 1px solid #500;
            margin-bottom: 5px;
            transition: 0.3s;
        }

        .online { 
            background: var(--blue); 
            box-shadow: 0 0 8px var(--blue); 
            border-color: #fff; 
        }
        .tx { 
            background: var(--red); 
            box-shadow: 0 0 15px var(--red); 
            border-color: #fff; 
            animation: tx-pulse 0.5s ease-in-out infinite alternate;
        }
        
        @keyframes tx-pulse {
            from { box-shadow: 0 0 10px var(--red); }
            to { box-shadow: 0 0 20px var(--red), 0 0 30px var(--red-dim); }
        }

        #meter-container {
            width: 100%;
            height: 8px;
            background: #000;
            border: 1px solid #444;
            margin-top: 10px;
        }
        
        #meter-fill {
            width: 0%;
            height: 100%;
            background: var(--green);
            transition: width 0.05s linear;
            box-shadow: 0 0 5px var(--green);
        }

        .role-badge {
            display: inline-block;
            padding: 2px 8px;
            font-size: 0.6rem;
            border: 1px solid;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .role-host { color: var(--green); border-color: var(--green); }
        .role-client { color: var(--blue); border-color: var(--blue); }

        .connecting-spinner {
            display: inline-block;
            width: 10px;
            height: 10px;
            border: 2px solid var(--amber-dim);
            border-top-color: var(--amber);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 5px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="scanlines"></div>

<div class="mainframe">
    <audio id="remoteAudio" autoplay playsinline style="display:none;"></audio>

    <div class="monitor">
        <div class="status-bar">
            <span>FREQ: <span id="curFreq" style="color:var(--blue)">--.--</span> MHz</span>
            <span id="roleBadge"></span>
            <span id="netStat">NET: DISCONNECTED</span>
        </div>
        
        <div id="output">
            <div>> SYSTEM STANDBY...</div>
            <div style="color:#555; font-size:0.7em; margin-top:5px;">WAITING FOR FREQUENCY ALLOCATION</div>
        </div>
        
        <div style="margin-top:auto;">
             <div style="display:flex; justify-content:space-between; font-size:0.6rem; margin-bottom:2px;">
                <span>RX LEVEL</span>
                <span id="dbVal">-∞ dB</span>
            </div>
            <div id="meter-container"><div id="meter-fill"></div></div>
        </div>
    </div>

    <div class="side-panel">
        <div class="module">
            <div style="font-size: 0.6rem; color: #777; margin-bottom: 8px; text-align: center;">SET SECURE CHANNEL (1-99)</div>
            <input type="number" id="chanInput" value="1" min="1" max="99" autocomplete="off" inputmode="numeric">
            <button class="btn-action" id="bootBtn" style="margin-top:10px;">
                INITIALIZE LINK
            </button>
        </div>

        <div class="module" style="text-align:center;">
            <button class="btn-ptt" id="pttBtn" disabled>
                <span>PUSH TO TALK</span>
                <span style="font-size:0.8rem; font-weight:normal; opacity:0.8;">(HOLD)</span>
            </button>
            
            <div class="led-group">
                <div class="indicator">
                    <div class="status-led" id="ledNet"></div>
                    <span>DATA LINK</span>
                </div>
                <div class="indicator">
                    <div class="status-led" id="ledTx"></div>
                    <span>TX</span>
                </div>
            </div>
        </div>

        <button class="btn-action" id="resetBtn" style="background:#200; border-color:#500; color:#f55;">
            SYSTEM RESET
        </button>
    </div>
</div>

<script>
    // --- State Management ---
    const state = {
        peer: null,
        conn: null,
        localStream: null,
        audioCtx: null,
        delayNode: null,
        analyser: null,
        speakerGain: null,
        currentCall: null,
        isTransmitting: false,
        isRemoteTransmitting: false,
        isConnected: false,
        role: null, // 'host' or 'client'
        remoteSource: null,
        meterRAF: null
    };

    const APP_PREFIX = "TACCOM-";
    const CONNECTION_TIMEOUT = 10000;

    // --- DOM References ---
    const DOM = {
        output: document.getElementById('output'),
        chanInput: document.getElementById('chanInput'),
        bootBtn: document.getElementById('bootBtn'),
        pttBtn: document.getElementById('pttBtn'),
        resetBtn: document.getElementById('resetBtn'),
        curFreq: document.getElementById('curFreq'),
        netStat: document.getElementById('netStat'),
        ledNet: document.getElementById('ledNet'),
        ledTx: document.getElementById('ledTx'),
        roleBadge: document.getElementById('roleBadge'),
        meterFill: document.getElementById('meter-fill'),
        dbVal: document.getElementById('dbVal'),
        remoteAudio: document.getElementById('remoteAudio')
    };

    // --- Logging (XSS Safe) ---
    function log(msg, type = "info") {
        const div = document.createElement('div');
        const timestamp = new Date().toLocaleTimeString('en-US', {
            hour12: false,
            hour: "2-digit",
            minute: "2-digit",
            second: "2-digit"
        });
        
        div.textContent = `[${timestamp}] > ${msg}`;
        
        const colors = {
            error: "var(--red)",
            success: "var(--green)",
            sys: "#888",
            info: "var(--amber)"
        };
        div.style.color = colors[type] || colors.info;

        DOM.output.appendChild(div);
        
        // Keep only last 100 messages
        while (DOM.output.children.length > 100) {
            DOM.output.removeChild(DOM.output.firstChild);
        }
        
        DOM.output.scrollTop = DOM.output.scrollHeight;
    }

    // --- Main Initialization ---
    async function initChannel() {
        // Validate input
        const val = parseInt(DOM.chanInput.value, 10);
        
        if (isNaN(val) || val < 1 || val > 99 || DOM.chanInput.value !== val.toString()) {
            log("ERROR: INVALID FREQUENCY. RANGE 01-99.", "error");
            DOM.chanInput.style.borderColor = "var(--red)";
            setTimeout(() => DOM.chanInput.style.borderColor = "#444", 1000);
            return;
        }

        const chanNum = val.toString().padStart(2, '0');
        const fullId = APP_PREFIX + chanNum;

        // Update UI
        DOM.bootBtn.disabled = true;
        DOM.bootBtn.innerHTML = 'LINKING<span class="connecting-spinner"></span>';
        DOM.chanInput.disabled = true;
        log(`ATTEMPTING CONNECTION ON CHANNEL ${chanNum}...`, "sys");

        try {
            // Get microphone access
            state.localStream = await navigator.mediaDevices.getUserMedia({
                audio: {
                    echoCancellation: true,
                    noiseSuppression: true,
                    autoGainControl: true
                }
            });

            // Mute mic by default (half-duplex)
            setMicState(false);

            // Setup audio processing graph
            setupAudioGraph();

            // Update frequency display
            DOM.curFreq.innerText = "462." + chanNum;

            // Start connection with timeout
            connectWithTimeout(fullId);

        } catch (err) {
            console.error(err);
            
            let errorMsg = "HARDWARE ERROR: MIC ACCESS DENIED";
            if (err.name === 'NotFoundError') {
                errorMsg = "HARDWARE ERROR: NO MICROPHONE FOUND";
            } else if (err.name === 'NotAllowedError') {
                errorMsg = "HARDWARE ERROR: PERMISSION DENIED";
            }
            
            log(errorMsg, "error");
            resetUI();
        }
    }

    function setupAudioGraph() {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        state.audioCtx = new AudioContext();
        
        state.speakerGain = state.audioCtx.createGain();
        state.speakerGain.gain.value = 1;

        state.delayNode = state.audioCtx.createDelay(2.0);
        state.delayNode.delayTime.value = 0.02; // Minimal delay

        state.analyser = state.audioCtx.createAnalyser();
        state.analyser.fftSize = 64;
        state.analyser.smoothingTimeConstant = 0.8;

        // Audio chain
        state.delayNode.connect(state.analyser);
        state.analyser.connect(state.speakerGain);
        state.speakerGain.connect(state.audioCtx.destination);
        
        startMeter();
    }

    function startMeter() {
        if (!state.analyser) return;
        
        const dataArray = new Uint8Array(state.analyser.frequencyBinCount);
        
        function update() {
            state.analyser.getByteFrequencyData(dataArray);
            
            let sum = 0;
            for (let i = 0; i < dataArray.length; i++) {
                sum += dataArray[i];
            }
            const average = sum / dataArray.length;
            const percentage = Math.min(100, average * 2.5);

            DOM.meterFill.style.width = percentage + "%";
            
            // Color gradient based on level
            if (percentage > 80) {
                DOM.meterFill.style.background = "var(--red)";
                DOM.meterFill.style.boxShadow = "0 0 5px var(--red)";
            } else if (percentage > 50) {
                DOM.meterFill.style.background = "var(--amber)";
                DOM.meterFill.style.boxShadow = "0 0 5px var(--amber)";
            } else {
                DOM.meterFill.style.background = "var(--green)";
                DOM.meterFill.style.boxShadow = "0 0 5px var(--green)";
            }

            DOM.dbVal.textContent = percentage > 5 
                ? `-${(100 - percentage).toFixed(0)} dB` 
                : "-∞ dB";

            state.meterRAF = requestAnimationFrame(update);
        }
        
        update();
    }

    // --- Connection Logic ---
    function connectWithTimeout(targetId) {
        let timeoutId;
        let connectionEstablished = false;

        const cleanup = () => {
            clearTimeout(timeoutId);
            timeoutId = null;
        };

        // Timeout handler
        timeoutId = setTimeout(() => {
            if (!connectionEstablished && state.peer) {
                log("CONNECTION TIMEOUT. BECOMING HOST...", "sys");
                state.peer.destroy();
                becomeHost(targetId);
            }
        }, CONNECTION_TIMEOUT);

        // Create temporary peer to probe for existing host
        state.peer = new Peer();

        state.peer.on('open', () => {
            log("SCANNING FREQUENCY...", "sys");
            
            // Try data connection first
            const probeConn = state.peer.connect(targetId, { reliable: true });
            
            probeConn.on('open', () => {
                connectionEstablished = true;
                cleanup();
                log("HOST DETECTED. JOINING AS CLIENT...", "sys");
                
                // Now make the actual call with media
                state.currentCall = state.peer.call(targetId, state.localStream);
                
                if (state.currentCall) {
                    state.conn = probeConn;
                    state.role = 'client';
                    setupClientHandlers(probeConn, state.currentCall);
                } else {
                    log("ERROR: CALL FAILED", "error");
                    cleanup();
                    state.peer.destroy();
                    becomeHost(targetId);
                }
            });

            probeConn.on('error', (err) => {
                console.log("Probe error:", err);
            });
        });

        state.peer.on('error', (err) => {
            if (err.type === 'peer-unavailable') {
                cleanup();
                log("CHANNEL CLEAR. ESTABLISHING HOST NODE...", "sys");
                state.peer.destroy();
                becomeHost(targetId);
            } else if (!connectionEstablished) {
                cleanup();
                log(`CONNECTION ERROR: ${err.type}`, "error");
                resetUI();
            }
        });
    }

    function becomeHost(myHostId) {
        state.role = 'host';
        state.peer = new Peer(myHostId);

        state.peer.on('open', (id) => {
            log(`NODE ${id.slice(-2)} ONLINE AS HOST`, "success");
            updateConnectionUI();
            enablePTT();
        });

        state.peer.on('connection', (incomingConn) => {
            log("INCOMING HANDSHAKE DETECTED", "sys");
            
            // Close any existing connection
            if (state.conn && state.conn.open) {
                state.conn.close();
            }
            
            state.conn = incomingConn;
            setupHostDataHandler(incomingConn);
        });

        state.peer.on('call', (incomingCall) => {
            log("INCOMING VOICE LINK", "sys");
            incomingCall.answer(state.localStream);
            state.currentCall = incomingCall;
            setupMediaHandler(incomingCall);
            updateConnectionUI();
            enablePTT();
        });

        state.peer.on('error', (err) => {
            if (err.type === 'unavailable-id') {
                // Someone else became host first, retry as client
                log("CHANNEL CONFLICT. REATTEMPTING...", "sys");
                setTimeout(() => {
                    state.peer.destroy();
                    connectWithTimeout(myHostId);
                }, 1000);
            } else {
                log(`HOST ERROR: ${err.type}`, "error");
                resetUI();
            }
        });
    }

    function setupClientHandlers(conn, call) {
        // Data channel
        conn.on('data', handleIncomingData);
        conn.on('close', () => { log("DATA LINK LOST", "error"); hardReset(); });
        conn.on('error', (err) => log(`DATA ERROR: ${err}`, "error"));

        // Media channel
        setupMediaHandler(call);
        updateConnectionUI();
        enablePTT();
    }

    function setupHostDataHandler(conn) {
        conn.on('open', () => {
            updateConnectionUI();
            enablePTT();
            log("CLIENT LINKED", "success");
        });
        conn.on('data', handleIncomingData);
        conn.on('close', () => {
            log("CLIENT DISCONNECTED", "error");
            updateConnectionUI(true);
        });
    }

    function setupMediaHandler(call) {
        call.on('stream', (stream) => {
            DOM.remoteAudio.srcObject = stream;
            
            // Connect to audio graph for visualization
            if (!state.remoteSource) {
                try {
                    state.remoteSource = state.audioCtx.createMediaStreamSource(stream);
                    state.remoteSource.connect(state.delayNode);
                } catch (e) {
                    console.warn("Could not connect remote source:", e);
                }
            }
            log("REMOTE AUDIO SYNCED", "success");
        });

        call.on('close', () => { log("VOICE LINK TERMINATED", "error"); hardReset(); });
        call.on('error', (err) => log(`VOICE ERROR: ${err.type}`, "error"));
    }

    function handleIncomingData(data) {
        if (data === 'TX_ON' && !state.isRemoteTransmitting) {
            state.isRemoteTransmitting = true;
            DOM.ledTx.classList.add('tx');
            setSpeakerMute(true);
            log("[REMOTE TX]", "sys");
        }
        if (data === 'TX_OFF' && state.isRemoteTransmitting) {
            state.isRemoteTransmitting = false;
            DOM.ledTx.classList.remove('tx');
            setSpeakerMute(false);
            playTone(600, 0.1, 'sine');
        }
    }

    // --- UI Updates ---
    function updateConnectionUI(waitingOnly = false) {
        const conn = state.conn;
        const isOpen = conn && conn.open;
        const hasStream = state.currentCall && DOM.remoteAudio.srcObject;
        
        if (waitingOnly && state.role === 'host') {
            DOM.netStat.innerHTML = "NET: WAITING <span class='connecting-spinner'></span>";
            DOM.netStat.style.color = "var(--amber)";
            DOM.ledNet.classList.remove('online');
            return;
        }

        if (isOpen || hasStream) {
            DOM.netStat.textContent = "NET: CONNECTED";
            DOM.netStat.style.color = "var(--blue)";
            DOM.ledNet.classList.add('online');
            state.isConnected = true;
        } else {
            DOM.netStat.textContent = "NET: LINKING...";
            DOM.netStat.style.color = "var(--amber)";
            DOM.ledNet.classList.remove('online');
        }

        // Role badge
        if (state.role === 'host') {
            DOM.roleBadge.innerHTML = '<span class="role-badge role-host">HOST</span>';
        } else if (state.role === 'client') {
            DOM.roleBadge.innerHTML = '<span class="role-badge role-client">REMOTE</span>';
        }
    }

    function enablePTT() {
        DOM.pttBtn.disabled = false;
        DOM.bootBtn.textContent = "LINK ACTIVE";
        DOM.bootBtn.style.color = "var(--green)";
        DOM.curFreq.style.color = "var(--green)";
    }

    function resetUI() {
        DOM.bootBtn.disabled = false;
        DOM.bootBtn.textContent = "INITIALIZE LINK";
        DOM.bootBtn.style.color = "";
        DOM.chanInput.disabled = false;
        DOM.pttBtn.disabled = true;
        DOM.pttBtn.classList.remove('active');
        DOM.ledNet.classList.remove('online');
        DOM.ledTx.classList.remove('tx');
        DOM.netStat.textContent = "NET: DISCONNECTED";
        DOM.netStat.style.color = "";
        DOM.curFreq.style.color = "var(--blue)";
        DOM.roleBadge.innerHTML = "";
        state.isConnected = false;
    }

    // --- Audio Control ---
    function setMicState(enable) {
        if (state.localStream) {
            state.localStream.getAudioTracks().forEach(track => {
                track.enabled = enable;
            });
        }
    }

    function setSpeakerMute(mute) {
        if (state.speakerGain && state.audioCtx) {
            state.speakerGain.gain.setTargetAtTime(
                mute ? 0 : 1,
                state.audioCtx.currentTime,
                0.05
            );
        }
    }

    // --- PTT Logic ---
    function pttActivate() {
        if (!state.conn || !state.conn.open || state.isTransmitting) return;
        
        state.isTransmitting = true;
        setMicState(true);
        setSpeakerMute(true); // Prevent hearing yourself
        state.conn.send('TX_ON');
        
        DOM.ledTx.classList.add('tx');
        DOM.pttBtn.classList.add('active');
        
        playTone(1200, 0.05, 'square');
    }

    function pttDeactivate() {
        if (!state.isTransmitting) return;
        
        state.isTransmitting = false;
        setMicState(false);
        setSpeakerMute(state.isRemoteTransmitting); // Stay muted if remote is TX
        state.conn.send('TX_OFF');
        
        DOM.ledTx.classList.remove('tx');
        DOM.pttBtn.classList.remove('active');
        
        playTone(450, 0.1, 'sine');
    }

    // PTT Event Listeners (passive, not active)
    DOM.pttBtn.addEventListener('mousedown', pttActivate);
    window.addEventListener('mouseup', pttDeactivate);
    
    DOM.pttBtn.addEventListener('touchstart', (e) => { e.preventDefault(); pttActivate(); }, { passive: false });
    DOM.pttBtn.addEventListener('touchend', (e) => { e.preventDefault(); pttDeactivate(); }, { passive: false });
    DOM.pttBtn.addEventListener('touchcancel', (e) => { e.preventDefault(); pttDeactivate(); }, { passive: false });

    // --- Utilities ---
    function playTone(freq, duration, type) {
        if (!state.audioCtx) return;
        
        const osc = state.audioCtx.createOscillator();
        const gain = state.audioCtx.createGain();
        
        osc.type = type;
        osc.frequency.value = freq;
        gain.gain.value = 0.1;
        
        osc.connect(gain);
        gain.connect(state.audioCtx.destination);
        
        osc.start();
        gain.gain.exponentialRampToValueAtTime(0.001, state.audioCtx.currentTime + duration);
        osc.stop(state.audioCtx.currentTime + duration + 0.05);
    }

    function cleanup() {
        if (state.meterRAF) {
            cancelAnimationFrame(state.meterRAF);
        }
        if (state.peer) {
            state.peer.destroy();
        }
        if (state.localStream) {
            state.localStream.getTracks().forEach(track => track.stop());
        }
        if (state.audioCtx) {
            state.audioCtx.close().catch(() => {});
        }
        DOM.remoteAudio.srcObject = null;
    }

    function hardReset() {
        cleanup();
        location.reload();
    }

    // --- Event Bindings ---
    DOM.bootBtn.addEventListener('click', initChannel);
    DOM.resetBtn.addEventListener('click', hardReset);

    // Allow Enter key to initialize
    DOM.chanInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !DOM.bootBtn.disabled) {
            initChannel();
        }
    });

    // Prevent zoom on double-tap for mobile
    document.addEventListener('dblclick', (e) => e.preventDefault());

    // --- Boot Sequence ---
    log("SYSTEM BOOT SEQUENCE INITIATED", "sys");
    setTimeout(() => log("TAC/COM-04 v2.0 READY", "sys"), 300);
    setTimeout(() => log("AWAITING FREQUENCY INPUT...", "sys"), 600);

</script>
</body>
</html>
