<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TAC/COM-04 | SECURE NET v2.4 — FIXED</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root {
            --amber: #ffb000;
            --amber-dim: #8c6600;
            --bg: #0d0900;
            --red: #ff3333;
            --red-dim: #8c1818;
            --blue: #00d4ff;
            --green: #39ff14;
            --panel-bg: #1a1a1a;
        }
        body {
            background: #050505;
            color: var(--amber);
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            touch-action: manipulation;
            overflow: hidden;
        }
        .scanlines {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
            z-index: 999;
        }
        .mainframe {
            width: 95%;
            max-width: 900px;
            background: #222;
            border: 4px solid #333;
            padding: 10px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 40px #000;
            box-sizing: border-box;
            position: relative;
            z-index: 10;
        }
        @media (min-width: 768px) {
            .mainframe {
                display: grid;
                grid-template-columns: 1fr 300px;
                gap: 15px;
                height: 650px;
            }
        }
        .monitor {
            background: var(--bg);
            border: 2px solid #333;
            padding: 15px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: inset 0 0 20px #000;
        }
        .status-bar {
            font-size: 0.7rem;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #333;
            padding-bottom: 5px;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        #output {
            height: 100%;
            overflow-y: auto;
            font-size: 0.85rem;
            scrollbar-width: thin;
            scrollbar-color: var(--amber-dim) #000;
            margin-bottom: 10px;
            word-break: break-all;
        }
        .module {
            background: var(--panel-bg);
            padding: 15px;
            border: 1px solid #444;
            margin-bottom: 15px;
            position: relative;
        }
        .btn-ptt {
            width: 100%;
            height: 120px;
            background: repeating-linear-gradient(45deg, var(--red-dim), var(--red-dim) 10px, #601010 10px, #601010 20px);
            color: white;
            border: 4px solid #442222;
            font-weight: bold;
            font-size: 1.5rem;
            cursor: pointer;
            transition: 0.1s;
            text-shadow: 0 2px 0 #000;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        .btn-ptt:active:not(:disabled) {
            background: var(--red);
            transform: scale(0.98);
            box-shadow: 0 0 15px var(--red);
            border-color: #fff;
        }
        .btn-action {
            width: 100%;
            padding: 12px;
            background: #222;
            color: var(--amber);
            border: 1px solid var(--amber-dim);
            cursor: pointer;
            font-weight: bold;
            font-size: 0.8rem;
            text-transform: uppercase;
            transition: 0.2s;
        }
        input {
            width: 100%;
            background: #000;
            border: 2px solid #444;
            color: var(--blue);
            padding: 12px;
            box-sizing: border-box;
            outline: none;
            text-align: center;
            font-size: 1.5rem;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            letter-spacing: 3px;
        }
        .status-led {
            width: 14px; height: 14px; border-radius: 50%;
            background: #300; border: 1px solid #500;
            margin-bottom: 5px; transition: 0.3s;
        }
        .online { background: var(--blue); box-shadow: 0 0 8px var(--blue); }
        .tx { background: var(--red); box-shadow: 0 0 15px var(--red); }
    </style>
</head>
<body>
<div class="scanlines"></div>
<div class="mainframe">
    <audio id="remoteAudio" autoplay playsinline></audio>

    <div class="monitor">
        <div class="status-bar">
            <span>FREQ: <span id="curFreq" style="color:var(--blue)">--.--</span> MHz</span>
            <span id="netStat">NET: DISCONNECTED</span>
        </div>
        <div id="output"></div>
        
        <div style="margin-top:auto;">
            <div style="display:flex; justify-content:space-between; font-size:0.6rem; margin-bottom:2px;">
                <span>RX LEVEL</span>
                <span id="dbVal">-inf dB</span>
            </div>
            <div id="meter-container"><div id="meter-fill" style="width:0%;height:100%;background:#39ff14;transition:width 0.05s;"></div></div>
        </div>
    </div>

    <div class="side-panel">
        <div class="module">
            <div style="font-size: 0.6rem; color: #777; margin-bottom: 8px; text-align: center;">SET SECURE CHANNEL (1-99)</div>
            <input type="number" id="chanInput" value="5" min="1" max="99">
            <button class="btn-action" id="bootBtn" onclick="initChannel()" style="margin-top:10px;">INITIALIZE LINK</button>
        </div>

        <div class="module" style="text-align:center;">
            <button class="btn-ptt" id="pttBtn" disabled>
                <span>PUSH TO TALK</span>
                <span style="font-size:0.8rem; font-weight:normal; opacity:0.8;">(HOLD)</span>
            </button>
            <div class="led-group" style="display:flex;justify-content:space-around;margin-top:15px;">
                <div class="indicator"><div class="status-led" id="ledNet"></div><span>DATA LINK</span></div>
                <div class="indicator"><div class="status-led" id="ledTx"></div><span>TX</span></div>
            </div>
        </div>

        <button class="btn-action" onclick="hardReset()" style="background:#200; border-color:#500; color:#f55;">SYSTEM RESET</button>
    </div>
</div>

<script>
    let peer = null, conn = null, localStream = null, currentCall = null;
    let audioCtx = null, analyser = null, speakerGain = null;
    let isHost = false;
    const APP_PREFIX = "TAC-COM-SECURE-";

    function log(msg, type="info") {
        const out = document.getElementById('output');
        const div = document.createElement('div');
        const timestamp = new Date().toLocaleTimeString('en-US', {hour12: false, hour: "2-digit", minute: "2-digit", second: "2-digit"});
        div.innerText = `[${timestamp}] > ${msg}`;
        if (type === "error") div.style.color = "#ff3333";
        else if (type === "success") div.style.color = "#39ff14";
        else if (type === "sys") div.style.color = "#888";
        else div.style.color = "#ffb000";
        out.appendChild(div);
        out.scrollTop = out.scrollHeight;
    }

    const iceConfig = {
        config: {
            iceServers: [
                { urls: "stun:stun.l.google.com:19302" },
                { urls: "stun:stun1.l.google.com:19302" },
                { urls: "stun:stun2.l.google.com:19302" },
                { urls: "turn:openrelay.metered.ca:80", username: "openrelayproject", credential: "openrelayproject" },
                { urls: "turn:openrelay.metered.ca:443", username: "openrelayproject", credential: "openrelayproject" }
            ]
        }
    };

    async function initChannel() {
        let val = parseInt(document.getElementById('chanInput').value);
        if (isNaN(val) || val < 1 || val > 99) {
            log("INVALID CHANNEL (01-99)", "error");
            return;
        }
        const chanNum = val.toString().padStart(2, '0');
        const fullId = APP_PREFIX + chanNum;

        document.getElementById('bootBtn').disabled = true;
        document.getElementById('bootBtn').innerText = "LINKING...";
        log(`ATTEMPTING CONNECTION ON CHANNEL ${chanNum}...`, "sys");

        try {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true }});
            setMicState(false);
            setupAudioGraph();
            document.getElementById('curFreq').innerText = "462." + chanNum;

            peer = new Peer(iceConfig);

            peer.on('open', (id) => {
                log("LOCAL NODE READY", "sys");
                conn = peer.connect(fullId);
                currentCall = peer.call(fullId, localStream);
                setupHandlers();
            });

            peer.on('error', (err) => {
                if (err.type === 'peer-unavailable') {
                    log("NO HOST FOUND → BECOMING HOST", "sys");
                    peer.destroy();
                    becomeHost(fullId);
                } else {
                    log("ERROR: " + err.type, "error");
                }
            });

        } catch(e) {
            log("MIC ACCESS DENIED", "error");
            document.getElementById('bootBtn').disabled = false;
            document.getElementById('bootBtn').innerText = "INITIALIZE LINK";
        }
    }

    function becomeHost(hostId) {
        isHost = true;
        peer = new Peer(hostId, iceConfig);
        peer.on('open', () => {
            log("YOU ARE NOW HOST", "success");
            document.getElementById('netStat').innerText = "NET: HOSTING";
            document.getElementById('netStat').style.color = "#39ff14";
            enablePTT();
        });
        peer.on('connection', (c) => { conn = c; setupHandlers(); });
        peer.on('call', (call) => {
            call.answer(localStream);
            setupHandlers(null, call);
        });
    }

    function setupHandlers(connection, call) {
        if (connection) {
            connection.on('open', () => {
                document.getElementById('ledNet').classList.add('online');
                document.getElementById('netStat').innerText = "NET: CONNECTED";
                document.getElementById('netStat').style.color = "#00d4ff";
                enablePTT();
                log("LINK ESTABLISHED SUCCESSFULLY", "success");
            });
        }

        if (call) {
            call.on('stream', (stream) => {
                const audioEl = document.getElementById('remoteAudio');
                audioEl.srcObject = stream;
                audioEl.play().catch(() => {});
                log("REMOTE AUDIO CONNECTED", "success");
            });
        }
    }

    function setupAudioGraph() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        speakerGain = audioCtx.createGain();
        speakerGain.gain.value = 1;
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 64;
        updateMeter();
    }

    function updateMeter() {
        if (!analyser) return;
        const data = new Uint8Array(analyser.frequencyBinCount);
        analyser.getByteFrequencyData(data);
        let avg = data.reduce((a,b) => a+b) / data.length;
        document.getElementById('meter-fill').style.width = Math.min(100, avg * 3) + "%";
        requestAnimationFrame(updateMeter);
    }

    function enablePTT() {
        document.getElementById('pttBtn').disabled = false;
        document.getElementById('bootBtn').innerText = "LINK ACTIVE";
    }

    function setMicState(enable) {
        if (localStream) localStream.getAudioTracks().forEach(t => t.enabled = enable);
    }

    const pttBtn = document.getElementById('pttBtn');
    function pttDown() {
        if (!conn || !conn.open) return;
        setMicState(true);
        conn.send('TX_ON');
        document.getElementById('ledTx').classList.add('tx');
        if (speakerGain) speakerGain.gain.value = 0;
    }
    function pttUp() {
        if (!conn || !conn.open) return;
        setMicState(false);
        conn.send('TX_OFF');
        document.getElementById('ledTx').classList.remove('tx');
        if (speakerGain) speakerGain.gain.value = 1;
    }

    pttBtn.addEventListener('mousedown', pttDown);
    pttBtn.addEventListener('mouseup', pttUp);
    pttBtn.addEventListener('touchstart', e => {e.preventDefault(); pttDown();});
    pttBtn.addEventListener('touchend', e => {e.preventDefault(); pttUp();});

    function hardReset() {
        if (peer) peer.destroy();
        if (localStream) localStream.getTracks().forEach(t => t.stop());
        location.reload();
    }

    log("TAC/COM-04 v2.4 LOADED", "sys");
    log("Use same channel on both devices", "sys");
    log("First device will auto-become host", "success");
</script>
</body>
</html>
