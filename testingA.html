<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OMNI-LINK v14.0</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --accent: #39ff14; --bg: #050505; --panel: #0f0f0f; --border: #222; --warn: #ffcc00; --err: #ff4444; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background: var(--bg); color: #e0e0e0; font-family: 'Segoe UI', system-ui, sans-serif; 
            margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* Header & Diagnostic Indicators */
        .header { padding: 15px 20px; background: #000; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .brand { color: var(--accent); font-weight: bold; font-size: 14px; letter-spacing: 2px; }
        
        .indicators { display: flex; gap: 15px; align-items: center; }
        .indicator-item { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .label { font-size: 8px; color: #666; text-transform: uppercase; }
        .light { width: 8px; height: 8px; border-radius: 50%; background: #222; transition: 0.3s; }
        
        /* Light States */
        .active-sig { background: var(--warn); box-shadow: 0 0 8px var(--warn); }
        .active-net { background: var(--accent); box-shadow: 0 0 8px var(--accent); }

        .console { flex: 1; overflow-y: auto; padding: 20px; background: #000; font-size: 12px; font-family: 'Courier New', monospace; }
        .entry { margin-bottom: 8px; padding: 4px 8px; border-radius: 4px; border-left: 2px solid transparent; }
        .local { color: var(--accent); text-align: right; border-right: 2px solid var(--accent); }
        .remote { color: #00d4ff; border-left: 2px solid #00d4ff; }
        .sys { color: #555; font-size: 11px; text-align: center; }
        .diagnostic { color: var(--warn); font-size: 10px; opacity: 0.8; }

        .controls { padding: 20px; background: var(--panel); border-top: 1px solid var(--border); display: flex; gap: 10px; }
        input { flex: 1; background: #000; border: 1px solid var(--border); color: var(--accent); padding: 14px; outline: none; border-radius: 8px; font-size: 16px; }
        .btn { background: transparent; border: 1px solid var(--accent); color: var(--accent); padding: 0 20px; cursor: pointer; border-radius: 8px; font-weight: bold; font-size: 12px; }
        .btn:active { background: var(--accent); color: #000; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<header class="header">
    <div class="brand">OMNI-LINK // v14</div>
    <div class="indicators">
        <div class="indicator-item">
            <span class="label">Signal</span>
            <div id="sigLight" class="light"></div>
        </div>
        <div class="indicator-item">
            <span class="label">P2P Link</span>
            <div id="netLight" class="light"></div>
        </div>
    </div>
</header>

<main class="console" id="log"></main>

<div class="controls" id="setup">
    <input type="number" id="ch" placeholder="CHANNEL ID" inputmode="numeric">
    <button class="btn" onclick="boot()">BOOT</button>
</div>

<div class="controls hidden" id="chat">
    <input type="text" id="msg" placeholder="TRANSMIT..." autocomplete="off">
    <button class="btn" onclick="send()">SEND</button>
</div>

<script>
    let peer = null, conn = null;
    const PREFIX = 'OMNI-X14-';

    function log(m, c) {
        const d = document.createElement('div');
        d.className = 'entry ' + (c || '');
        d.textContent = m;
        const lb = document.getElementById('log');
        lb.appendChild(d);
        lb.scrollTop = lb.scrollHeight;
    }

    function boot() {
        const id = document.getElementById('ch').value;
        if(!id) return;
        document.getElementById('setup').classList.add('hidden');
        log("DIAG: Initializing signaling server...", "sys");

        peer = new Peer(PREFIX + id, {
            config: { 'iceServers': [
                { 'urls': 'stun:stun.l.google.com:19302' },
                { 'urls': 'stun:stun1.l.google.com:19302' },
                { 'urls': 'stun:stun2.l.google.com:19302' }
            ]}
        });

        peer.on('open', () => {
            log("DIAG: Signaling Active. ID: " + id, "diagnostic");
            document.getElementById('sigLight').className = 'light active-sig';
        });

        peer.on('connection', (c) => {
            log("DIAG: Handshake Request Received.", "diagnostic");
            conn = c;
            setupHandlers();
        });

        peer.on('error', (err) => {
            if(err.type === 'unavailable-id') {
                log("DIAG: Port Occupied. Attempting P2P Join...", "diagnostic");
                peer.destroy();
                const guest = new Peer({ config: peer.options.config });
                guest.on('open', () => {
                    document.getElementById('sigLight').className = 'light active-sig';
                    conn = guest.connect(PREFIX + id, { reliable: true });
                    setupHandlers();
                });
            } else {
                log("FATAL: " + err.type, "sys");
                document.getElementById('setup').classList.remove('hidden');
            }
        });
    }

    function setupHandlers() {
        conn.on('open', () => {
            log("SYSTEM: P2P Tunnel Established.", "sys");
            document.getElementById('netLight').className = 'light active-net';
            document.getElementById('chat').classList.remove('hidden');
            
            // Heartbeat
            setInterval(() => { if(conn.open) conn.send('__h__'); }, 10000);
        });

        conn.on('data', (d) => {
            if(d === '__h__') return;
            log(d, "remote");
        });

        conn.on('close', () => {
            log("ALERT: Link Lost.", "sys");
            document.getElementById('netLight').className = 'light';
            setTimeout(() => location.reload(), 2000);
        });
    }

    function send() {
        const i = document.getElementById('msg');
        if(i.value && conn && conn.open) {
            conn.send(i.value);
            log(i.value, "local");
            i.value = "";
        }
    }

    window.onkeydown = (e) => { if(e.key === 'Enter') send(); };
</script>
</body>
</html>
