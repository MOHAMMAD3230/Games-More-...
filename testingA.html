<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TAC/COM-04 | SECURE NET v2.3 — FIXED</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root {
            --amber: #ffb000; --red: #ff3333; --green: #39ff14; --blue: #00d4ff;
        }
        body {
            background:#050505; color:var(--amber); font-family:'Courier New',monospace;
            margin:0; padding:10px; overflow:auto; touch-action:manipulation;
        }
        .mainframe {
            max-width: 1100px; margin: auto; background:#222; border:6px solid #333;
            padding:15px; box-shadow:0 0 60px #000;
        }
        button {
            width: 100%; padding: 16px; margin: 8px 0; font-size: 1.1rem;
            background: #222; color: var(--amber); border: 3px solid #555;
            cursor: pointer; font-weight: bold;
        }
        button:active { background: #333; transform: scale(0.98); }
        button:disabled { opacity: 0.4; cursor: not-allowed; }
        .ptt {
            height: 160px; font-size: 1.8rem; background: #400; border-color: #f44;
        }
        .ptt:active { background: var(--red); border-color: white; }
        #output { height: 220px; overflow-y: auto; background:#000; padding:10px; font-size:0.9rem; }
        .status { font-size: 1.1rem; padding: 8px; margin: 8px 0; text-align:center; }
    </style>
</head>
<body>
<div class="mainframe">

    <audio id="remoteAudio" autoplay playsinline></audio>

    <div style="text-align:center; margin-bottom:15px; font-size:1.3rem;">
        TAC/COM-04 <span style="color:#39ff14">v2.3</span> — FIXED
    </div>

    <div class="status" id="netStat">NET: OFFLINE</div>

    <div style="margin:15px 0;">
        <input type="number" id="chanInput" value="05" min="1" max="99" 
               style="width:100%; font-size:2rem; text-align:center; padding:12px; background:#111; color:var(--blue); border:3px solid #555;">
    </div>

    <button id="hostBtn" onclick="becomeHost()">1. BECOME HOST (Use on FIRST device)</button>
    <button id="joinBtn" onclick="joinChannel()">2. JOIN CHANNEL (Use on SECOND device)</button>
    <button id="pttBtn" class="ptt" disabled>HOLD TO TALK</button>

    <div style="margin-top:15px;">
        <button onclick="sendTestMessage()">SEND TEST MESSAGE</button>
        <button onclick="hardReset()" style="background:#300;color:#f66;">FULL RESET</button>
    </div>

    <div id="output"></div>
</div>

<script>
    let peer = null;
    let conn = null;
    let call = null;
    let localStream = null;
    let currentChannel = "05";
    let isHost = false;

    const output = document.getElementById('output');
    const netStat = document.getElementById('netStat');
    const pttBtn = document.getElementById('pttBtn');

    function log(msg, color = "#ffb000") {
        const div = document.createElement('div');
        const time = new Date().toLocaleTimeString('en-US', {hour12:false});
        div.innerHTML = `<span style="color:#888">[${time}]</span> <span style="color:${color}">${msg}</span>`;
        output.appendChild(div);
        output.scrollTop = output.scrollHeight;
        console.log(msg);
    }

    function updateStatus(text, color = "#888") {
        netStat.textContent = text;
        netStat.style.color = color;
    }

    // ==================== ICE SERVERS ====================
    const peerConfig = {
        config: {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' },
                { urls: 'turn:openrelay.metered.ca:80', username: "openrelayproject", credential: "openrelayproject" },
                { urls: 'turn:openrelay.metered.ca:443', username: "openrelayproject", credential: "openrelayproject" }
            ]
        }
    };

    async function becomeHost() {
        const val = document.getElementById('chanInput').value.padStart(2, '0');
        currentChannel = val;
        const hostId = "TAC-COM-SECURE-" + val;

        log("BECOMING HOST ON CHANNEL " + val, "#39ff14");
        updateStatus("BECOMING HOST...", "#39ff14");

        try {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            peer = new Peer(hostId, peerConfig);

            peer.on('open', () => {
                log("HOST STARTED SUCCESSFULLY", "#39ff14");
                updateStatus("HOST ACTIVE - WAITING FOR OTHERS", "#39ff14");
                enableAllFeatures();
            });

            peer.on('connection', (c) => {
                conn = c;
                c.on('open', () => { log("CLIENT CONNECTED", "#39ff14"); enableAllFeatures(); });
                c.on('data', (data) => log("DATA: " + JSON.stringify(data)));
            });

            peer.on('call', (incomingCall) => {
                incomingCall.answer(localStream);
                call = incomingCall;
                incomingCall.on('stream', handleRemoteStream);
            });

        } catch (e) {
            log("ERROR: " + e.message, "#ff3333");
        }
    }

    async function joinChannel() {
        const val = document.getElementById('chanInput').value.padStart(2, '0');
        currentChannel = val;
        const targetId = "TAC-COM-SECURE-" + val;

        log("JOINING CHANNEL " + val, "#00d4ff");
        updateStatus("JOINING...", "#00d4ff");

        try {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            peer = new Peer(peerConfig);

            peer.on('open', () => {
                log("CONNECTING TO HOST...", "#00d4ff");
                conn = peer.connect(targetId);
                call = peer.call(targetId, localStream);

                conn.on('open', () => {
                    log("CONNECTED TO HOST!", "#39ff14");
                    updateStatus("LINKED TO HOST", "#39ff14");
                    enableAllFeatures();
                });

                call.on('stream', handleRemoteStream);
            });

        } catch (e) {
            log("ERROR: " + e.message, "#ff3333");
        }
    }

    function handleRemoteStream(stream) {
        const audio = document.getElementById('remoteAudio');
        audio.srcObject = stream;
        audio.play().catch(() => log("Audio autoplay blocked - tap screen", "#ffaa00"));
        log("REMOTE AUDIO RECEIVED", "#39ff14");
    }

    function enableAllFeatures() {
        pttBtn.disabled = false;
        log("ALL FEATURES UNLOCKED - PTT & Chat Ready", "#39ff14");
    }

    // PTT
    function pttDown() {
        if (localStream) localStream.getAudioTracks()[0].enabled = true;
        pttBtn.style.background = "#ff3333";
    }
    function pttUp() {
        if (localStream) localStream.getAudioTracks()[0].enabled = false;
        pttBtn.style.background = "#400";
    }

    pttBtn.addEventListener('mousedown', pttDown);
    pttBtn.addEventListener('mouseup', pttUp);
    pttBtn.addEventListener('mouseleave', pttUp);
    pttBtn.addEventListener('touchstart', (e) => { e.preventDefault(); pttDown(); });
    pttBtn.addEventListener('touchend', (e) => { e.preventDefault(); pttUp(); });

    function sendTestMessage() {
        if (conn && conn.open) {
            conn.send({type: "chat", msg: "Test message from " + (isHost ? "Host" : "Client")});
            log("Test message sent", "#00d4ff");
        } else {
            log("Not connected yet", "#ff3333");
        }
    }

    function hardReset() {
        if (peer) peer.destroy();
        if (localStream) localStream.getTracks().forEach(t => t.stop());
        location.reload();
    }

    // Initial log
    log("TAC/COM-04 v2.3 LOADED SUCCESSFULLY", "#39ff14");
    log("1. First device → click BECOME HOST", "#ffb000");
    log("2. Second device → click JOIN CHANNEL", "#ffb000");
    log("Make sure both use SAME channel number", "#ffb000");
</script>
</body>
</html>
