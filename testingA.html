<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta name="referrer" content="no-referrer">
    <meta name="permissions-policy" content="microphone=(self), camera=(), geolocation=()">
    <title>TAC/COM-04 | SECURE NET</title>
    
    <!-- PeerJS pinned version -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js" crossorigin="anonymous"></script>

    <style>
        :root {
            --amber: #ffb000; --amber-dim: #8c6600; --bg: #0d0900;
            --red: #ff3333; --red-dim: #8c1818; --blue: #00d4ff;
            --green: #39ff14; --panel-bg: #1a1a1a;
        }
        *, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html { overscroll-behavior: none; }
        body {
            background: #050505; color: var(--amber);
            font-family: 'Courier New', Courier, monospace;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; min-height: 100dvh; margin: 0;
            touch-action: manipulation; overflow: hidden;
            -webkit-touch-callout: none; -webkit-user-select: none; user-select: none;
        }
        .scanlines {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,0.25) 50%), linear-gradient(90deg, rgba(255,0,0,0.06), rgba(0,255,0,0.02), rgba(0,0,255,0.06));
            background-size: 100% 2px, 3px 100%; pointer-events: none; z-index: 999;
        }
        .mainframe {
            width: 95%; max-width: 900px; background: #222; border: 4px solid #333;
            padding: 10px; display: flex; flex-direction: column;
            box-shadow: 0 0 40px #000; position: relative; z-index: 10;
            height: 100vh; height: 100dvh; overflow: hidden;
        }
        @media (min-width: 768px) {
            .mainframe { display: grid; grid-template-columns: 1fr 300px; gap: 15px; height: 650px; max-height: 90vh; }
        }
        .monitor {
            background: var(--bg); border: 2px solid #333; padding: 12px;
            display: flex; flex-direction: column; position: relative;
            box-shadow: inset 0 0 20px #000; overflow: hidden; min-height: 0;
        }
        @media (max-width: 767px) { .monitor { flex: 0 0 40vh; min-height: 180px; } }
        .status-bar {
            font-size: 0.7rem; display: flex; justify-content: space-between;
            border-bottom: 1px solid #333; padding-bottom: 6px; margin-bottom: 8px;
            text-transform: uppercase; letter-spacing: 1px; flex-shrink: 0;
        }
        #output {
            flex: 1; overflow-y: auto; font-size: 0.8rem; line-height: 1.4;
            scrollbar-width: thin; scrollbar-color: var(--amber-dim) #000;
            margin-bottom: 8px; word-break: break-word; overscroll-behavior: contain;
            -webkit-user-select: text; user-select: text;
        }
        @media (max-width: 767px) { #output { font-size: 0.7rem; } }
        #output::-webkit-scrollbar { width: 5px; }
        #output::-webkit-scrollbar-thumb { background: var(--amber-dim); border-radius: 3px; }
        .log-entry { padding: 2px 0; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .log-error { color: var(--red) !important; }
        .log-success { color: var(--green) !important; }
        .log-sys { color: #888 !important; }
        
        .side-panel {
            display: flex; flex-direction: column; gap: 10px;
            overflow-y: auto; overscroll-behavior: contain; scrollbar-width: none; min-height: 0;
        }
        .side-panel::-webkit-scrollbar { display: none; }
        @media (min-width: 768px) { .side-panel { overflow: visible; } }
        
        .module {
            background: var(--panel-bg); padding: 14px; border: 1px solid #444;
            position: relative; flex-shrink: 0;
        }
        .module::before { content: ''; position: absolute; top: 2px; left: 2px; right: 2px; height: 1px; background: #444; }
        
        input[type="text"] {
            width: 100%; background: #000; border: 2px solid #444; color: var(--blue);
            padding: 12px; outline: none; text-align: center; font-size: 1.5rem;
            font-family: 'Courier New', monospace; font-weight: bold; letter-spacing: 3px;
            -webkit-appearance: none; appearance: none;
        }
        input[type="text"]:focus { border-color: var(--blue); }
        input[type="text"].input-error { border-color: var(--red); animation: shake 0.4s ease; }
        @keyframes shake { 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }
        
        .btn-action {
            width: 100%; padding: 12px; background: #222; color: var(--amber);
            border: 1px solid var(--amber-dim); cursor: pointer; font-weight: bold;
            font-size: 0.75rem; font-family: 'Courier New', monospace; text-transform: uppercase;
            letter-spacing: 1px; transition: 0.2s; min-height: 44px;
            -webkit-appearance: none; appearance: none;
        }
        .btn-action:hover:not(:disabled) { background: var(--amber-dim); color: #000; }
        .btn-action:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-reset { background: #1a0808; border-color: #500; color: #f55; }
        
        .btn-ptt {
            width: 100%; height: 110px;
            background: repeating-linear-gradient(45deg, var(--red-dim), var(--red-dim) 10px, #601010 10px, #601010 20px);
            color: white; border: 4px solid #442222; font-weight: bold; font-size: 1.4rem;
            font-family: 'Courier New', monospace; cursor: pointer; transition: 0.05s;
            text-shadow: 0 2px 0 #000; display: flex; align-items: center;
            justify-content: center; flex-direction: column; gap: 4px; min-height: 80px;
            -webkit-appearance: none; appearance: none;
        }
        .btn-ptt:active:not(:disabled) { background: var(--red); transform: scale(0.97); box-shadow: 0 0 20px var(--red); border-color: #fff; }
        .btn-ptt:disabled { background: #181818; color: #444; border-color: #2a2a2a; cursor: not-allowed; }
        .ptt-sub { font-size: 0.7rem; font-weight: normal; opacity: 0.7; }
        
        .led-group { display: flex; justify-content: space-around; margin-top: 14px; }
        .indicator { display: flex; flex-direction: column; align-items: center; font-size: 0.55rem; color: #999; }
        .status-led { width: 14px; height: 14px; border-radius: 50%; background: #250000; border: 1px solid #400; margin-bottom: 5px; transition: 0.3s; }
        .led-online { background: var(--blue); box-shadow: 0 0 8px var(--blue); border-color: #fff; }
        .led-tx { background: var(--red); box-shadow: 0 0 12px var(--red); border-color: #fff; }
        .led-host { background: var(--green); box-shadow: 0 0 8px var(--green); border-color: #fff; }
        
        .meter-wrapper { margin-top: auto; flex-shrink: 0; }
        .meter-header { display: flex; justify-content: space-between; font-size: 0.6rem; margin-bottom: 3px; color: #999; }
        #meter-container { width: 100%; height: 8px; background: #000; border: 1px solid #444; }
        #meter-fill { width: 0%; height: 100%; background: var(--green); transition: width 0.06s linear; }
        .state-banner { font-size: 0.6rem; text-align: center; padding: 4px; letter-spacing: 1px; text-transform: uppercase; flex-shrink: 0; color: #555; }
        .privacy-notice { font-size: 0.5rem; color: #444; text-align: center; padding: 6px; line-height: 1.3; border-top: 1px solid #222; flex-shrink: 0; }
        @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; } }
    </style>
</head>
<body>

<div class="scanlines" aria-hidden="true"></div>
<audio id="remoteAudio" autoplay playsinline style="display:none;"></audio>

<div class="mainframe">
    <div class="monitor" role="log" aria-label="Comm log">
        <div class="status-bar">
            <span>FREQ: <span id="curFreq" style="color:var(--blue)">--.--</span> MHz</span>
            <span id="netStat">NET: OFFLINE</span>
        </div>
        <div id="output">
            <div class="log-entry log-sys">> TAC/COM-04 TERMINAL READY</div>
        </div>
        <div class="meter-wrapper">
            <div class="meter-header"><span>RX LEVEL</span><span id="dbVal">-inf dB</span></div>
            <div id="meter-container"><div id="meter-fill"></div></div>
        </div>
    </div>

    <div class="side-panel">
        <div class="module">
            <div style="font-size:0.6rem; color:#999; margin-bottom:8px; text-align:center;">SET CHANNEL (01-99)</div>
            <input type="text" id="chanInput" value="1" inputmode="numeric" maxlength="2" autocomplete="off" aria-label="Channel">
            <button class="btn-action" id="bootBtn" style="margin-top:10px;">INITIALIZE LINK</button>
        </div>
        
        <div class="state-banner" id="stateBanner">STANDBY</div>

        <div class="module" style="text-align:center;">
            <button class="btn-ptt" id="pttBtn" disabled aria-label="Push to talk">
                <span>PUSH TO TALK</span>
                <span class="ptt-sub">(HOLD)</span>
            </button>
            <div class="led-group">
                <div class="indicator"><div class="status-led" id="ledNet"></div><span>LINK</span></div>
                <div class="indicator"><div class="status-led" id="ledTx"></div><span>TX</span></div>
            </div>
        </div>

        <button class="btn-action btn-reset" id="resetBtn">SYSTEM RESET</button>
        <div class="privacy-notice">WebRTC Encrypted. No data stored.<br>If stuck on "LINKING", your network/firewall is blocking WebRTC.</div>
    </div>
</div>

<script>
    // ====================================================================
    // HARDCORE NETWORK CONFIGURATION
    // ====================================================================
    var APP_PREFIX = "TACCOM04-";
    
    // Robust ICE Config (Google STUN + Free Metered TURN fallback)
    var ICE_CONFIG = {
        iceServers: [
            { urls: 'stun:stun.l.google.com:19302' },
            { urls: 'stun:stun1.l.google.com:19302' },
            // Open Relay Project (Free TURN fallback for strict NATs/Firewalls)
            { urls: 'stun:openrelay.metered.ca:80' },
            { urls: 'turn:openrelay.metered.ca:80', username: 'openrelayproject', credential: 'openrelayproject' },
            { urls: 'turn:openrelay.metered.ca:443', username: 'openrelayproject', credential: 'openrelayproject' },
            { urls: 'turn:openrelay.metered.ca:443?transport=tcp', username: 'openrelayproject', credential: 'openrelayproject' }
        ]
    };

    // ====================================================================
    // STATE
    // ====================================================================
    var peer = null, conn = null, localStream = null, audioCtx = null;
    var delayNode = null, analyser = null, speakerGain = null, currentCall = null;
    var isTransmitting = false, isConnected = false, isHost = false;
    var remoteAudioSource = null, meterRAF = null;

    // ====================================================================
    // DOM CACHE
    // ====================================================================
    var dom = {
        output: document.getElementById('output'),
        chanInput: document.getElementById('chanInput'),
        bootBtn: document.getElementById('bootBtn'),
        pttBtn: document.getElementById('pttBtn'),
        resetBtn: document.getElementById('resetBtn'),
        curFreq: document.getElementById('curFreq'),
        netStat: document.getElementById('netStat'),
        ledNet: document.getElementById('ledNet'),
        ledTx: document.getElementById('ledTx'),
        meterFill: document.getElementById('meter-fill'),
        dbVal: document.getElementById('dbVal'),
        remoteAudio: document.getElementById('remoteAudio'),
        stateBanner: document.getElementById('stateBanner')
    };

    dom.chanInput.addEventListener('input', function() { this.value = this.value.replace(/[^0-9]/g, ''); this.classList.remove('input-error'); });

    // ====================================================================
    // LOGGING
    // ====================================================================
    function log(msg, type) {
        var div = document.createElement('div');
        div.className = 'log-entry' + (type ? ' log-' + type : '');
        var ts = new Date().toLocaleTimeString('en-US', {hour12:false, hour:"2-digit", minute:"2-digit", second:"2-digit"});
        div.textContent = '[' + ts + '] > ' + msg;
        dom.output.appendChild(div);
        if (dom.output.children.length > 150) dom.output.removeChild(dom.output.firstChild);
        dom.output.scrollTop = dom.output.scrollHeight;
    }

    // ====================================================================
    // INITIALIZATION
    // ====================================================================
    async function initChannel() {
        if (peer) return;
        var num = parseInt(dom.chanInput.value, 10);
        if (isNaN(num) || num < 1 || num > 99) {
            log('INVALID CHANNEL. RANGE 01-99.', 'error');
            dom.chanInput.classList.add('input-error');
            return;
        }
        var chanStr = num.toString().padStart(2, '0');
        var targetId = APP_PREFIX + chanStr;

        dom.bootBtn.disabled = true; dom.bootBtn.textContent = 'LINKING...'; dom.chanInput.disabled = true;
        dom.stateBanner.textContent = 'CONNECTING...'; dom.stateBanner.style.color = 'var(--amber)';
        log('CONNECTING TO CH ' + chanStr + '...', 'sys');

        try {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true } });
            setMicState(false);
            initAudioGraph();
            if (audioCtx.state === 'suspended') await audioCtx.resume();
            dom.curFreq.textContent = '462.' + chanStr;
            connectAsClient(targetId);
        } catch(e) {
            log('MIC ERROR: ' + e.message, 'error');
            resetUI();
        }
    }

    function initAudioGraph() {
        var AC = window.AudioContext || window.webkitAudioContext;
        audioCtx = new AC();
        speakerGain = audioCtx.createGain(); speakerGain.gain.value = 1;
        delayNode = audioCtx.createDelay(5); delayNode.delayTime.value = 0.05;
        analyser = audioCtx.createAnalyser(); analyser.fftSize = 64;
        delayNode.connect(analyser); analyser.connect(speakerGain); speakerGain.connect(audioCtx.destination);
        startMeter();
    }

    function startMeter() {
        if (meterRAF) cancelAnimationFrame(meterRAF);
        (function loop() {
            if (!analyser) return;
            var arr = new Uint8Array(analyser.frequencyBinCount);
            analyser.getByteFrequencyData(arr);
            var sum = 0; for(var i=0; i<arr.length; i++) sum += arr[i];
            var pct = Math.min(100, (sum/arr.length) * 3);
            dom.meterFill.style.width = pct + '%';
            dom.dbVal.textContent = pct > 5 ? '-' + (100-pct).toFixed(0) + ' dB' : '-inf dB';
            meterRAF = requestAnimationFrame(loop);
        })();
    }

    // ====================================================================
    // PEERJS CONNECTION LOGIC (ROBUST)
    // ====================================================================
    
    // Create Peer with explicit config to avoid GitHub Pages WSS blocks
    function createPeer(id) {
        return new Peer(id, {
            debug: 1, // Set to 0 for production, 1 for basic logging
            config: ICE_CONFIG,
            // secure: true forces WSS. If GH Pages blocks it, PeerJS falls back to HTTP polling automatically.
            secure: true 
        });
    }

    function connectAsClient(targetId) {
        peer = createPeer(); 
        var timeout = setTimeout(function() {
            log('SIGNAL TIMEOUT. ASSUMING CHANNEL CLEAR.', 'sys');
            if(peer) peer.destroy();
            peer = null; becomeHost(targetId);
        }, 6000); // 6 second timeout

        peer.on('open', function() {
            clearTimeout(timeout);
            log('SIGNAL ONLINE. PROBING TARGET...', 'sys');
            conn = peer.connect(targetId, { reliable: true });
            try { currentCall = peer.call(targetId, localStream); } catch(e) {}
            bindHandlers(conn, currentCall);
        });

        peer.on('error', function(err) {
            clearTimeout(timeout);
            if (err.type === 'peer-unavailable') {
                log('CHANNEL CLEAR. BECOMING HOST.', 'sys');
                if(peer) peer.destroy(); peer = null; conn = null; currentCall = null;
                becomeHost(targetId);
            } else if (err.type === 'unavailable-id') {
                log('CHANNEL OCCUPIED. RETRYING...', 'error');
                if(peer) peer.destroy(); peer = null;
                setTimeout(function() { if(!isConnected) connectAsClient(targetId); }, 2000);
            } else {
                log('NETWORK ERROR: ' + err.type, 'error');
                cleanupAndReset();
            }
        });
    }

    function becomeHost(hostId) {
        dom.stateBanner.textContent = 'CLAIMING CHANNEL...'; dom.stateBanner.style.color = 'var(--amber)';
        peer = createPeer(hostId);

        peer.on('open', function(id) {
            isHost = true;
            log('HOSTING CH ' + id.substring(id.length-2) + '. WAITING FOR INCOMING.', 'success');
            dom.netStat.textContent = 'NET: HOSTING'; dom.netStat.style.color = 'var(--green)';
            dom.ledNet.classList.add('led-host');
            dom.stateBanner.textContent = 'HOSTING'; dom.stateBanner.style.color = 'var(--green)';
            enablePTT();
        });

        peer.on('connection', function(c) {
            if (isConnected) { c.close(); return; }
            log('INCOMING HANDSHAKE.', 'sys'); conn = c; bindHandlers(c, null);
        });

        peer.on('call', function(call) {
            if (isConnected) { call.close(); return; }
            log('INCOMING VOICE LINK.', 'sys'); call.answer(localStream); currentCall = call; bindHandlers(null, call);
        });

        peer.on('error', function(err) {
            if (err.type === 'unavailable-id') {
                log('CHANNEL TAKEN. SWITCHING TO CLIENT.', 'sys');
                if(peer) peer.destroy(); peer = null; isHost = false;
                setTimeout(function() { if(!isConnected) connectAsClient(hostId); }, 1500);
            } else {
                log('HOST ERROR: ' + err.type, 'error'); cleanupAndReset();
            }
        });
    }

    function bindHandlers(connection, call) {
        if (connection) {
            connection.on('open', function() {
                isConnected = true;
                dom.ledNet.className = 'status-led led-online';
                dom.netStat.textContent = 'NET: CONNECTED'; dom.netStat.style.color = 'var(--blue)';
                dom.stateBanner.textContent = 'LINK ACTIVE'; dom.stateBanner.style.color = 'var(--blue)';
                enablePTT(); log('DATA LINK ESTABLISHED.', 'success');
            });
            connection.on('data', function(data) {
                if (typeof data !== 'string') return;
                if (data === 'TX_ON') { dom.ledTx.classList.add('led-tx'); if(speakerGain) speakerGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.05); }
                if (data === 'TX_OFF') { dom.ledTx.classList.remove('led-tx'); if(speakerGain) speakerGain.gain.setTargetAtTime(1, audioCtx.currentTime, 0.3); playTone(600, 0.08); }
            });
            connection.on('close', function() { log('LINK LOST.', 'error'); handleDisconnect(); });
        }
        if (call) {
            call.on('stream', function(stream) {
                dom.remoteAudio.srcObject = stream;
                try { remoteAudioSource = audioCtx.createMediaStreamSource(stream); remoteAudioSource.connect(delayNode); } catch(e) {}
                log('REMOTE AUDIO SYNCED.', 'success');
            });
            call.on('close', function() { log('CALL ENDED.', 'error'); handleDisconnect(); });
        }
    }

    function handleDisconnect() { isConnected = false; isTransmitting = false; dom.ledTx.classList.remove('led-tx'); setTimeout(cleanupAndReset, 2000); }

    // ====================================================================
    // PTT CONTROLS
    // ====================================================================
    function enablePTT() { dom.pttBtn.disabled = false; dom.bootBtn.textContent = 'LINK ACTIVE'; dom.curFreq.style.color = 'var(--green)'; }
    function setMicState(en) { if(localStream) localStream.getAudioTracks().forEach(function(t){ t.enabled = en; }); }
    
    function pttDown() {
        if (!conn || !conn.open || isTransmitting) return;
        isTransmitting = true; setMicState(true);
        try { conn.send('TX_ON'); } catch(e) {}
        dom.ledTx.classList.add('led-tx');
        if(speakerGain) speakerGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.01);
        playTone(1200, 0.04, 'square');
    }
    function pttUp() {
        if (!isTransmitting) return;
        isTransmitting = false; setMicState(false);
        try { conn.send('TX_OFF'); } catch(e) {}
        dom.ledTx.classList.remove('led-tx');
        if(speakerGain) speakerGain.gain.setTargetAtTime(1, audioCtx.currentTime, 0.4);
        playTone(450, 0.08);
    }

    dom.pttBtn.addEventListener('mousedown', function(e){ e.preventDefault(); pttDown(); });
    window.addEventListener('mouseup', pttUp);
    dom.pttBtn.addEventListener('touchstart', function(e){ e.preventDefault(); pttDown(); }, {passive:false});
    dom.pttBtn.addEventListener('touchend', function(e){ e.preventDefault(); pttUp(); }, {passive:false});
    dom.pttBtn.addEventListener('touchcancel', function(e){ e.preventDefault(); pttUp(); }, {passive:false});
    dom.pttBtn.addEventListener('contextmenu', function(e){ e.preventDefault(); });

    function playTone(f, d, t) {
        if(!audioCtx) return;
        try { var o=audioCtx.createOscillator(), g=audioCtx.createGain(); o.type=t||'sine'; o.frequency.value=f; g.gain.value=0.08; o.connect(g); g.connect(audioCtx.destination); o.start(); g.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime+d); o.stop(audioCtx.currentTime+d+0.01); } catch(e){}
    }

    // ====================================================================
    // CLEANUP & RESET
    // ====================================================================
    function resetUI() {
        dom.bootBtn.disabled = false; dom.bootBtn.textContent = 'INITIALIZE LINK'; dom.chanInput.disabled = false;
        dom.pttBtn.disabled = true; dom.curFreq.textContent = '--.--'; dom.curFreq.style.color = 'var(--blue)';
        dom.netStat.textContent = 'NET: OFFLINE'; dom.netStat.style.color = 'var(--amber)';
        dom.ledNet.className = 'status-led'; dom.ledTx.className = 'status-led';
        dom.meterFill.style.width = '0%'; dom.dbVal.textContent = '-inf dB';
        dom.stateBanner.textContent = 'STANDBY'; dom.stateBanner.style.color = '#555';
    }

    function cleanupAndReset() {
        if (peer) { try { peer.destroy(); } catch(e){} peer = null; }
        if (localStream) { localStream.getTracks().forEach(function(t){ t.stop(); }); localStream = null; }
        dom.remoteAudio.srcObject = null;
        if (meterRAF) cancelAnimationFrame(meterRAF);
        if (remoteAudioSource) { try{remoteAudioSource.disconnect();}catch(e){} remoteAudioSource = null; }
        if (delayNode) { try{delayNode.disconnect();}catch(e){} }
        if (analyser) { try{analyser.disconnect();}catch(e){} }
        if (speakerGain) { try{speakerGain.disconnect();}catch(e){} }
        if (audioCtx) { try{audioCtx.close();}catch(e){} audioCtx = null; }
        delayNode = null; analyser = null; speakerGain = null;
        conn = null; currentCall = null; isConnected = false; isTransmitting = false; isHost = false;
        resetUI(); log('SYSTEM RESET.', 'sys');
    }

    // ====================================================================
    // EVENT LISTENERS
    // ====================================================================
    dom.bootBtn.addEventListener('click', initChannel);
    dom.resetBtn.addEventListener('click', cleanupAndReset);
    dom.chanInput.addEventListener('keydown', function(e) { if(e.key==='Enter') initChannel(); });
    window.addEventListener('beforeunload', function(e) { if(isConnected) { e.preventDefault(); e.returnValue=''; } });

</script>
</body>
</html>
