<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TAC/COM-04 | SECURE NET v2.1</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root {
            --amber: #ffb000; --amber-dim: #8c6600; --bg: #0d0900;
            --red: #ff3333; --green: #39ff14; --blue: #00d4ff;
            --panel-bg: #1a1a1a;
        }
        body { background:#050505; color:var(--amber); font-family:'Courier New',monospace; margin:0; padding:0; overflow:hidden; }
        .scanlines { position:fixed; top:0; left:0; width:100%; height:100%; background:linear-gradient(rgba(18,16,16,0)50%,rgba(0,0,0,0.25)50%), linear-gradient(90deg,rgba(255,0,0,0.04),rgba(0,255,0,0.01),rgba(0,0,255,0.04)); background-size:100% 3px,4px 100%; pointer-events:none; z-index:999; }
        .mainframe {
            width:96%; max-width:1100px; margin:12px auto; background:#222; border:6px solid #333; padding:15px;
            box-shadow:0 0 60px #000; display:grid; grid-template-columns:1fr 380px; gap:18px; height:calc(100vh - 24px); box-sizing:border-box;
        }
        @media (max-width:768px) { .mainframe { grid-template-columns:1fr; height:auto; min-height:100vh; } }
        .monitor { background:var(--bg); border:3px solid #444; padding:18px; display:flex; flex-direction:column; box-shadow:inset 0 0 30px #000; }
        .status-bar { font-size:0.78rem; display:flex; justify-content:space-between; align-items:center; border-bottom:2px solid #444; padding-bottom:8px; margin-bottom:12px; text-transform:uppercase; }
        .enc-badge { background:#003300; color:var(--green); padding:2px 8px; font-size:0.65rem; border:1px solid var(--green); border-radius:2px; }
        #output { flex-grow:1; overflow-y:auto; font-size:0.88rem; padding-right:8px; line-height:1.4; }
        .chat-box { margin-top:12px; border-top:2px solid #444; padding-top:10px; }
        .chat-messages { height:160px; overflow-y:auto; font-size:0.85rem; background:#000; padding:8px; border:1px solid #555; }
        .chat-input { display:flex; gap:6px; margin-top:6px; }
        .chat-input input { flex:1; background:#111; border:2px solid #666; color:var(--blue); padding:10px; font-size:1rem; }
        .module { background:var(--panel-bg); padding:16px; border:2px solid #444; margin-bottom:14px; }
        .btn-ptt {
            width:100%; height:138px; background:#222; color:white; border:6px solid #444; font-size:1.65rem; font-weight:bold;
            cursor:pointer; transition:all 0.1s; display:flex; align-items:center; justify-content:center; flex-direction:column;
        }
        .btn-ptt:active:not(:disabled) { background:var(--red); border-color:#fff; transform:scale(0.96); }
        .btn-action { width:100%; padding:14px; background:#222; color:var(--amber); border:2px solid var(--amber-dim); cursor:pointer; font-weight:bold; font-size:0.9rem; }
        .btn-action:hover:not(:disabled) { background:var(--amber-dim); color:#000; }
        .channel-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:6px; margin-top:8px; }
        .chan-btn { padding:10px; font-size:1.1rem; background:#111; border:2px solid #555; color:var(--blue); cursor:pointer; }
        .chan-btn.active { background:var(--blue); color:#000; border-color:var(--blue); }
        .signal-bars { display:flex; gap:3px; align-items:flex-end; height:28px; }
        .bar { width:10px; background:#222; transition:height 0.15s linear; }
        .bar.active { background:var(--green); box-shadow:0 0 6px var(--green); }
    </style>
</head>
<body>
<div class="scanlines"></div>
<div class="mainframe">
    <audio id="remoteAudio" autoplay playsinline style="display:none;"></audio>

    <div class="monitor">
        <div class="status-bar">
            <span>FREQ: <span id="curFreq" style="color:var(--blue)">462.--</span> MHz</span>
            <span id="netStat" style="color:#888">NET: OFFLINE</span>
            <span class="enc-badge">🔒 E2EE</span>
            <div class="signal-bars" id="signalBars">
                <div class="bar" style="height:20%"></div><div class="bar" style="height:40%"></div>
                <div class="bar" style="height:65%"></div><div class="bar" style="height:85%"></div><div class="bar" style="height:100%"></div>
            </div>
        </div>
        <div id="output"></div>
        <div class="chat-box">
            <div style="font-size:0.75rem;color:#777;margin-bottom:6px;">ENCRYPTED CHAT</div>
            <div id="chatMessages" class="chat-messages"></div>
            <div class="chat-input">
                <input type="text" id="chatInput" placeholder="TYPE MESSAGE..." onkeypress="if(event.key==='Enter') sendChat()">
                <button class="btn-action" onclick="sendChat()" style="width:90px">SEND</button>
            </div>
        </div>
    </div>

    <div>
        <div class="module">
            <div style="text-align:center;font-size:0.75rem;color:#777;margin-bottom:10px;">CHANNEL (01-99)</div>
            <input type="number" id="chanInput" value="01" min="1" max="99" style="width:100%;font-size:2.2rem;text-align:center;background:#000;border:3px solid #555;color:var(--blue);padding:8px;">
            <div style="margin-top:12px;font-size:0.75rem;color:#777;text-align:center;">QUICK</div>
            <div class="channel-grid" id="quickChannels"></div>
            <button class="btn-action" id="bootBtn" onclick="initChannel()" style="margin-top:14px;">CONNECT TO CHANNEL</button>
        </div>

        <div class="module" style="text-align:center;">
            <button class="btn-ptt" id="pttBtn" disabled>PUSH TO TALK<br><span style="font-size:0.85rem;opacity:0.75">(HOLD)</span></button>
            <div style="margin-top:18px;display:flex;justify-content:center;gap:40px;">
                <div style="text-align:center;"><div id="ledNet" style="width:22px;height:22px;border-radius:50%;background:#300;border:3px solid #500;margin:0 auto 6px;"></div><span style="font-size:0.75rem">LINK</span></div>
                <div style="text-align:center;"><div id="ledTx" style="width:22px;height:22px;border-radius:50%;background:#300;border:3px solid #500;margin:0 auto 6px;"></div><span style="font-size:0.75rem">TX</span></div>
            </div>
        </div>

        <button class="btn-action" onclick="hardReset()" style="background:#300;color:#f66;border-color:#800;">RESET</button>
    </div>
</div>

<script>
    let peer = null, connections = [], calls = [], localStream = null;
    let audioCtx = null, analyser = null, remoteGain = null;
    let currentChannel = "01";
    let isConnected = false;
    const APP_PREFIX = "TAC-COM-SECURE-";

    const output = document.getElementById('output');
    const chatMessages = document.getElementById('chatMessages');

    function log(msg, type="info") {
        const div = document.createElement('div');
        const time = new Date().toLocaleTimeString('en-US',{hour12:false,hour:"2-digit",minute:"2-digit",second:"2-digit"});
        div.textContent = `[${time}] > ${msg}`;
        if(type==="error") div.style.color="#f66";
        if(type==="success") div.style.color="#39ff14";
        if(type==="sys") div.style.color="#888";
        output.appendChild(div);
        output.scrollTop = output.scrollHeight;
    }

    function addChat(msg, from="REMOTE") {
        const div = document.createElement('div');
        div.innerHTML = `<span style="color:#0af">[${from}]</span> ${msg}`;
        chatMessages.appendChild(div);
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    // ==================== IMPROVED ICE SERVERS (CRITICAL FOR CROSS-NETWORK) ====================
    const iceConfig = {
        iceServers: [
            { urls: "stun:stun.l.google.com:19302" },
            { urls: "stun:stun1.l.google.com:19302" },
            { urls: "stun:stun2.l.google.com:19302" },
            { urls: "stun:stun3.l.google.com:19302" },
            { urls: "stun:stun4.l.google.com:19302" },
            { urls: "turn:openrelay.metered.ca:80", username: "openrelayproject", credential: "openrelayproject" },
            { urls: "turn:openrelay.metered.ca:443", username: "openrelayproject", credential: "openrelayproject" },
            { urls: "turn:openrelay.metered.ca:443?transport=tcp", username: "openrelayproject", credential: "openrelayproject" }
        ]
    };

    async function initChannel() {
        let val = parseInt(document.getElementById('chanInput').value);
        if (isNaN(val) || val < 1 || val > 99) return log("INVALID CHANNEL", "error");

        currentChannel = val.toString().padStart(2, '0');
        const targetId = APP_PREFIX + currentChannel;

        if (peer) peer.destroy();
        connections = []; calls = []; isConnected = false;

        document.getElementById('bootBtn').innerText = "CONNECTING...";
        document.getElementById('curFreq').innerText = `462.${currentChannel}`;
        log(`ATTEMPTING SECURE LINK ON CHANNEL ${currentChannel}...`, "sys");

        try {
            localStream = await navigator.mediaDevices.getUserMedia({ 
                audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true } 
            });

            await setupAudio();

            peer = new Peer({ config: iceConfig });

            peer.on('open', (id) => {
                log(`LOCAL NODE READY (${id.slice(0,8)}...)`, "sys");
                const conn = peer.connect(targetId);
                const call = peer.call(targetId, localStream);
                handleConnection(conn, call);
            });

            peer.on('error', (err) => {
                log("ERROR: " + err.type + " — Try different network or channel", "error");
                if (err.type === 'peer-unavailable') {
                    log("No host found → Becoming host...", "sys");
                    becomeHost(targetId);
                }
            });

            peer.on('connection', c => handleConnection(c, null));
            peer.on('call', call => {
                call.answer(localStream);
                handleConnection(null, call);
            });

        } catch(e) {
            log("MIC ACCESS DENIED OR NETWORK ERROR", "error");
        }
    }

    function becomeHost(hostId) {
        peer = new Peer(hostId, { config: iceConfig });
        peer.on('open', () => {
            log("YOU ARE NOW THE HOST", "success");
            document.getElementById('netStat').innerText = "HOST";
            document.getElementById('netStat').style.color = "var(--green)";
            enablePTT();
            isConnected = true;
        });
        peer.on('connection', c => handleConnection(c, null));
        peer.on('call', call => { call.answer(localStream); handleConnection(null, call); });
    }

    function handleConnection(connection, call) {
        if (connection) {
            connections.push(connection);
            connection.on('open', () => {
                isConnected = true;
                document.getElementById('ledNet').style.background = "#00d4ff";
                document.getElementById('ledNet').style.boxShadow = "0 0 12px #00d4ff";
                document.getElementById('netStat').innerText = `LINKED (${connections.length})`;
                document.getElementById('netStat').style.color = "var(--blue)";
                enablePTT();
                log("DATA LINK ESTABLISHED", "success");
            });
            connection.on('data', data => { if(data.type==="chat") addChat(data.msg, "REMOTE"); });
        }

        if (call) {
            calls.push(call);
            call.on('stream', stream => {
                const audioEl = document.getElementById('remoteAudio');
                audioEl.srcObject = stream;
                audioEl.play().catch(() => {});   // Force play on mobile
                log("REMOTE AUDIO STREAM RECEIVED", "success");
            });
        }
    }

    async function setupAudio() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 128;
        remoteGain = audioCtx.createGain();
        remoteGain.gain.value = 1.0;
        analyser.connect(remoteGain);
        remoteGain.connect(audioCtx.destination);
    }

    function enablePTT() {
        document.getElementById('pttBtn').disabled = false;
        document.getElementById('bootBtn').innerText = "CHANNEL ACTIVE";
    }

    // PTT
    const pttBtn = document.getElementById('pttBtn');
    function pttDown() {
        if (localStream) localStream.getAudioTracks().forEach(t => t.enabled = true);
        document.getElementById('ledTx').style.background = "#ff3333";
        connections.forEach(c => { if(c.open) c.send({type:"TX_ON"}); });
    }
    function pttUp() {
        if (localStream) localStream.getAudioTracks().forEach(t => t.enabled = false);
        document.getElementById('ledTx').style.background = "#300";
        connections.forEach(c => { if(c.open) c.send({type:"TX_OFF"}); });
    }
    pttBtn.addEventListener('mousedown', pttDown);
    pttBtn.addEventListener('mouseup', pttUp);
    pttBtn.addEventListener('mouseleave', pttUp);
    pttBtn.addEventListener('touchstart', e=>{e.preventDefault(); pttDown();});
    pttBtn.addEventListener('touchend', e=>{e.preventDefault(); pttUp();});

    async function sendChat() {
        const input = document.getElementById('chatInput');
        if (!input.value.trim() || connections.length === 0) return;
        const msg = input.value.trim();
        addChat(msg, "YOU");
        connections.forEach(c => { if(c.open) c.send({type:"chat", msg}); });
        input.value = "";
    }

    function hardReset() {
        if (peer) peer.destroy();
        if (localStream) localStream.getTracks().forEach(t => t.stop());
        location.reload();
    }

    // Quick channels
    function createQuickChannels() {
        const container = document.getElementById('quickChannels');
        for (let i = 1; i <= 10; i++) {
            const num = i.toString().padStart(2, '0');
            const btn = document.createElement('button');
            btn.className = 'chan-btn';
            btn.textContent = num;
            btn.onclick = () => {
                document.getElementById('chanInput').value = num;
                document.querySelectorAll('.chan-btn').forEach(b=>b.classList.remove('active'));
                btn.classList.add('active');
                initChannel();
            };
            container.appendChild(btn);
        }
    }

    log("TAC/COM-04 v2.1 CROSS-NETWORK READY", "sys");
    log("STUN + TURN SERVERS LOADED — BETTER NAT TRAVERSAL", "success");
    createQuickChannels();
</script>
</body>
</html>
