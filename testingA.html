<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMNI-LINK v11.0 | GLOBAL</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --accent: #39ff14; --bg: #050505; --dim: #1a1a1a; }
        body { background: var(--bg); color: #e0e0e0; font-family: 'Courier New', monospace; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* UI Elements */
        .header { padding: 12px 20px; background: #0a0a0a; border-bottom: 1px solid var(--dim); display: flex; justify-content: space-between; align-items: center; }
        .console { flex: 1; overflow-y: auto; padding: 20px; background: #000; font-size: 12px; line-height: 1.5; }
        .status-badge { display: flex; align-items: center; gap: 8px; font-size: 10px; color: #666; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #333; transition: 0.3s; }
        .status-dot.active { background: var(--accent); box-shadow: 0 0 10px var(--accent); }
        
        /* Messaging */
        .entry { margin-bottom: 8px; border-left: 2px solid transparent; padding-left: 10px; word-break: break-all; }
        .local { color: var(--accent); border-left-color: var(--accent); }
        .remote { color: #00d4ff; border-left-color: #00d4ff; }
        .sys { color: #555; font-style: italic; }

        /* Controls */
        .panel { padding: 15px; background: #0a0a0a; border-top: 1px solid var(--dim); display: flex; gap: 10px; }
        input { flex: 1; background: #000; border: 1px solid #222; color: var(--accent); padding: 12px; outline: none; border-radius: 4px; }
        input:focus { border-color: var(--accent); }
        .btn { background: transparent; border: 1px solid var(--accent); color: var(--accent); padding: 0 20px; cursor: pointer; font-size: 11px; text-transform: uppercase; border-radius: 4px; }
        .btn:hover { background: var(--accent); color: #000; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<header class="header">
    <div style="color:var(--accent); font-weight:bold; letter-spacing:1px;">OMNI-LINK // GLOBAL_RELAY</div>
    <div class="status-badge">
        <span id="stText">OFFLINE</span>
        <div id="stDot" class="status-dot"></div>
    </div>
</header>

<main class="console" id="log"></main>

<div class="panel" id="setup">
    <input type="number" id="ch" placeholder="ENTER CHANNEL ID (e.g. 55)">
    <button class="btn" onclick="init()">START</button>
</div>

<div class="panel hidden" id="chat">
    <input type="text" id="msg" placeholder="TYPE DATA..." autocomplete="off">
    <button class="btn" onclick="send()">SEND</button>
</div>

<script>
    let peer = null, conn = null;
    const logEl = document.getElementById('log');
    const PREFIX = 'OMNI-GLOBAL-X-';

    // GLOBAL STUN CONFIGURATION (Essential for Cross-Network)
    const iceConfig = {
        'iceServers': [
            { 'urls': 'stun:stun.l.google.com:19302' },
            { 'urls': 'stun:stun1.l.google.com:19302' },
            { 'urls': 'stun:stun2.l.google.com:19302' },
            { 'urls': 'stun:stun3.l.google.com:19302' },
            { 'urls': 'stun:stun4.l.google.com:19302' }
        ]
    };

    function log(m, c) {
        const d = document.createElement('div');
        d.className = 'entry ' + (c || '');
        d.textContent = `[${new Date().toLocaleTimeString([], {hour12:false})}] ${m}`;
        logEl.appendChild(d);
        logEl.scrollTop = logEl.scrollHeight;
    }

    function init() {
        const id = document.getElementById('ch').value;
        if(!id) return;
        document.getElementById('setup').classList.add('hidden');
        log(`System: Routing through STUN relay for CH-${id}...`, "sys");

        // Attempt to create the Host Node
        peer = new Peer(PREFIX + id, { config: iceConfig, debug: 1 });

        peer.on('open', () => {
            log("System: Listening for remote signal.", "sys");
            document.getElementById('stText').textContent = "LISTENING";
        });

        peer.on('connection', (c) => {
            log("System: Incoming packet from remote network.", "sys");
            conn = c;
            setupConn();
        });

        peer.on('error', (err) => {
            if(err.type === 'unavailable-id') {
                log("System: Channel active. Initiating Handshake...", "sys");
                peer.destroy();
                // Connect as Guest
                const guest = new Peer({ config: iceConfig });
                guest.on('open', () => {
                    conn = guest.connect(PREFIX + id, { reliable: true });
                    setupConn();
                });
            } else {
                log("Critical: " + err.type, "sys");
                document.getElementById('setup').classList.remove('hidden');
            }
        });
    }

    function setupConn() {
        conn.on('open', () => {
            log("Link: GLOBAL SYNC SUCCESSFUL.", "sys");
            document.getElementById('stDot').classList.add('active');
            document.getElementById('stText').textContent = "ONLINE";
            document.getElementById('chat').classList.remove('hidden');
        });
        
        conn.on('data', (d) => {
            log("RECV: " + d, "remote");
        });

        conn.on('close', () => {
            log("Link: Connection Severed.", "sys");
            setTimeout(() => location.reload(), 2000);
        });
    }

    function send() {
        const i = document.getElementById('msg');
        if(i.value && conn && conn.open) {
            conn.send(i.value);
            log("SENT: " + i.value, "local");
            i.value = "";
        }
    }

    // Enter Key Support
    window.onkeydown = (e) => { if(e.key === 'Enter') send(); };
    log("OMNI-LINK v11.0 Core Loaded.", "sys");
</script>
</body>
</html>
