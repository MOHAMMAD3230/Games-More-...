<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OMNI-LINK v12.0</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --accent: #39ff14; --bg: #050505; --panel: #0f0f0f; --border: #222; }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background: var(--bg); color: #e0e0e0; font-family: 'Segoe UI', 'Courier New', monospace; 
            margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* Header - Desktop & Mobile friendly height */
        .header { 
            padding: 15px 20px; background: #000; border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }
        .brand { color: var(--accent); font-weight: bold; font-size: 14px; letter-spacing: 2px; }

        /* Console - Scrollable area */
        .console { 
            flex: 1; overflow-y: auto; padding: 20px; background: linear-gradient(180deg, #050505 0%, #000 100%);
            font-size: 13px; line-height: 1.6;
        }
        .entry { margin-bottom: 10px; word-break: break-all; padding: 8px; border-radius: 4px; background: rgba(255,255,255,0.02); }
        .local { color: var(--accent); border-right: 3px solid var(--accent); text-align: right; }
        .remote { color: #00d4ff; border-left: 3px solid #00d4ff; }
        .sys { color: #666; font-size: 11px; text-align: center; background: none; }

        /* Status Dot */
        .status-badge { display: flex; align-items: center; gap: 8px; font-size: 11px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: #333; transition: 0.5s; }
        .dot.active { background: var(--accent); box-shadow: 0 0 12px var(--accent); }

        /* Controls - Responsive Layout */
        .controls { 
            padding: 20px; background: var(--panel); border-top: 1px solid var(--border);
            display: flex; gap: 10px; width: 100%;
        }
        
        input { 
            flex: 1; background: #000; border: 1px solid var(--border); color: var(--accent);
            padding: 14px; outline: none; border-radius: 8px; font-family: inherit; font-size: 16px; /* 16px prevents iOS zoom on focus */
        }
        .btn { 
            background: transparent; border: 1px solid var(--accent); color: var(--accent);
            padding: 0 25px; cursor: pointer; border-radius: 8px; font-weight: bold;
            text-transform: uppercase; transition: 0.2s; font-size: 12px;
        }
        .btn:active { background: var(--accent); color: #000; transform: scale(0.95); }

        .hidden { display: none !important; }

        /* Desktop Adjustments */
        @media (min-width: 768px) {
            .console { padding: 40px 20% 20px 20%; }
            .controls { padding: 30px 20%; }
            .brand { font-size: 18px; }
        }
    </style>
</head>
<body>

<header class="header">
    <div class="brand">OMNI-LINK // v12</div>
    <div class="status-badge">
        <span id="stText">OFFLINE</span>
        <div id="stDot" class="dot"></div>
    </div>
</header>

<main class="console" id="log"></main>

<div class="controls" id="setup">
    <input type="number" id="ch" placeholder="CHANNEL ID" inputmode="numeric">
    <button class="btn" onclick="boot()">INITIALIZE</button>
</div>

<div class="controls hidden" id="chat">
    <input type="text" id="msg" placeholder="TRANSMIT DATA..." autocomplete="off">
    <button class="btn" onclick="send()">SEND</button>
</div>

<script>
    let peer = null, conn = null;
    const PREFIX = 'OMNI-V12-';

    function log(m, c) {
        const d = document.createElement('div');
        d.className = 'entry ' + (c || '');
        d.textContent = m;
        document.getElementById('log').appendChild(d);
        document.getElementById('log').scrollTop = document.getElementById('log').scrollHeight;
    }

    function boot() {
        const id = document.getElementById('ch').value;
        if(!id) return;
        
        document.getElementById('setup').classList.add('hidden');
        log("System: Punching through firewall...", "sys");

        // Advanced STUN configuration for cross-network
        peer = new Peer(PREFIX + id, {
            config: { 'iceServers': [
                { 'urls': 'stun:stun.l.google.com:19302' },
                { 'urls': 'stun:stun1.l.google.com:19302' }
            ]}
        });

        peer.on('open', () => {
            log("System: Node listening on CH-" + id, "sys");
            document.getElementById('stText').textContent = "LISTENING";
        });

        peer.on('connection', (c) => {
            conn = c;
            setupHandlers();
        });

        peer.on('error', (err) => {
            if(err.type === 'unavailable-id') {
                log("System: Peer found. Syncing...", "sys");
                peer.destroy();
                const guest = new Peer({ config: peer.options.config });
                guest.on('open', () => {
                    conn = guest.connect(PREFIX + id, { reliable: true });
                    setupHandlers();
                });
            } else {
                log("Error: " + err.type, "sys");
                document.getElementById('setup').classList.remove('hidden');
            }
        });
    }

    function setupHandlers() {
        conn.on('open', () => {
            log("System: GLOBAL LINK SECURED", "sys");
            document.getElementById('stDot').classList.add('active');
            document.getElementById('stText').textContent = "ONLINE";
            document.getElementById('chat').classList.remove('hidden');
        });
        conn.on('data', (d) => log(d, "remote"));
        conn.on('close', () => location.reload());
    }

    function send() {
        const i = document.getElementById('msg');
        if(i.value && conn && conn.open) {
            conn.send(i.value);
            log(i.value, "local");
            i.value = "";
        }
    }

    window.onkeydown = (e) => { if(e.key === 'Enter') send(); };
    log("OMNI-LINK v12.0 Ready.", "sys");
</script>
</body>
</html>
