<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OMNI-LINK v16.0</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --accent: #39ff14; --bg: #050505; --panel: #111; --border: #222; }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg); color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0; height: 100vh; height: -webkit-fill-available; 
            display: flex; flex-direction: column; overflow: hidden;
        }

        /* Responsive Header */
        .header { 
            padding: 15px 20px; background: #000; border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center; flex-shrink: 0;
        }
        .logo { color: var(--accent); font-weight: 800; font-size: 14px; letter-spacing: 1px; }

        /* Status Indicators */
        .indicators { display: flex; gap: 12px; }
        .ind-group { display: flex; flex-direction: column; align-items: center; }
        .ind-label { font-size: 8px; color: #555; text-transform: uppercase; margin-bottom: 4px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: #222; transition: 0.3s; }
        .dot.ready { background: #ffcc00; box-shadow: 0 0 10px #ffcc00; }
        .dot.active { background: var(--accent); box-shadow: 0 0 10px var(--accent); }

        /* Chat Display - Auto-scrolls */
        .chat-area { 
            flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px;
            background-image: radial-gradient(#111 1px, transparent 1px); background-size: 20px 20px;
        }
        .bubble { max-width: 80%; padding: 12px 16px; border-radius: 15px; font-size: 15px; line-height: 1.4; position: relative; }
        .sys-msg { align-self: center; background: none; color: #666; font-size: 12px; text-align: center; }
        .my-msg { align-self: flex-end; background: var(--accent); color: #000; font-weight: 500; border-bottom-right-radius: 2px; }
        .peer-msg { align-self: flex-start; background: #222; color: #fff; border-bottom-left-radius: 2px; }

        /* Footer Input Area */
        .controls { 
            padding: 15px; background: var(--panel); border-top: 1px solid var(--border);
            display: flex; gap: 10px; flex-shrink: 0; padding-bottom: calc(15px + env(safe-area-inset-bottom));
        }
        input { 
            flex: 1; background: #000; border: 1px solid var(--border); color: #fff; 
            padding: 14px; border-radius: 12px; font-size: 16px; outline: none; transition: 0.2s;
        }
        input:focus { border-color: var(--accent); }
        .send-btn { 
            background: var(--accent); border: none; color: #000; padding: 0 20px; 
            border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        .send-btn:active { transform: scale(0.9); }

        .hidden { display: none !important; }

        /* Desktop Optimization */
        @media (min-width: 768px) {
            .chat-area, .controls { padding-left: 25%; padding-right: 25%; }
            .logo { font-size: 18px; }
        }
    </style>
</head>
<body>

<header class="header">
    <div class="logo">OMNI-LINK // v16</div>
    <div class="indicators">
        <div class="ind-group"><span class="ind-label">Signal</span><div id="sig" class="dot"></div></div>
        <div class="ind-group"><span class="ind-label">Link</span><div id="lnk" class="dot"></div></div>
    </div>
</header>

<main class="chat-area" id="display">
    <div class="bubble sys-msg">Ready for deployment. Enter Channel ID.</div>
</main>

<div class="controls" id="setupUI">
    <input type="number" id="chan" placeholder="Channel (e.g. 77)" inputmode="numeric">
    <button class="send-btn" onclick="init()">CONNECT</button>
</div>

<div class="controls hidden" id="chatUI">
    <input type="text" id="textIn" placeholder="Type a message..." autocomplete="off">
    <button class="send-btn" onclick="push()">SEND</button>
</div>

<script>
    let p = null, c = null;
    const PFX = 'OMNI-V16-';

    function post(txt, cls) {
        const d = document.createElement('div');
        d.className = `bubble ${cls}`;
        d.textContent = txt;
        const area = document.getElementById('display');
        area.appendChild(d);
        area.scrollTop = area.scrollHeight;
    }

    function init() {
        const id = document.getElementById('chan').value;
        if(!id) return;
        
        document.getElementById('setupUI').classList.add('hidden');
        post("Establishing global signal...", "sys-msg");
        document.getElementById('sig').classList.add('ready');

        p = new Peer(PFX + id, {
            config: { 'iceServers': [
                { 'urls': 'stun:stun.l.google.com:19302' },
                { 'urls': 'stun:stun1.l.google.com:19302' },
                { 'urls': 'stun:stun2.l.google.com:19302' }
            ]}
        });

        p.on('open', () => post("Signal Active. Waiting for peer...", "sys-msg"));
        
        p.on('connection', (conn) => {
            c = conn;
            handleStream();
        });

        p.on('error', (e) => {
            if(e.type === 'unavailable-id') {
                post("Syncing with existing channel...", "sys-msg");
                p.destroy();
                const g = new Peer({ config: p.options.config });
                g.on('open', () => {
                    c = g.connect(PFX + id, { reliable: true });
                    handleStream();
                });
            } else {
                post("Error: " + e.type, "sys-msg");
                document.getElementById('setupUI').classList.remove('hidden');
            }
        });
    }

    function handleStream() {
        c.on('open', () => {
            document.getElementById('lnk').classList.add('active');
            document.getElementById('chatUI').classList.remove('hidden');
            post("Secure P2P Link Established.", "sys-msg");
            
            // Keep-alive to prevent mobile sleep
            setInterval(() => { if(c.open) c.send('::keepalive::'); }, 10000);
        });

        c.on('data', (data) => {
            if(data === '::keepalive::') return;
            post(data, "peer-msg");
        });

        c.on('close', () => {
            post("Connection closed.", "sys-msg");
            setTimeout(() => location.reload(), 2000);
        });
    }

    function push() {
        const el = document.getElementById('textIn');
        if(el.value && c && c.open) {
            c.send(el.value);
            post(el.value, "my-msg");
            el.value = "";
        }
    }

    window.onkeydown = (e) => { if(e.key === 'Enter') push(); };
</script>
</body>
</html>
