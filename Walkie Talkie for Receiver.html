<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAC/COM-04 | PUBLIC RELAY</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root {
            --crt-amber: #ffb000;
            --crt-bg: #0d0900;
            --main-red: #8c3024;
            --led-blue: #00d4ff;
        }

        body {
            background-color: #050505;
            color: var(--crt-amber);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .mainframe {
            width: 900px;
            height: 600px;
            background: #222;
            border: 10px solid #111;
            display: grid;
            grid-template-columns: 1fr 300px;
            padding: 20px;
            box-shadow: 0 0 50px #000;
        }

        .monitor {
            background: var(--crt-bg);
            border: 15px solid #1a1a1a;
            border-radius: 20px;
            padding: 20px;
            position: relative;
            box-shadow: inset 0 0 30px #000;
        }

        #output {
            height: 300px;
            overflow-y: auto;
            font-size: 0.85rem;
            line-height: 1.4;
            scrollbar-width: none;
        }

        .module {
            background: #111;
            padding: 15px;
            border: 1px solid #333;
            margin-bottom: 10px;
        }

        .btn-ptt {
            width: 100%;
            height: 80px;
            background: var(--main-red);
            color: white;
            border: 4px solid #5e1e16;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-ptt:active:not(:disabled) { background: #f00; }
        .btn-ptt:disabled { background: #333; opacity: 0.3; }

        .btn-action {
            width: 100%; padding: 10px; background: #333; color: #fff; border: 1px solid #555; cursor: pointer; margin-top: 5px;
        }

        input {
            width: 100%; background: #000; border: 1px solid #444;
            color: var(--crt-amber); padding: 5px; box-sizing: border-box; outline: none;
        }

        .status-led { width: 8px; height: 8px; border-radius: 50%; background: #200; display: inline-block; }
        .online { background: var(--led-blue); box-shadow: 0 0 8px var(--led-blue); }
        .tx { background: #f00; box-shadow: 0 0 8px #f00; }
        
        #meter { width: 100%; height: 8px; background: #111; margin-top: 10px; border: 1px solid #333; }
        #meter-fill { width: 0%; height: 100%; background: var(--crt-amber); transition: width 0.1s; }
    </style>
</head>
<body>

<div class="mainframe">
    <div class="monitor">
        <div style="font-size: 0.7rem; border-bottom: 1px solid #333; margin-bottom: 10px; display:flex; justify-content:space-between;">
            <span>ID: <span id="myId">----</span></span>
            <span>RELAY: 1500ms</span>
        </div>
        <div id="output">
            <div>> TAC/COM-04 READY.</div>
            <div style="color: #00d4ff;">> INITIALIZE AUDIO ENGINE TO COMMENCE.</div>
        </div>
        <div id="meter"><div id="meter-fill"></div></div>
    </div>

    <div class="side-panel" style="padding-left: 20px;">
        <div class="module">
            <button class="btn-action" style="border-color: #225522; color: #39ff14;" onclick="unlockAudio()">BOOT AUDIO ENGINE</button>
        </div>

        <div class="module">
            <input type="text" id="targetId" placeholder="Remote ID...">
            <button class="btn-action" onclick="startUplink()">LINK SATELLITE</button>
        </div>

        <div class="module">
            <button class="btn-ptt" id="pttBtn" disabled>PUSH TO TALK</button>
            <div style="margin-top:10px; font-size:0.5rem; display:flex; justify-content:space-around; color: #555;">
                <span><div class="status-led" id="ledNet"></div> NET</span>
                <span><div class="status-led" id="ledTx"></div> TRANS</span>
            </div>
        </div>
    </div>
</div>

<script>
    let peer, conn, localStream, audioCtx, delayNode, analyser;

    function log(msg, color="#ffb000") {
        const div = document.createElement('div');
        div.innerText = msg; div.style.color = color;
        document.getElementById('output').appendChild(div);
        document.getElementById('output').scrollTop = document.getElementById('output').scrollHeight;
    }

    async function unlockAudio() {
        if (location.protocol !== 'https:' && location.hostname !== 'localhost') {
            alert("Web Audio/Mic requires HTTPS (GitHub Pages Default).");
        }

        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            delayNode = audioCtx.createDelay(5.0);
            delayNode.delayTime.value = 1.5; // Satellite latency
            
            analyser = audioCtx.createAnalyser();
            delayNode.connect(analyser);
            analyser.connect(audioCtx.destination);
            
            updateMeter();
            
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                log("> MIC CAPTURE ACTIVE.");
                initPeer();
            } catch(e) {
                log("> ERR: MIC PERMISSION DENIED.", "red");
            }
        }
    }

    function initPeer() {
        peer = new Peer();
        peer.on('open', id => { 
            document.getElementById('myId').innerText = id; 
            log("> GLOBAL ID GENERATED: " + id, "#00d4ff");
        });

        // Receive Audio Call
        peer.on('call', call => {
            log("> INCOMING SATELLITE SIGNAL...");
            call.answer(localStream);
            call.on('stream', remoteStream => {
                const source = audioCtx.createMediaStreamSource(remoteStream);
                source.connect(delayNode);
                log("> SIGNAL LOCKED. AUDIO BUFFERING...");
            });
        });

        // Receive Data (LEDs/Beeps)
        peer.on('connection', c => { 
            conn = c; 
            setupDataHandlers(); 
            log("> REMOTE PEER CONNECTED.");
        });
    }

    function startUplink() {
        const tid = document.getElementById('targetId').value;
        if(!tid) return;
        
        log("> ESTABLISHING UPLINK TO " + tid);
        conn = peer.connect(tid);
        const call = peer.call(tid, localStream);
        
        call.on('stream', remoteStream => {
            const source = audioCtx.createMediaStreamSource(remoteStream);
            source.connect(delayNode);
        });
        
        setupDataHandlers();
    }

    function setupDataHandlers() {
        conn.on('open', () => {
            document.getElementById('ledNet').classList.add('online');
            document.getElementById('pttBtn').disabled = false;
            log("> UPLINK SECURE.", "#00d4ff");
        });
        conn.on('data', data => {
            if(data === 'TX_ON') document.getElementById('ledTx').classList.add('tx');
            if(data === 'TX_OFF') {
                document.getElementById('ledTx').classList.remove('tx');
                setTimeout(() => playBeep(450, 0.3), 1500); // Delay beep to match audio
            }
        });
    }

    function updateMeter() {
        if(!analyser) return;
        const dataArray = new Uint8Array(analyser.frequencyBinCount);
        analyser.getByteFrequencyData(dataArray);
        let sum = 0;
        for(let i=0; i<dataArray.length; i++) sum += dataArray[i];
        document.getElementById('meter-fill').style.width = Math.min(100, (sum/dataArray.length) * 2) + "%";
        requestAnimationFrame(updateMeter);
    }

    function playBeep(f, d) {
        if(!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.frequency.value = f;
        g.gain.value = 0.05;
        osc.connect(g); g.connect(audioCtx.destination);
        osc.start();
        g.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + d);
        osc.stop(audioCtx.currentTime + d);
    }

    const ptt = document.getElementById('pttBtn');
    ptt.onmousedown = () => {
        if(!conn) return;
        conn.send('TX_ON');
        document.getElementById('ledTx').classList.add('tx');
        playBeep(1200, 0.05);
    };
    ptt.onmouseup = () => {
        if(!conn) return;
        conn.send('TX_OFF');
        document.getElementById('ledTx').classList.remove('tx');
        playBeep(450, 0.25);
    };
</script>

</body>
</html>
