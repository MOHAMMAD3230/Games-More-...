<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TAC/COM-04 | CROSS-LINK</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root {
            --crt-amber: #ffb000;
            --crt-bg: #0d0900;
            --main-red: #8c3024;
            --led-blue: #00d4ff;
        }

        body {
            background-color: #050505;
            color: var(--crt-amber);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
            touch-action: manipulation;
        }

        .mainframe {
            width: 95%;
            max-width: 900px;
            background: #222;
            border: 5px solid #111;
            display: flex;
            flex-direction: column;
            padding: 15px;
            box-shadow: 0 0 50px #000;
            box-sizing: border-box;
        }

        @media (min-width: 768px) {
            .mainframe { display: grid; grid-template-columns: 1fr 300px; height: 600px; gap: 20px; }
        }

        .monitor {
            background: var(--crt-bg);
            border: 10px solid #1a1a1a;
            border-radius: 15px;
            padding: 15px;
            position: relative;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        #output {
            height: 200px;
            overflow-y: auto;
            font-size: 0.8rem;
            line-height: 1.4;
            scrollbar-width: none;
            margin-bottom: 10px;
        }

        .module {
            background: #111;
            padding: 12px;
            border: 1px solid #333;
            margin-bottom: 10px;
        }

        .btn-ptt {
            width: 100%;
            height: 100px;
            background: var(--main-red);
            color: white;
            border: 4px solid #5e1e16;
            font-weight: bold;
            font-size: 1.2rem;
            cursor: pointer;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-ptt:active:not(:disabled) { background: #f00; }
        .btn-ptt:disabled { background: #333; opacity: 0.3; cursor: not-allowed; }

        .btn-action {
            width: 100%; padding: 10px; background: #333; color: #fff; border: 1px solid #555; cursor: pointer; margin-top: 5px; font-size: 0.7rem;
        }

        input {
            width: 100%; background: #000; border: 1px solid #444;
            color: var(--crt-amber); padding: 8px; box-sizing: border-box; outline: none;
        }

        .status-led { width: 10px; height: 10px; border-radius: 50%; background: #200; display: inline-block; vertical-align: middle; }
        .online { background: var(--led-blue); box-shadow: 0 0 8px var(--led-blue); }
        .tx { background: #f00; box-shadow: 0 0 8px #f00; }
        
        #meter { width: 100%; height: 8px; background: #111; border: 1px solid #333; margin-top: auto; }
        #meter-fill { width: 0%; height: 100%; background: var(--crt-amber); transition: width 0.1s; }
    </style>
</head>
<body>

<div class="mainframe">
    <div class="monitor">
        <div style="font-size: 0.6rem; border-bottom: 1px solid #333; padding-bottom: 5px; margin-bottom: 10px; display:flex; justify-content:space-between;">
            <span>LINK-ID: <span id="myId" onclick="copyId()" style="cursor:pointer; text-decoration: underline;">----</span></span>
            <span>DELAY: 1.5s</span>
        </div>
        <div id="output">
            <div>> SYSTEM COLD BOOT...</div>
            <div style="color: #39ff14;">> STEP 1: CLICK "INITIALIZE"</div>
        </div>
        <div id="meter"><div id="meter-fill"></div></div>
    </div>

    <div class="side-panel">
        <div class="module">
            <button class="btn-action" style="border-color: #39ff14; color: #39ff14;" id="bootBtn" onclick="unlockAudio()">INITIALIZE ENGINE</button>
        </div>

        <div class="module">
            <input type="text" id="targetId" placeholder="Remote ID...">
            <button class="btn-action" onclick="startUplink()">LINK SATELLITE</button>
        </div>

        <div class="module" style="text-align:center;">
            <button class="btn-ptt" id="pttBtn" disabled>PUSH TO TALK</button>
            <div style="margin-top:10px; font-size:0.6rem; display:flex; justify-content:space-around; color: #666;">
                <span><div class="status-led" id="ledNet"></div> NET</span>
                <span><div class="status-led" id="ledTx"></div> TRANS</span>
            </div>
        </div>
    </div>
</div>

<script>
    let peer, conn, localStream, audioCtx, delayNode, analyser;

    function log(msg, color="#ffb000") {
        const div = document.createElement('div');
        div.innerText = msg; div.style.color = color;
        const out = document.getElementById('output');
        out.appendChild(div);
        out.scrollTop = out.scrollHeight;
    }

    function copyId() {
        const id = document.getElementById('myId').innerText;
        if(id === "----") return;
        navigator.clipboard.writeText(id);
        log("> ID COPIED TO CLIPBOARD.");
    }

    async function unlockAudio() {
        if (!audioCtx) {
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                delayNode = audioCtx.createDelay(5.0);
                delayNode.delayTime.value = 1.5;
                analyser = audioCtx.createAnalyser();
                delayNode.connect(analyser);
                analyser.connect(audioCtx.destination);
                
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                document.getElementById('bootBtn').style.display = "none";
                updateMeter();
                initPeer();
                log("> ENGINE ONLINE. MIC ACTIVE.");
            } catch(e) {
                log("> ERR: MIC REQUIRED FOR UPLINK.", "red");
            }
        }
    }

    function initPeer() {
        peer = new Peer();
        peer.on('open', id => { 
            document.getElementById('myId').innerText = id; 
            log("> GLOBAL ADDR: " + id, "#00d4ff");
            log("> SHARE THIS ID WITH REMOTE UNIT.");
        });

        peer.on('call', call => {
            log("> INCOMING SATELLITE SIGNAL...");
            call.answer(localStream);
            call.on('stream', remoteStream => {
                const source = audioCtx.createMediaStreamSource(remoteStream);
                source.connect(delayNode);
                log("> SIGNAL LOCKED.");
            });
        });

        peer.on('connection', c => { 
            conn = c; 
            setupDataHandlers(); 
        });
    }

    function startUplink() {
        const tid = document.getElementById('targetId').value.trim();
        if(!tid) return;
        log("> ESTABLISHING UPLINK...");
        conn = peer.connect(tid);
        const call = peer.call(tid, localStream);
        call.on('stream', remoteStream => {
            const source = audioCtx.createMediaStreamSource(remoteStream);
            source.connect(delayNode);
        });
        setupDataHandlers();
    }

    function setupDataHandlers() {
        conn.on('open', () => {
            document.getElementById('ledNet').classList.add('online');
            document.getElementById('pttBtn').disabled = false;
            log("> UPLINK SECURE. PTT ENABLED.", "#00d4ff");
            playBeep(800, 0.2);
        });
        conn.on('data', data => {
            if(data === 'TX_ON') document.getElementById('ledTx').classList.add('tx');
            if(data === 'TX_OFF') {
                document.getElementById('ledTx').classList.remove('tx');
                setTimeout(() => playBeep(450, 0.3), 1500);
            }
        });
    }

    function updateMeter() {
        if(!analyser) return;
        const dataArray = new Uint8Array(analyser.frequencyBinCount);
        analyser.getByteFrequencyData(dataArray);
        let sum = 0;
        for(let i=0; i<dataArray.length; i++) sum += dataArray[i];
        document.getElementById('meter-fill').style.width = Math.min(100, (sum/dataArray.length) * 2.5) + "%";
        requestAnimationFrame(updateMeter);
    }

    function playBeep(f, d) {
        if(!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.frequency.value = f;
        g.gain.value = 0.1;
        osc.connect(g); g.connect(audioCtx.destination);
        osc.start();
        g.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + d);
        osc.stop(audioCtx.currentTime + d);
    }

    const ptt = document.getElementById('pttBtn');
    
    // Desktop Events
    ptt.onmousedown = pttStart;
    ptt.onmouseup = pttEnd;
    
    // Mobile Touch Events
    ptt.addEventListener('touchstart', (e) => { e.preventDefault(); pttStart(); });
    ptt.addEventListener('touchend', (e) => { e.preventDefault(); pttEnd(); });

    function pttStart() {
        if(!conn || ptt.disabled) return;
        conn.send('TX_ON');
        document.getElementById('ledTx').classList.add('tx');
        playBeep(1200, 0.05);
    }

    function pttEnd() {
        if(!conn || ptt.disabled) return;
        conn.send('TX_OFF');
        document.getElementById('ledTx').classList.remove('tx');
        playBeep(450, 0.25);
    }
</script>

</body>
</html>
