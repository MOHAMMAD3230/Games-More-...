<script>
  /* ═══════════════════════════════════════════
     SECURITY: Lazy AudioContext creation
     - Avoids auto-play policy violations on mobile
     - Only initializes after user gesture
     ═══════════════════════════════════════════ */
  let audioCtx = null;
  function getAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') {
      audioCtx.resume();
    }
    return audioCtx;
  }

  /* ═══════════════════════════════════════════
     SECURITY: Input Sanitization
     - Strips all HTML tags (prevents injection into the API payload)
     - Removes javascript: URIs and event handler patterns
     - Enforces length limit (defense in depth with maxlength attribute)
     - Trims whitespace
     ═══════════════════════════════════════════ */
  function sanitizeInput(raw) {
    if (typeof raw !== 'string') return '';
    let clean = raw;
    // Strip HTML/XML tags
    clean = clean.replace(/<[^>]*>/g, '');
    // Remove javascript: protocol
    clean = clean.replace(/javascript\s*:/gi, '');
    // Remove inline event handler patterns
    clean = clean.replace(/on\w+\s*=\s*/gi, '');
    // Remove common encoding tricks
    clean = clean.replace(/&#(\d+);?/g, '');
    clean = clean.replace(/&#[xX]([0-9a-fA-F]+);?/g, '');
    // Enforce length limit
    clean = clean.substring(0, 500);
    // Trim
    clean = clean.trim();
    return clean;
  }

  /* ═══════════════════════════════════════════
     ACCESSIBILITY: Reduced motion preference
     ═══════════════════════════════════════════ */
  const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  /* ═══════════════════════════════════════════
     CANVAS SETUP
     ═══════════════════════════════════════════ */
  const sCanvas = document.getElementById('smokeCanvas');
  const sCtx = sCanvas.getContext('2d');
  const wCanvas = document.getElementById('waveCanvas');
  const wCtx = wCanvas.getContext('2d');

  let parts = [];
  let psi = 0;
  let active = false;
  let errorState = false;
  let waveOffset = 0;
  let fanRot = 0;
  let fuel = 100;

  /* ═══════════════════════════════════════════
     GAUGE HELPERS
     ═══════════════════════════════════════════ */
  function createTicks(groupId, startAngle, endAngle, numTicks) {
    numTicks = numTicks || 10;
    var group = document.getElementById(groupId);
    if (!group) return;
    for (var i = 0; i <= numTicks; i++) {
      var angleDeg = startAngle + (i / numTicks) * (endAngle - startAngle);
      var angleRad = angleDeg * Math.PI / 180;
      var x1 = 100 + 80 * Math.cos(angleRad);
      var y1 = 100 + 80 * Math.sin(angleRad);
      var x2 = 100 + 72 * Math.cos(angleRad);
      var y2 = 100 + 72 * Math.sin(angleRad);
      var line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', x1);
      line.setAttribute('y1', y1);
      line.setAttribute('x2', x2);
      line.setAttribute('y2', y2);
      line.setAttribute('stroke', '#fff');
      line.setAttribute('stroke-width', '1');
      group.appendChild(line);
    }
  }

  function animateNeedle(needleId, targetValue, max) {
    max = max || 100;
    var needle = document.getElementById(needleId);
    if (!needle) return;
    var endAngle = (targetValue / max) * 300 - 150;
    needle.style.transition = active ? 'transform 0.5s ease-in' : 'transform 1.5s ease-out';
    needle.setAttribute('transform', 'rotate(' + endAngle + ' 100 100)');
  }

  function setIndicator(indicatorId, color, shouldBlink) {
    var container = document.getElementById(indicatorId);
    if (!container) return;
    var inner = container.querySelector('.indicator-inner');
    if (!inner) return;
    inner.setAttribute('fill', color);
    inner.style.animation = shouldBlink
      ? 'blink 1s infinite, brightness-blink 1s infinite'
      : 'none';
  }

  function flushGauges() {
    animateNeedle('needle1', 0);
    animateNeedle('needle2', 0);
    animateNeedle('needle3', 0);
    setIndicator('indicator1', '#00d4ff', true);
    setIndicator('indicator2', '#00d4ff', true);
    setIndicator('indicator3', '#00d4ff', true);
  }

  function simulateNetworkData() {
    if (active) return;
    var netSpeed = Math.random() * 100;
    var dlSpeed = Math.random() * 100;
    var ulSpeed = Math.random() * 100;
    animateNeedle('needle1', netSpeed);
    animateNeedle('needle2', dlSpeed);
    animateNeedle('needle3', ulSpeed);
    setIndicator('indicator1', 'red', false);
    setIndicator('indicator2', dlSpeed > 30 ? 'green' : 'yellow', true);
    setIndicator('indicator3', '#FFA500', true);
  }

  /* ═══════════════════════════════════════════
     CLOCK
     ═══════════════════════════════════════════ */
  function updateClock() {
    var now = new Date();
    var el = document.getElementById('liveClock');
    if (el) el.textContent = now.toTimeString().split(' ')[0];
  }

  function updateChronos() {
    var now = new Date();
    var hSec = document.getElementById('h-sec');
    var hMin = document.getElementById('h-min');
    var hHour = document.getElementById('h-hour');
    if (hSec) hSec.style.transform = 'rotate(' + ((now.getSeconds() * 6) + (now.getMilliseconds() * 0.006)) + 'deg)';
    if (hMin) hMin.style.transform = 'rotate(' + ((now.getMinutes() * 6) + (now.getSeconds() * 0.1)) + 'deg)';
    if (hHour) hHour.style.transform = 'rotate(' + ((now.getHours() % 12 * 30) + (now.getMinutes() * 0.5)) + 'deg)';
    requestAnimationFrame(updateChronos);
  }

  /* ═══════════════════════════════════════════
     VOLTAGE SLIDER (event handler in JS, not inline)
     ═══════════════════════════════════════════ */
  function adjustVoltage(val) {
    var core = document.getElementById('glowCore');
    if (!core) return;
    if (!active) {
      core.style.opacity = val;
      core.style.boxShadow = '0 0 ' + (val * 40) + 'px var(--aether)';
    }
  }

  /* ═══════════════════════════════════════════
     AUDIO (lazy AudioContext)
     ═══════════════════════════════════════════ */
  function snd(f, d, v, type) {
    try {
      var ctx = getAudio();
      v = v || 0.05;
      type = type || 'sine';
      var o = ctx.createOscillator();
      var g = ctx.createGain();
      o.type = type;
      o.frequency.value = f;
      g.gain.setValueAtTime(v, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + d);
      o.connect(g);
      g.connect(ctx.destination);
      o.start();
      o.stop(ctx.currentTime + d);
    } catch (e) {
      /* Audio failure is non-critical — silently ignore */
    }
  }

  function steamHiss(duration, volume) {
    try {
      var ctx = getAudio();
      duration = duration || 1.2;
      volume = volume || 0.1;
      var buffer = ctx.createBuffer(1, ctx.sampleRate * duration, ctx.sampleRate);
      var data = buffer.getChannelData(0);
      for (var i = 0; i < buffer.length; i++) data[i] = Math.random() * 2 - 1;
      var source = ctx.createBufferSource();
      source.buffer = buffer;
      var g = ctx.createGain();
      g.gain.setValueAtTime(volume, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + duration);
      source.connect(g);
      g.connect(ctx.destination);
      source.start();
    } catch (e) {
      /* Audio failure is non-critical */
    }
  }

  /* ═══════════════════════════════════════════
     WAVE CANVAS
     ═══════════════════════════════════════════ */
  function drawWave() {
    if (!wCanvas) return;
    wCtx.clearRect(0, 0, wCanvas.width, wCanvas.height);
    wCtx.beginPath();
    wCtx.strokeStyle = errorState ? '#f00' : (active ? '#00d4ff' : '#0f0');
    wCtx.lineWidth = 2;
    var amp = 10 + (psi / 4) + (active ? 40 : 0);
    var freq = 0.05 + (active ? 0.3 : 0);
    for (var x = 0; x < wCanvas.width; x++) {
      var y = errorState
        ? (wCanvas.height / 2 + (Math.sin(x * freq + waveOffset) > 0 ? amp : -amp))
        : (wCanvas.height / 2 + Math.sin(x * freq + waveOffset) * amp);
      if (x === 0) wCtx.moveTo(x, y);
      else wCtx.lineTo(x, y);
    }
    wCtx.stroke();
    waveOffset += 0.15 + (psi / 200) + (errorState ? 0.5 : 0);
    requestAnimationFrame(drawWave);
  }

  /* ═══════════════════════════════════════════
     ENGINE LOOP (smoke + fan)
     ═══════════════════════════════════════════ */
  function engineLoop() {
    sCtx.clearRect(0, 0, sCanvas.width, sCanvas.height);

    if (!prefersReducedMotion && (psi > 0 || active)) {
      if (Math.random() < (active ? 0.8 : 0.3)) {
        parts.push({ x: 50, y: 50, vx: (Math.random() - 0.5) * 4, vy: -3, s: 2, a: 1 });
      }
    }

    var fanSpeed = 2 + (psi / 10) + (active ? 30 : 0);
    if (!prefersReducedMotion) {
      fanRot += fanSpeed;
    }
    var fanSvg = document.getElementById('fan-svg');
    if (fanSvg) fanSvg.style.transform = 'rotate(' + fanRot + 'deg)';

    var fuelBar = document.getElementById('fuelBar');
    if (fuelBar) fuelBar.style.height = fuel + '%';

    for (var i = parts.length - 1; i >= 0; i--) {
      var p = parts[i];
      p.x += p.vx;
      p.y += p.vy;
      p.s += 0.4;
      p.a -= 0.02;
      sCtx.globalAlpha = Math.max(0, p.a);
      sCtx.fillStyle = active ? '#fff' : '#bbb';
      sCtx.beginPath();
      sCtx.arc(p.x, p.y, p.s, 0, Math.PI * 2);
      sCtx.fill();
      if (p.a <= 0) parts.splice(i, 1);
    }

    requestAnimationFrame(engineLoop);
  }

  /* ═══════════════════════════════════════════
     ENGINE CONTROLS (event handlers via addEventListener)
     ═══════════════════════════════════════════ */
  function handleEngine() {
    var btn = document.getElementById('mainBtn');
    if (!btn) return;
    if (fuel <= 0) return;

    if (btn.textContent === 'ENGAGE BOILER') {
      btn.textContent = 'SHOVEL COAL';
    } else {
      fuel -= 15;
      psi += 25;
      snd(60 + (psi * 0.4), 0.4, 0.1, 'sawtooth');

      var needle = document.getElementById('p-needle');
      if (needle) needle.style.transform = 'rotate(' + (-120 + (psi * 2.4)) + 'deg)';

      if (fuel <= 0) {
        fuel = 0;
        btn.disabled = true;
        var plaque = document.getElementById('plaqueText');
        if (plaque) plaque.textContent = 'OPEN COAL CHUTE';
      }
      if (psi >= 125) {
        var deck = document.getElementById('deck');
        if (deck) deck.style.animation = 'shake 0.2s infinite';
        steamHiss(0.2, 0.04);
      }
      if (psi >= 100 && !active) {
        var key = document.getElementById('t-key');
        if (key) key.style.display = 'flex';
      }
    }
  }

  /* ═══════════════════════════════════════════
     UPLINK — API CALL WITH FULL SECURITY HARDENING
     - Input sanitization before transmission
     - AbortController timeout (15s)
     - Response type validation
     - JSON parse error handling
     - Output truncation for performance
     - textContent only (XSS-safe rendering)
     ═══════════════════════════════════════════ */
  async function runUplink() {
    active = true;
    errorState = false;

    var vTube = document.getElementById('vTube');
    if (vTube) vTube.classList.add('active-link');

    flushGauges();
    steamHiss(2.0, 0.2);

    var resultsEl = document.getElementById('results');
    if (resultsEl) resultsEl.textContent = 'DATA FLUSHED. TRANSMITTING AETHER PULSE...';

    try {
      var rawQuery = document.getElementById('query').value;
      var sanitized = sanitizeInput(rawQuery);

      if (!sanitized) {
        throw new Error('FREQUENCY MODULATION EMPTY');
      }

      // SECURITY: AbortController prevents infinite hang on network failure
      var controller = new AbortController();
      var timeoutId = setTimeout(function() { controller.abort(); }, 15000);

      var res = await fetch('https://ouadtdnyyaxprbdeotvl.supabase.co/functions/v1/usda-proxy', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query: sanitized }),
        signal: controller.signal
      });

      clearTimeout(timeoutId);

      if (!res.ok) {
        throw new Error('UPLINK ERROR: HTTP ' + res.status);
      }

      // SECURITY: Validate JSON response before processing
      var data;
      try {
        data = await res.json();
      } catch (parseErr) {
        throw new Error('UPLINK PARSE ERROR: Invalid response format');
      }

      // SECURITY: Validate response is an object (not a string with injected HTML)
      if (data === null || typeof data !== 'object' || Array.isArray(data)) {
        // Arrays and primitives are safe to stringify via textContent
      }

      // SECURITY: textContent is immune to XSS — even if API returns malicious HTML
      var displayText = JSON.stringify(data, null, 2);

      // Truncate extremely long responses to prevent UI freeze
      if (displayText.length > 10000) {
        displayText = displayText.substring(0, 10000) + '\n\n[... OUTPUT TRUNCATED FOR PERFORMANCE ...]';
      }

      if (resultsEl) resultsEl.textContent = displayText;

    } catch (e) {
      errorState = true;
      var errorMsg = 'UPLINK FAILED';
      if (e.name === 'AbortError') {
        errorMsg += ': TRANSMISSION TIMEOUT (15s)';
      } else {
        // SECURITY: Error message via textContent — no injection possible
        errorMsg += ': ' + (e.message || 'UNKNOWN ERROR');
      }
      if (resultsEl) resultsEl.textContent = errorMsg;
    } finally {
      setTimeout(function() {
        active = false;
        psi = 0;
        errorState = false;

        var deck = document.getElementById('deck');
        if (deck) deck.style.animation = 'none';

        if (vTube) vTube.classList.remove('active-link');

        var needle = document.getElementById('p-needle');
        if (needle) needle.style.transform = 'rotate(-120deg)';

        var btn = document.getElementById('mainBtn');
        if (btn) btn.textContent = 'ENGAGE BOILER';

        steamHiss(1.5, 0.1);
      }, 4000);
    }
  }

  function tapKey() {
    snd(1200, 0.1, 0.3, 'square');
    var key = document.getElementById('t-key');
    if (key) key.style.display = 'none';
    runUplink();
  }

  function inspectPlaque() {
    var p = document.getElementById('plaqueText');
    if (!p) return;

    if (p.textContent === 'OPEN COAL CHUTE') {
      snd(100, 0.5, 0.2, 'square');
      fuel = 100;
      p.textContent = 'ASHRAF ALI';
      var btn = document.getElementById('mainBtn');
      if (btn) {
        btn.disabled = false;
        btn.textContent = 'ENGAGE BOILER';
      }
    } else {
      snd(400, 0.1, 0.1);
      p.textContent = (p.textContent === 'ASHRAF ALI') ? 'OMNI-CHASSIS' : 'ASHRAF ALI';
    }
  }

  /* ═══════════════════════════════════════════
     RESIZE HANDLER
     ═══════════════════════════════════════════ */
  function resize() {
    var d = document.getElementById('deck');
    if (d) {
      sCanvas.width = d.offsetWidth;
      sCanvas.height = d.offsetHeight;
    }
    wCanvas.width = 120;
    wCanvas.height = 120;
  }

  /* ═══════════════════════════════════════════
     EVENT LISTENERS (all moved from inline handlers)
     ═══════════════════════════════════════════ */
  document.addEventListener('DOMContentLoaded', function() {
    // Main button
    var mainBtn = document.getElementById('mainBtn');
    if (mainBtn) mainBtn.addEventListener('click', handleEngine);

    // Telegraph key
    var tKey = document.getElementById('t-key');
    if (tKey) tKey.addEventListener('click', tapKey);

    // Plaque — supports both click and keyboard (Enter/Space) for accessibility
    var plaque = document.getElementById('plaqueText');
    if (plaque) {
      plaque.addEventListener('click', inspectPlaque);
      plaque.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          inspectPlaque();
        }
      });
    }

    // Voltage slider
    var vSlider = document.getElementById('vSlider');
    if (vSlider) {
      vSlider.addEventListener('input', function() {
        adjustVoltage(this.value);
      });
    }

    // Allow Enter key on query input to trigger boiler
    var queryInput = document.getElementById('query');
    if (queryInput) {
      queryInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
          e.preventDefault();
          handleEngine();
        }
      });
    }

    // Initialize
    resize();
    createTicks('ticks1', -150, 150);
    createTicks('ticks2', -150, 150);
    createTicks('ticks3', -150, 150);
    engineLoop();
    drawWave();
    updateChronos();
    adjustVoltage(0.2);

    setInterval(updateClock, 1000);
    setInterval(simulateNetworkData, 2000);
  });

  // Debounced resize
  var resizeTimer;
  window.addEventListener('resize', function() {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(resize, 150);
  });
</script>
