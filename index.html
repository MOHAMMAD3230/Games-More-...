<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MY_STUFF with Matrix Background and Categories Box</title>
  <style>
    /* Matrix animated background canvas style */
    #matrix {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      background: #000010;
      display: block;
    }

    /* Box container style for categories */
    .categories-box {
      max-width: 400px;
      margin: 30px auto;
      background: rgba(0, 0, 20, 0.8); /* semi-transparent dark */
      border: 2px solid #00bfff;      /* bright blue border */
      border-radius: 10px;
      padding: 20px 30px;
      color: white;
      font-family: monospace, monospace;
      box-shadow: 0 0 15px rgba(0, 191, 255, 0.9);
      overflow-wrap: break-word;
    }

    .categories-box a {
      color: #00bfff;
      text-decoration: none;
      font-weight: bold;
    }

    .categories-box a:hover {
      text-decoration: underline;
    }

    /* Additional style to ensure text inside <pre> wraps nicely */
    .categories-box pre {
      white-space: pre-wrap;
      margin: 0;
    }
  </style>
</head>
<body>
  <canvas id="matrix"></canvas>

  <div class="categories-box">
    <h3>Untitled</h3>
</div>

<div class="categories-box">
<pre>
         <a href="snake.html" style="color:#00bfff;">Online Snake Game</a> <br>

  </pre>

</div>



  
 
  <!-- Place the rest of your paste.txt content exactly here, outside the box container if needed -->

  <script>
    // Matrix animation code
    const canvas = document.getElementById('matrix');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const characters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ1234567890@#$%^&*()+~{}[]<>?';
    const fontSize = 20;
    const columns = Math.floor(canvas.width / fontSize);
    const drops = new Array(columns).fill(0);

    function draw() {
      ctx.fillStyle = 'rgba(0, 0, 16, 0.1)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.font = fontSize + 'px monospace';

      for (let i = 0; i < drops.length; i++) {
        const text = characters.charAt(Math.floor(Math.random() * characters.length));
        ctx.fillStyle = (i % 2 === 0) ? '#00bfff' : '#e0f7ff';
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);

        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
          drops[i] = 0;
        }
        drops[i]++;
      }
    }

    setInterval(draw, 50);

    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });
  </script>
</body>
</html>
